body:
  text: 嚴仲慤宋文森畢紫嵐傳嚴仲慤法名大參自號𨍏轢道人嘉興人也嗣法於天童費隱和尚其自敘云參道人恆喜順風揚帆隨緣放曠偶遊雙徑遇聞谷大師授以向上一著苦究三載了無所入適閲法眼指簾公案忽然身心世界盡情脫落祖師關捩徹底掀翻再謁聞谷大師憨山大師天隱和尚皆承許可復見密雲老人老人舉杖便作倒身勢老人植杖即起身據坐老人橫杖抽身便走老人趕趁轉身向曰咄哉老僧又來泥裏洗土塊老人便休隱居二十八載費隱容和尚首嗣老人法席乃往問曰古人道百尺竿頭進步百尺竿頭即不問如何是進步處容便打云向這裏轉身道人云這猶是百尺竿未是進步在容又打云不知進退漢道人云山猫原是短腳的容云這畜生道人作虎跳勢容云莫揑怪道人作擒僧勢哮吼而出容即上堂云今日諸人莫撒沙試聽山僧一指述嘉禾有個老鼠子偷却上天一粒粟慣向諸方弄爪牙惹得清風香拂拂獨是山僧不近情白棒掀天直打出且轉身一句又作麼生道道人掩耳出堂後容將如意云付汝表信道人舉手接云沒手人得接容曰接了也道人展兩手容曰流傳去也𨍏轢便禮拜而出嘗自圖其影費隱為之贊曰斗笠不遮眼鋤頭不著地何似山中人了了心無緒腰束裙而寬手露臂而冷欲行不行前頭無門鑿開虗空一竅許大地人在此屙矢放溺是𨍏轢平日之受用呵呵大笑把起鋤頭須放下草鞋何不脫來賣咄咄咄明月清風得自在仲慤禮謝費隱不顧便與一踢費隱曰好像一隻狂狗仲慤曰早被我一口其友周知微病篤仲慤往視道及家事仲慤云公一生學道得力處正在此際不得雜念知微即舉拳曰是甚麼仲慤曰也是閒言語知微點首曰願與兄世世結為道中骨肉仲慤曰驀直去知微即坐椅而逝𨍏轢機緣宋文森名世隆長洲人父學程夢文殊抱子授之而生故初名曰文年四歲聽父讀金剛經即能誦四句偈既長補諸生年五十餘遭家多故成疾偶觸華嚴經無著無縛解脫句有會遂長齊斷欲日誦金剛經月餘病起中秋夕見堂前角燈光不透脫不覺感慨默坐參究久之忽汗下通身胸中廓然作偈曰主主賓賓無主賓分明指點愈迷津偶然風觸燈中火却遇當家舊主人又曰今日方知吾喪吾凡情聖解一齊枯親朋問我如何是者也之乎隻字無頃之聞天笠珍禪師宗風甚盛欲往咨決適師過蘇之大雲菴文森往謁既見即云龍腦薄荷香聞天下師云可要乾矢橛麼隨問云如何是乾矢橛文森云八面春風師云來此作麼文森云不求佛不求法要討個了當師厲聲曰萬劫千生不得了文森言下有省師尋去之杭州南澗文森再往謁之師曰向在甚麼處得這個消息文森曰向在孟夫子飯糗茹草章曾打一個輥曰如何文森曰龐公云但自無心於萬物何妨萬物常圍繞語未畢師擊几云可惜一個龐公尚打作兩橛文森頓省前過明年再往南澗謁師在堂中有問未生前面目者文森應曰螺髻峯少頃進見師云好箇螺髻峰只恐未肯點頭在因舉六祖師秀菩提樹話問和尚如何道師云掀倒菩提樹打翻明鏡臺髑髏都粉碎處處絶塵埃文森云也不過到此師拂衣而起拍文森肩曰如今可把六祖神秀并老僧與居士縛做一束拋向錢塘江裏去文森頓悟臨濟喫三頓痛棒意旨遂口占偈云生前面目絶追求螺髻峰高解點頭一句頓超三頓棒凡情聖解付東流居三年師過蘇泊舟盤門呼文森往謂曰老僧九坐道場欲來一休歇了徹人莫如居士老僧有末後付囑可承當此事既去遂遣兩僧齎拂子授之師行至謝村遂沐浴更衣坐逝康熙四十一年文森得脾疾示禪客曰末後何必有句末後何必無句刀山劒樹上翻身鑊湯爐炭中躲避無端七十餘年總是逢場作戲今日尚要賣弄一番咄你看這粉碎枯髏那有一點西來之意其妻疾亟以告文森不往第傳語云子去我且行矣遂後妻數刻而逝城南遺稿畢紫嵐名奇江南歙人也少避難之杭州寓僧舍閲金剛般若經始知信向繼閲祖師語録疑之有堂頭僧教看南泉斬猫公案久之聞斧聲有省頗自負尋入馬首山有醒愚禪師者結茅山居灰頭土面紫嵐一見以機語相接醒愚微哂而已明日復往見請益醒愚徵前語指其負墮處令參一歸何處居數月其所親訪得之要與俱歸紫嵐歸參究甚力行止不少閒閲五年偶閲巖頭語大悟再謁醒愚醒愚笑曰今日始知吾不欺汝也自是常居僧舍持佛戒終日瞑坐自號懶菴夜臥不夢者二十年其妻至輒引避子死亦弗哭也居蘇州支硎山德雲菴最久嘗示禪客云參話頭有法不可不知何謂法一念真疑無閒斷是也何謂一念真疑如雪巖云盡三百六十骨節八萬四千毛竅并作個趙州無字一提提起如一團熱鐵如一堆烈𦦨相似並無昏沉散亂之相可得又如高峰云萬法歸一一歸何處世間一切萬法總歸一法畢竟歸在何處決定要討個分曉此之謂一念真疑也你若道趙州無字圓同太虗無缺無餘若起心動念便不是趙州無字矣又萬法歸一一者心也一歸何處乃是處而無處無處而處若真有處則不是不是也如此云云謂之第二念盡落知解知解愈精去道愈遠近世馳聲走譽者都從第二念而入外面看時句句般若其實皆是意識依通認賊為子可不哀耶何謂無間斷今日也一念真疑而參明日也一念真疑而參不論年那管月但時時刻刻一念真疑而參必要實證實悟大法現前而後已此之謂無間斷也若果如是一念真疑如是無間斷自然有日不期而然話頭參破而明心見性矣又云古聖道涅槃心易曉差別智難明此兩句最元最微非大法現前不知其故而今諸方盡作世諦解會謂打一七二七略有省入即知此心為涅槃心從此討機緣論公案這則明白那則誵訛那則明白這則誵訛必要推敲逐個透盡此則謂之差別智故曰涅槃心易曉差別智難明也這般的都是地獄漢何以故都是將意識為涅槃心都是學得胡言漢語為差別智耳所以諸方付法之後將機緣公案揣摩得依稀倣佛向人前拏三說七指白道黃以為得大機顯大用冤哉冤哉佛法安得不平沉耶好教爾知大凡真參話頭者不到大徹大悟斷不敢開口妄談佛法一大徹大悟縱有百千機緣萬億公案當下一串穿起掛在眉邊若也未能則是不曾大徹大悟而汝揣摩得依稀倣佛向人前拏三說七指黃道白者盡是汝意識堆中狼藉糞穢也是以懶菴改曰涅槃心一曉差別智全明高流異衲諦聽諦聽其他論著頗多此其最切者康熙四十七年終於德雲菴菴主如珏為之殮收其遺書有別傳録八卷行世別傳録畢居士傳知歸子曰近世士大夫學禪者頗衆然多掠影宗門掉弄知解求其真實參悟者蓋難其人諸方希圖外護付囑如麻適足為門風玷耳嚴宋諸君苦心斯道既有歷年邂逅因緣卒明大法蓋猶有楊李之風焉紫嵐之論禪病最為深痛善學者由是而求之其於邪正之界不昭如白黑矣乎
