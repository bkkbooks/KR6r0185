body:
  text: 嚴敏卿陸與繩傳嚴敏卿名訥蘇州常熟人也嘉靖二十年進士官翰林院侍讀三吳數被倭患歲復大祲民死徙幾半有司徵斂益急敏卿疏陳民困請蠲貸報可纍遷吏部尚書承嚴嵩亂政後吏道污雜敏卿力為振戒朝士無得私謁慎擇曹郎抑奔競振淹滯銓政一新人稱之曰嚴青天拜武英殿大學士尋致仕歸居常信奉佛法歸心淨土著樂文類序云昔善逝愍群生之旋復於諸苦趣也指樂令歸依列聖幽讚宿耆受生者不一載諸竺墳燦如星陳及後之宗焉者漸遠率以聲色求而不知求諸心故大鑒示以惟心俾知欲得淨土當淨其心是善逝説觀佛而示是心是佛之旨也是具三心十心而往生之方也是法藏發勝願其心寂靜志無所著之因行也及後之宗焉者漸遠率弟視九品恬嬉具縛夫恬嬉具縛則諸佛不必出世而度生而群生之流浪無已也不求諸心則愈求愈遠三聖之觀皆外逐於相也聖人因病以致藥衆生因藥而滋可不哀耶是故稱樂所以使理即者緣般若而修證拯流浪於苦輪也言唯心所以使觀行者本法身而解脫見三聖於真常也善逝指人以寶藏大鑒啓之以元鑰大鑒示人以因華善逝接人以果地也披其華而遺其果猶夫無華矣有其藏而不能啓猶夫無藏矣事樂者能外夫唯心耶古今吾心之古今也延極三世而不可際也剎界吾心之剎界也廣被無邊而不可窮也淨而四聖染而六凡吾心之四聖六凡也不曰唯心將安所而求樂也誠知唯心必不能無事於樂也蠢爾含生遠自無始於無生而妄生於無我而執我三縛十使習染久矣非籍濟願船棲靈聖域則菩薩尚迷於隔陰聲聞有昧於出胎乃下焉者而可自期不退哉文殊七佛導師也無生忍非不證也而受記往生善財一生圓曠劫之果者也第一義非不聞也而發願導歸不事樂將何修而盡惟心之妙也吾心中之阿彌陀佛於因地所莊嚴吾心之勝土為樂原我之初與阿彌陀佛無二無別我則迷而流浪為佛心中之衆生佛則覺而修證為衆生心中之佛耳我心即佛心我不可得而我也佛心即我心佛不可得而他也不可得而他之佛念念度生無間於我而衆生執不可得而我之幻我背覺合塵役役而顛冥於三界悲夫故盡修乎樂者所以盡修乎吾心也盡修乎吾心所以遠離顛倒而證我所同於阿彌陀佛者也諸佛別無所證全證衆生本性耳凡阿彌陀佛所具足我亦具足不離我心故樂非相即我心故非空無相即相非相故即相非相則依正皆真生佛同體矣依正皆真生佛同體則樂之過去尊音王如來未嘗入滅未來功德山王如來久已成佛現在阿彌陀如來在十萬億佛剎外而靡所隔也八萬四千隨形好隨念隨見我心非往彼佛不來如鏡中燈如水中月鏡非攬燈燈自現鏡月非入水水常含月在在爾法法爾毫相常觀而非觀寶臺無生而往生若然者謂之惟心乎謂之樂乎吾不得而知也鹿亭上人梓宋曉師所集樂文類乞豫言辨其卷遂為稽首佛祖抒臆見而𢌿之隆慶萬歷間蓮池宏公以淨土法門倡於雲棲敏卿實為外護居鄉好施豫出語唯恐傷人歲飢致書當事請蠲租者三民甚德之稱之曰嚴老佛年七十有四卒贈少保諡文靖次子名澄字道徹號天池山樵少有清節敏卿既入閣澄侍母歸所過或饋之金澄曰父辭之朝而子受之塗可乎固却之師事管東溟傳其學既又與瞿元立參究宗乘以蔭為中書舍人官至邵武知府晚而家居奉雲棲之教子朴淳謹樂善年二十五得疾將卒澄謂曰毋雜思但一心念佛朴曰諾澄又曰從今以往吾亦一心念佛朴喜曰審如是兒無慮矣正容合掌而逝澄乃取朴所刻龍舒淨土文印之廣遺親故繫以書曰澄一病幾殆不意復生雖則苟延焉知來日回首營生舊計有同嚼蠟一具皮囊終須敗壞六塵緣影何處堅牢不如換却凡心求生淨土誦彌陀一句消罪業無邊聊奉勸文用表誠意卒年七十八弟澤字開宗官中書舍人慷慨能急人之難臨終書偈曰大千世界浩茫茫俱是爭名奪利場今日老夫撒手去萬緣都淨見空王投筆而逝澤子拭字子張崇禎七年進士知信陽州有守禦功入本朝大吏交章論薦不出搆小楞伽室於錦峯山祖墓旁息心禪誦一日晨起禮佛畢趺坐脫去弟濟字道行太學生工書有手書楞嚴經行世明史常熟志雲棲法彙淨土文跋樂邦文類序陸與繩名光祖號五臺居士平潮人也嘉靖二十六年成進士除濬縣知縣遷南京禮部主事歷官驗封郎中轉考功及文選萬歷中纍遷吏部尚書與繩公忠強直練達掌故先後居吏部力持清議推轂豪俊不遺疏賤人望翕然歸之亦因是為忌者所中屢退間家居究心佛乘發宏護之願不以毀譽易心嘗為文募刻五燈會元其辭曰夫佛道東流至晉宋齊梁之間學佛者競以名理禪觀相高莫究本心妙明之體自達磨大士來至此方始唱直指人心見性成佛傳至六祖能公斯宗大振厥後五宗並立門風峻甚圓機密義不可以隨言而解用智而求至於揚眉瞬目或喝或棒所以闡呈真體愈出愈奇有省者若痛處喫拳不會者如聾人聞鼓而膚識之士乃或病其難通訾其詭異蓋由鈍根之無入則謂聖言之有隱大抵然也然開元之後宗教大明上至冕旒簪貂下及販夫孺婦往往能響答元言刃遊道妙當斯時也見性知心超凡入聖上下數百年內先後千有餘人自兩儀奠定以來未有若斯之盛者何儒門淡泊寥寥若此釋教流通林林如彼良以道喪多岐智分穿鑿仲尼沒而時乎不再顏淵死而今也則亡官失而求之四夷學絶而傳之方外一晦一明有由然矣至宋巨儒周元公程伯子乃旁尋墜緒密闡心宗或問儒佛異同伯子曰公本來處還有儒佛否伊川晚閲內典遇異人始明此學考亭亦曰達摩盡翻窠臼尤為高妙乃知斥佛老為異端非程朱之定論也自茲而降去聖時遙儒昧通方釋拘異學由是西來妙旨東土希聲所幸教外之單傳具載傳燈之五録濟禪師以其書浩博撮為會元斯固莊生所譏聖人已往而糟粕徒存焉者然而求道之人有能因言筌窮理窟日由繹之夕鑽剔之忽焉而鋸窮木斷水到渠成所謂因指以見月假筏而渡海亦易易焉則是此土此書之不可一日無矣賤子幼慕神仙每符瑞夢既聞魯訓知反求乎六經載遇竺墳時泛觀乎三藏稍能通其一貫會其殊塗祇自討論無誰告語嗟乎五千退席憫增慢之難移四十無聞嗟寓形之易盡願與同懷之士共成得道之因敢以此書請同戮力昔在先覺有聞半偈而明心或識二字而證果矧二十卷之活句誠百千劫之奇逢入此法門皆當作佛倘有通微俊彥慧徹高賢盡捨牀頭阿堵物成就世間希有事庶開來而繼往亦自度而度人不亦偉與幸無膠泥曲儒談曰非吾孔氏之書也居父喪既葬乃渡江上鄮山禮佛舍利既至僧出一塔中懸金磬可寸計內視舍利圜轉不定初如珠已如彈丸已如瓜忽如車輪五色變幻光彩射目時同遊者或見如梧子色白或見如菽色青與繩心異之因出金建石浮圖藏塔其中書其事乞諸宰官居士遂重興塔殿密藏開公首募刻小本藏經與繩與馮開之陳廷祼等倡導甚力遠近響應終以集事開之名夢禎秀水人萬歷中進士官至國子祭酒免歸師事紫柏可公發宏護之願刺血寫經律論各一卷廷祼別有傳與繩晚歲亦從紫柏老人遊研究益力已而修念佛三昧及臥疾陽陽如平時左手握心印經旬不解紫柏來視歎其心力堅猛為説偈曰手印堅持衆所見者手印之初不可心測豈能目覩是不能覩即壞不壞智者了然衆人驚怪卒贈太子太保諡莊簡子伯貞名基忠能紹其學以蔭為兵部司務遷刑部郎中會紫柏以妖書事被誣下獄既説偈化去伯貞贊其像曰昔先莊簡法門金湯博求龍象為法津梁既遇吾師曰真法王歸依參請篤老皇皇忠得夤緣巾瓶侍旁昏衢智燈苦海慈航世間父執出世導師近之則畏遠之又思創見則詫即之轉慈揭示道要能覺我迷我於彈指悟昔之非舍海認漚乃今始知因師知佛因佛知儒靈明廓徹乃有階梯師曰咄咄階梯非是腳下承當舉足便至每惟深慈感激涕泗法乳難酬有死無二豈期緣慳躬承師逝嗟呼哲人不可思議戒慧之光遇緣益熾遊於福堂作大法施歷諸苦惱意地寂然既展王法曰了夙緣合掌跏趺隻履翩翩六月牢戶露地風煙屹峙如山光溢於顴西源夏瘞淫潦成川傾城漂舍激蕩靡堅意此土封雨齧風穿南遷啓龕載覿師顏相好莊嚴儼若生前聞古賢聖去來如意定慧力故結成舍利入火入水色身不壞不圖愚蒙覩此奇異允若師言驗瞑目地非肉身佛豈能若是伯貞後卒於官明史阿育山志紫柏老人集五燈會元序平湖志密藏禪師遺集附録知歸子曰敏卿之於雲棲與繩之於紫柏非徒外護而已考其言論風旨亦各有相喻於微者焉嚴氏陸氏代有顯人豫采其通知佛法者著於篇嗚呼世祿之家驕以取敗者多矣非範之於道其能久乎汪大紳云佛與衆生心性本無差別過關人不妨如此道未過關人畢竟以換却凡心一句為斬關奪隘要著凡心者何衆生色心也衆生全靠著這色心育養五蘊安隱六根受用六塵陪奉自謂快活度日不知本來一段光明陷在色心之中五蘊埋却六根交結六塵封蔽弄得你這段光明污染千生流浪萬劫無絲毫出頭分在你須起箇厭離心換却他方是如何得換却宗門中人拋一無義味語在你肚子裏與鐵餕餡相似任你咬嚼色心一點也育養他不來咬嚼到得五蘊可憐六根零落六塵消煞所謂敗家散宅時候也家已散矣宅已敗矣這段光明自然出現蓋天蓋地去也淨土中人請一尊佛放在你肚子裏這便是你的主人公了也念念無間一心供養供養久之佛念漸長色心自漸漸消去消到盡時即此五蘊根塵變成佛國所謂形段身易為光明身者只是還你那一段光明耳換却凡心一句是修行大關隘換得來是聖換不得來是凡此處沒毫頭許假借修行人須自考若過不得這關慎勿徒效過關人説心説性是一是二賺却一生也儒門中苦苦説道心人心義理之性氣質之性亦最是要緊去處克得己方得由己變化得氣質之性方能成性此如水之寒火之熱無可疑者於此未能痛下工夫現成説箇是一者只為做了色心眷屬捨不得食色性也一句耳嚴氏之於雲棲陸氏之於紫柏遙遙相對章法天然入妙
