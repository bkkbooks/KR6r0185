body:
  text: 楊次公王敏仲傳楊次公名傑生於無為州自號曰無為子元豐中官太常初好禪宗歷參諸老宿不契既從天衣禪師遊天衣每引龐公機語令參究及奉祠泰山一日鷄初鳴覩日出如盤湧忽大悟易龐公偈曰男大須婚女大須嫁討甚閒工夫更說無生話書寄天衣天衣然之甞示僧曰學道之人十二時中常須照顧不見南泉道三十年看一頭水牯牛若犯人苗稼擿鼻拽回如今變成露地白牛裸裸地放他不肯去諸人長須著精采不可說禪時便有道理洗菜作務時便無知也如鷄抱卵若是一刻拋離暖氣不接不成種子如今萬境森羅六根煩動略失照顧便致喪身失命不是小事也熙寧末以母憂歸閒居閱藏經遂歸心淨土繪丈六阿彌陀佛隨身觀念憫諸眾生溺心五濁輪轉無已不知出離而參禪人又輙視淨土為權教妄生異見深負諸佛大悲方便導引之心適同時王敏仲撰淨土決疑集成次公為之序其辭曰大願聖人從淨土來來實無來深心凡夫往淨土去去實無去彼不來此此不往彼而其聖凡會遇兩得交際者何也彌陀光明如大圓月徧照十方水清而靜則月現全體月非趣水而遽來水濁而動則月無定光月非舍水而遽去在水則有清濁動靜在月則無趣舍去來故華嚴解脫長者云知一切佛猶如影像自心如水彼諸如來不來至此我不往彼我若欲見安樂世界阿彌陀佛隨意即見是知眾生注念定見彌陀彌陀來迎極樂不遠乃稱性實言非權教也淨土無欲非欲界也其國地居非色界也生有形相非無色界也一切眾生未悟正覺處大夢中六道升沉未甞休止諸天雖樂報盡相衰修羅方瞋戰爭互勝旁生飛走噉食相殘鬼神幽陰飢渴困逼地獄長夜痛楚號呼得生人趣固已為幸然而生老病死眾苦嬰纏惟是淨方更無諸苦蓮胞託質無生苦也寒暑不遷無老苦也身非分段無病苦也壽命無量無死苦也無父母妻子無愛別離也上善人聚會無怨憎會也華裓香食珍寶受用無求不得無窮困也觀照空寂無蘊苦也悲濟有情欲生則生不住寂滅非二乘也智照生死得不退轉非凡夫也三界蕩然譬如四裔丘陵阬坎穢腐所積溪壑阻絕孰為津梁乃有狂人迷路於此惡獸魑魅惱害雜居刀兵水火或時傷暴風霜霹𮦷凌厲摧攝罔知城域可以庇覆飲食衣服未或充足甘受是苦不求安樂有佛釋迦是大導師指清淨土是安樂國無量壽佛是淨土師爾諸眾生但發誠心念彼佛號即得往生則無諸惱不聞知者固可哀憐亦有善士發三種不信心不求生者尤可嗟惜一曰吾當超佛越祖淨土不足生也二曰處處皆淨土西方不必生也三曰極樂聖域我輩凡夫不能生也夫行海無盡普賢願見彌陀佛國雖空維摩常修淨土十方如來有廣舌之讚十方菩薩有同往之心試自忖量孰與諸聖謂不足生者何其自欺哉至如龍樹祖師也楞伽經有預記之文天親教宗也無量論有求生之偈慈恩通讚首稱十勝智者析理明辨十疑彼皆上哲精進往生謂不必生者何其自慢哉火車可滅舟石不沈現華報者莫甚於張馗十念而超勝處入地獄者莫速於雄俊再生而證妙因世人愆尤未必若此謂不能生者何其自棄哉般舟三昧經云䟦陀惒菩薩問釋迦佛未來眾生云何得見十方諸佛佛教念阿彌陀佛即見十方一切諸佛又大寶積經云若他方眾生聞無量壽如來名號乃至能發一念淨信歡喜愛樂所有善根迴向願生無量壽國者隨願皆生得不退轉此皆佛言也不信佛言何言可信不生淨土何土可生自欺自慢自棄己靈流入輪迴是誰之咎四十八願悉為度生一十六觀同歸繫念一念既信已投種於寶池眾善相資定化生於金地無輙悔墮誤認疑城即時蓮開得解脫道唯心淨土自性彌陀大光明中決無魔事直指淨土決疑集者吾友王古敏仲之所編也博采教典該括古今開釋疑情徑超信地其載聖賢之旨在淨土諸書最為詳要盖安養國之向導也若登彼岸舟固可忘來者問津斯言無忽元祐中官兩浙提點刑獄卒臨終說偈曰生亦無可戀死亦無可捨太虗空中之乎者也將錯就錯西方極樂先是有司士參軍王仲回者與次公同鄉里甞從受念佛法門問如何得不間斷曰一信之後更不再疑即是不間斷也仲回躍然明年次公守丹陽一夕忽夢見仲回云向蒙以淨土為導今得往生特來致謝再拜而出已而得其子訃書言仲回預知化期徧別親舊逝矣次公既卒其後有荊王夫人與侍妾同修淨土其侍妾先化去引夫人夢遊西方見一人坐蓮華上其衣飄揚寶冠瓔珞莊嚴其身問是何人侍妾云揚傑也次公甞著輔道集專揚佛教蘇子瞻為之序東都事略樂邦文類王敏仲名古東都人文正公旦之曾孫也初杭州昭慶寺法師省常與諸士大夫結淨行社文正為之首及有疾乃屬楊大年曰吾深厭勞生願來世為僧宴坐林間觀心為樂我死為我請大德施戒剃髮鬚著三衣火葬勿以金寶置棺內既卒大年曰公三公也殮贈公袞豈可加於僧體但以三衣置柩中而已自敏仲之先七世持不殺戒好放生命至敏仲忽自疑一日問小法華禪師曰以古所見不殺不放一切付之無心可乎師厲聲曰公大錯豈作空解耶面前露柱亦自無心著幾箇露柱能救得世間一箇苦惱眾生否敏仲瞿然遂發心放生命一百萬遊江西與晦堂楊岐諸老師究宗門中事既而作直指淨土決疑集宏西方之教閒居數珠不去手行住坐臥修行淨觀無有閒歇著淨土寶珠集序云眾生心淨則佛土淨法性無生而無不生有佛世尊今現說法在極樂國號阿彌陀緣勝劫長悲深願大無邊際光明攝受不思議淨妙莊嚴珠網麗空瑤林矗地池含八德華發四光韻天樂於六時散裓華於億剎諸佛共讚十方來歸彌陀心內眾生新新攝化眾生心中淨土念念往生質託寶蓮不離當處神遊多剎豈出自心如鏡含萬象而無有去來似月印千江而本非升降被圓頓機則皆一生補處明方便門則有九品階差念本性之無量光本來無念生唯心之安養國真實無生解脫苦輪十念亦超於寶地會歸實際二乘終證於菩提如大舟載石而遂免沉淪若順風揚帆而終無留難悟之則非遠非近迷之則即近而遙嗟夫學寡障多疑深觀淺斥為權小閴若存亡則以馬鳴龍樹為未然天台智覺為不達不信當受菩提記不肯頓生如來家籠鳥鼎魚翻然游戲隙駒風燭妄計久長虗受一報身枉投諸苦趣豈知大雄讚勸金口丁寧侶聖賢於剎那具相好於俄頃樂受則永拋五濁悲增則迴救三塗於此不知是為可憫自魏晉大經初出則有遠顯諸賢繼修事列簡編驗彰耳目福唐釋戒珠採十二家傳記得七十五人蒐補闕遺芟夷繁長該羅別錄增廣新聞共得一百九人隱顯畢収緇素並列會江河淮濟於一海融瓶盤釵釧無二金標為險道之津梁永作後來之龜鑑居常以大藏浩衍學者不能徧觀乃隨經次第釋其因緣詮其旨要為法寶標目十卷既成說偈曰歸命正徧知如來妙法藏十方大菩薩三尊真聖眾我今於法寶願作勝妙緣若以一毛端測量太空界如說須彌頂是諸天住處如指海波中大魚龍窟毛廣大殊勝處非一言可盡然其所標顯舉要非妄謬憫彼不遇者望涯而自絕常時過寶所終身空手過暫能一經目即植菩提根清信樂法人未暇徧披閱崑山取片玉滄溟采如意隨其所欲見發函即有得多聞博覧人已知龍藏者溫故檢忘誤釋然得本明除彼大闡提有是種種益海墨書一義九旬而演妙云何以片言而欲顯法要如來在定時五百阿羅漢各各說所解而皆非佛意各順正理故可依而無罪我今所撰述悉稽古德語非我妄臆說是故應信受智者悟筏喻不著文字相見月而忘指入海譏筭沙方便有多門豈以一廢百種種皆佛事全來彰妙用以此勝功德願常在佛會一音所演法歷耳永不忘如海受大雨亦如水傳器持以利眾生如法界無盡徽宗朝官戶部侍郎與中丞趙挺之同理逋賦多所蠲釋挺之劾敏仲傾天下財以為己惠諫官江民表辨其誣既而入元祐黨人籍尋化去有僧神遊淨土見敏仲與葛繁在焉繁澄江人官至朝散夫夫公第私居必營淨室設佛像一日方禮誦時舍利從空而下後無疾面西端坐而逝宋史法寶標目樂邦文類法喜志藏中誤以標目為元人作今據文獻通考經籍志正之知歸子曰自曹溪闡無相之宗斥心外求生淨土者後學不悟其旨妄生分別執著成謗哀哉佛本無相念即無念以無念念念無相佛是為直指是為單傳易曰神而明之存乎其人默而成之不言而信存乎德行若楊王二公其庶幾乎汪大紳云里仁為美擇不處仁焉得知二公只是能擇能處吾自閱七佛偈後徧觀萬法無不攝於是毗婆尸佛曰身從無相中受生猶如幻出諸形象幻人心識本來無罪福皆空無所住是偈能了曹溪之蘊盡於是矣曹溪之言曰從上以來先立無念為宗無相為體無住為本毗婆尸曰身從無相中受生猶如幻出諸形象曹溪曰無相為體毗婆尸曰幻人心識本來無曹溪曰無念為宗毗婆尸曰罪福皆空無所住曹溪曰無住為本先聖後聖非若合符節者與曹溪善發先聖之旨其言曰無相者於相而離相無念者於念而無念無住者人之本性其發明下手工夫之言曰此法門立無念為宗無者無二相無諸塵勞之心念者念真如之本性真如即是念之體念即是真如之用真如自性起念非眼耳鼻舌能念真如有性所以起念真如若無眼耳色聲當時即壞真如自性起念六根雖有見聞覺知不染萬境而真性常自在此毗婆尸開示心識本來無要指也下手工夫全在此一句了此乃能於相而離相復人之本性也大哉毗婆尸之偈義也宗門之淵海也迦葉佛曰一切眾生性清淨從本無生無可滅即此身心是幻生幻化之中無罪福是偈能了淨土之蘊盡於是矣彌陀自性即所謂性清淨也性清淨故曰淨土也彌陀為眾生發一切大願以一切眾生性清淨也勸一切眾生往生者從本無生無可滅也眾生即此身心可以往生者以即此身心是幻生也勸其離穢即淨者亦以即此身心是幻生也往生有九品者以幻化有盡有不盡罪福有空有不空也眾生發願修淨土法門者須於迦葉佛第一句中信到萬萬分則知彌陀非添設也性本如是也一切眾生性清淨也於第二句中信到萬萬分則知往生非妄想也生本如是也從本無生無可滅也於第三句中信到萬萬分則現在身執心執可破也於第四句中信到萬萬分則往生上品上上品可登也大矣哉迦葉佛之偈義也淨土之大關捩也修淨土之法全在念門須打得開打得入念門之法以何為要曹溪之言至矣曰真如即是念之體念即是真如之用真如自性起念非眼耳鼻舌能念真如有性所以起念嗚呼盡之矣
