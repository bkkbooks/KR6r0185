body:
  text: 周安士傳周安士名夢顏一名思仁崑山諸生也博通經藏深信因果居常念言衆生造無量罪淫殺二業實居大半古今世典懲勸頗詳不斷其源川壅則潰爰竭苦衷深維經義抉微洞幽拔山搗穴勒成二書戒淫與殺其戒殺書言多深痛大要云刀兵之難在於人道或數十年或百餘年僅一二見至於畜生無日得脫普天之下一遇雞鳴無量無邊狠心屠戶手執利刀奮向羣豕爾時羣豕自知難到大聲哀號救援不至各被彼人裂腹刺心抽腸拔肺哀號未斷又投沸湯受大苦惱片刻之間閻浮世界萬萬生靈頭足異處積羣豕骨過高山巔漂羣豕血赤江水流如是惡因如是惡果詰其根由皆為我等口腹所致世人動稱我不作惡何必持齊豈知爾等偃息在牀妻孥聚首即有素不相識之人先為汝等遍造惡業無量無邊諸佛菩薩神通天眼見諸衆生輪回六趣如旋火輪或為大身更相殺食或為細身更相殺食或為父母六親眷屬更相殺食發大悲心說真實語導彼迷流開爾覺路我勸世人未能持齊先須斷殺孟子有言仁者人也人不信佛何不信人若信是人何不斷殺仁則不殺殺則非仁諦聽吾言免入異類安士每過一切神祠必祝願云惟願尊神發出世心勿受血食一心常念阿彌陀佛求生淨土思仁自今二十四歲直至壽盡中間若殺一小魚蝦惟願尊神是糾是殛迅雷擊碎所著書板思仁自今二十四歲直至壽盡家中眷屬若有一人傷一蚊蟻亦同此誓思仁自今二十四歲直至壽盡中間若遇身及眷屬嬰諸重病忽一仙人來告之言投一小蛤於沸湯中飲之則生不然則死以貪生故竟從其言亦同此誓思仁自今二十四歲直至壽盡倘有毒蛇嚙我垂斃家衆憤憤欲殺此蛇而我不能極力救阻亦同此誓思仁自今二十四歲直至壽盡臨河見魚仰面見鳥不思救度反萌殺機亦同此誓思仁自今二十四歲直至壽盡若夢寐中見人殺生不能至心稱佛名號發救度心而反歡喜贊成其事亦同此誓其戒淫書勸諸淫者先觀胎獄了種種苦是謂息淫原始方便繫以偈曰父母未生時因業多掛帶一點無明根見欲生貪愛淫心才一起忽被精血蓋從此十月中次第還宿債母噉熱食時如受濩湯溉母飲冷水時若臥寒氷塊腹中當飽滿頂上懸鐵袋五內如飢虗空洞失依賴會當出胎時翻身若旋岱産母忽瞑眩眷屬盡惶駭身逼兩山中熱窄不可耐穩婆牽其頭痛極心肝碎嫩頏扼粗手刀劒無能賽放聲鳴其哀旁人乃稱快豈知稱快人經過忘悔艾昧昧極思量咄咄咤災怪此言非臆說五王經所載凡夫戀欲樂輾轉沉黑穢生生受煩惱曾見何人代欲破煩惱軍智者擒其帥主帥是淫魔魔死餘兵敗我將胎形慘屈指陳其概珍重世間人可一不可再次觀此身諸蟲蝟集宛轉遊行食人腦髓是為初開不淨方便繫以偈曰穢哉血肉軀無量蟲所萃潛伏四大中其形甚微細凡夫不覺知天眼方能靜氣一返觀男女真兒戲次觀男女膿血洟唾惡露中滿猶如溷廁糞穢所都是為息淫對治方便繫以偈曰世間苦惱事皆從愛欲生愛心不能斷對色形神傾水從骨內出火自心中騰平時顧禮義或復愛聲名到此霎時間開眼投深坑鬼神且不畏名教豈能繩茫茫五濁世獄訟滋繁興幸有如來教暗室懸明燈示以不淨觀欲火消為氷我從昔年來亦復似摩登多方用強制對境還復萌自作此觀後結習日以輕今者稍覺悟歸命佛法僧誓於未來世掃盡羣魔兵分身無量剎普利諸有情氷菴張夫子誨我嘗叮嚀其言修觀法譬諸學庖丁庖丁技成後不見全牛形用刀十九載猶如新發硎我此降魔劒百鍊剛所成斬盡妖容鬼髑髏莽縱橫西施接膝坐蔓草纏紫荊三十六種物到鼻知羶腥此觀得成就萬象都空明爰述為俚句聞者應惕驚齊心出苦海濁世皎然清次設九想想初死人正直仰臥寒氣徹骨一無所知而我此身終亦如是又想死人一二日往黑氣騰溢轉成青紫甚可怖畏而我此身終亦如是又想死人尸停既久黃水流出臭不可聞而我此身終亦如是又想死人遍體生蟲處處鑽囓骨節之內皆如蜂窠而我此身終亦如是又想死人皮肉已盡惟筋在骨如繩束薪而我此身終亦如是又想死人筋已爛盡骨節縱橫不在一處而我此身終亦如是又想死人被火所燒焦縮在地或熟或生而我此身終亦如是又想死人冡破骨出日暴雨侵其色轉白或復黃朽人獸踐踏而我此身終亦如是次想經要深自䇿發經言菩薩修於死想觀是壽命常為無量冤讎所繞念念損滅無有增長猶山瀑水不得停住亦如朝露勢不久停如囚趣市步步近死如牽牛羊詣於屠所繫以偈曰人想死亡日欲火頓清凉愚人若聞此愁眉歎不祥究竟百年後同入灰燼場菩薩九想觀苦海大津梁次念法華所說因緣生相滅相與不生滅是為斷淫窮源方便繫以偈曰衆生畏苦果菩薩斷惡因惡因既已斷苦果無遺根譬如猛獅子利鏃中其身急顧發的處獵戶群波奔犬若遭人擊但向棒頭呻一智視一愚不啻霄壤分又如止沸湯爨者去其薪十二因緣內無明為之君一斷一切斷淨掃鄰虗塵次當觀佛坐寶蓮華及諸種種莊嚴瑞相發願往生西方極樂是為究竟解脫方便繫以偈曰修行無別法出世為究竟出世有多途淨土為捷徑述此觀想法言言宗大乘托質上品蓮永遠脫淫穽他諸辨難究析因果語多造微不能具載安士既歿其書漸湮表而出之以勸來者欲海回狂萬善先資知歸子曰豫讀安士書因樂訪安士生平行事久之得其宗人言安士通世務習知吳中田賦水利原委得失著書甚具康熙三十八年仁皇帝南巡安士迎駕揚州九龍橋上疏請減蘇松浮賦事雖未遽行然安士之心至今猶可見也其後應巡撫張公聘校録宋元明先儒書老於家其大概如此張氷菴者名立廉嘗序安士書安士書尊稱之豫訪之崑山人無知者汪大紳云悲猛極矣如從吾佛世尊金口宣揚而得六種為之震動
