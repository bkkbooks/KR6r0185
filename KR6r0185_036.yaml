body:
  text: 耶律晉卿國寶傳耶律晉卿名楚材遼東丹王突欲八世孫也仕金為開州同知宣宗遷汴完顏復興守燕辟為左右司員外郎元太祖既定燕晉卿閒居久之已而太祖聞其名召置左右日益信任每從征伐晉卿隨事納諫務止殺以全民命太宗即位拜中書令軍國大計悉取決焉於是均賦稅正官制興文學覈工匠平權量給符印百度具舉遐邇悅服元遂得撫定中原者晉卿之力也晉卿於學無所不闚尤傾心祖道初年二十餘居燕自以所得叩聖安澄公澄公時見許可其後輙不以為然晉卿請其故澄公曰公昔官要劇予不敢苦相鉗鎚又儒者多不信佛法唯搜摘語錄以資談抦耳今誠有志本分事予安得不為苦口雖然吾老矣有萬松老人兼通儒釋辨才無礙可往見之晉卿遂謁萬松秀公屏絕人事息心參究雖祁寒大暑不輟迄三年而盡其道秀公授以衣名之曰從源號曰湛然居士其後歷官貴顯日應萬務而神明淡泊如處深山中一日秀公過其家見晉卿方啖菜根飯脫粟曰不太儉乎晉卿曰昔燕京被圍絕粒六十日予守職如平常及扈從西征六萬餘里備歷險阻而志不少沮跨崑崙瞰瀚海而志不加大盖汪洋法海涵養之效有如此也甞自題其象曰別來十年五歲依舊一模一樣髭髯垂到腰間雙眉儼然眼上龜毛錐子畫空虗寫破湛然閒伎倆又曰有髮禪僧無名居士人道甚似我道便是塵塵剎剎露全身紙上毫端何處避當西征時有司奏五臺等僧徒有能呪術及嫺武略者可部以從軍晉卿止之曰釋氏高行者必守不殺戒奉慈忍行故有危身不證鵝珠守死不拔生草者用之從軍豈其宜哉其不循法律者必無志行在彼既違佛旨在此豈忠王事故皆不可以從軍也乃止大夫蕭守中曰沙門不征不役安坐而食耗國累民必此類矣請除之晉卿曰人之生也有天命焉人力所不能予奪者也世有辛苦而飢餓者有安逸而飽足者修短苦樂壽夭窮通萬狀不齊雖孔明之智項羽之勇顏回之賢尼父之聖亦不能移其毫髮豈彼沙門能窮吾民耗吾國耶故萬世之在天下天與則生天奪則死沙門亦天地間一物耳其亦天養之也天且宥之子獨不容隘亦甚矣太宗崩皇后稱制任用奧都剌合蠻晉卿屢諫不聽尋以疾卒至順初贈太師追封廣寧王諡文正元史湛然居士集清凉通傳國寶名安藏畏兀人世家別石八里自號龍宮老人父腆藏帖材護廸方燕坐作觀音觀忽有人抱童子付之已而其母有娠及產紅光發於屋生五歲甞一臥三晝夜始寤問其故云適見文殊為我說法不覺久耳已而從父兄問經義即開解九歲始從師力學十三能默誦俱舍論至十五而孔釋之書皆貫穿矣十九被徵入朝以佛法見知世祖進寶藏論元演集深被嘉歎因勸上宜親經史以知古今治亂之由正心術以示天下向背之道遂譯尚書無逸篇貞觀政要申鑒各一通以獻授翰林學士知制誥尋商議中書省事每賜對必以開言路廣聖慮慎刑節用為言世祖未甞不稱善至元三十年夏五月丁丑方宴居忽端坐若禪定者左右扶就寢至夜聞異香馥郁即視之已薨矣有大星隕於庭圓相凝室不散頃之見白毫光出西南去辛巳闍維於國西南門之外得五色舍利不可勝計詔收其遺書得歌詩偈贊頌雜文數十卷命刻板行世延祐二年贈太師封秦國公諡文靖程鉅夫雪樓集知歸子曰晉卿於元佐命功第一察其本知其所養者裕矣國寶出入儒釋間觀其言論風旨殆亦晉卿之亞與而元史逸之其遺書不可得而見矣為著其大概如此云汪大紳云敘學佛得力處曰息心參究未得手時工夫也曰涵養之效既得手時工夫也大抵參究之功須要外屏諸緣方易得手得手後全要涵養到純一地步方好
