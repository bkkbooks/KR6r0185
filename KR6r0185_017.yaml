body:
  text: 龐居士傳龐居士者名蘊字道元襄陽人也父任衡陽太守寓居城南建菴於宅西為修行之所唐貞元初參石頭禪師問不與萬法為侶者是甚麼人石頭以手掩其口豁然有省一日石頭問曰子見老僧以來日用事作麼生居士曰若問日用事即無開口處乃呈偈曰日用事無別惟吾自偶諧頭頭非取捨處處沒張乖朱紫誰為號邱山絕點埃神通并妙用運水及搬柴石頭然之後參馬祖復問不與萬法為侶者是甚麼人祖曰待汝一口吸盡西江水即向汝道道元於言下領旨留駐二載自後機鋒迅捷諸方莫能難甞以舟載家珍數萬沈之湘流元和初歸襄陽棲止巖竇與妻子及女靈照市鬻竹器以自活甞作偈曰有男不婚有女不嫁大家團欒頭共說無生話又作偈曰心如境如無實無虗不是賢聖了事凡夫居士將入滅謂靈照曰視日早晚及午以報靈照遽報曰日已午矣而有蝕也可試觀之居士避席臨窓靈照即據榻趺坐而化居士笑曰吾女鋒捷矣乃拾薪燔之展期七日太守于頔素與親厚乃往問安居士曰但願空諸所有慎勿實諸所無好住世間皆如影響言訖端躬若思異香滿室頔亟呼之已逝矣遺命焚棄江湖頔遣使報其妻妻曰這癡女與無知老漢不報而去何忍也因往告子子方斸畬釋鉏應曰嗄良久亦立而亡去妻曰愚子癡何甚也亦燔之未幾徧詣鄉閭告別隱去不知所終傳燈錄龐居士集序知歸子曰予少讀寒山大士詩樂之如遊危峯邃㵎中聞懸泉滴乳松籟徐吹五蘊聚落一時杳寂已而讀龐居士詩又如刺船入海天水空同四大浮根脫然漚謝嗚呼魚山清梵伽陵仙音剎剎塵塵度生無盡矣汪大紳云看龐家老老大大遊戲寂滅光中一何似老杜詩云穿花蛺蝶深深見點水蜻蜓欵欵飛也
