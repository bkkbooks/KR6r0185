body:
  text: 管楊陶焦唐瞿傳管登之名志道太倉人學者稱東溟先生為諸生篤學力行隆慶初知府蔡公建中吳書院以登之為師集諸生講學嘗曰世必有遁世不見知而不悔之志而後可以載道必有行一不義殺一不辜而得天下不為之力而後可以立身聞者竦然五年舉進士除南京兵部職方司主事以父憂歸服除補刑部主事萬歷初張居正當國總纜威福六年登之條上九事大旨在肅朝綱通下情革弊政欲奪居正權歸天子居正不悅尋以員外郎出為廣東按察司僉事分巡南韶道時廣東多盜登之實軍伍嚴連坐分兵扼要害所部宴然而言官希居正旨劾之降鹽課司提舉明年外計以老疾致仕居正敗廷臣交章論薦起湖廣僉事以母老乞歸初登之以選貢入京師止西山碧雲寺閲華嚴經世主妙嚴品忽悟周易乾元用九之義反觀身心渾同太虗照見古今聖賢出世經世乘願乘力與時變化之妙用以為理則互融教必不濫或順而相攝或逆而相成或閟實而彰權或廢權以明實種種出沒種種張弛各有條理難可思測此無他龍德不可為首也孔子無可無不可子思親承家脉故曰並育並行川流敦化孟子而後全體太極貫通三教者周元公一人而已我聖祖攬二氏以通儒各理其條貫以儒治儒以釋治釋以老治老與其相參不與其相濫蓋教理不得不圓教體不得不方規欲圓即以仲尼之圓圓宋儒之方而使儒不礙釋釋不礙儒極而至於事事無礙以通並育並行之轍矩欲方亦以仲尼之方方近儒之圓而使儒不濫釋釋不濫儒推而極於法法不濫以持不害不悖之衡其生平論學大旨如此嘗著從先維俗議其護法篇云釋門於儒家護教者名曰佛法金湯狀其以外護內若金城湯池之不可破也蓋佛法有內外二護拈花之頃以正法眼藏涅槃妙心屬大迦葉入滅之期以結集三藏十二部屬阿難又於刀兵劫後減盡還增起而轟揚三乘教法屬十六應供羅漢三者總名內護而有所謂金湯外護者則屬之國王大臣其重有加於內護此以折攝二門寄之也蓋護佛法於增劫初減之時易護佛法於減劫將終之時難護增劫初減時之佛法但有攝而無折護減劫將終時之佛法則折攝必須並行而末法中則折法更嚴於攝法邪法不折則正法不可得而攝也正法以教理行證全備為義故護法者必有以鼓末法之人通五時之教明一乘之理修無漏之行入涅槃之證而後可當金湯外護之名吾觀唐宋名賢作禪講二家之金湯者護教護宗則有之罕有達於護行護證之旨者也愚嘗謂儒者不透孔子一貫之心宗不見乾元用九之天則則斷不可與護持如來正法何者言不能慮其所終行不能稽其所敝也近有越僧欲續國初岱宗佛法金湯編豫嘗為之言其大略曰夫所貴於金湯者為其護持正法也未有身不行正法而能護持佛之正法者欲續金湯當知三重一曰德行二曰願力三曰知見德行欲密大而忠孝全德細而辭受纖行無敗缺也願力欲堅八風不能搖其願百鍊不能移其力有餘忍也知見欲正佛子必攝之以慈魔子必折之以威勿以小仁賊大仁也三重闕一則金湯之量不完雖使宗徹五綱教通三藏兼以捨宅為寺傾産飯僧之功而如來之正法不屬焉况乎敗類宰官虗聲居士徒以塵羮塗飯之餘讚揚佛事此佛門之少正卯也金湯云乎哉晚尤究心楞嚴經應諸方扣擊益詣元奧三十五年冬有疾述孟子七篇謂子珍曰當以殘冬卒業於此明年將逝豫欲無言決矣至除夕始畢明年七月病革命侍者舁至中堂端坐而瞑年七十有三從先維俗議楞嚴經𫎇鈔明文偶鈔楊貞復名起元號復所廣東歸善人萬歷初登進士第授翰林院編修纍遷吏部侍郎貞復早歲讀書白門遇建昌黎允儒與之言學有省允儒者近溪羅氏弟子也其後貞復官京師近溪適至遂受業稱弟子時執政者不悅學近溪遂南歸貞復歎曰吾師老矣今者不盡其傳異時悔可及乎乃移疾歸依近溪以卒業焉居閒究心宗乘慕曹溪大鑒之風遂結屋韶石與諸釋子往還重刊法寶壇經導諸來學為之序曰六祖大鑒禪師豫東粵人也得法黃梅宏法曹溪是有法寶壇經之籍東南人士家傳人習豫隨衆讀誦晚乃自謂有得於其見過知非之旨孔子曰已矣乎吾未見能見其過而內自訟者也何絶望至此哉蓋過不在於過凡吾人自以為善而帖然安之者即過也何者是皆識為之也識生於習孔子之所謂習即佛之所謂業也業識所現智者過而不留而愚夫執以為是以至認賊作子喪真失常是以孔子於其門人僅許顏子有不善未嘗不知於其交遊僅與伯玉欲寡其過而未能至其自鳴亦僅曰五十學易可以無大過矣蓋其難如此凡吾人不見性體即不能見過性體一見過狀歷然不能見過而自謂見性者欺也不至見性而自謂見過者亦欺也見過者見性之實也見性如人之活見過如人知痛癢謂活人不知痛癢無是理矣問人之活否曰知痛癢矣問人見性否曰知過矣此孔子之旨也亦佛之髓也六祖壇經屢發之矣於法達念法華三千部而責其負此事業全不知過他日又語神會曰吾常見自心過愆不見他人是非好惡何不自知自見乃問見與不見至哉言乎菩提無樹明鏡非臺直入此門方為真實世之學人樹菩提而臺明鏡者即以為賢此有為之法有漏之因宜其麻木不知痛癢也此經南中無板故重刻而序之蓋欲吾人由是經教以詣我孔聖見過自訟之域共證本來淨諸業障而已矣其後有詔召還尋卒所著有證學編行於世多推明近溪論學之旨云曹溪志明儒學案陶周望名望齡號石簣居士會稽人也萬歷十七年舉會試第一成進士授編修與同官焦弱侯相䇿發始研求性命之學已而請假歸過吳江與袁中郎論學三日上剡溪謁周海門參叩甚力每自撫膺曰此中終未穩在一日讀方山合論手足忭舞語弟齡曰吾往者空自生退屈也海門嘗致書詰其所得周望復書曰竊聞華嚴十信初心即齊佛智佛智者無待之智也何階級之可言哉然必五十位升進鄰於二覺後契佛乘孔子三十而立已歷信位矣然必知命耳順以至從心蓋知見久汰而日銷習氣旋除而日淨如精金離礦經鍛鍊而益露光芒嬰兒出胎加歲時而自然充長人形金體不異舊時瑩淨魁梧新新莫掩然則放刀屠兒獻珠龍女無待之智燈也懶安拽鼻二祖調心神化之實功也以緣起無生為覺照故不屬斷除以佛知見為對治故不落二乘耳是故道人有道人之遷改俗學有俗學之遷改凡夫於心外見法種種善惡執為實有如魘人認手為鬼稚子怖影為物遷改雖嚴終成壓伏學道人善是己善過是己過遷是己遷改是己改以無善為善故見過愈微以罪性本空故改過甚速顏子有不善未嘗不知知之未嘗復行者是也僧問古宿如何保任曰一翳在目空花亂墜大慧亦言學道人須要熟處生生處熟如何生處無分別處是如何熟處分別處是到此則過是過善亦是過分別是習氣饒你不分別亦是習氣直得念念知非時時改過始有相應分是真遷善是真改過是名隨心自在亦名稱性修行先代聖賢所有言說總不出此尚何置同異於其間哉然僕今日之病則在悟頭未徹疑情未消解處與行處說處與受用處未能相應以此惻惻居心不寧老丈何以救之周望居常參一歸何處公案自言緊作課寬作程一生再生會有出頭分不敢求速效也已而起前官纍遷左諭德萬歷三十一年妖書事起沈一貫當國欲藉以陷沈鯉郭正域周望詣一貫切責之又見朱賡不為救慷慨數賡願棄官與沈郭同死二人皆心動沈郭卒得免者亦周望力也頃之復乞歸以祭酒徵不起周望生平廉隅甚峻進退以義自奉薄布衣蔬食終其身其為學久而益誠未嘗自是每曰古人見性空以修道今人見性空以長欲晚而參雲棲宏公受菩薩戒因與諸善友創放生會於城南以廣雲棲之化作放生詩十首以凡百畏刀杖無不愛壽命為韻其一云人生事腸腹及與口舌三二但取飽軟一乃司吾饞萬錢飾盤筵殉此徑寸甘下咽了無知理與木札兼晚食美葵蓼甚飢望虀鹽徑寸况易欺何當信其婪半臠償一身債主真不廉人羊須臾理請君覩其凡其二曰毒莖烹肉肥利刃藏魚窄魚肉豈不美智者走弗食吾有萬世患驁以取一適匕箸成戈矛操之還自賊君看几筵上怨敵常繞百食肉作莖觀斯言心可刺其三曰介盧曉牛鳴冶長諳噦吾願天耳通達此音聲類羣魚泣妻妾雞鶩呼弟妹不獨死可哀生離亦多慨楚語既侏離齊音了難會寧聞楚人肉忍作齊人膾可憐登陸魚噞喁向人誶人曰魚口喑魚言人耳背何當破網羅施之以無畏其四曰挾弩隱衣袂入林羣鳥號狗屠一鳴鞭衆吠從之囂殺機翳胸中燦然若懸杓吾聞螳螂蟬能變琴者操至人秉慈尚虎象焉足調因果苟無徵視斯亦已昭與其噉群生寧我吞千刀其五曰從事愁見拘波臣苦遭蕩蟈氏群處囊悲鳴更相杖寄書已成悔見夢徒增妄數錢贖爾至縛解囚放困極勢未遒蘇餘氣仍壯䘖恩未忍去故作三回望何方絶網羅向去保無恙感激見深衷遲疑抱遐悵贈爾金口言努力此回向耨水具功德蓮華好安養微施豈懷報往矣慎波浪群蛙尤有情鼓吹西窗傍其六曰昔有二勇者操刀相與酤曰子我肉也奚更求肉乎互割還互噉彼盡我亦枯食彼因自食舉世歎其愚還語血食人有以異此無其七曰吾聞豐坊生赤章呪蚤虱蚤虱食幾許討捕已酷烈借問坊食者還當呪坊不宏恕聖所稱斯言非佛其八曰生食不可食熟以過時敗生既嫌腥膻敗時仍臭穢腥穢君所知胡為強吞嘬水火幻味香口鼻成災怪如蠅穢中育還以臭為愛及其生子孫居然臭穢內坑圊難久居蟲乎可為戒其九曰竪首橫目人竪目橫身獸從獸者智攖甘人者勇鬬悲哉肉世界奚物獲長壽一虎當邑居萬人怖而走萬人俱虎心物命誰當救莫言他肉肥可療吾身瘦彼此電露命但當相憫宥共修三堅法人獸兩無負其十曰食肉反有墨食糠反肥盛薇蕨雖苦飢甘脂亦生病我痛思彼痛彼命如我命勿憎質直語質語應易聽又設問答著放生解惑篇甚詳辨文多不載三十七年秋有疾飭治後事三日而逝諡文簡齡亦好禪學崇禎中與蕺山劉子講學陽明祠從之者甚衆明史歇菴文集行述雲棲法彙紹興志獪園焦弱侯名竑應天人也萬歷十七年舉進士第一有司欲為建坊弱侯謝之請移賑飢民除修撰為東宮講官進講時有鳥飛鳴而過皇太子目之弱侯即輟講皇太子改容聽之乃復講如初嘗采故事為養正圖以進日有啓導之益為同官所嫉用科場事被謫出為福寧同知再遷為南京司業初弱侯師事耿天臺羅近溪已而篤信李卓吾往來論學始終無間居常博覽群書卒歸心於佛氏天臺嘗引程子斥佛語以相詰弱侯復之曰伯淳斥佛大抵謂出離生死為利心夫生死者所謂生滅心也起信論有真如生滅二門未達真如之門則念念遷流終無了歇欲止其所不能矣以出離生死為利心是易之止其所亦利心也苟止其所非利心則即生滅而證真如乃吾曹所當亟求者從而斥之可乎時有唐子張者先從近溪學已而來謁初見言知弱侯曰如為常見是衆生法再見言無知弱侯曰無知為斷見是二乘法子張憮然弱侯因語之曰人心之妙囊括太虗不可以有無求不可以取舍得以無求之者攝心獨坐一事不理靜中光景了了可即事物現前茫無湊泊大慧呵之為默照邪禪是也以有求之者認取識神以為家寶有可俟排有可著手輒生歡悅不知認賊為子百劫千生輾轉淪墜楞嚴所謂知見立知即無明本元沙訶之為昭昭靈靈的禪是也夫此本地風光無徑可尋無門可入才有所重便成窠臼學者於口耳俱喪之餘言思路絶之際瞥地一下任伊說有說無信手拈來何所不可若未曾實證此理靠些知解為本命元辰不知此知頭出頭沒時滅時生生死流浪輾轉不休於無生法忍還相契否子既有意此道便當真參實悟求正人指與出路此正人吾有一訣可以勘驗出離生死為正流浪生死為邪說無為法為正說有為法為邪無門路無階級為正可以知知可以說說為邪中心行道而外不毀法為正駕言無礙任情恣肆為邪子當如此辨別之既得其人死心踏地務求安身立命一著方是究竟法也居南京以所學倡後進從者甚衆晚修念佛三昧泰昌元年卒年八十一贈諭德崇禎末諡文端憺園集陶石簣集明儒學案唐宜之名時湖州人也以諸生貢太學出判壽陽繼輔襄國流賊破襄陽宜之投端禮門左井中家人掖之出絶而復蘇上書自訟詔付三司究問得白放還家宜之初參蓮池授以念佛法門遂勤修淨業諸眷屬皆能覆誦金剛經及普門品晝則各習所業夜則共集佛前回向以為常嘗言修淨土者以觀門為要須穿衣喫飯常在觀中或神遊蓮海華中禮佛或坐瞻寶剎佛光照身淨想既成往生何待遂專修佛觀過南京長干寺禮塔念佛次見塔頂放白光佛為現相如黃金色一日坐禪堂推窗忽見大海中湧一山佛坐其上光明四徹墻壁林木盡空不見其精誠所感如此宜之工文章既歸心佛乘每順世語言說諸法要淮南李小有述廣仁品宜之為序曰學者聞胞民與物之說亦有刻意推心引為同體而無奈與自身痛癢畢竟不同譬如蒙鏡照人雖強以人面相逼而鬚眉終不能了了古人在畎畝中未有天下之任而念及一夫如己推溝亦無奈其覺性明徹衆生痛癢呼吸相關故不禁其焦腸輪轉也凡夫與衆生雖求親而反隔聖人與衆生不求緣而自不隔則覺與不覺之分也聖人經理民物如拯溺救焚千方百變皆是仁中之用唯此覺性遍滿法界是之謂仁耳伊尹天民之先覺者也覺衆生與我不隔而又覺衆生不能與我不隔如父與子不能一心安能禁其焦腸輪轉乎夫如是自不得不以天下為己任故曰伊尹聖之任者也伊尹之任蓋自覺中來也伊尹之任天下不獨謂生民塗炭出之水火而已若以此為任後世豪傑將相皆然安見其重哉伊尹自思匹夫匹婦有不與被堯舜之澤者若己推而內之溝中欲使天下之人皆有匹夫匹婦不與被堯舜之澤者若己推而內之溝中之思此之謂先覺覺後覺其任天下如此故曰重也蓋衆生不覺非止於不覺而已不覺之言不可勝言也不知君父是我頭目起愛戴想則自然欺慢不知百姓是我血肉起調理想則自然貪虐不知鳥獸魚鱉是我手足指爪起保護想則自然屠戮而諸受害之倫又不能覺知自性起容受想起平等想起慈憫想於是欺者還欺虐者還虐屠戮者還屠戮合千百劫怨讐報施之慘禍聖人大悲覺體了了盡知盡見譬如祖父見子孫殘殺無已安能禁其焦腸輪轉乎是故聖人或以王法明吉凶之影響或以天網昭禍福之不漏或以三世因緣決因果之不昧燦然明備矣然憂世之君子惟恐衆生聾聵易安猶必隨其見之所到時有著述而吾友小有起而輯其大成曰廣仁品小有慧根深厚一腔愷悌先有仁品行世本以妙生戒殺為宗自後但見忠孝慈廉之事則曰此其生機之布護也但見貪叨淫縱之事則曰此其殺機之橫流也而廣仁品又因以出焉向使小有非二十年至靜中討求恍然得法界往來之路何以為衆生之心如此其焦腸輪轉乎宜之他所著有蓮華世界書如來香頻迦音等書刻行於世嘗自營生壙旋捨之棲霞寺中遺言死後必用茶毗法臨終現諸瑞相正念而逝金剛持驗記淨土晨鐘廣仁品序瞿元立名汝稷蘇州常熟人以父文懿公蔭為官歷黃州知府徙邵武再守辰州遷長蘆鹽運使其在官以名節自厲清望歸之以太僕少卿致仕歸元立受業於管東溟學通內外尤盡心於佛法時徑山刻大藏元立為文導諸衆信破除異論其言曰世之誕佛者皆比於范縝之神滅也而神滅非聖人所立教也夫神也者妙萬物而為言者也即心也即道也範圍天地曲成萬物聖人所以參贊化育者也是豈形之所及也唯聖人為能窮神而庸愚固未嘗亡特不知其即道耳故曰百姓日用而不知不知則一狥於形於是遺範圍天地之廣大而自局棄曲成萬物之微妙而自穢終日役役不過耳目口腹聖人愍焉故喻之曰形而上者謂之道形而下者謂之器謂之道復慮人之自畫而高遠之謂非己所及也故曰利用出入民咸用之謂之神堯之所以堯窮此神也桀之所以桀昧此神也是神者遡之無始推之無終豈形生而始生形滅而隨滅哉形有盡而神無窮故曰原始反終故知死生之說精氣為物游魂為變是故知鬼神之情狀而縝之言曰形即神也神即形也形生而神生形滅而神滅藉如縝言操則存者存形與舍則亡者形亡與出入無時莫知其鄉百髓九竅六臟誰為然與心不在焉視而不見夢說築巖豈目所矚處今而憶昔在吳而知越何形之能然縝亦不思甚矣縝之言使人重形而遺神淪胥以溺者也謂形即神則舍形無我舍形無我則凡形之所欲皆我之所欲而以禮義維之是強也是外鑠也神不滅而謂滅則堯桀均盡顏跖均生均生則縱逸者自適均盡則好修者徒勞於是示之以餘慶戒之以百殃則見以為茫昧而難徵也揭之以仁義則以為仁義攖人心揭之以性善則以為性惡則以為善惡混幾何其能信之於是聿皇得喪徽纆貪毒惡積而不可掩罪大而不可解沉瀹昏衢莫能自出旋復流浪為苦無已如來智入三世圓應衆機五時說法海墨不可勝紀其流入震旦者才海墨之一滴是為今一大藏其語報則徵之三世其語性則盡之妙覺知三世之報則堯桀不均盡知性覺之妙則性善無所疑故下焉者得其說必惕於三世之報惡不俟懲而革善不俟勸而行矣上焉者得其說則妙契性善之真居仁由義若耳聽目視何有攖我心哉是以聖賢之教得如來而大暢惜哉縝之不講謂神滅形滅而誕佛也惟如來之教能窮此神之廣大微妙語其大則天地者無盡大海之一漚耳元會運世者無盡時劫之一瞬耳語其妙則無聲無臭此之空諦也精一執中此之尸波羅密也一言演為無量義竟古今而推之莫能竟也儒佛之是非黃老之祕密與夫百家之雄辨一言蔽之而有餘也佐堯而堯佐舜而舜父以之而慈子以之而孝護法以之而護諸衆生帝釋以之而離愛梵天以之而勝慧二乘以之而回向真乘菩薩以之而證入妙覺四聖六凡無根不被故其言必至於海墨也河沙妙德罔越窮神故其要必歸於一乘也世出世法莫不竭盡無餘矣是以世之興王莫不尊尚我太祖太宗彌極紹隆太祖既刻大藏於留都太宗復刻大藏於京師列聖纘緒底今無替至於列代名卿宿儒或行峻一世或文雄百代龍翰鳳雛之彥蘭薰雪白之賢歸命法流頤真靈筏者數之更僕未易終也嗟乎四大假合也百年旦暮也昔之所歷於今奚存今之所存又何可恃至愛終離大業終棄神之未窮茫茫安托適百里而不得其所托則皇皇焉浩劫之適何翅百里七趣紛沓所托非定狃百年之得喪而輕萬劫之流浪可不謂大哀耶故濟我於一時者不及濟我於一世者也俾我一世得所安者不如使我浩劫得所安者也求濟我於浩劫者非如來之教而何姑未敢論受果登地第能泛瀾覺海少溉餘潤則契根根塵塵靡不周遍法界於是纏蓋不能縻陰陽不能控翛兮其翔汩兮其集究曠劫於剎那拔九類於半偈莫尚於是矣密藏幻余二上人以南北二藏皆梵策流通不易思刻方冊廣其流通拯溺之慈甚盛諸龍象敷美其事盡矣豫特恐世之誕佛者或沮之遂書此以輔韋馱氏之跋折羅杵云又於佛前說誓曰願畢我形壽力荷此法藏苟可效我力靡所不自竭念昔佛菩薩以此法藏故剝皮以為紙析骨以為筆書寫此經卷積如須彌山今此真丹國陟𨤲瑩於玉無事以我皮充此法藏用使我皮可用剝所不敢辭域有蒙氏筆無事析我骨使我骨可用析所不敢辭我今雖食貧檀資當勉具歷仕及歸農隨緣力為辦不直此一生願盡未來際常以此法藏普度諸衆生同時發願者又有曾乾亨傅光宅唐文獻曾鳳儀徐琰于立玉吳惟明王宇泰袁了凡共九人其文俱刻徑山藏中元立嘗上溯諸佛下逮宗門撮其語要為指月録盛行於世後終老於家於時士大夫學佛者所在多有其不列於傳者並著其大概如左朱兆隆名國祚秀水人萬歷十一年登進士第第一天啓朝拜武英殿大學士在官侃侃持大體進退以禮事具明史傳中居常自奉淡泊日必闔戶閲一卷書又靜坐久之乃出既乞休歸舟中人見之知所閲者乃金剛經也已而謂其子曰我生平榮枯不較順逆一如只得金剛經中無我相無人相六字之力又時呼老鄰說經中大意天啓四年預知將終命酒自酌端坐而逝鼻中玉筯下垂久之乃隱諡文恪鍾伯敬名惺竟陵人萬歷中進士官禮部主事出為福建提學一年以父憂歸服除不出年將五十自念人生無常佛性漸失不覺悲淚乃專精首楞嚴經眠食造次皆執卷熟思與永新賀中男往復參訂成楞嚴如說十卷將歿前三日告於佛請大僧授五戒法名斷殘願生生世世為比邱優婆塞遂逝崑山王弱生名志堅萬歷中進士官終湖廣提學其學博通內外與弟平仲與遊並禮雲棲宏公稱弟子弱生嘗手寫華嚴經至再晚修兜率觀卒於官未卒前兩月嘉定徐成民治閻羅事言弱生已注名上生兜率矣既弱生自官所寄所著彌勒懺歸乃驗成民言不虗也平仲名志長與遊名志慶皆博學有高行老於公車其手書華嚴經各一部金壇王宇泰名肯堂父方麓名樵萬歷中以南京右都御史致仕歸得疾苦躁宇泰奉金剛經進曰願大人澄心聽兒誦經方麓頷之誦至無我相無人相方麓微笑曰煩惱本空我相何在遂起坐合掌而逝宇泰既成進士官翰林檢討終福建參政平生博通教乘尤精相宗以慈恩成唯識疏既亡學者無所取證乃創唯識證義十卷書成力疾校讐刻行於世曰此龍華之羔雉也初高原昱公以宇泰之請演唯識俗詮既成浙江布政使吳體中施金刻之為之序曰衆生念念執我在在執法古佛語之曰無勞執也此唯識耳遮執之談何關表識而逐影伺聲之流乃至望識幢而生執夫識真如之病與夢也病與夢誠非無顧何得言誠是有吾求之始大覺湛澄識於何生吾求之終佛智歷然識向何滅言思路絶擬議道窮坐見八識恍然墮矣隨即名轉義不等於斡旋轉即是智境非立於對待未轉通智全體是識病外無身既轉通識全體是智覺來無夢如是則天親不得已以有頌護法不得已以有論高原上人亦不得已而有俗詮乎體中名用先桐城人從紫柏老人遊復徑山化城寺貯藏經板為流通計叔父應賓官翰林編修受雲棲戒為優婆塞敬信尤篤雲棲志多出其手華亭董元宰名其昌為諸生時參紫柏老人與密藏師激揚大事遂博觀大乘經力究竹篦子話一日舟過武塘念香巖擊竹因緣以手敲張帆竹竿瞥然有省自後不疑從上公案因讀華嚴合論作偈云帝網重珠遍剎塵都來當念兩言真華嚴論主分明舉五十三參鈍置人又云儒衣僧帽道人鞋百劫莊嚴不受些笑倒靈山臨末會生平伎倆一枝花萬歷中成通士官至禮部尚書告歸諡文敏明文偶鈔刻藏緣起常熟志密藏禪師遺稿附録明史金剛新異録鍾伯敬集活閻君紀略𮓒菴別録金剛果報唯識證義序唯識俗詮序雲棲法彙畫禪隨筆知歸子曰儒佛盛衰實相表裏曹溪之化盛而李翱演復性之書東林之教行而周子抉無極之祕其發軫迥殊而歸宗非別洎於明道推闡天人研窮性命往往契金剛無住之旨維摩不二之門然而痛斥枯禪深排二乘非獨顯提名教抑且陰翼禪宗雖排斥之言不無太過將願力所憑別有深旨乎降及象山慈湖陽明心齊諸先生直契心源痛除枝葉宜乎登少林之堂飲曹溪之水而乃曲為衆生嚴分經界權實互用冥顯難窺越至明之末造籓籬既撤華梵交宣覲彌陀於數仞墻中謁庖犧於菩提樹下大同之化於是為昭然或徒尚空言終乖實相長顢頇之習開閃爍之風亦識法者所深懼也豫録自宋以來諸先生其一意宗儒者不敢旁濫若出入二教信向慤誠踐履篤實者采其議論以導將來如管楊以下諸公其尤著者也子思曰道並行而不相悖孟子曰夫道一而已矣非忘言之倫奚足以語於斯哉
