body:
  text: 劉潘許郭陳吳傳劉興朝名經臣不詳其里居年三十餘會東林照覺總公始究心祖道既而抵京師謁慧林冲公冲舉或問雪竇如何是諸佛本源答曰千峯寒色言下有省已而官洛中就參韶山杲公杲囑曰公如此用心何愁不悟爾後或有非常境界無量歡喜宜急收拾若收拾得去便成法器否則將成失心之疾矣未幾復至京師參正覺逸公逸曰古人言平常心是道你十二時中放光動地不自覺知向外馳求轉踈轉遠興朝益疑不解一夕入室逸舉波羅提尊者見性是佛語詰之不能對疑甚遂歸就寢至五更而覺方追念間見種種異相表裏通徹六根震動天地回旋如雲開月現喜不自勝忽憶韶山臨別語姑抑之向明以告逸逸曰更須用得始得興朝曰莫要踐履否逸厲聲曰這個是甚麼事却說踐履興朝默契乃作發明心地頌及明道喻儒篇以曉世其略曰人之於道猶魚之於水未嘗須臾離也唯其迷己逐物故終身由之而不知佛曰大覺儒曰先覺蓋覺此耳昔人有言曰今古應無墜分明在目前又曰大道祇在目前要且目前難覩欲識大道真體不離聲色言語又曰夜夜抱佛眠朝朝還共起起倒鎮相隨語默同居止欲識佛去處祇這語聲是此佛者之語道為最親者立則見其參於前也在輿則見其倚於衡也瞻之在前也忽焉在後也取之左右逢其原也此儒者語道最邇者奈何此道唯心可傳不立文字故世尊拈花而妙心傳於迦葉達摩面壁而宗旨付於神光六葉既敷千花競秀分宗列派各有門庭故或瞬目揚眉擎拳舉指或行棒行喝竪拂拈捶或持叉張弓輥毬舞笏或拽石搬土打鼓吹毛或一默一言一吁一笑乃至種種方便皆是親切為人然祇為太親故人多罔措瞥然見者不隔絲毫其或沉吟迢迢萬里欲明道者宜無忽焉豫之有得實在此門反思吾儒自有其道良哉孔子之言默而識之一以貫之故目擊而道存指掌而意喻凡若此者皆合宗門之妙旨得教外之真機然孔子之道傳之子思子思傳之孟子孟子既歿不得其傳而所傳於世者特文字耳豫之學必求自得而後已幸豫一夕開悟凡目之所見耳之所聞心之所思口之所談手足之所運動無非妙者得之既久日益見前每以與人人不能受然後知其妙道果不可以文字傳也嗚呼是道也有其人則傳無其人則絶豫既得之矣誰其似之乎五燈會元潘延之名興嗣家豫章東湖上懷道耽隱自嘉祐以來公卿交章薦不起琴書自娛號清逸居士嘗問道於黃龍南公得其密意一日南公弟子源公訪之見其拂琴次源公曰老老大大猶弄個線索在對曰也要彈教響源曰也不少對曰知心能幾人覺範洪公題其像曰毗盧無生之藏震旦有道之器談妙義借身為舌擎大千以手為地機鋒不減龐蘊而解文字禪行藏大類孺子而值休明世舒王強之而不可神考致之而不起此天下士大夫所共聞然公豈止於是而已哉石門文字禪金湯徵文録許叔矜名式蘇州人舉進士名著雍咸間官尚書祠部郎中出知洪州參洞山曉聰得正法眼嘗贈曉聰詩有句云夜坐連雲石春栽帶雨松一日與泐潭澄上藍溥坐頃泐潭問曰夜坐連雲石春栽帶雨松當時答洞山甚麼語叔矜曰今日放衙早泐潭曰聞答泗州大聖揚州出現語是否叔矜曰別點茶來泐潭曰名不虗傳叔矜曰和尚早晚回山泐潭曰今日被上藍破上藍便喝泐潭曰須你始得叔矜曰不奈船何打破戽斗後官至轉運使卒贈禮部尚書五燈會元蘇州志郭功父名祥正當塗人也母夢李太白而生及長工詩熙寧中知武岡縣僉書保信軍節度判官尋致仕隱於青山自號淨空居士渡江謁舒州白雲端公白雲上堂曰夜來枕上作得一頌謝功父遠訪之勤當須舉似諸方要與天下有鼻孔衲僧脫却著肉汗衫莫言不道乃曰上大人邱乙己化三千七十士爾小生八九子佳作仁可知禮也功父切疑後聞小兒誦之忽有省以書報白雲白雲以偈答曰藏身不用縮頭斂跡何須收腳金烏半夜撩天玉兔趕他不著一日白雲問曰牛淳乎曰淳矣白雲叱之功父拱手而立白雲曰淳乎淳乎乃贈偈曰牛來山中水足草足牛出山去東觸西觸嘗到雲居請佛印升座拈香曰覺地相逢一何早鶻臭布衫今脫了要識雲居一句玄珍重後園驢喫草召大衆曰此一瓣香薰天炙地去也佛印曰今日不著便被這漢當面塗糊便打乃曰謝公千里來相訪共話東山竹徑深借與一龍騎出洞若逢天旱便為霖擲拄杖下座功父拜起佛印曰收得龍麼功父曰已在這裏佛印曰作麼生騎功父擺手作舞便行佛印拊掌曰祇有這漢猶較些子後復起知端州尋棄去老於家東都事略五燈會元陳體常名易家蔡溪之左巖少好學該綜經史熙寧初應試即棄去與釋氏論出世法嘗作頌曰密坐研窮有細微到頭須是自忘機應無祖佛能超越豈有冤親更順違歷歷孤明猶認影巍巍獨露尚披衣翻嗟會得昭靈者也道尋常得旨歸其二曰個中端的有誰知知者歸來到者稀即見即聞還錯會離聲離色轉乖違山青水緑明元旨鶴唳猿啼顯妙機有意覓渠終不遇無心到處盡逢伊崇寧中舉遺逸又舉八行郡守郭重致禮聘之體常謝箋曰早粗修於八行晚但了於一心心既本無行亦何有平生無忤視妄言或語老莊釋氏大意則亹亹忘倦宣和八年跏趺而逝漁隱叢話法喜志吳德夫名恂不詳其里居元豐元年任豫章法曹時郡帥王韶迎晦堂禪師入城館於大梵院咨訪大法德夫亦往叩焉晦堂曰公平生學解即不問父母未生已前道將一句來德夫不能對一日閲傳燈録至鄧隱峯倒卓而化其衣順體不退深以為疑復趨問晦堂晦堂笑曰公今侍立是順耶是逆也曰是順晦堂曰還疑否曰不疑晦堂曰自既不疑何疑於彼德夫言下大徹即說偈曰咄這多知俗漢咬盡古今公案忽於狼籍堆頭拾得蜣螂糞彈明明不直分文萬兩黃金不換等閒拈出示人祇為走盤難看時韶亦於晦堂得法述頌曰晝曾忘食夜忘眠捧得驪珠欲上天却向自身都放下四稜榻地恰團圓後德夫官至祕書五燈會元林間録知歸子曰觀諸賢問答及所論著於心地法門豁如矣迹其出處之際類能不繫於物非其驗耶以視夏竦呂惠卿之徒濫廁傳燈者其相去何如也汪大紳曰歷歷孤明巍巍獨坐近來居士頗有這般人物否有則叫他到大紳門下來看箭
