body:
  text: 真希元吳毅夫傳真希元名德秀建州浦城人慶元五年登進士第理宗朝官至參知政事立朝不滿十年所上奏疏數十萬言皆切當世要務直聲震朝野洊歷州郡民懷其惠自寧宗以來屢下僞學之禁真元晚出獨慨然以道自任讀佛經通其旨趣嘗題遺教經云遺教經蓋瞿曇氏最後教諸弟子語今學佛者罕嘗誦而習之蓋自禪教既分學者往往以為不階語言文字而佛可得於是脫略經教而求其所謂禪者高則高矣至其身心顛倒有不堪點檢者則反不如誦經持律之徒循循規矩中猶不至大謬也今觀此經以端心正念為首而深言持戒為禪定智慧之本至謂制心之道如牧牛如馭馬不使縱逸去瞋止妄息欲寡求然後由遠離以至精進由禪定以造智慧具有漸次梯級非如今之談者以為一超可到如來地位也以吾儒觀之聖門教人以下學為本然後可以上達亦此理也學佛者不由持戒而欲至定慧亦猶吾儒舍離經辨志而急於大成去灑掃應對而語性與天道之妙其可得哉余謂佛氏之有此經猶儒家之有論語而金剛楞嚴圓覺等經則易中庸之比未有不先論語而可遽及易中庸者也其題蓮華經普門品云昔唐李文公問藥山儼禪師曰如何是惡風吹船飄落鬼國師曰李翱小子問此何為文公怫然怒形於色師笑曰如此便是黑風吹船飄入鬼國也吁藥山可為善啓發人矣以是推之則知利欲熾然即是火坑貪愛沉溺便是苦海一念清淨烈焰成池一念警覺船到彼岸災患纏縛隨處而安我無怖畏如械自脫惡人侵凌待他橫逆我無忿嫉如獸自奔讀是經者作如是觀則知補陀大士真實為人非虗語也又嘗遺書提刑陳貴謙問禪門事貴謙嘗參月林鐵鞭諸老切究向上一機答之曰承下問禪門所謂話頭合看與否以愚觀之初無定說若能一念無生全體是佛何處別有話頭只緣多生習氣背覺合塵剎那之間念念起滅如猴猻拾栗相似祖師不得已權設方便令咬嚼一句無滋味話頭淘汝業識都無實義今時學者却於話頭上強生穿鑿或至逐箇解說以當事業遠之遠矣來教謂未誦佛之言存佛之心行佛之行久久須有得處如此行履固不失為一世賢者然禪門一著又須見徹自己本地風光方為究竟此事雖人人本有但為客塵妄想所蔽若不痛加煆煉終不明淨來教又謂道若不在言語文字上諸佛諸祖何為留許多經論在世經是佛言禪是佛心初無違背但世人尋言逐句沒溺教網不知自己有一段光明大事故達摩西來不立文字直指人心見性成佛謂之教外別傳非是教外別有一箇道理只要明了此心不著教相今若只誦佛語而不會歸自己如人數他珍寶自無半錢分縱於中得少滋味猶是法愛之見直須打併一切淨盡方有少分相應也以日用驗之雖無濁惡粗過然於一切善惡逆順境界上果能照破不為他所移換否夜睡中夢覺一如否恐怖顛倒否疾病而能作得主否若目前猶有境在則夢寐未免顛倒夢寐既顛倒疾病必不能作得主宰疾病既作主宰不得則生死岸頭必不自在所謂如人飲水冷暖自知來教謂無下手處只是無下手處正是得力處如前書所言靜處閙處皆著一隻眼看是甚麼道理久久純熟自無靜閙之異其或雜亂紛飛起滅不停却舉一則公案與之撕挨則起滅之心自然頓息照與照者同時寂滅即是到家消息也端平二年希元有疾三上章乞祠祿疾亟冠帶起坐神爽不亂卒諡文忠宋史西山文集緇門警訓吳毅夫名潛寧國人嘉定十年進士第一立朝骨鯁不避權要淳祐中拜右丞相以直言忤旨責授化州團練使循州安置居常究心大法深有悟入序大慧正法眼藏至此事亘古亘今漫天漫地端視側視直視橫視開視闔視明視暗視無不視亦無所視亦無無不視無所視謂正即離謂法即塵謂眼即鑿謂藏即塞是故這四箇字直須撇向大洋海裏方免擔枷帶索受人圈䙡然雖如此初機鈍根也要得一則半則胡言漢語來去綻須光景此時正好𢬵命捨身單鎗直進如老鼠入牛角挨牆拶壁更無去處正迷悶中猛忽地頭破額裂通身流汗得箇休歇始知法眼慧眼天眼佛眼只是一雙凡眼到這裏說道學人事畢也且未在履齊老子即說偈言若以色見我以音聲求我是人行邪道不能見如來及赴貶所宿楓亭接待寺告寺僧曰文殊言我初入不思議三昧繫心一緣若久習成就更無他想常與定俱此繫心一緣乃成佛作祖之階梯也所謂繫心一緣如日觀月觀眉間毫相與鼻準白之類事雖淺近理實幽微如趙州云老僧十二時惟粥飯二時是雜用心溈山問懶安曰汝十二時當作何務安云牧牛溈云作麼生牧安曰一回入草去驀鼻拽將來凡此皆繫心一緣也是後尊宿又生巧妙方便令學人看個話頭如狗子佛性麻三升乾屎橛青州布衫鎮州蘿蔔庭前柏樹子之類都是理路不通處教人取次看一則看來看去疑來疑去十二時中常不放捨忽然鼻孔噴地一下即是當人安身立命處此寺僧徒戒行嚴潔誦經禮佛脅不附席蓋禪教律剎之希有亦謂精進矣有此鎡基更能趲上一層繫心一緣習定生慧則人人是佛自家現成公案不用借他珍寶開帳鋪席可惜只在有為法上過了一生總然以今世持戒福德來世不失人身脫殼入殼何時休歇一有蹉跌永劫扶頭不起所謂此生不向今生度更向何生度此身此語最為悲切履齊老子未能自度先願度人因書此以效法施云履齊者毅夫所自號也將卒之日語人曰吾將逝矣夜必雷風大雨已而果然四更開霽撰遺表作詩端坐而逝事在景定三年徑山志佛法金湯知歸子曰希元之論佛法信有功於下學矣雖然學佛而不明宗如陷蹄涔求適大海不亦左乎故陳吳之說學者其不可不盡心也汪大紳云明宗判得甚是然明得宗希元之論皆宗也明不得宗陳吳之論皆枝節耳儒門論禪何等切直著於居士傳法施之善者也
