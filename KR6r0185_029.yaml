body:
  text: 李伯紀傳李伯紀名綱邵武人也父夔官龍圖待制初為松溪尉與大中寺慶餘禪師往還究心佛法時參政呂公謫居建安以龍圖故致禮於慶餘一日慶餘升堂集衆跏趺化去龍圖呂公方遊武夷歸急趨視之距慶餘化時越一晝夜矣呂公痛哭恨不及其生叩其所證龍圖曰盍誠禱倘能復反呂公焚香再拜就慶餘耳擊小磬數十聲慶餘忽開眼笑曰已相別何用爾耶當為公留七日遂下座呂公咨問道要請慶餘再開堂說法龍圖為之疏辭義甚美及期復如前升座而化其後伯紀過建安訪龍圖遺跡書其事勵學佛者政和二年伯紀登進士第歷官中外事徽宗欽宗高宗三居相位孤忠信於朝野偉略蓋世俄頃指顧間懾強敵持危士庶恃之以為命蔽於僉邪屢振屢絀出入險阻中心浩然同時吳元中敏與伯紀先後柄政以復為己任已而先後皆遠竄數遺書往復切劘大義慷慨痛激自擬申胥既已欲自效無由則發憤求出世法研佛書聞伯紀通易華嚴二經遺書雷陽問二經同別伯紀復之其略曰易立象以盡意華嚴托事以表法本無二理世間出世間亦無二道何以言之天地萬物之情無不攝總於八卦引而申之而其象至於無窮此即華嚴法界之互相攝入也一為無量無量為一小中現大大中現小法界之成壞一漚之起滅是也乾坤之闔闢一氣之盈虗是也易有時其在華嚴則世界也易有才其在華嚴則法門也嘗觀十處九會雖升諸天宮說法而不離普光明殿雖普現羣生前而常處菩提座每會必有十方法界諸佛菩薩同一名號來集作禮同一威儀慰諭稱讚同一言說乃至所事之佛所從來國無不同者此何理耶譬猶鏡鏡相照重重相入無有窮盡是故百億天地即乾坤也百億日月即坎離也百億山海即艮兌也陰極陽生君子道長佛出世也陽極陰生君子道消佛滅度也剛柔相推以生變化世界生滅相依也六爻周流循環無端萬物輪回互高下也由是言之華嚴法界與易乾坤諸卦有二理哉嘗觀善財之入法界遍參五十三善知識童男童女外道仙人醫卜船師無不求也妙高之峯海岸曠野城邑聚落無不至也文殊導其前普賢示其後彈指而樓閣開攝心而佛境現其表法之意微矣然所以為菩薩道行菩薩行者則不出諸波羅密等法而已六十四卦善知識也君子觀象善財遍參也卦之象無所不取而君子觀之無所不法自強不息積小而大非精進乎自昭明德作事謀始非智慧乎反身修德儉德辟難非忍辱乎稱物平施施祿及下非布施乎懲忿窒欲慎言語節飲食非持戒乎立不易方言有物行有恆非禪定乎教思無窮容保民無疆茂對時育萬物所謂慈也議獄緩死明慎用刑而不留獄所謂悲也飲食宴樂朋友講習所謂喜也獨立不懼遁世無悶所謂捨也成卦之象皆出於乾坤君子觀象皆得於易簡易簡而天下之理得矣由是觀之華嚴法門與易之易簡法門有二理哉繫辭論八卦必妙之以神八卦者菩薩也如所謂文殊小男普賢長子之類是也神者佛也如所謂毗盧遮那是也生生之謂易一陰一陽之謂道陰陽不測之謂神猶佛之有清淨法身圓滿報身千百億化身也八卦用事而易無作諸菩薩說法而佛無言散佛之體則文殊得其理普賢得其行觀音得其悲勢至得其智合之則佛也散易之體則乾得其健坤得其順六子得其動止陷麗說入合之則易也神無方也易無體也佛身充滿於法界無不在無不為也無芥子許孔中無虗空無一塵中無佛身翾飛蠕動皆神之所妙草木縷結皆易之所存反而觀之則大千法界與夫天地萬物皆在吾方寸之間故孟子曰萬物皆備於我矣反身而誠樂莫大焉楞嚴曰一切世間諸所有物皆即菩提妙明元心心精遍圓含裹十方反觀父母所生之身猶彼十方虗空之中吹一微塵若存若亡如湛巨海流一浮漚起滅無從此心地法門也為易之說則曰復其見天地之心乎以此洗心退藏於密吉凶與民同患為華嚴之說則曰當觀法界性一切唯心造善用其心則獲一切勝妙功德心靜而明廓而大虗而通寂而靈建立萬法為之主宰而物有蔽之則明者暗大者小通者礙靈者頑所謂操存而舍亡也故易立象以盡意華嚴托事以表法皆以其本來所有者示之非能與其所無也體此道者莫若誠至誠則不息不息則悠久悠久則博厚博厚則高明故曰惟天下至誠為能盡己之性能盡己之性則能盡人之性能盡人之性則能盡物之性能盡物之性則可與天地參此致其誠而天地萬物得於一心者也昔之發無上道者自十信始故曰信為道元功德母長養一切諸善根斷諸疑網出愛流開示涅槃無上道由此充之為十住十行十回向十地成等正覺猶育孩稚以為成人養根萌以為成材其骨節枝幹初已具足充大之而已其悲願之深勇猛精進為羣生入諸惡趣受種種苦心不退轉而况死生禍福毀譽足驚怖動搖之乎故能出入三界遊戲十方於夢幻中而作佛事此致其誠而華嚴之法界得於一心者也二者皆不出於心法故吾儕之所當自事者心而已了此則廓然更有何事夫晝之所想即夜之所夢生之所履即死之所為春之所種即秋之所獲所以處世間者所以出世間者儒釋之術一也夫何疑哉神通妙用在運水搬柴中坐脫立亡在著衣吃飯中無上妙道在平常心中願試思之後以江西安撫使乞祠提舉臨安洞霄宮紹興十年卒年五十八贈少師諡忠定中歲嘗自題其像曰是影是形了無差別行年之化三十有八返觀其前膚腴色悅從是以往蒼顏華髮本來面目不生不滅遊戲仕塗天付之拙須天而行一無敢設獨知其天寧有他訣萬里清風一輪明月有來問者默然無說李忠定集宋史知歸子曰世之議儒釋者不得其本往往知見立知滯迹異同之間籓太虗畫滄溟汗漫精微祇成戲論耳吾觀伯紀與吳元中書周易䇿數華嚴法界涉入圓融同一涅槃元清淨體彼其出入塵勞煩惱中獨肩世界不厭不疲非誠得其本者其能如是乎汪大紳云豫讀論語至豫欲無言及莫我知也夫輒為之喟然歎曰其先師窮理盡性以至於命之時乎其釋迦氏見明星而豁然大悟之境界乎先師之發是言也從天而降不知影落何處是言也端木先生以上大弟子不用問端木先生以下大弟子不能問惟端木先生能逆流而入曰子如不言則小子何述焉曰何為其莫知子也是問也香象渡河金翅劈海為百萬人之橋梁於是先師現毗盧身為說法曰天何言哉四時行焉百物生焉天何言哉此華嚴重重法界也曰不怨天不尤人下學而上達知我者其天乎此華嚴十信十住十行十回向十地成等正覺也蓋聖門之所謂天即佛門之所謂毗盧法身也
