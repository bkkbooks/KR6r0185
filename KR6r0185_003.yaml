body:
  text: 二張王宗周雷傳張萊民名野尋陽人也性孝友田宅悉推與弟甘苦與九族共之州郡屢辟不應朝命拜散騎常侍亦不就入廬山白蓮社稱遠公門人義熙十四年與家人別入室端坐而逝年六十九東林傳張秀實名詮野之族子也尚情高逸好古樂道荷鉏力田帶經不釋以散騎常侍徵不起庾悅憐其貧薦為尋陽令亦不應已而入廬山依遠公研窮佛經深有悟入宋景平元年西向念佛無疾而卒年六十五東林傳王喬之琅邪人官臨賀大守已而入白蓮社事遠公與劉遺民諸賢作念佛三昧詩而喬之詩獨傳於世詩曰妙用在茲涉有覽無神由昧徹識以照粗積微自引因功本虗泯彼三觀忘此毫餘其二曰寂寞何始履元通微融然忘適乃廓靈暉心遊緬域得不踐機用之以沖會之以希其三曰神姿天凝圓映朝雲與化而咸與佛斯群應不以方受者自分寂爾淵鏡謝彼塵紛其四曰慨自一生夙乏慧識託崇淵人庶藉冥力思轉毫功在深不測至哉之念注心西極遠公為作序云夫稱三昧者何專思寂想之謂也思專則志一不分想寂則氣虗神朗氣虗則智悟其照神朗則無幽不徹是二者自然之元符會一而致用也又諸三昧其名甚衆功高易進念佛為先何者窮元極寂尊號如來體神合變應不以方故令入斯定者昧然忘知即所緣以成鑒鑒明則內照交映而萬象生焉非耳目之所暨而聞見行焉於是靈相湛一清明自然元音叩心滯情融朗非天下之至妙孰能與於此哉所以奉法諸賢咸思一揆之契感寸陰之將頽懼來儲之未積洗心法堂整襟清向夜分忘寢夙興唯勤庶夫貞詣之功以通三乘之志仰援超步茅之興俯引弱進垂䇿其後以此覽衆萹之揮翰豈徒文詠而已哉宏明集盧山集喬之一作齊之或其字也宗少文名炳南陽人妙善琴書精於理論殷仲堪桓元劉裕並以主簿辟不就乃入廬山事遠師築室依白蓮社居之既而兄臧為南平守逼與俱還江陵間居絶俗頗營稼穡以給其家衡陽王義季親訪之少文角巾布衣引見不拜王曰處先生以重祿可乎對曰祿如秋草時過即腐宋受禪三徵不應雅好山水西陟荊巫南登衝嶽以疾還江陵歎曰老病俱至名山不可再登唯澄懷觀道臥以遊之凡所遊履悉圖之於壁謂人曰撫琴動操欲令衆山皆響嘗著神不滅論其略云群生之神其極雖齊而隨緣遷流成粗妙之識夫舜生於瞽舜之神也必非瞽之所生則商均之神又非舜之所育生育之前素有粗妙矣既本立於未生之先則知不滅於既死之後矣神也者妙萬物而為言矣若資形以造隨形以滅則以形為本何妙以言乎誠能澄不滅之本稟日損之學損之又損以至無為無為則無當於生矣無生則無身無身而有神法身之謂也今黃帝虞舜姬公孔父世之所仰而信者也觀其縱轡升天龍潛鳳揚反風起禾絶粒弦歌亦皆由窮神為體故神功所應倜儻無方也夫洪範庶徵休咎之應皆由心來逮白虹貫日太白入昴寒谷生黍崩城隕霜之類皆發自人情而遠形天事固相為形影矣夫形無無影聲無無響亦情無無報矣豈直貫日隕霜之類哉莫不隨情曲應物無遁形但或結於身或播於事交賒紛綸顯昧渺漫孰覩其際哉衆變盈世群象滿目皆萬世以來精感之所集矣故佛經云一切諸法從意生形又云心為法本心作天堂心作地獄義由此也是以清心潔情必妙生於英麗之境濁情滓行必永滯於三塗之域夫神聖圓照而無思營之識者由心與物絶唯神而已故虗明之本終始長住不可凋矣今以悟空息心心用止而情識歇則神明全矣顏子知其如此故處有若無撫實若虗不見有犯而不校也今觀顏子之屢空則知其有之實無矣且舟壑潛謝變速奔電將來未至過去已滅現在不住瞬息之頃無一毫可據將欲何守而以為有乎甚矣偽有之蔽神也今有明鏡於斯紛穢集之微則其照藹然積則其照朏然彌厚則照而昧矣人之神理有類於此偽有纍神成精粗之識識附於神故雖死不滅漸之以空必將習漸至盡而窮本神矣泥洹之謂也夫自古所以不顯至道者將存其生也而苦由生來昧者不知矣且時則無止運則無窮既往積劫無數無邊皆一瞬所閲以及今耳今積瞬以至百年曾幾何時而又鮮克半焉夫物之媚於朝露之身者類無清遐之實矣何為甘臭腐於漏刻以枉長存之神而不自踈於遐遠之風哉元嘉二十年卒年六十九宋書東林傳宏明集周道祖名續之雁門人父歿過江居豫章年十二詣范寧受業通五經五緯養志窮居精研老易既而入廬山白蓮社以為身不可遺餘纍宜絶遂終身不娶妻布衣蔬食朝命徵太學博士不就劉裕北伐世子守彭城迎之館於安東寺延入講禮月餘還山裕還鎮復遣使迎之宋受禪為開館東郭外招集生徒以禮經教授或問身為處士時踐王庭何也答曰心馳魏闕者以江湖為桎梏情致兩忘者市朝亦巖穴耳時號通隱先生未幾移疾鍾山景平元年卒年六十七宋書雷仲倫名次宗南昌人少入廬山事遠師篤志好學不交世務精於毛詩三禮之學本州辟從事朝以員外散騎侍郎徵並不就年五十餘與子姪書以言所守曰夫生之修短咸有定分定分之外不可以智力求但當於所稟之中順而勿害耳吾少嬰羸患為性好間故在童稚之年已懷遠迹之意暨於弱冠遂託業廬山逮事釋和尚於時師友淵源務訓弘道外慕等夷內懷悱發於是洗氣神明玩心墳典勉志勤躬夜以繼日爰有山水之好晤言之歎實足以通理輔性成夫亹亹之業樂以忘憂不知朝日之晏矣自遊道䬸風二十餘載淵匠既傾良朋凋索續以釁逆違天備嘗荼蓼疇昔誠願頓盡一朝心慮荒散情意衰損故遂與汝曹歸耕壟畔山居谷飲人理久絶日月不處忽復十年崦嵫將迫前塗幾何及今耄未至昏衰不及頓尚可厲志於所期縱心於所託棲誠來生之津梁專氣暮年之攝養在心所期盡於此矣自今以往家事大小一勿見關宋元嘉十五年徵至京師開館雞籠山聚徒教授除給事中不就頃之還廬山二十五年又徵詣京師為築室鍾山西巖下謂之招隱館使為皇太子諸王講喪服經是歲卒年六十三宋書知歸子曰白蓮社一百二十三人居士之可得紀者七人焉才敏如康樂欲求入社遠公拒之誠慎所與哉而七人之外流風遺書不可得而見矣豫亦不得而稱之也
