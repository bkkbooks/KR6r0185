body:
  text: 安陽董何魏陳劉傳安陽沮渠侯京聲者天水臨城縣人河西王蒙遜之從弟也為人疎通彊識幼稟五戒銳意內典少時甞到于闐國經衢摩帝太寺遇天竺法師佛陀斯陀咨問道義從受禪要秘密治病經既而東歸高昌求得觀世音彌勒二觀經各一卷及還河西即譯出禪要居數年魏主燾破河西安陽奔宋晦志卑身不交世務常遊止塔寺初出觀世音彌勒二觀經丹陽尹孟顗見而善之請與相見厚設供養至孝建二年比丘尼慧濬聞其諷禪經請得傳寫遂出為五卷其年於鍾山定林寺續出佛母泥洹經一卷安陽居絕妻拏不樂榮利從容法侶宣通經典是以緇白交敬禮焉大明末遘疾而卒出三藏記集董吉於潛人也奉法三世至吉尤精進恒齋戒誦首楞嚴經所居村人有疾病請吉誦經輙愈同縣何晃亦奉法卒中毒請吉往會溪水暴漲不得度吉默禱於大士裸而戴囊經以度及岸忽囊經為水漂沒甚悲恨至晃家懺悔自責俛仰之間乃見經囊在高座上啟視之未甞沾濕於是縣人一時皆奉法吉家西北有山高險中多妖魅犯害居民吉欲降之乃闢山地四五畆構造小屋設高座轉首楞嚴經百餘日民害遂止後有數人來謁曰聞君德行清肅故來相觀并請一事想當見聽吾世有此山今君來止慮相犯冒當更作界分以殺樹為斷吉知是山鬼乃曰僕貪此寂靜讀誦經典不干君等願見祐助鬼許諾而去越一宿自吉所闢地四際之外樹皆枯死如焚焉冥祥記何曇遠廬江人宋御史中丞萬壽之子也少奉法持菩薩戒年十八居父喪哀毀成疾遂歸心淨土請僧數人於家懺悔宿業久而益䖍一夕轉經竟眾僧已眠曇遠忽自歌誦僧異而問之曰見佛身黃金色光丈餘自西而至幡花翼從充滿虗空佛熈怡微笑詔曇遠速去曇遠素羸弱至是神色壯厲便取香花散之空中至五更忽然而終宅中芬香數日乃歇冥祥記魏世子梁郡人生當宋世奉佛精進率諸子女修西方淨業唯婦獨不信其女病死七日復蘇即升高座誦無量壽經下啟父言兒去便往無量壽國兒及父兄池中各有大蓮華當生其內唯母獨無不勝此悲故歸啟報語竟而瞑母自是亦奉法焉冥祥記陳參軍名鍼荊州華容人天台智者禪師之兄也仕梁為普安王中兵參軍年四十遇仙人張果謂之曰吾觀汝相陽筭已盡死在朞月參軍懼以白智者智者授以童蒙止觀教行方等懺法先具十法一者明信因果二者生重怖畏三者深起慚愧四者求滅罪方法所謂大乘經中明諸行法應當如法修行五者發露先罪六者斷相續心七者起護法心八者發大誓願度脫眾生九者常念十方諸佛十者觀罪性無生具此十法莊嚴道場著潔淨衣燒香散華於三寶前如法修行一七三七一月三月乃至經年專心懺悔即得重罪消滅禪定現前參軍奉教修習夙夜不怠未及一載復見果果大驚異曰服何藥而致此曰但修懺法未甞服食果以手加額曰奇哉道力越死超生後參軍於禪定中升天宮見金殿榜曰陳鍼之室後十五年當生於此及期徧謁親知言別端坐而逝佛祖統記小止觀劉謙之魏孝文帝時中官也太和中自傷刑餘奏乞入山修道齎華嚴經一部晝夜禮誦絕粒飲水經三七日忽髯髭盡生復丈夫相神思通悟洞曉幽旨遂殫精造華嚴經論共六百卷奏聞孝文倍加敬信華嚴一教遂盛於時大唐內典錄華嚴經疏鈔疏鈔以謙之為北齊人又言感第三王子焚身供養文殊事因而發心按北齊無太和年號且魏齊諸王子盡列於史並無焚身事今據內典錄削之嚴恭泉州人也隋開皇中客於揚州造精舍寫法華經道俗崇敬常送錢供給後有人從貸經錢一萬恭不獲已與之貸者載至中路船覆失錢是日恭入庫見一萬錢如新出水怪之已而其人以船覆告乃知庫中錢即其所貸也一商人至衖亭湖祭神夜夢神云諸君以所贈物與嚴法華為書經用也其他感應甚眾恭遂以書經終大業末子孫猶傳其業群盜相約不入其里里人賴之同時益州新繁有荀生者居縣西三十里許曰王李村工書然自重不肯為人書人雖辱毆之不顧也一日把筆走前村向空中四面書般若經數日而畢曰好令諸天讀之人初不覺其異其後大雷雨牧牛小兒住其地中可丈許雨不能濕自後遇雨牧兒輙避雨其處武德中有異僧語村人曰此地空中有般若經諸天於上設葢覆之不可輕踐村人遂以闌楯周之齋日設供每聞天樂聲冥報記三寶感通記知歸子曰數君之奉法可謂專且勤矣其能格天人而度生死也宜哉夫陽氣奮而萌芽作秋風至而木葉零至誠而不動者不亦鮮乎
