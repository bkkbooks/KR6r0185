body:
  text: 楊大年李公武傳楊大年名億浦城人也少能文年十一宋太宗召試詩賦授祕書省正字真宗朝纍遷至左司諫咸平中詔近臣議靈州棄守事大年上書極言征戍之苦棄之便真宗立劉后后所出微朝臣以為不可真宗欲得大年草制使丁謂諭旨大年難之謂曰勉為之不愁不富貴大年曰如此富貴非所欲也乃以命陳彭年旋移疾歸大年初不知有佛後會翰林李維勉以宗門事相䇿發遂生深信著發願文云十方常住一切諸佛真淨妙法無生聖人惟願以真實眼真實智真實平等不捨誓願洞賜哀憐切念億與法界衆生從無始曠大劫來未識佛時未遇法時未會僧時於其中間至於今日趨塵背覺迷失本心閉解脫門涉輪回道蝟張見網蜂喧妄廛懸嗜欲之帆鼓無明之浪杯我慢酒醉苦惱鄉不憑歸向之誠是滯因果之迹如斯過咎齊佛所知惟佛所見若輕若重等與法界衆生有茲罪者同共懺悔願罪消滅以億所集善根隨時回向真如實際承諸佛本誓願力大威猛力勝護念力盡未來際直至無上菩提為一切依正莊嚴具為一切自他解脫門一切三昧門一切陀羅尼門一切安立衆生門一一稱虗空等法界皆有我身起勇猛心捨身命財興大佛事作大利益攝化有情願諸有情見我身聞我名皆發菩提心與我同回向無上菩提心不退轉願億與法界衆生未契心者開佛知見悟自本心一念發明諸境純淨去來坐立見聞覺知咸以如實智相應不相違背從今去已盡未來際令菩提心相續不斷所作利益常得現前供養諸佛利樂衆生衆生成佛盡然後成正覺虗空有盡我願無窮法界有邊願心無極病起由祕書監出知汝州謁廣慧禪師問布鼓當軒擊誰是知音者廣慧曰來風深辨大年曰恁麼則禪客相逢祇彈指也廣慧曰君子可入大年應諾廣慧曰草賊大敗夜語次廣慧曰公曾與何人道話來大年曰億曾問雲嚴諒監寺兩個大蟲相咬時如何諒曰一合相億曰我祇管看未審得如此道否廣慧曰我即不然大年曰請和尚別轉一語慧以手作拽鼻勢曰這畜生更𨁝跳在大年言下脫然有偈曰八角磨盤空裏走金毛獅子變作狗擬欲將身北斗藏更須合掌南辰後自後與廣慧遊從日密遂嗣其法嘗致書李維勉曰自遇廣慧師請扣無方蒙滯頓釋半歲之後曠然弗疑如忘忽記如夢忽覺平昔礙膺之物𪹼然自落積劫未明之事廓然現前繼紹之緣其在是矣天禧四年為翰林學士代寇凖奏請太子監國斥丁謂姦邪謂聞而深恨之是歲微疾環禪師往視之大年曰億四大將離大師如何相救環槌胸三下大年曰賴遇作家環曰幾年學佛法俗氣猶未除大年曰禍不單行環作噓噓聲大年書偈遺李都尉曰漚生與漚滅二法本來齊欲識真歸處趙州東院西都尉得偈曰泰山廟裏賣紙錢即往詣之而大年逝矣年四十七諡曰文武夷集五燈會元宋史李公武名遵勗上黨人也舉進士尚萬壽長公主為駙馬都尉纍官至鎮國軍節度使性尚朴素有節概天聖間請太后歸政天子論者韙之居常探索宗要無間寒暑得心法於谷隱禪師嘗作偈云學道須是鐵漢著手心頭便判直趨無上菩提一切是非莫管公武不樂仕宦請援唐韋嗣立故事退處山林不許與楊大年及慈明禪師為法門好友大年卒為制服將卒之年遣使邀慈明於唐明既至月餘而公武得疾臨終畫一圓相作偈曰世界無依山河匪礙大海微塵須彌納芥拈起幞頭解下腰帶若覓死生問取皮袋慈明問曰如何是本來佛性公武曰今日熱如昨日隨問曰臨行一句作麼生慈明曰本來無罣礙隨處任方圓公武曰晚來倦甚更不答話遂泊然而逝仲子端願官大尉亦篤志祖道築室後圃邀達觀禪師處之朝夕咨參至忘寢食一日問達觀曰天堂地獄畢竟是有是無達觀曰諸佛向無中説有眼見空花太尉就有裏尋無手撈水月堪笑眼前見牢獄不避心外聞天堂欲生殊不知欣怖在心善惡成境太尉但了自心自然無惑曰心如何了達觀曰善惡都莫思量曰不思量後心歸何所達觀曰且請太尉歸宅曰祇如人死後心歸何所達觀曰未知生焉知死曰生則已知達觀曰生從何來端願擬對達觀揕其胸曰祇在這裏思量則甚端願曰會也只知貪程不覺蹉路達觀拓開曰百年一夢端願説偈曰三十八歲懵然無知及其有知何異無知滔滔汴水隱隱隋堤師其歸矣箭浪東馳端願立朝有直節以太子太保致仕終五燈會元宋史知歸子曰楊李二公不捨塵勞頓明本有遂超然於生死之際偉哉初機學人往往厭動求靜靜不可得煩惱攻中業繫日強妄希解脫難矣即奈何不取鏡於二公也汪大紳曰廣慧達觀皆得臨濟機用所以能了當人大事近來知解之流祇向人如何若何怎麼怎麼弄得人𨁝跳者只管𨁝跳去貪程者只管貪程去看你何日是了悲夫
