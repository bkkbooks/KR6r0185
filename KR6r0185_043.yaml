body:
  text: 李卓吾傳李卓吾名贄泉州晉江人嘉靖間領鄉薦為教官萬歷初歷南京刑部主事出為姚安知府卓吾風骨孤峻善觸人其學不守繩轍出入儒佛之間以空宗為歸於時諸老師獨推龍溪王先生近溪羅先生嘗從之論學又嘗與耿天臺鄧石陽遺書辨難反復萬餘言抉摘世儒情偽發明本心剝膚見骨在姚安自治清苦為政舉大體往往喜與衲子遊處常住伽藍判事而事辦是時上官嚴刻吏民多不安卓吾言曰邊方雜夷法難盡執日過一日與軍民共享太平足矣仕於此者携家萬里而來動以過失狼狽去尤不可不念之但有一長即為賢者豈容備責耶居三年以病告不許遂入雞足山閲藏經不出御史劉維疏令致仕遂客居黃安旋至麻城龍潭湖上剃髮去冠服即所居為禪院居常與侍者論出家事曰世間有三等人宜出家其一如莊周梅福之徒以生為我梏形為我辱智為我毒灼然見身世如贅瘤然不得不棄官隱者一也其一如嚴光阮籍陳摶邵雍之徒苟不得比於傅説之遇高宗太公之遇文王管仲之遇桓公孔明之遇先主則寧隱毋出亦其一也又其一者陶淵明是也亦愛富貴亦苦貧窮苦貧窮故以乞食為耻而曰叩門拙言辭愛富貴故求為彭澤令然無奈其不肯折腰何是以八十日便賦歸去也此又其一也侍者進曰先生於三者何居卓吾曰卓哉莊周梅福之見我無是也待知己之主而後出必具蓋世才我亦無是也其陶公乎夫陶公清風被千古余何人而敢云庶幾焉然其一念真實不欲受世間管束則偶與之同也卓吾喜接人來問學者無論緇白披心酬對風動黃麻間時有女人來聽法或言女人見短不堪學道卓吾曰人有男女見亦有男女乎且彼為法來者男子不如也既而麻黃間士大夫皆大噪斥為左道惑衆欲逐去之卓吾笑曰吾誠左道耶即加冠可也遂服其舊服御史馬經綸嘗往問易義大服事以師禮奉之入黃蘗山旋御以北館於通州復為言官所劾下詔獄獄成勒歸原籍卓吾曰吾年七十六死耳何以歸為奪刀自剄死經綸備禮殮之葬於通州北門外明文偶鈔溫陵外紀知歸子曰豫始觀卓吾居士論古之書駭其言迹其行事動為世詬病以為居士實自取之也既而讀居士論學書服之嗚呼若居士者可謂知本者與居士既出家不受戒無何又反冠服其戲耶其有激而為此耶則豫不足以知之矣汪大紳云卓吾努目允初低眉以低眉人寫努目人眼光忽如巖下電此知歸子所謂落落自喜者與羅臺山云古之傷心人別有懷抱吾與卓吾先生亦云中間一段無古無今蒼莽悲懷恰好間中磕著痛處觸著奇癢難奈處借一段冷語消釋觀者切勿認作實話鈍置卓吾鈍置知歸吾今日讀此乃見卓吾先生可敬處可愛處吾今日讀此乃如讀屈子天問讀莊子天下篇讀枚叔七發
