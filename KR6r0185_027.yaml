body:
  text: 鄭介夫鄒志完江民表陳瑩中傳鄭介夫名俠福州福清人也少刻苦好學治平中擢進士甲科調光州司法參軍秩滿入都監安上門熈寧六七年間兩河關輔大旱蝗民又苦新法流亡載路介夫繪所見為圖極陳新法之害且曰陛下行臣之言十日不雨乞斬臣以正欺君之罪假稱密急發馬遞上之銀臺司神宗覧圖及奏大感動明日罷新法十八事下責躬詔越三日果大雨王安石罷相呂惠卿繼之行新法如故介夫復上書極言之惠卿以為謗訕朝政斥為民安置英州居大慶山英之子弟歸其德興於學者甚眾作大慶居士序曰居士本儒以孔氏為宗得老氏之說以明又得釋氏而後大明三氏之外百家傳記歷代史載至於醫方小說其於民物有補毫髮無不留意此其學也以為父子君臣夫婦長幼朋友之相與譬之直一蟬之翼合上下四方通為一物亦若是而已矣此其識也以為吾之是非毀譽與祇鬼禍福朝廷黜陟相表裏也故雖對妻拏莫敢溢人美惡幽闇闃寂莫或自欺上不諛公卿下不原鄉黨水火可蹈而議論不可回此其守也惟君為堯舜民復太古一飯一衣四方萬里同飽暖也一憂一樂四方萬里同欣戚也敻古之上無窮之下大之天地細至鱗介猶若是也而功無尸物無府此其志也其視先後古今等人與我等我與人等眾生與佛等佛與眾生等無一物無取無捨非即非離以大清淨圓攝為我住止是曰居士哲宗即位復官歸鄉里不出元符元年以前事再竄英州徽宗即位赦歸薦起為泉州教授秩滿歸又號一拂居士宣和元年夢客有稱鐵冠道士遺之詩視之乃蘇子瞻詩也寤而歎曰吾將逝矣臨終作詩曰似此平生只藉天勝如過鳥在雲烟如今身畔無一物贏得虗堂一枕眠授其孫而卒年七十九嘉定中諡曰介酉塘集宋史鄒志完名浩常州晉陵人也舉進士歷官襄陽教授元符中召對除右正言時章惇擅政志完三上疏劾惇未報會詔立劉后復上疏爭之惇因詆其狂妄除名貶新州徽宗即位召復故官遷司諫歷吏部兵部侍郎蔡京用事再斥衡山別駕永州安置復除名羈昭州移漢陽軍初志完官襄州夢詣大剎見白衣大士親為說法覺而繪所見為之像其後在昭州供奉益䖍日跪像前誦華嚴經有舍利出於袖間像後生竹三竿垂枝下覆與世所畫普陀巖竹無以異也讀華嚴合論作頌曰華嚴佛菩薩悲智咸徧周廣開方便門主伴互酬請於無言說中說法無數量我讀誦思惟獲從信根入闇逢照世燈病遇雪山藥無價大寶珠衣內忽然得願盡未來際滿足普賢行一切導師前一一興供養一切眾生前一一作利益持經繼有人悉冀同我願自號道鄉居士作道鄉歌曰要識道鄉去處只在微塵裏許不立四至封疆不問二儀寒暑日月常放光明鳥獸率來儀舞其俗無譽無非其民無喜無怒別是一種乾坤全異九州風土師曠傾耳莫聞離婁拭目莫覩誰知有個冥蒙踏著從來門戶入也不動脚根居也不記年所行住坐臥虗徐色聲臭味愚魯偶然成矩成規未甞為鼠為虎任他卜度縱橫逈脫機關取與人間天上無朋可謂自今自古大觀元年復直龍圖閣乞歸養親六年而卒年五十二宋史道鄉集漁隱叢話江民表名公望嚴州人也登進士第建中靖國元年拜左司諫極論哲宗朝朋黨之禍為將來戒時內苑稍畜珍禽奇獸民表以為言徽宗立縱之既出知淮陽軍蔡京為政嫉諸言事者編管安南居常與妻俞氏蔬食清齋修念佛三昧著念佛方便文曰世出世間之法欲得成辦省力莫若繫心一緣即如稱念阿彌陀佛有巧方便無用動口不出音聲微以舌根敲擊前齒心念隨應音聲歷然聲不越竅聞性內融心印舌機機抽念根從聞入流反聞自性是三融會念念圓通久久遂成唯心識觀若是利根之人念念不生心心無所六根杳寂諸識消除法法全真門門絕待瞥爾遂成真如實觀初機後學一心攝念如來乃至營辦家事種種作務亦自不相妨礙都攝六根淨念相繼不過旬月便成三昧所謂自心作佛自心是佛自心見佛有子早亡見夢於其舅乞民表就天寧寺轉寶積經祈生善處且言見冥中金字云江公望身居言責志慕苦空躬事焚修心無愛染動靜不違佛法語默時契宗風名預脫乎幽關身必歸乎淨土後遇赦得歸無疾而化宋史樂邦文類佛法金湯陳瑩中名瓘南劍州沙縣人也性閒雅與物無競見人之短未甞面訐但微示意儆之而已登進士第徽宗朝為左司諫論議持平務存大體惟極言蔡卞蔡京章惇之罪終以直道不見容尋出補外既而還為右司員外郎權給事中言時政過失忤宰相曾布出知泰州崇寧中編管袁州已而移通州著尊堯集辨王安石日錄之誣上之復謫台州初瑩中好華嚴經自號華嚴居士及遇明智法師叩天台宗旨明智示以上根止觀不思議境以性奪修成無作行深有契入著三千有門頌云不思議假非偏假此假本具一切法真空不空非但空圓中圓滿非但中是故四門之初門即是不可思議假初門即三三即一非一非三又非四智者說四門一有門一空門一亦空亦有門一非空非有門一二三四指一月四點似別惟一空門門一一為法界攝一切法皆無餘不以妙假有門觀誰知法界具足法聞思修證無不妙心能觀此體具故若祇觀心不觀具則於一觀分二家一家觀門異諸說諸說雖異觀自一彼迷一心具諸法墮在通別次第中次第而生次第斷豈知十界本來一三千本一亦如是皆非世數可分別妙境元無空假中而亦不離空假中空即是心假是色非色非心名曰中色心絕處中體現於一一法體皆具凡夫心具即佛具取著不圓則不具惟一具字顯今宗入此宗者甚希有又以書與明智論其義云有門頌但隨順古意過蒙采覧仰見法師收簡自在來諭云以有題之恐鈍者不領誠如所慮然智者以有門為圓門之相又謂此相四門皆妙無粗若有門為法界攝一切法況復三門法相平等無復優劣是故若論具足佛法則見思假即法界也若論法性因緣則第一義亦因緣也此妙門以有名之即生死之有是實相之有一切法趣有有即法界出法界外更無可論此即止觀有門之大旨而前書妙假之意也所云此之三千性是中理不當有無有無自爾茲乃古師詮具之微言也夫不當有無者泯妙外之一執也有無自爾者開離執之一妙也於有為妙有於無為真無真無則空而不空妙有則有而不有有無自爾非有無也在假則假具在空則空具在中則中具無不在無不具也然則妙假之有豈情有乎假不待空泯絕無對說有說無皆不待絕且一念心起則有三千國土一千則山河大地是也五陰世間一千則染淨一切色心是也眾生世間一千則六凡四聖假名是也一念心起三千性相一時起一念心滅三千性相一時滅念外無一毫法可得法外無一毫念可得此乃本住不遷不遷者中理圓明之體此體如理為念其壽無量本無名字而不失諸名名其土曰極樂名其身曰阿彌陀身土交參融乎一妙故能使說法之音不離彼土而廣長舌相具足周徧其具如是向實際之中要在不往而往於方便之內何妨去已還來機熟緣深定須成辦此瓘之有得於祖意者也瑩中自入台州捐書不復為文專修念佛三昧居五年復承事郎移楚州居住過廬山家焉甞語所親曰吾往年遭患難所懼惟一死今則死生皆置度外矣尋卒年六十五靖康初贈諫議大夫高宗朝賜諡忠肅東都事略佛祖統記冷齋夜話李忠定集知歸子曰吾觀鄭鄒江陳四君子修行如幻三昧泊然於夷險生死之際經言塵勞之儔為如來種豈不信哉瑩中之於台教盖得其精者其於淨土一門殆猶承蜩之人掇之而已矣汪大紳云有即是無無即是有此理甚明吾亦能言之所難者斷截情見耳情見既斷者一任你說有說無總是光明藏著些情見便說得與如來一般總是生死根耳瑩中忠義其斷截情見必勇其言自是可寶非獨瑩中也鄭鄒江皆忠義之士其勇於入道能斷截情見故也最是文人才子好名之人不濟事說著此事早已曉得了也不知只是情見所解賺得千生萬劫於生死中說好看話頭在
