body:
  text: 李師政梁敬之斐公美傳李師政者上黨人也唐初官門下典儀武德中太史令傅奕七上書請除佛法僕射蕭瑀爭之力事雖不行然猶下沙汰僧道之令議者率謂三王無佛而年永二石有僧而政虐損化由於奉佛益國在於廢僧師政駁之曰亡秦者胡亥時無佛而土崩興佛者漢明世有僧而國治周除佛寺而天元之祚不永隋宏釋教而開皇之令無虐盛衰由布政治亂在庶官歸咎佛僧實非通論且佛唯宏善不長惡於臣民戒本防非何損害於家國若人人守善家家奉戒則刑罰何得而廣禍亂無由而作項籍喪師非范增之無筭石氏興虐豈浮圖之不仁但為違之而暴亂未有遵之而凶虐者也於是著論三篇辨惑第一明邪正之通蔽通命第二辨殃慶之倚伏空有第三破斷常之執見其空有一篇最為精造辭曰或有惡取於空以生斷見無所慚懼自謂大乘此正法所深戒也其斷見者曰經以法喻泡影生同幻化又云罪福不二業報非有故知殖因収果之談天堂地獄之說無異相如述上林之橘樹孟德指前路之梅園權誘愚蒙假稱珍怪有其語焉無其實矣至如冉疾顏夭彭壽聃存貴賤自然而殊苦樂偶其所遇譬諸草木區以別矣若乃異臭殊味千品萬形何業而見重何因而被輕何由而速斃何功而久生人之殊命盖亦如是然則無是無非大乘之深理明善明惡小乘之淺教何為捨惡趣善而起分別之心乎論曰若夫如夢如幻如響如泡無一法而不爾總萬像而俱包上士觀之以至聖至聖體之而獨超大浸稽天而不溺大風偃岳而無飄具六通而自在越三界而逍遙然理不自了正觀以昭心不自寂靜攝斯調障不自遣對治方消德不自備勤修乃饒六蔽既除則真如可顯三障未滅則菩提極遙故真諦離垢淨之相俗諦立是非之條指事必假於分別論法豈宜於混淆六度不可為墜苦之業三毒不可為出世之橋投谷難以無墜赴火何由不燒何得同因果於兔角匹罪福於龜毛乎雖引大乘之玅言不得妙之真致說之於口若同用之於心則異正法以空去其貪邪說以空資其愛智者觀空以除恚惑者論空而肆害達者行空而慧解迷者取空以狂悖大士體空而進德小人說空而善退其殊若此豈同致乎良由反用正言以生邪執矣夫妙道之元致即群有以明空既觸實而知假亦就殊而照同譬如對明鏡而旁觀臨碧池而俯映眾像粲而在目可見而無實性緣生有而成形有離緣而表質水遇寒而氷壯氷涉溫而堅失凡從緣而為有雖大有其何實故天與我皆虗我與萬物為一菩提不得謂為有何況群生與眾術故察於物而非物取諸身而非身善惡殊途而不二聖凡異等而常均尋夫經論之大旨也從緣以明非有緣起以辨非無事有而無妙實義空而非太虗道智了空而絕縛俗情滯有以常拘人與業報而非有業報隨人而不無何乃取空言而背旨援卉木而比諸獨謂鄙行空而不戒善法空而不遵三惑應捨而未悛五德應修而反棄不觀空以遣累但取空而廢善此豈淨名不二之深致莊周齊物之元旨乎大矣哉至人之體空也證萬物之本寂知四大之為假視西施如行廁比南金於碎瓦五欲不能亂其心四魔無以變其雅智日明而德富惑日除而過寡截手足而無憾乞頭目而能捨八法不生二相萬物觀如一馬故能證無上智為薩婆若得其理也解脫如此失其旨者過患如彼何得為非而不懼崇邪以為是夫見舟見水皆非真諦而將涉大川非舟不濟病體藥性均是空虗而人由病隕病因藥除罪福之性平等不二而福以善臻禍因惡致善惡諸法等空無相而善法助道惡法生障故知萬法真性同一如矣因緣法中有萬殊矣空有二門不相違矣真俗二諦同所歸矣若謂小乘有罪福之言大乘無是非之語似胡越之殊趣若矛盾之相拒童子尚羞翻覆聖人豈為首鼠良以道聽而塗說遂使謬量而惡取若博考而深思必疑釋而迷愈矣若夫方等一乘波若八部聖慧之極大乘之首莫不廣述受持之利深陳毀謗之咎經又云深信因果不謗大乘何謂大乘之理都無因果乎夫取相而為善則善而未精見相而斷惡則斷已復生若悟善性寂而無作了惡體空而何斷乃令三障水消而寂滅萬德雲集以彌滿智慧如海不可酌之以一蠡道邁人天豈得闚之以寸管夫說空而恣情者不能無所苦也疾痛惱之則寢不安矣刀鋸傷之則體不完矣終日不食則受其飢矣無裘禦冬則苦其寒矣然則致苦之業豈可輕而不避乎千品萬端皆業為主三界六趣隨業而處百卉無情故美惡非關於業報四生有命則因緣不同於草莽斤斧伐木不驚刀杖加人則懼比有情於無知何非倫而引喻三世因果佛不我欺十方勸戒聞當不疑勸之者應修戒之者宜遠抑凡情之所耽行聖智之所願何得違經論之所明以胸臆而為斷而謂善惡都空無損益乎夫法眼明了無法不悉舌相廣長言無不實其析有也則一毫為萬其等空也則萬象皆一防斷常之死生兼空有以除疾彼菩提之妙理實甚深而微密厭塵勞而求解慧當謹慎而無放佚非聖者必凶順道者終吉勿謂不信有如皎日廣宏明集大唐內典錄梁敬之名肅安定人建中朝官翰林學士守右補闕侍皇太子學天台教於荊溪法師深得心要以止觀文義宏博覽者費日乃削定為六卷撰統例云夫止觀何為也導萬法之理而復於實際者也實際者何也性之本也物之所以不能復者昏與動使之然也照昏者謂之明駐動者謂之靜明與靜止觀之體也在因謂之止觀在果謂之智定因謂之行果謂之成行者行此者也成者證此者也原夫聖人有以見惑足以喪志動足以失方於是乎止而觀之靜而明之使其動而能靜靜而能明因相待以成法即絕待以照本立大車以御正乘大事而總權消息乎不二之場鼓舞於說三之域至微以盡性至以體神語其近則一毫之善可通也語其遠則重元之門可闚也用至圓以圓之物無偏也用至實以實之物無妄也聖人舉其言所以示也廣其目所以告也優而柔之使自求之擬而議之使自至之此止觀所由作也夫三諦者何也一之謂也空假中者何也一之目也空假者相對之義中道者得一之名此思議之說非至一之旨也至一即三至三即一非相含而然也非相生而然也非數義也非強名也自然之理也言而傳之者迹也理謂之本迹謂之末本也者聖人所至之地也末也者聖人所示之教也由本以垂迹則為小為大為通為別為頓為漸為顯為秘為權為實為定為不定循迹以返本則為一為大為圓為實為無住為中為妙為第一義是三一之蘊也所謂空也者通萬法而為言者也假也者立萬法而為言者也中也者妙萬物而為言者也破一切惑莫盛乎空建一切法莫盛乎假究竟一切性莫大乎中舉中則無法非中目假則何法非假舉空則無法非空成之謂之三德修之謂之三觀舉其要則聖人極深研幾窮理盡性之說乎昧者使明塞者使通通則悟悟則至至則常常則盡矣明則照照則化化則成成則一矣聖人有以彌綸萬法而不差旁礴萬劫而不遺燾載恒沙而不有復歸無物而不無寓名之曰佛強號之曰覺究其旨其解脫自在莫大極妙之德乎夫三觀成功者如此所謂圓頓者非漸次非不定指論十章之義也七章者演始末通道之關也五略者舉其宏綱截流之津也十境者發動之機立觀之諦也十乘者妙用所修發行之門也止於正觀而終於見境者義備故也闕其餘者非修之要也乘者何也載萬物而運者也十者何也成載之事者也如其境之妙不行而至者德之上也乘一而已矣豈籍夫九哉九者非他相生之說未至者之所踐也故發心者發無所發安心者安無所安破徧者破無所破爰至餘乘皆不得已而說也至於別其義例判為章目推而廣之不為繁統而簡之不為少如連環不可解也如貫珠不可雜也如懸鏡不可掩也如通川不可遏也義家多門非諍論也按經證義非虗說也辨四教淺深事有源也成一事因緣理無遺也噫止觀其救世明道之書乎非夫聖智超絕卓爾獨立其孰能為乎非夫聰明深達得意忘象其孰能知乎或稱不思議境與不思議事皆極聖之域等覺至人猶所未盡若凡夫生滅心行三惑浩然於言說之中推上妙之理是猶醯雞而說大鵬夏蟲之議層氷其不可見明矣今止觀之說文字萬數廣論果地無益初學豈如暗然自修功至自至何必以早計為事乎是大不然凡所為上聖之域豈隔闊遼敻與凡境杳絕歟是唯一性而已得之為悟失之為迷一理而已迷而為凡悟而為聖迷者自隔理不隔也失者自失性不失也止觀之作所以離異同而究聖神使羣生正性而順理者也正性順理所以行覺路也至妙境也不知此教者則學何所入功何所施智何所發譬如無目昧於日月之光行於重險之處顛踣墮落可勝既乎噫去聖久遠賢人不出庸昏之徒含識而已致使魔邪詭惑諸黨並熾空有云云為沉為穽有膠於文句不敢動者有流於漭浪不能住者有太遠而甘心不至者有太近而我身即是者有枯木而稱定者有竅號而稱慧者有奔走非道而言權者有假於鬼而言通者有放心而言廣者有罕言而為密者有齒舌潛傳而為口訣者凡此之類自立為祖繼祖為家反經非聖昧者不覺仲尼有言道之不明也我知之矣由物累也悲夫隋開皇十八年智者大師去世至皇朝建中垂二百年以斯文相傳凡五家師其始曰灌頂其次曰晉雲威又其次曰東陽小威又其次曰左溪朗公其五曰荊溪然公頂於同門中慧解第一能奉師訓集成此書盖不以文辭為本故也或失則煩或得則野當二威之際緘授而已其道不行天寶中左溪始弘解說而知者盖寡荊溪廣以傳記數十萬言網羅遺法勤矣備矣荊溪滅後知其說者適三四人學者內病於蔽外役於煩以不能喻之師教不領之弟子止觀所以未光大於時也予常戚戚於是整其宏綱提其機要其理之所存教之所急或易置之或引伸之其義之迂其辭之鄙或薙除之或潤色之大凡浮踈之患十愈其九廣略之宜三存其一是祛鄙滯道蒙童貽諸他人則吾豈敢若同見同行且不以止觀罪我亦無隱乎爾建中上元甲子首事筆削三歲歲在析木之津功畢云爾卒贈禮部郎中時吏部郎中李華亦從荊溪學止觀荊溪為述止觀大意一篇散騎常待崔恭諫議大夫田敦皆其同學云佛祖統紀柳河東集裴公美名休河東聞喜人也兒時與兄弟居家塾讀書有饋鹿脯者共薦之公美不食曰疏食猶不足今一啖肉後將何繼家世奉佛至公美益精進有異僧自清涼來貽舍利三顆並一簡簡有梵書莫能識已得譯者辨其文曰大士涉俗小士居真欲求佛道豈離紅塵長慶中擢進士第舉賢良方正異等更內外任官新安太守屬希運禪師初自黃檗山捨眾入大安精舍混迹勞侶公美入寺觀壁間畵問是何圖相主事者曰高僧真儀公美曰真儀可觀高僧何在主事不能對公美曰此間有禪人否主事曰近有一僧投寺執役頗似禪者乃請運至公美舉前問運朗聲曰裴休公美應諾運曰在甚麼處公美當下知旨如獲髻珠遂延入府署執弟子禮復請住黃檗山後遷宣城復創精舍請運居之公美既徹法源復博綜教相與宗密法師往來甚親宗密有所著述輙序而行之其大方廣圓覺了義經略疏序曰夫血氣之屬必有知凡有知者必同體所謂真淨明妙虗徹靈通卓然而獨存者也是眾生之本源故曰心地是諸佛之所得故曰菩提交徹融攝故曰法界寂靜常樂故曰涅槃不濁不漏故曰清淨不妄不變故曰真如離過絕非故曰佛性護善遮惡故曰總持隱覆含攝故曰如來藏超越玄閟故曰密嚴國統眾德而大備爍群昏而獨照故曰圓覺其實皆一心也背之則凡順之則聖迷之則生死始悟之則輪廻息親而求之則止觀定慧推而廣之則六度萬行引而為智然後為正智依而為因然後為正因其實皆一法也終日圓覺而未甞圓覺者凡夫也欲證圓覺而未極圓覺者菩薩也具足圓覺而住持圓覺者如來也離圓覺無六道捨圓覺無三乘非圓覺無如來泯圓覺無真法其實皆一道也三世諸佛之所證蓋證此也如來為一大事出現盖為此也三藏十二部一切修多羅盖詮此也然如來垂教指法有顯密立義有廣略乘時有先後當機有深淺非上根圓智其孰能大通之故如來於光明藏與十二大士密說而顯演潛通而廣被以印定其法為一切經之宗也圭峯禪師得法於荷澤嫡孫南印上足道圓和尚一日隨眾僧齋於州民任灌家居下位以次受經遇圓覺了義卷未終軸感悟流涕歸以所悟告其師師撫之曰汝當大弘圓頓之教此經諸佛授汝耳禪師既佩南宗密印受圓覺懸記於是閱大藏經律通唯識起信等論然後頓轡於華嚴法界宴坐於圓覺妙場究一雨之所霑窮五教之殊致乃為之疏解凡大疏三卷大鈔十三卷略疏兩卷小鈔六卷道塲修證儀一十八卷並行於世其序教也圓其見法也徹其釋義也端知析薪其入觀也明若秉燭其辭也極於理而已不虗騁其文也扶於教而已不苟飾不以其所長病人故無排斥之說不以其未至盖人故無胸臆之論蕩蕩然實十二部經之眼目三十五祖之骨髓生靈之大本三世之達道後世雖有作者不能過矣其四依之一乎或淨土之親聞乎何盡其義味如此也或曰道無形視者莫能覩道無方行者莫能至況文字乎在性之而已豈區區數萬言而可詮之哉對曰噫是不足以語道也前不云乎統眾德而大備爍群昏而獨照者圓覺也盖圓覺能出一切法一切法未甞離圓覺今夫經律論三藏之文傳於中國者五千餘卷其所詮者何也戒定慧而已修戒定慧而求者何也圓覺而已圓覺一法也張萬行而求之者何眾生之根器異也然則大藏皆圓覺之經此疏乃大藏之疏也羅五千軸之文而以數卷之疏通之豈不至簡哉何言其繁也及其斷言語之道息思想之心忘能所滅影像然後為得也固不在詮表耳嗚呼生靈之所以往來者六道也鬼神沈幽愁之苦鳥獸懷獝狘之悲修羅方瞋諸天正樂可以整心慮趣菩提唯人道能之耳人而不為吾末如之何也已矣休甞遊禪師之閫域受禪師之顯訣無以自効輙直讚其法而普告大眾耳公美居官操守嚴正不為皦察之行而吏民畏信大中初官戶部侍郎領諸道鹽鐵轉運使革除姦弊責所在令長兼董漕運賞勤而紏惰舟無廢滯又立稅茶十二法人以為便六年同平章事又五年罷歷諸州軍節度觀察等使咸通初卒年七十四公美自中年後斷肉食屏嗜慾齋居焚香誦經習歌唄為樂甞著勸發菩提心文云大眾從無始來常認為我身者是地水火風假合之身旋聚旋滅屬無常法非我身也大眾從無始來常認為我心者是緣慮客塵虗妄之心乍起乍滅屬無常法非我心也我有真身圓滿空寂者是也我有真心廣大靈知者是也空寂靈知神用自在性含萬德體絕百非如淨月輪圓滿無缺惑雲所覆不自覺知妄惑既除真心本淨十方諸佛一切眾生與我此心三無差別此即菩提心體捨此不認而認臭身妄念隨死隨生與禽畜雜類比肩受苦為丈夫者不亦羞哉居常自言能不為俗染可以說法度人常著毳衲於歌妓院持鉢乞食復發願世為國王宏護佛教後于闐國王生太子掌有文曰裴休聞於中朝公美子𢎼通書欲奉迎不可乃止唐書五燈會元圓覺經略疏序道院集北夢瑣言按清凉通傳載河東節度使李詵使五臺還公美與之論佛法其言甚辨然詵使五臺乃貞元十一年事公美年甫數歲何由與詵問答明為後人附會削之知歸子曰唐世士大夫善說法要者李梁裴三君子而已典儀之論禪病何其痛哉梁之於荊溪裴之於圭峯皆能洪其教者獨怪公美撰圭峯謂六祖之道傳於荷澤稱七祖而南岳馬祖為別系夫公美既得法於黃檗矣扶教而抑宗此予所不解也汪大紳曰空有篇句句字字說透汪大紳凡夫病種大紳凡夫病是久矣偶讀六度經見有大弟子欲以神通免難者佛說有形之罪可免其如無形之罪乎瞿然而起曰善哉言乎曾思周程發聖人之蘊於此可悟入焉曰戒慎乎其所不覩恐懼乎其所不聞曰慎獨曰正心誠意曰靜虗動直曰擴然大公皆於無形之中纖塵不立纖塵纔立便是放肆便是偏著虗偽便是擾擾便是私曲無形之中罪惡如山在儒則斥之曰小人曰異端在釋則斥之曰魔曰外道學聖學佛到得纖塵不立境界曰誠曰明曰一真法界曰圓覺於是出焉乃大紳凡夫於無形之中好色好名好勝藏垢納汙海深山積兀自大言不慙談空說妙宣揚孔佛咄安得有無形之中罪惡如山而能空者乎咄安得有無形之中罪惡如山而能妙者乎咄安得有無形之中罪惡如山埋却聖種而能宣揚孔者乎咄安得有無形之中罪惡如山埋却佛種而能宣揚佛者乎兀自無耻狂心歇息不下扯那性本無生當體本空話頭做箇安心丸喫將去好色過了喫一丸兒者好名過了喫一丸兒者好勝過了喫一丸兒者咄你道一切本無生一切本空那水性本空本無生你何不入水去火性本空本無生你何不入火去毒性本空本無生你何不喫砒礵去你這裏來不得可知是假你這凡夫何不體究真空纖塵不立去到那入水入火喫砒礵時只是纖塵不立再開口談空說妙也未遲耳你這凡夫原有些熱腸原有些血性你若到這地位色心歇絕轉為大寶𦦨名心歇絕逾於須彌山勝心歇絕升為不動尊你這熱腸血性發作時原是大豪傑大羅漢大菩薩決定能忠爾忘身公爾忘私國爾忘家比不得那一班儒門酸子禪門禿驢連那好名好色好勝念頭動動時還要滿面正經便教他做正經人有甚用頭你若肯正經時候如上所說把這萬劫熱膓潑天血性放出來時了不得也如何了不得李師政來參你便坐在萬仞崖巔大棒子劈頭打下萬仞崖邊去也管教這漢一條窮性命絲毫不留倘若這漢乖巧道是義學門徒將那所講用紅格兒謄清做著時文樣子打聽得汪大紳處舘時恭恭敬敬送上求政你便用著敗毛大筆頭判將去曰真實做工夫人一句也背他不得一賞一罸多少分明你這熱腸血性用得何等諦當你何苦為好色好名好勝用却做了凡夫惹李老先生出你的醜大紳現身說法竟一切凡夫們聽者又曰止觀之法非獨為台教綱宗抑亦孔佛大總持也堯舜禹相傳曰惟精惟一允執厥中惟精觀也惟一止也允執厥中止觀等也湯曰聖敬日躋聖觀也敬止也合言之止觀等也文曰於緝熈敬止於緝熈觀也敬止止也合言之止觀等也孔顏相傳曰有不善未甞不知知之未甞復行知觀也未甞復行止也合言之止觀等也曾思孟相傳張皇孔氏之學曰正心誠意止也曰致知格物觀也曰明善觀也曰誠身止也曰誠者止也曰思誠者觀也合言之止觀等也濂洛關閩諸大儒之學以此推之無不合矣予所見佛書甚少所及憶者尤少所及見所及憶者如金剛經言云何降伏其心觀也云何住止也曰無所住而生其心無所住止也生其心觀也合言之止觀等也圓覺經言之備矣而楞嚴經從聞思修入三摩地心經觀自在由觀而止層層深入總不出止觀法門也以是推之千經萬典自無不合予以是知台宗甚大然予於台宗書自永嘉頌外實未之寓目也予何從而得之予讀朱子書得之也朱子言存養止也言省察觀也言存養省察交致互發止觀等也重提主敬觀自在菩薩也痛下格物窮理功夫從聞思修入三摩地也萬法總持歸一誠字無上正等正覺也予讀朱子書句句字字為孔門金針且為釋迦氏金針予讀釋迦氏書句句字字為孔門心印即句句字字為朱子心印與孔朱異者迹而已矣後儒議朱子格物之學者多矣由其說得無釋迦氏所呵為窮空不盡者乎釋迦之為釋迦窮空極盡而已矣吾孔氏之為孔氏窮理盡性以至於命而已矣先儒有言顏子與聖人未達一間還為那心粗然則餘塵尚諸學亦心粗而已矣嗚呼止觀之為大總持也而觀法尤要未有不深於觀而能止者也不觀而止饒他八萬劫終是落空亡可不慎與所以儒門之學格物為要佛門之學觀法為要朱子精於格物觀音大士精於觀法所以為儒佛之選也嗚呼予之為是言也一以為怪談一以為曠論皆非予之心也予之心盖欲一切人天究竟實義無取中途之樂而已矣又曰日用而不知者凡夫也知至至之知終終之菩薩也通乎晝夜而知者如來也文中子曰元亨利貞運行不匱者智之功也其於易也幾乎公美之於圓覺文中之於易皆見得端緒又曰之三君子者佛門中之文質彬彬者也
