body:
  text: 王敬初陳操甘行者張秀才傳王敬初襄州人初見睦州陳尊宿尊宿曰今日何故入院遲敬初曰看打毬來尊宿曰人打毬馬打毬答曰人打毬曰人困麼曰困曰露柱困麼敬初惘然歸至私第中夜忽然有省明日見尊宿以告尊宿曰露柱困麼曰困歷官至常侍視事次米和尚至敬初舉筆示之米曰還判得虗空否敬初擲筆入宅更不復出米疑之明日屬鼓山供養主探其意米亦隨至匿於屏間供養主問曰昨日米和尚有何言句便不相見答曰獅子咬人韓盧逐塊米聞即省前過遽出笑曰我會也敬初曰試道看米曰請常侍舉敬初豎起一箸米曰這野狐精敬初曰這漢徹也一日問僧一切眾生還有佛性也無僧曰無敬初指壁上畫狗曰這箇還有也無僧不對敬初代答曰看齩著汝又甞與臨濟到僧堂問曰這一堂僧還看經麼臨濟曰不看經曰還習禪麼曰不習禪敬初曰既不看經又不習禪畢竟作個甚麼曰總教伊成佛作祖去敬初曰金屑雖貴落眼成翳臨濟曰將謂你是俗漢後嗣法溈山祐公五燈會元先覺宗乘陳操不詳其里居為睦州刺史參陳尊宿一日尊宿看金剛經操問曰六朝翻譯此當第幾譯尊宿舉經起云一切有為法如夢幻泡影有省遂嗣法焉後官至尚書齋僧次拈胡餅問僧江西湖南還有這個麼僧曰尚書適來喫箇甚麼操曰敲鐘謝響後躬自行餅一僧展手擬接操却縮手僧無語操曰果然甞訪資福和尚和尚見操便畫一圓相操曰弟子與麼來早是不著便更畫一圓相和尚於中著一點操曰將謂是南番舶主和尚便歸方丈閉却門五燈會元先覺宗乘甘行者名贄池州人嗣法南泉願禪師一日入南泉設齋黃蘗運為首座行者請施財答曰財法二施等無差別行者曰甚麼道爭消得贄䞋便將出去須臾復入曰請施財黃蘗曰財法二施等無差別乃䞋行者甞接待往來有僧問曰行者接待不易行者曰譬如餧驢餧馬藥山令供養主行乞至行者家行者問從何來曰藥山行者曰來作麼曰教化行者曰將得藥來麼曰行者有甚麼病行者便捨銀兩錠歸舉呈藥山曰速還之子著賊了也主即送還行者曰彼中有人加銀施之巖頭奯禪師甞舍行者家度夏補衣次行者趨過巖頭以針作劄勢行者整衣謝妻問云作麼行者曰說不得妻曰也要大家知乃舉前話妻頓悟乃云此去三十年後須知一回飲水一回咽其女子聞之亦悟曰誰知盡大地人性命被奯上座劄將去也五燈會元先覺宗乘張秀才名拙謁石霜諸公石霜問秀才何名曰名拙石霜曰覓巧尚不可得拙自何來張忽有省呈偈曰光明寂照徧河沙凡聖含靈共我家一念不生全體現六根纔動被雲遮斷除煩惱重增病趨向真如亦是邪隨順世緣無罣礙涅槃生死等空華五燈會元知歸子曰自曹溪之化行而居士之究心祖道者多矣予閱傳燈諸錄錄諸子問答機緣如此其他行事不得而詳也
