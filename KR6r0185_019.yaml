body:
  text: 王摩詰柳子厚白樂天傳王摩詰名維世為祁縣人後徙家於蒲與弟縉俱有俊才開元九年擢進士第歷官至監察御史母博陵縣君崔氏持戒安禪摩詰於藍田營山莊為母經行之處既卒乃上表於朝請施莊為寺詔許之天寶末為給事中安祿山陷京師為所得以藥下痢佯瘖祿山迎置洛陽迫為給事中賊平論罪時縉已官刑部侍郎請削官贖兄罪乃左遷太子中允累遷尚書右丞在京師從薦福寺道光禪師遊日飯數十名僧齋中無所有唯藥鐺茶臼經案繩牀而已居常不茹葷血不衣文綵妻亡不再娶三十年孤處一室焚香獨坐以禪誦為業時與友人裴廸往來山莊彈琴嘯咏樂之忘歸同時有魏處士者高不仕之節屢徵不應摩詰為書遺之曰聖人知身之不足有也故曰欲潔其身而亂大倫知名之無所著也故曰欲使如來名聲普聞古之高者曰許由聞堯讓臨水而洗其耳耳非駐聲之地聲無染耳之迹惡外者垢內病物者自我豈入道者之門與孔宣父云我則異於是無可無不可願足下思可不可之旨無守默以為絕塵以不動為出世也乾元二年七月有疾以縉在鳳翔索筆作別縉書又與親故書數幅多敦厲奉佛修心之旨捨筆而逝唐書右丞文集柳子厚名宗元河東人早歲登進士第舉博學宏詞科授校書郎調藍田尉貞元末官監察御史順宗即位王叔文韋執誼用事引入禁中議政轉禮部員外郎俄而王韋敗子厚貶邵州刺史未至貶永州司馬子厚自幼信佛求其道積三十餘年韓退之甞遺書規之子厚答曰浮屠之教與易論語合雖聖人復生不可得而斥也既南遷與諸禪人遊處一時南方諸大德銘之文多出其手其為言尊尚戒律翼贊經論以豁達狂禪為戒甞著文曰東海若闡淨土法門其辭曰東海若陸遊登孟諸之阿得二瓠焉刳而振其犀以嬉取海水雜糞壤蟯蚘而實之臭不可當也窒以密石舉而投之海逾時焉而過之曰是故棄糞耶其一徹聲而呼曰我大海也東海若呀然笑曰怪矣今夫大海其東無東其西無西其北無北其南無南旦則浴日而出之夜則韜列星涵太陰揚陰火珠寶之光以為明其塵霾不處也必汩之西澨故其大也深也潔也光明也無我若者今汝海之棄滴也而與糞壤同體臭朽之與曹蟯蚘之與居其狹咫也又冥暗若是而同之海不亦羞而可憐也哉子欲之乎吾將為汝抉石破瓠盪羣穢於大荒之島而同子於向之所陳者可乎糞水泊然不悅曰我固同矣吾又何求於若吾之性也亦若是而已矣穢者自穢不足以害吾潔狹者自狹不足以害吾廣幽者自幽不足以害吾明而穢亦海也狹幽亦海也突然而往于然而來孰非海者子去矣無亂我其一聞若之言號而祈曰吾毒是久矣吾以為是固然而不可易也今子告我以海之大又目我以故海之棄糞也吾愈急焉涌吾沫不足以發其窒旋吾波不足以穴瓠之腹也就能之窮歲月耳願若幸而哀我哉東海若乃抉石破瓠投之孟諸之陸盪其穢於大荒之島而水復於海盡得向之所陳者焉而向之一者終與臭腐處而不變也今有為佛者二人同出於毗盧遮那之海而汩於五濁之糞而幽於三有之瓠而窒於無明之石雜於十二類之蟯蚘人有問焉其一人曰我佛也毗盧遮那五濁三有無明十二類皆空也一切無善無惡無因無果無修無證無佛無眾生皆無焉吾何求也問者曰子之所言性也有事焉夫性與事一而二二而一者也若守而一定則大患者至矣其人曰子去矣無亂我其一人曰嘻吾毒之久矣吾盡吾力而不足以去無明窮吾智而不足以超三有離五濁而異夫十二類也就能之其大小劫之多不可知也若之何問者乃為陳西方之事使修念佛三昧一空有之說於是聖人憐之接而致之極樂之境而得以去羣惡集萬行居聖者之地同佛知見矣向之一人者終與十二類同而不變也夫二人之相違也不若二瓠之水哉今不知去一而取一甚矣其愚也元和十年遷柳州刺史柳故夷子厚導以禮義恤其孤獨經其生產嫁娶葬埋各有條法三年教化大行柳民懷之及卒柳民為立廟羅池事具韓退之羅池廟柳州文集唐書昌黎文集白樂天名居易太原下邽人貞元中擢進士第元和中官左拾遺彊直敢言其所諫爭多軍國大體憲宗屢納之既而為宰相所忌出為江表刺史徙江州司馬樂天好釋氏書用以自理性情能順適所遇不以遷謫介意立隱舍於廬山與諸禪德遊處或經月忘歸長慶中為主客郎中知制誥穆宗好畋遊献續虞人箴以諷時河朔亂出師無功樂天上言制御之䇿不用乃求外任出知杭州太和二年為刑部侍郎求為分司官尋除太子賓客會朋黨事起樂天見時不可為思退處散地以遠害凡所居官未甞終秩率以病免會昌中以刑部尚書致仕與香山如滿禪師結香火社自稱香山居士先是太和中樂天在東都長壽寺受八戒與僧俗百四十人畫彌勒上生圖共發願生兜率內院及晚歲得風痺疾更捨錢三萬命工畫西方極樂世界高九尺廣丈有三尺阿彌陀佛居中觀音勢至執侍左右百萬人天恭敬圍繞樓臺伎樂水樹花鳥七寶莊嚴具如經說既成復發願言願此功德回施一切眾生一切眾生如我老者如我病者願皆離苦得樂斷惡修善不越南部便覩西方大白毫光應念來感青蓮上品隨願往生以偈讚曰極樂世界清淨土無諸惡道及眾苦願如我身病苦者同生無量壽佛所又自以生平湛樂文字放言綺語往往有之懼結來業願以文字因緣回向實地希於來世讚歎佛乘勸轉法輪乃作六偈唱於佛前讚佛偈曰十方世界天上天下我今盡知無如佛者堂堂巍巍為天人師故我禮足讚歎歸依讚法偈曰過現當來千萬億佛皆因法成法從經出是大法輪是大寶藏故我合掌至心回向讚僧偈曰緣覺聲聞諸大沙門漏盡果滿眾中之尊假和合力求無上道故我稽首和南僧寶讚眾生偈曰毛道凡夫火宅眾生胎卵濕化一切有情善根苟種佛果終成我不輕汝汝無自輕懺悔偈曰無始劫來所造諸罪若輕若重無大無小我求其相中間內外了不可得是名懺悔發願偈曰煩惱願去涅槃願住十地願登四生願度佛出世時願我得親最先勸請請轉法輪佛滅度時願我得值最後供養受菩提記會昌六年卒年七十五遺命斂以衣一襲送以車一乘無用鹵簿葬無以血食祭無請太常謚無建神道可葬香山如滿禪師塔側家人從之無子以從孫嗣唐書長慶集知歸子曰摩詰子厚並以文術鳴當時傳後世然考其生平視白公有愧焉迷陽迷陽無傷吾行古人所為致悲者也摩詰脫盖於輞川子厚激誠於海若驚心垢薉蟬蛻清虗具此淨因理宜解脫而子厚乃復流連神趣立威醉人亦獨何哉汪大紳云三人同傳而以白先生為指歸此傳引人入勝處也王柳名理妙絕白先生則願力堅矣又云知歸子贊已具隻眼者二人生平卒不能無愧者知歸子亦曾究其因乎以二人乃文人根種故也此等根種最不濟事吾近來尚喜歸震川侯朝宗汪鈍翁諸先生文并及湯臨川洪昉思曲子不濟事甚矣真實學道人案頭只宜看內外經典先儒古德書歷代史冊及韓歐李杜詩文乃無一字入陰界記取吾語流連神趣語尤好只為他趣根深耳趣根亦從文根得來其為神者以子厚生平孑直故也去其趣而存其直則生天矣記取吾語
