body:
  text: 蘇子瞻黃魯直朝無咎傳蘇子瞻名軾眉州眉山人也母程氏方娠夢僧至門遂生子瞻年七八歲常夢身為僧少長讀莊子歎曰吾昔有見於中口未能言今見是書得吾心矣登進士第熙寧初判官告院時王安石方用事行新法神宗召見子瞻問何以助朕對曰臣意陛下求治太急聽言太廣進人太鋭願陛下安靜以待物之來然後應之神宗悚然曰卿所言朕當詳思之子瞻每有論列多與安石不合及攝開封推官上書極言新法之害安石滋不悅遂請出外補杭州通判時錢塘圓照律師方開淨土法門子瞻因命工畫阿彌陀佛像為父母薦福而作頌曰佛以大圓覺充滿河沙界我以顛倒想出沒生死中云何以一念得往生淨土我造無始業本從一念生既從一念生還從一念滅生滅滅盡處則我與佛同如投水海中如風中鼓槖雖有大聖智亦不能分別願我先父母與一切衆生在處為西方所遇皆極樂人人無量壽無往亦無來徙知湖州御史劾其以詩訕謗逮赴臺獄禍且不測神宗密遣人覘之子瞻方酣睡鼻息聲達戶外神宗曰朕知蘇軾胸中固無事也遂責授黃州團練副使子瞻自出獄後持不殺戒過岐亭訪故人陳季常與之詩曰我哀籃中蛤閉口護殘汁又哀網中魚開口吐微濕刳腸彼交病過分我何得相逢未寒溫相勸此最急不見盧懷慎蒸壺以蒸鴨坐客皆忍笑髠然發其不見王武子每食刀几赤琉璃載蒸豚中有人乳白盧公信寒陋衰𩬆得滿幘武子雖豪舉未死神已泣先生萬金璧護此一蟻缺一年成一夢百歲真過客君無廢此篇嚴詩編杜集及至黃築室東坡自號東坡居士得城南精舍安國寺間一二日輒往焚香默坐克己悔過久之身心皆空覓罪垢相了不可得居五年移汝州走高安別弟子由將至之夕子由與真淨文壽聖聰聯牀共宿三人並夢迎五祖戒禪師俄而子瞻至元祐初為翰林學士四年出知杭州杭州大旱且疫子瞻設法補救多所全活浚茅山鹽橋二湖修復六井民甚便之為立生祠六年入為翰林承旨遷端明殿學士兼翰林院學士八年出知定州紹聖初朋黨禍作謫居惠州既至與王定國書曰軾到此八月獨與幼子一人來凡百不失所風土不甚惡軾既緣此絶棄世故身心俱安而小兒亦遂超然物外非此父不生此子也南北去住有定命此心亦不念歸明年買田築室作惠州人矣又與李公擇曰示及新詩皆有遠別惘然之意雖公之愛我厚然僕本以鐵心石腸待公何乃爾耶吾儕雖老且窮而道理貫心肝忠義填骨髓直須談笑於死生之際若見僕困窮便相於邑則與不學道者不相遠矣僕雖懷坎壈於時遇事有可以尊主庇民者便忘軀為之禍福得喪付與造物非兄僕豈發此居三年人無賢愚皆得其歡心已復徙昌化携阿彌陀佛像一軸自隨曰此吾往生公案也薪米不具則食芋飲水著書嘗負大瓢行歌田間俯仰浩然有以自樂元符初大赦北還復朝奉郎提舉成都玉局觀得疾止於常州上表請老許之臨終時門人錢世雄進曰先生平生踐履至此更宜著力曰著力即差語絶而逝高宗朝贈文忠子由名轍在高安時黃蘗全禪師勸之參禪最後叩洪州順禪師有省纍官翰林學士門下侍郎卒諡文定東坡年譜文集春渚紀聞龍舒淨土文宋史五燈會元黃魯直名庭堅江西分寧人也嘗遊灊皖山谷寺樂之因自號曰山谷道人治平中登進士第故好作艷辭法秀禪師呵之曰汝以綺語動天下人淫心不懼入泥犂耶魯直悚然悔謝遂鋭志學佛法知太和縣以平易為治年餘移監德州德平鎮過泗州僧伽塔作誓云菩薩師子王白淨法為身勝義空谷中奮迅及哮吼念弓明利箭被以慈哀甲忍力不動搖直破魔王軍三昧常娛樂甘露為美食解脫味為漿遊戲於三乘住一切種智轉無上法輪我今稱揚稱性實語以身語意籌量觀察如實懺悔我從昔來因癡有愛飲酒食肉增長愛渴入邪見林不得解脫今者對佛發大誓願願從今日盡未來世不復淫欲願從今日盡未來世不復飲酒願從今日盡未來世不復食肉設復淫欲當墮地獄住火坑中經無量劫一切衆生為淫亂故應受苦報我皆代受設復飲酒當墮地獄飲洋銅汁經無量劫一切衆生為酒顛倒故應受苦報我皆代受設復食肉當墮地獄吞熱鐵丸經無量劫一切衆生為殺生故應受苦報我皆代受願我以此盡未來際忍辱誓願根塵清淨具足十忍不由他教入一切智隨順如來於無量衆生界中現作佛事恭惟十身洞徹萬德莊嚴於剎剎塵塵為我作證設經歌邏羅身忘失本願唯垂加護開我迷雲稽首如空等一痛切既至官通判趙挺之希朝旨欲於鎮行市易法魯直謂鎮小民貧不可乃止元祐初除校書郎修神宗實録遷著作佐郎母病彌年盡夜視顏色衣不解帶及卒護喪歸哀毀得疾幾死既葬廬墓終喪服除起為祕書丞紹聖初乞外補知宣州改鄂州會黨禍作章惇蔡卞論神宗實録多誣貶涪州別駕黔州安置初魯直詣晦堂禪師問道晦堂曰論語云二三子以吾為隱乎吾無隱乎爾公居常如何理論魯直呈解晦堂曰不是不是魯直迷悶不已一日侍晦堂山行時木樨盛放晦堂曰聞木樨香否曰聞晦堂曰吾無隱乎爾魯直釋然即拜之既謁死心禪師隨衆入室死心張目問曰死心死學士死燒作兩堆灰向何處相見魯直不能對死心揮出及至黔忽明死心所問報以書曰往日嘗蒙苦口提撕長如醉夢依稀在光影中蓋疑情不盡命根不斷故望崖而退耳黔南道中晝臥覺來忽然廓爾尋思被天下老和尚謾了多少惟有死心道人不肯乃是第一慈悲也徽宗即位起監鄂州稅屢奉召命辭不行乞州得知太平趙挺之為相素恨魯直不附己或誣魯直以文章謗國遂除名羈管宜州所館之家有司輒坐以罪乃館於戍樓上雨旁風浩歌自得崇寧四年九月以疾終所善蔣湋為治殮送其喪歸江西高宗朝追諡文節山谷文集宋史五燈會元朝無咎名補之明遠四世孫也善屬文與蘇子瞻黃魯直善官至吏部郎中兼國史編修歷知州府有惠政在齊州嘗活流民數千人年二十餘即歸向正法深信因果與圓通覺海諸禪師遊參求向上事崇寧二年衛州民殺豬有犬銜豬首骨去狺狺四日不食或異而析之於左牡齒臼中得肉如拇如來像也髻有粟如珠紺目跏趺莊嚴畢具無咎弟載之親見其事記於石以示無咎無咎曰佛菩薩誓救衆生至不愛頭目髓腦度人畜身出無量苦而具縛凡夫以利養故殺害不已俱入劇苦大火坑中佛菩薩動於威神為警此輩因懼生信於沸鑊湯蓮花湧出戒悔殺害普作回向由是增長深般若因為一切諸佛之所護念豈不勝哉乃作贊曰吾觀鳥獸諸食肉形鈎吻鋸牙慘劇羅剎如是一類是強非強業力所驅啖彼養己是遭食者死已能生反誅其償如汝啖我版築上下無有盡時此業甚深佛所不度牛馬草食口方齒平業淺易超無對復苦人非牛馬齊貝瓠犀食穀果蔬形善應爾云何不若牛馬異生無凶吻牙而作鋒刃鷹虎受報形凶則然人形佛形而慘鷹虎故死受報甚於馬牛我誦此言普勸橫目血入牙故殺生不休至人無心同仁一視視人如我視豬如人人自不知是豬何等或其前世諸眷屬因云何無明日殺眷屬刺心取血血大壑流揚湯燖毛毛須彌聚死者不捨萬豬常隨汝莫鼓刀謂豬賤畜是熱血裏有丈六身南無佛陀南無僧伽我不敢殺諸佛現前一切衆生若飛若走若潛若穴大小妍媸其血肉中各具一佛云何見佛而欲鼓刀汝欲殺豬應作是念賓國王殺尊者時未及捨刀臂已墮落白乳湧出六種震驚亦如此豬腦破佛出佛不在外佛不在中佛不在空佛不在色是豬不死彼佛儼然世分別心自説人貴謂羊豕業本以供人彼以業來我何故受受則羊豕業歸吾身往有大豬生不啖穢食薄荷草度羣業豬菩薩威神示入異類汝自肉眼何由識豬藏汝之刀莫加豬首驚齒臼內跏趺坐人稽首世尊在我齒臼我不敢慢無豬無人惟願現前諸見聞者如菩薩誓念念勿疑以此勝因普薦三世父母師長若冤若親化柔軟心去毒害意捨熱血汁獲甘露漿苦海悉乾同一安隱又嘗作宴坐文云平居宴坐閉目收慮恆作是語汝身今者非男非女非孫非祖無古無今無來無去清淨本然妄生國土被塵染識根乃結聚久不可洗如衣受漬妄有形骸妄有名字是張是李是男是女汝既非此此亦非汝譬如蠔相被石粘住認石為我千劫受苦是義不然吾有一喻譬我如空被釘釘住是空非物釘無著處便得脫然離我我所正恁麼時揩眼看取一念相應是涅槃路大觀中知泗州卒年五十八從弟説之字以道官至徽猷閣待制嘗訪湖南明智法師學天台教觀晚年日誦法華經不輟云宋史雞肋集佛法金湯知歸子曰蘇黃朝三君子並以文人遊泳佛海子瞻之浩落魯直之鋭猛無咎之切深考其文亦各肖其人焉岐亭之詩得齒臼佛贊而其指益昶肉食者其亦有隱於中否耶獨怪魯直始作自誓文至居黔時乃悉毀所持禁戒屢見於詩則豫不能知其説也嗚呼淨業難成習果易縱可不慎哉可不慎哉汪大紳云東坡生平如一屋散錢從何處收拾此傳寫來一一上串極有心眼極有精神東坡遊戲人間比山谷會熱閙些其於禪也俱涉理路東坡較濶綽些又云無咎傳當與七佛偈般若心經西方佛號同誦朝夕持百八珠心口相應一年二年三年中若不入道者我願得斷舌報
