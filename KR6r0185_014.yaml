body:
  text: 李樊牛于商鄭馬陸李傳李山龍馮翊人唐初官監門校尉武德中暴亡而胸微熱家人伺之尋蘇自言死後有吏攝至一王府庭中有囚數千皆枷鎖北面立王坐高牀侍衛甚盛山龍既至階下王問曰汝平生作何福業對言鄉人每設齋恆施物助之又問汝身作何善業對言誦法華經日兩卷王曰大善即請升階上高座王移座對之山龍開經曰妙法蓮華經序品第一王便請下座山龍下則庭中諸囚忽已不見王曰君誦經之福非唯自利衆囚聞經皆已獲免豈不善哉今放君還謂吏曰可將此人歷觀諸獄吏引東行百餘步過一鐵城云是罪人所居山龍憫然稱南無佛復行見一大鑊火猛湯沸旁有二人坐臥山龍問之對言我等罪報得此鑊湯蒙賢者稱南無佛故獄中囚得一日休息耳山龍又稱南無佛便歸家距歿時已七日矣同時有史阿誓者居郊南福水之陰誦法華經行住不廢充邑令史出入城郭必由小徑低氣怡顏緣念相續平生未嘗乘馬以依經云哀愍一切故也病終時香聞里許後十年妻死合葬啓之舌本如生又有薛嚴者官忠州司馬長齋奉佛日誦金剛經三十遍至年七十二將終幢蓋自空而下天樂盈耳其妻見嚴冉冉升空而去室中異香芬烈家人莫不聞之冥報記法苑珠林續高僧傳報應記阿誓或作呵擔樊元智安定人弱齡好道居京城南依杜順和尚杜順令習華嚴為業仍依經修普賢行每誦經口中頻獲舍利前後數百粒有時夜誦口放光明照及四十餘里遠近驚異年九十二無而終茶毗時牙齒變為舍利得百餘粒悉放光明數日不歇僧俗建塔以為供養華嚴經疏鈔華嚴感應傳牛思遠名騰不詳其里居少挺異操沉靜寡言早歲明經擢第天后時以舅裴炎得罪貶為牂牁建安丞中丞崔察欲害之有異人授以神呪得免遂篤信佛道雖已婚宦如守戒僧口不妄談目不妄視在牂牁大布釋教置道場數處夷人皆漬其化居三年莊周獠反轉入牂牁遠近皆殺長吏應之建安大豪起兵劫思遠坐樹下將戮之忽有旁人持刀斬守者頭置思遠籠中舁而走事平還視事後宰數邑皆計日受俸人服其清尋棄官精心釋教以終其身紀聞于昶不詳其里居天后朝任并州録事晝決曹務夜判冥司每知災咎陰為之備凡六年丁母憂持金剛經日以為課更不復為冥吏矣年八十四將終忽聞奇香遽謂左右曰西方聖人來迎我也即向西連稱佛名而逝報應記商居士遺其名三河縣人年七歲能通佛書後廬於縣西田中有佛書數百千卷閲誦未嘗一日廢從而師者百輩每行其骨體珊然若戞玉之音年九十餘一日湯沐具冠帶悉召門弟子會食告之曰吾旦暮且死當以火燼吾尸慎無逆吾旨是夕坐逝後三日焚之視其骨若鈎鎖之相屬也於是里人建塔以奉焉宣室志鄭牧卿滎陽人舉家修淨業開元中病篤或勸進魚肉不許手執香爐一心西向忽聞異香蔚然遂逝其舅尚書蘇頲夢寶蓮華開牧卿坐其上佛祖統紀馬子雲不詳其里居舉孝廉任涇縣尉充本郡租綱督運入京舟溺沉米萬斛繫獄中子雲專心念佛閲五年遇赦得出隱南陵山寺中持一食齋天寶十年卒於涇先謂人曰吾因數奇遂精持內教今西方業成當往生安樂世界爾明日沐浴衣新衣端坐合掌俄而異香滿室子雲云佛來矣遂逝紀聞陸康成不詳其里居官京兆法曹公退忽見已故吏抱案立於前康成驚曰爾已下世何得來曰此幽府文簿皆來年兵刃死者康成曰得毋有我乎吏檢示之康成瞿然曰奈何吏曰惟金剛經可託特以報公言訖不見康成遂取金剛經誦之日數十遍明年朱泚反署為御史康成叱泚曰賊臣敢干國士泚怒令數百騎環而射之康成默念金剛經矢不能入遂捨之康成去之終南山老焉報應記李知遙長安人篤志淨土為五會念佛導諸衆信晚得疾忽云和尚來也洗漱著衣然香爐中出堂頂禮聞空中説偈云報汝李知遙功成果自招引君生淨土將爾上金橋却就牀坐泊然而化異香滿室衆共聞之淨土文知歸子曰豫觀百家所紀載其言感應事詳矣而或者以為異夫萬法一心自感自應如食充飢如飲止渴曾足異乎觀山龍以下諸君事固知心力不可思議矣與之言佛而不信者其亦不自信其心者哉汪大紳云心光為業力所障遂有地獄等事業力為心光所破則地獄等事一時解釋矣精心持佛語久之心光自然發露能救一切苦矣知歸子撰此一傳度苦之念勸人之心真至已極伏願仁者敬而聽之
