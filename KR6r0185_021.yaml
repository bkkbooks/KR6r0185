body:
  text: 朝王文富張趙傳朝明遠名迥世為清豐人父儉徙家彭門明遠幼能文太平興國五年登進士第至道末官翰林學士性樂易淳固服道甚篤歷官臨事未嘗挾情害人真宗數稱為長者初受學於劉海蟾得煉形服氣之術後學釋氏以止觀為宗在禁苑中與同僚偶坐有汲水者趨而過語同僚曰觀空純熟目無全人所著書有道院別集多發明空理其一云人生世間其夢無數無數之夢一一稱我一一之我豈非空乎歷劫之中其身無數無數之身一一稱我一一之我又非空乎夢既是空身亦如夢何以迷著念念爭空又云人生有身而後有名人人各以身名自執為我己之身名自無始來生化出沒亦已無數不知定以何時何處之身執為我耶定以何時何處之名垂之不朽耶靜思好身後名者不亦悠悠哉又作七審一一切妄念能息否二一切外緣稍簡省否三一切觸境能不動否四一切語言能慎密否五一切黑白滅分別否六夢想之間不顛倒否七方寸之中得恬愈否書之座右終身自考以驗道力仁宗即位以太子少保致仕居昭德坊里名其堂曰凝寂時習安坐鞭心入理晝課心經夜則數息戒家人無輒有請其夫人密覘之見其瞑目端坐鬚髮搖風凝然如木偶一夕夢遊西北方國入大山洞中群僧列而誦經明遠合掌禮之顧見一道士向明遠作禮趨而避之居一月卒年八十四諡文元其後李昌齡紀明遠事謂其前生實淨居天主云東都事略道院録法藏碎金文元逸事王子正名隨河陽人登進士甲科歷知州郡其為政外嚴而內寬居常慕裴公美之為人以御史中丞出鎮錢塘往興教寺謁小壽禪師機語契合自是踐履日深竟明大法時長水法師子璿疏首楞嚴經既成屬子正為之序序曰大佛頂義密因了義首楞嚴經者乃竺乾之洪範法苑之寶典也昔能仁以出震五天獨尊三界舍金輪而啓物現玉毫而應世觀四生之受苦也惠濟庶物愍羣機之未悟也力垂善誘於是俯仰至理述宣微言闢大慈之門廓真如之海以為一切諸法唯依妄念而起一切衆生不出因緣而有乃知生死輪轉貪欲為本修證常樂禪慧為宗則斯經也可以辨識諸魔破滅七趣謂止及觀修圓覺妙明之心發真歸元證上乘至極之道懿夫般剌譯其義房相筆其文今釋璿師學識兼高辨才無礙以是經典為時教於一代分妙理於十門功濟大千道傳不二信受則為世津梁開悟則入佛知見乃題經以作疏因疏以明理故可以開前疑而決後滯披迷雲而覩慧日隨志在外護慙無內學因獲覽閲輒述序引歸依法寶幸精究於真詮讚揚佛乘願普霑於勝果嘗刪次傳燈録為玉英集行於世明道中參知政事臨終書偈曰畫堂燈不滅彈指向誰説去住本尋常春風掃殘雪贈中書令諡章惠東都事略五燈會元楞嚴經疏序文寬夫名彥博汾州介休人也歷仕仁英神哲四朝出入將相五十餘年官至太師嘗兼譯經潤文使封潞國公初鎮北京時華嚴洞老來別寬夫曰法師老矣復何往曰入滅去寬夫以為戲言既去使人候之果入滅矣大異之及闍維親往臨視以琉璃瓶置座前祝曰佛法果靈願舍利入吾瓶俄有煙自空而降入瓶中傾之獲舍利無算乃皈信佛法晚向道益力專念阿彌陀佛晨夕行坐未嘗少懈發願云願我常精進勤修一切善願我了心宗廣度諸含識居京師與淨嚴法師集十萬人為淨土會年九十二卒諡忠烈東都事略林間録佛祖統紀佛法金湯富彥國名弼河南人慶歷中與文寬夫並相天下稱為富文封鄭國公趙閲道嘗貽書䇿之曰執事富貴已極道德甚盛所未甚留意者如來一大事因緣而已願益勉之彥國以為然守亳州日聞修顒禪師主投子遂往參謁顒見即呼曰相公已入來富弼猶在外彥國汗出浹背有省即延至府中居兩月日有發明後呈顒書曰弼遭遇和尚即無始以來忘失事一旦認得此後定須拔出生死海不是尋常恩知雖盡力道斷道不出也年八十餘卒元祐初加太師諡文忠東都事略五燈會元湘湖野録張安道名方平宋城人纍官太子太師𫾻歷中外望重一世慶歷中為滁州守遊琅琊山抵藏院偶見楞伽經取視之恍然如獲舊物讀至世間離生滅猶如虗空華宿障氷釋遂明心要作偈曰一念在生滅千機縛有無神鋒輕舉處透出走盤珠暮年以此經授蘇子瞻輔以錢三十萬使印施江淮間王介甫問安道曰孔孟去世後千餘年絶無人焉何也安道曰豈為無人亦有過之者介甫曰何人安道曰馬祖一汾陽無業雪峯存巖頭奯丹霞然雲門偃介甫未喻安道曰儒門淡泊收拾不住皆歸釋氏耳介甫歎服後以語張天覺天覺撫几曰至哉此論也卒諡文定東坡文集佛祖統紀趙閲道名忭衢州西安人氣宇清逸喜慍不形於色仁宗朝官御史徑直敢言神宗朝擢參知政事屢陳新法之害歷知諸州民懷其惠閲道年四十餘屏去聲色居常蔬食究心宗教初在衢與慧來禪師遊慧來不容措一辭及在青州時時冥坐忽聞雷震大悟作偈曰默坐公堂虗隱几心源不動湛如水一聲霹𮦷頂門開喚起從前自家的慧來聞而笑曰趙閲道撞彩耳元豐初以太子太保致仕作高齋居之禪誦精嚴日延一僧與之對飯嘗作偈曰腰佩黃金已退藏箇中消息也尋常時人要識高齋老只是柯村趙四郎注云切忌錯認日所為事夜必露香以告於天七年卒年七十七先期遍辭親友其子屼見其形色異常問後事閲道厲聲叱之遺慧來書曰非師平日警誨至此必不得力矣少頃趺坐而化東都事略五燈會元趙清獻集知歸子曰明遠之學於天台三觀之旨知所致力矣子正與楊大年並號參禪有得觀其去來之際非其驗耶文富張趙平生勳德具載於史豫獨序其學道之始卒以著其所存者如此汪大紳云以文富勳名若未了此一著亦祇是一場大夢耳讀至此令我勳名之念氷消矣
