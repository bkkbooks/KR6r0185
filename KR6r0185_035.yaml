body:
  text: 李王董鄭胡傳李純甫名之純自號屏山居士宏州人也金承安中進士少負才氣自比諸葛孔明王景略三入翰林仕至尚書右司都事中年度其道不行遂棄官歸初好列禦寇莊周之書年三十後遍觀佛經信解猛利既歸隱好與諸方老宿遊亦頗好飲酒每酒酣人有問法者隨機引導如傾江湖無有窮竭於是窒者通疑者信莫不灑然以去也以謂近世儒者推闡大道窮性命之歸其為功甚巨然其論佛患不深究華嚴圓極之宗理事無礙之旨徒執小乘教相斥為死灰稿木又不知性真常中本無生滅輒謂此身死後斷滅墮於邪見疑誤後生因取先儒闢佛語分章條辨名曰鳴道集説為之序曰自生民以來未有不得道而為聖人者伏羲神農黃帝之心見於大易堯舜禹湯文武周公之道見於詩書皆得道之大聖人也聖人不王道術將裂有老子者遊方之外恐後世之人塞而無所入高談天地未生之前而洗之以道德有孔子者遊方之內恐後世之人眩而無所歸切論天地既生之後而封之以仁義故其言不無有少相齟齬者雖然或吹或噓或挽或推一首一尾一東一西元聖素王之志亦皆有歸矣其門弟子恐其不合而遂至於支離也莊周氏沿流而下自天人至於聖人孟軻氏泝流而上自善人至於神人如左右券內聖外王之説備矣惜夫四聖人沒聖人之道不傳一千五百年矣而浮屠氏之書從西方來蓋距中國數千萬里證之文字至言妙理與吾聖人之心魄然而合豈萬古之下四海之外聖人之心竟不能泯滅耶諸儒陰取其説以證吾書自李翱始至於近代王介甫父子倡之蘇子瞻兄弟和之大易詩書論孟老莊皆有所解濂溪涑水橫渠伊川之學踵而興焉上蔡龜山元城橫浦之徒從而翼之東萊南軒晦菴之書蔓衍四出其言遂大小生何幸見諸先生之議論心知古聖人之不死大道之將合也恐將合而又離箋其未合於古聖人者曰鳴道集説云純甫既卒耶律晉卿讀其書大好之為序以行世又有楞嚴金剛老莊學庸諸解皆不傳同時有劉謐者著三教平心録至明初建安沈士榮著續原教論其大旨與純甫略同中州集佛祖通載續原教論王子彧名文沼州人金承安中進士為尚書省椽性剛不與俗諧棄官去往來登封盧州山中二十年改名知非字無咎自號照了居士布衣蔬食厲志學道初出京時有詩云親疏俱穩人倫了婚嫁齊成俗意周一筆盡勾塵債斷都無虧欠大家休大家休愛著何時是徹頭風息浪平人已度笑携明月下孤舟居山日有詩云放下情懷觸處安生涯取次沒多般褐衣襤縷聊遮赤短髮鬅鬙底用冠一榻省緣資困歇二匙隨分了飢䬸也知苦澀人人笑烈日初心不敢漫又作決了歌禪家以為證道正大中參知政事思烈行臺洛陽辟之使參臺事城陷不知所終中州集董國華名文甫潞州人承安中進士為人淳質恬於世味學道有得與子安仁居寶豐坊並閉戶不出以習靜為業其後歷官至昌武軍節度副使正大中以公事至𣏌縣自知死期書與家人及同官別乃為詩曰白髮三千丈紅塵六十年只今無見在虗費草鞋錢又曰無情喪主沒錢僧送上城南無事人檢盡傳燈前後録更無公案這番新詩畢擲筆於地以扇障面而逝中州集鄭所南名思肖福州連江人徙於吳宋末貢太學舉博學鴻詞元兵南下上書論時事不報宋亡自傷不能報仇終身不娶不飲酒不北向坐歲時伏臘野哭面南拜棄所居宅寓城中萬壽覺報二寺以所有田施與之留數畝給衣食謂佃客曰我死汝則主之著一是居士傳曰一是居士大宋人也生於宋長於宋死於宋嘗貫古今六合觀之肇乎無天地之始亘乎有天地之終普天率土一草一木吾見其皆大宋天下大宋粹然一天也不以有疆土而存不以無疆土而亡也譬如孝子於其父前乎無前後乎無後滿眼惟父與天同大寧以生為在死為不在耶又寧見有二父耶此一是之所在也一是者何萬古不易之理也由之行天地鬼神咸聽其命不然天地鬼神反誅之斷古今定綱常配至道立衆事自天子至於庶人一皆不越於斯苟能深造一是之域殺之亦不變安能以偽富偽貴芻豢之哉所南性孤峭寡與人合時獨行獨吟獨遊山水間嗜餐梅花嘗夢乘雲登一高峯得古梅樹大百圍花徑半尺方盛開摘而食之空中有聲告曰此玉真峯頂也邇來四百萬劫無人至矣因為文紀之曰此一花樹其壽無量天根月窟和氣之液洪濛之雪搆為花骨世不得聞仙不得識頑立樹下頻嗅頻笑方瞳不瞬溜碧相射欲與俱化泯而為一倏躍而動手盡其葩齒鍊為丹火涼水浮鼻舌毛空迸散香霧六合同同燦發天光萬返於源其心忽空一旦獲無身之身還我於無極於戲偉哉書此紀已仰面長嘯聲震空碧瞿然而寤舌本猶香又嘗著施食心法説正覺摩醯首羅天王療一切病呪呪曰唵我有大願無量無邊虗空爛壞我願無盡我默我呪先斷病魔我觀我生我寶無生意歸其源六根俱寧歸無所歸心華自開我於是時現無邊身為大醫王普救病難即臻安康乃正綱常終於究竟我違我誓我當殛我滅為微塵聞聞聞聞娑婆訶晚自集所著文名曰心史誓教天下萬世皆為忠臣錮以鐵函沉古井中明崇禎時承天寺僧浚井得之新安汪駿聲刻以行世蘇州志宋文偶鈔胡汲仲名長孺婺州永康人博學強記受業青田余學古得朱子之傳以主敬為學之要默識靜觀超然自得發明本心導諸學者一時人望皆歸之居貧厲獨行之節嘗語其友至麋不繼襖不溫謳吟猶作鐘球鳴此豫祕密藏中休糧方也參閲內典著大同論曰孟子沒一千四百年而周子出周子之傳出於北固壽涯禪師程子朱子皆得之周子朱子後得張欽夫講究此道方得脫然元來此事與禪學十分相似學不知禪禪不知學互相排擊都不曾劄著痛處真可笑也初在宋咸淳中起家監重慶酒務歷福寧州倅宋亡隱永康山至元二十五年起集賢修撰出教授揚州歷寧海主簿延祐元年引疾歸晚居杭之虎林山病喘上氣者久之一日具酒食與比鄰別云將返故鄉門人覺其意問曰先生精神不衰遽欲觀化耶汲仲曰精神與死生初無相涉也就寢至夜半聲寂然其子駒排戶視之則正衣冠坐逝矣年七十五時又有馮子振者攸州人博學負才氣通內典與中峯本禪師遊師作淨土偈一百八首大闡唯心之旨子振見而心傾自號發願學人為之贊曰我觀幻住師於幻無所住雖不住於幻能覺如幻人幻人汝當知垢與淨相對離垢即淨性淨土應現前是故幻住師演説淨土偈手提古佛機數與念珠等一偈偈四句句句義畢彰字數逾三千其實無一字偈迷念珠轉偈悟轉念珠若人於此中一一總無念於無念念佛佛念亦復無紅爪紺髮螺種種白毫相有目具瞻仰月面照日輪花敷四色蓮出微妙高潔所生皆淨土云何是西方是人見彌陀悉得安隱住元史佛法金湯續法喜志樂邦文類知歸子曰元世士大夫如趙子昂程巨夫虞伯生袁伯長鄧善之之徒其於佛法不可謂無意者然文過其質其於道蓋未有得也豫故不得而傳之汪大紳云異人異趣異解
