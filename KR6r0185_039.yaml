body:
  text: 趙大洲傳趙大洲名貞吉字孟靜四川內江人也母余氏夢二小沙彌一衣緇一衣白牽衣求托處緇者先執母袂不脫而大洲生既而白者復來而小洲生小洲名蒙吉字仲通兩人即三四歲時相愛也每相引入坡谷僻處趺坐抵掌語聞人聲斂容默然或密聽之不辨也詰之不告也少長並博通群書大洲年二十學禪時與小洲閉戶習靜既居母喪悟哀而不傷之體兩人先後中鄉舉及大洲成進士小洲遂不復應試明世宗朝大洲官翰林與四方豪傑講習廓摧俗學發明本心以天下為己任著求放心齊銘云乾為吾健坤為吾順風行水流日麗澤潤動處為雷止處為山無聲無臭充滿兩間此名為心別名為仁無內無外無損無增自孝自弟自聰自明喜怒哀樂未有一物感而遂通天下之故有情無情合為一體未著軀殼只有此耳聖人以此洗而退藏惟有圓圈可以形容藏中何有圈中何名至精至一為天地心原此真心不分愚智魚躍鳶飛各適其職蒙蒙我生營營自戕自斫自喪自迷自狂自築其墻自錮其防自放於憂悲愴逸鄙吝貪妬之場而不悟其非真常也嗚呼此獨何心往而不復夜半一聲天心呈露夢後周公廟中西伯元酒大羮泊然無迹辟彼淵泉今見涓涓辟彼大莖今見萌根無象之象無形之形根滋莖大水到渠成一時翕聚萬古常靈嗚呼易悟者心難淨者習呼為習呼吸為習吸習心作主須臾不離辟彼家室見奪於賊退處奴𨽻僕僕受役反正之苦禹平水土涵養之力稷藝稼穡於是一念不起境不觸也一見不倚微不忽也不離繩縛自解脫也不絶思慮自澄寂也以我視天地萬物未有我也以天地萬物視我未有天地萬物也翼乎如鴻毛之遇順風浩乎如巨魚之縱大壑也然而不能無過也夫不能無過者習難淨自能改過者性自定也然後求為真求放而不放真悟真修前後徹朗愚非為下智非為上回也從事參乎免夫先立其大白首著書太山巖巖示我廣居學問無他了此而已實際其地庶為知耻銘於東西敢告同志纍遷中允掌司業事嘉靖二十九年俺答犯都城嫚書要貢詔百官廷議日中莫發一語大洲奮然出班曰城下之盟春秋耻之為今之計請上速御正殿下詔引咎録周尚文之功釋沈東於獄輕損軍之令重賞功之格飭文武百司城守遣官宣諭諸將監督力戰退敵易耳先是周尚文為大同總兵力戰敗俺答既卒大學士嚴嵩格恤典不豫給事中沈束以為言復下之獄故大洲及之時世宗遣中使瞰廷臣還報心壯其言令手疏便宜立擢為左諭德兼監察御史令齎金五萬犒軍嚴嵩心嫉之當撰敕不令督戰不與一卒護行時寇騎充斥大洲單騎馳入諸將營散金犒士會寇引出將出白羊口大洲為仇鸞設畫謂賊輕重甚多而白羊路險若以奇兵趨出賊前令賊回尋古北口故道我以全軍擊之可大克也鸞不能用尾之反為賊敗既復命嚴嵩復讒之世宗怒其為尚文束游說下之獄杖於廷謫荔波典史稍遷至南京吏部主事四十年召為戶部侍郎又以忤嵩罷穆宗即位起禮部右侍郎充日講官每進講開陳心學究極存亡得失之幾穆宗甚重之遷南京禮部尚書既行復召還留直講兼翰林學士教習庶吉士課讀楞嚴經謂曰諸君齒亦長矣不以此時讀此經更何待耶三年秋命兼文淵閣大學士參預機務與高拱共事議論多不合拱以私怨考察科道大洲疏言之拱益不悅諷言官劾大洲大洲疏辨遂致仕去居位止一載晚著書號二通曰經世通曰出世通通各二門門各為部既成為文告古佛聖賢之神曰貞吉夙生遇緣幸染真熏今出頭來不忘覺照身居臣子之地每懷經世之憂心慕道德之途時發出世之願如此展轉四十餘年邇來垂白謝事形志俱衰顧影枯殘忽生勇猛乃取架上舊書以類臚列隨文布點各就部曲曰統曰傳曰制曰志屬之史門申治理也曰典曰行曰藝曰術屬之業門明學術也夫學術必助於治理治理必原於學術二門通矣世可經矣題曰內篇取東土金經摘采要文以便修習曰經曰律曰論屬之說門大智三昧所自出也曰單傳直指屬之宗門大行三昧所自出也夫行智二嚴如震輪兩足闕一不可二門通矣世可出矣題曰外篇約要而言經世者不礙於出世之體出世者不忘乎經世之用然後千聖一心萬世一道聖人憂世之念可少慰矣嗚呼虗空有盡此願無窮劫石可消斯言常在唯神其鑒之萬歷十年卒年七十三贈少保諡文肅小洲嘗被薦出為國子監學正一月即謝事隨大洲歸自陳其所證大洲喜為作悟道詩先大洲卒大洲文集明史知歸子曰自唐以來學士大夫儒佛之辨齗齗如也大洲先生作而兩家之難通非深入夫不二之門者惡足以與於斯哉先生與友人書言近得李長者華嚴合論服之擬以衰殘身命供奉法界總持二通之作蓋將游戲乎毗盧性海中也嗚呼先生丈夫之雄哉汪大紳云大洲先生與龍湖紫柏皆以英雄而入道者入道愈深我相愈重了王摩詰蘇東坡黃山谷俱以名士而入道者入道愈深我相愈有趣了然則與不學道者何以分別曰大洲三人學道三人我相是雄的不學道者我相是雌的王摩詰三人學道王的我相香蘇的我相活黃的我相瘦不學道我相便是臭的死的肥的善學道者不要強做著無我只要在我相上著工夫我相雌的可厭要修得他雄起來臭的可厭要修得他香起來死的可厭要修得他活起來肥的可厭要修得他瘦起來此是漸門倘遇性急的朋友要請教我如何是頓門我便對他道為學只要了我相耳我相不除禍事不小然又急切除不得做工夫到得這裏十分著急不妨回轉頭將這我相做親人看待極力的覔這我相覔來覔去要覔他來見一面覔到一面也不得見這便是頓門
