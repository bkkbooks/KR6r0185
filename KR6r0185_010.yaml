body:
  text: 劉明劉庾劉向馮李傳劉靈預名虬南陽人徙居江陵宋太始中為當陽令罷官歸豫章王辟為荊州別駕不應齊永明三年徵為通直郎亦不就竟陵王聞靈預精釋教致書通意要其東下曰僕迹塵圭組心逸江湖未面自親聞風如舊而回駕之念徒軫式閭之禮無階君矯然獨遠確乎難拔宣習質文昭辨空有所謂忘言之人可論天人之際豈能鳳舉鶴翻有心儀萃覘濠射之冥遊屈祇鷲之法侶闡三乘於窮子發二諦於困蒙有是因也何其暢與答曰虬四節臥病三時營灌暢餘音於山澤託暮情於魚鳥寧非唐虞厚恩周召宏施遠澤既灑仁規先著敢收樵牧之嫌敬報軾蛙之義家居衣粗布衣禮佛長齊注法華經講涅槃大小品以江陵西沙洲去人遠乃徙居之建武二年詔徵國子博士不就其冬得疾正晝有白雲徘徊檐戶間香氣滿室空中磬聲鏗然是日卒年五十八南齊書廣宏明集明休烈名僧紹平原鬲人元嘉中再舉秀才宋齊之交隱居教授纍辟不出尋居攝山聞僧遠夙德往候於定林寺齊高帝欲就寺見之遠問休烈曰天子若來居士若何相對答曰山藪之人正當鑿壞以遁若辭不獲命便當依戴公故事昔戴顒高臥不起朝命以山人之服加其身故云旋遁還攝山高帝賜以竹根如意筍籜冠初至山中野老諫曰山多毒蛇猛虎不可居也休烈曰毒中之毒無過三毒忠信之人可蹈水火蛇虎何能為遂居焉棲心靜泊二十年許時道士顧歡作夷夏論意在抑佛伸老休烈論之曰若夫學鏡生靈中天設教觀象測變存而不論經世之深孔老之極也為於未有盡照窮緣殊生共理練僞歸真神功之正佛教之宏也是以佛明其宗老全其生守生者蔽明宗者通然靜止大方乃雖蔽而非妄動由其宗則理通而照極故夫學得所學則可以資全生靈而教尊域中矣為於無為將乃滅習反流而邈天人矣嘗與法度禪師講無量壽經中夜忽見金光照室光中有樓閣及化佛菩薩永明七年捨宅為棲霞寺夢巖間有佛放光志欲創造未果而卒次豫仲璋遂與法度造無量壽佛像三丈一尺餘並建觀音勢至像以終父志少子山賓字孝若能世其家業梁普通中官至散騎常侍時范縝著神滅論蕭琛曹思文並立義難之武帝亦下敕排縝論令釋法雲示王公貴人凡二十六人各有答書申不滅之旨而山賓書辭義尤切其文曰辱告惠示敕旨答臣下審神滅論源深趣遠豈鹿兔所測隨類得解或亦各欣所見奉以周旋不勝舞躍論者限於視聽豈達曠遠目覩百年心惑三世謂形魄既亡神魂俱滅斯則既遠釋典復乖孔教矣焉可與言至道語妙理者哉夫明則有禮樂幽則有鬼神是以孔宣垂範以知死酬問周文立教以多才代終詩稱三后在天書稱祖考來格此皆陳之載籍彰彰其明者也夫緣假故有滅業造故無常是以五陰合成終同烟盡四微虗搆會均火滅竊謂神明之道非業非緣非業非緣故雖遷不滅能緣能業故苦樂殊報此能仁之妙唱搢紳之所仰也雖教有殊途理還一致皇上智周空有照極神源爰發聖衷親染宸翰弘獎至教啓悟重昏令學者永祛疑惑眷逮不遺良兼欣戚後假節攝北兖州事卒於官贈侍中諡曰質南史宏明集劉士光名歊平原人也年十一讀莊子逍遙篇即能為客說其大義及長博學有文已而精心學佛不娶不仕神僧志公遇之於興皇寺驚起曰隱居學道清淨登真如此三說年三十一著革終論其略曰夫形也者無知之質也神也者有知之性也有知不獨存依無知以自立故形之於神逆旅之館耳及其死也神去此而適彼也神已去此館何用存神已適彼祭何所祭而姬孔之教不然者其有以乎蓋禮樂之興出於澆薄俎豆綴兆生於俗敝施靈筵陳棺槨設饋奠建邱隴蓋欲孝子有追思之地耳今欲剪截煩厚務從儉易不傷存者之念有合至人之道氣絶不須復魄盥洗而斂以一千錢市棺單故裙衫衣巾枕履此外送往之具棺中常物及餘閣之祭一不得有所施斂畢載以露車歸以舊山隨得一地地足為塪塪足容棺不須博甓不勞封樹勿設祭饗勿置几筵其蒸嘗繼嗣言像所絶事止余身無傷世教明年春有人為其庭中栽柿士光曰吾不及見此實矣至秋而亡親故誄其行諡曰貞節先生族弟彥度名訐少喪二親哀毀幾滅性及長事伯父母及兄姊友孝篤至性愛潔清兄為娶妻有日矣彥度聞而逃乃已本州辟為主簿不就主者強起之乃掛檄於樹復逃去彥度深信佛法曾與士光聽講於鍾山諸寺因共卜築宋熙寺東㵎有終焉之志天監十七年卒於士光舍年三十一遺言勿立後嗣其他終制與士光略同宗友相與刊立銘諡曰元貞處士梁書庾彥寶名詵新野人也博通經史緯候之學而性尚夷簡特愛林泉十畝之宅山池居半蔬食敝衣不修産業嘗乘舟從沮中山舍還載米一百五十石有人寄載三十石及至家寄載者曰君三十石我百五十石彥寶默然恣其取足鄰人或被誣為盜妄攀彥寶彥寶矜之因以所藏書質錢二萬令門生詐為其親代酬之鄰人獲免來謝彥寶曰吾矜天下無辜豈期謝也梁武帝少與彥寶善及起兵署為平西府記室不屈普通中詔以為黃門侍郎稱疾不起晚年於宅內建道場六時禮懺誦法華經每日一遍夜中忽見一道人自稱願公容止甚異呼彥寶為上行先生授香而去中大通四年晝寢忽驚覺曰願公復來不可久住言訖而逝舉室咸聞空中唱云上行先生已生彌陀淨域矣時年七十八武帝聞之詔諡貞節先生南史劉宣文名慧斐彭城人也少博學能文起家梁安成王法曹行參軍嘗還都途經匡山遇處士張文逸相得甚歡有終焉之志遂居於東林又於山北搆園號離垢園時人稱為離垢先生研精釋典兼工篆𨽻在山手寫佛經二千餘卷常所誦者百餘卷晝夜行道孜孜不怠遠近欽慕之簡文臨江州遺以几杖論者云自遠師沒後將三百年始有張劉之盛矣大同三年卒文逸名孝秀南陽宛人仕州中從事史徙尋陽性通率耐冷好佛氏書謹持戒律居東林力田以供山衆僧有敗行輒集衆佛前為羯磨而笞之多有悔過者普通三年卒室中聞有非常香氣同時阮士宗名孝緒陳留人亦以清隱著名末年蔬食斷酒虔精事佛其恆供養石像先有損壞心欲補之罄心敬禮一夜忽然完復南史向居士遺其名北齊人也幽栖林野木食㵎飲默契心法天保初聞二祖可公風教甚盛致書曰影由形起響逐聲來弄影勞形不識形為影本揚聲止響不知聲是響根除煩惱而趣涅槃喻去形而滅影離衆生而求佛果喻默聲而求響故知迷悟一途愚智非別無名作名因其名則是非生矣無理作理因其理則爭論起矣幻化非真誰是誰非虗妄無實何空何有將知得無所得失無所失未及造謁聊申此意伏望答之二祖復以偈曰備觀來意皆如實真幽之理竟不殊本迷摩尼謂瓦礫豁然自覺是真知無明智慧本無異當知萬法即皆如愍此二見之徒輩申辭措筆作斯書觀身與佛不差別何須更覓彼無餘居士得偈即往禮覲密承印記五燈會元馮兖北齊冀州人以儒生被貢入臺聞惠光法師演化鄴城私自惟曰元素兩教頗曾究懷至於釋宗生未信重試往候光以擇所從既至值光開講傾聽久之疑滯頓釋頓足稽首願畢命歸依遂為弟子究心法要常自檢責有叩擊者應病豫藥多至感泣其言曰諸行者不得信此無明昏心覓長覓短須識詐賊覓他過惡不求其長則吾我漸歇常須看心自己多過雖在世間無有滋味此心將我上至非想還下地獄常誘誑我如怨家如愛奴豈可長養賊心使覓名利造疽蠧也故經云常為心師不師於心八歲能誦百歲不行不救急也時有傳寫其言者世號捧心論焉充在光門低頭斂氣日營飯粥奉僧既了躬自滌器夜宿竈前取蒿一束半以藉背半以坐之明相才動粥便已熟午後擔食送彼獄囚往還所經識者開路或至稠人廣衆率先供給若水若火若掃若帚隨所應用莫不備焉作務少暇口隨說法初不告倦遂卒光門續高僧傳李子約名士謙趙郡平棘人髫年喪父事母孝年十二魏廣平王贊辟開府參軍自齊迄隋纍徵不應遭母喪哀毀骨立服闋遂捨宅為伽藍脫身游學博覽內外經教歸心佛乘終身不飲酒不食肉口無殺害之言親賓來萃陳樽俎危坐終日少長肅然莫敢弛惰退而相謂曰既見君子方覺吾徒之不德也性仁而好施州里有分財不均相䦧訟子約出財補其少者令與多者埒兄弟內慚更相推讓焉偶出見盜刈其菜默而避之家僮執盜粟者子約慰而遣之曰窮困所致無相責也嘗出粟數千石貸鄉人年飢鄉人無以償皆來致謝子約設酒食勞之舉契對鄉人焚之曰債了矣幸勿介意也明年大熟債家爭來償粟不受已而又大飢設粥食餓人所全活以萬計為大冢收瘞道殣至春則出穀種給貧乏趙人德之撫其子孫曰此李參軍所活也客謂子約多陰德子約曰所謂陰德者譬猶耳鳴已獨聞之人無知者今吾所行子皆知之何謂陰乎客又謂子約報應之說佛書載之世典獨無何也子約曰積善餘慶積惡餘殃高門待封掃墓望喪非報應乎佛經云輪轉五道無有窮已非即賈誼所言千變萬化未始有極之謂耶至如為黃能望帝為杜宇褒君為龍牛哀為獸彭生為豕黃母為宣武為鱉鄧艾為牛徐伯為魚非即佛家變受異形之謂耶客曰邢子才云豈有松柏後身化為樗櫟僕以為然子約曰此不類之談也變化由心木豈有心客不能難開皇八年終於家年六十六趙之士女莫不流涕曰我曹不死而令李參軍死乎會葬者萬餘人其妻范陽盧氏有賢德子約亡賻贈無所受謂其州里父老曰參軍生平好施今雖終安可奪其志哉更散粟五百石隋書知歸子曰余論次劉明以下諸君子跡其行事大都遺世纓網翱翔物外息心清淨之域勤身慈忍之途洵足靜躁競於末流播淳風於百世至如向居士者識自本心深達祖道斯又絶類離倫妙遠不測者矣他若顏之推王固姚察徐孝克之徒亦能淡泊自居修持罔間而委蛇亂朝歷事異姓效揚氏之草元愧莊生之曳尾吾無取焉後之學者謹去就之幾審清濁之辨嚴淨毗尼超越塵纍斯可謂之度諸疑謗報佛深恩者矣
