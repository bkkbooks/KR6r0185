body:
  text: 昭明太子傳昭明太子統字德施梁武帝長子也母丁貴嬪仁恕恭儉虔精奉佛居常蔬食受戒日甘露降於殿前能通經義所受供賜悉以充法事普通七年薨太子生而聰睿三歲受孝經論語五歲遍讀五經天監元年立為皇太子十四年正月朔武帝臨軒冠太子於大極殿時武帝大宏佛教太子亦深心信奉遍覽衆經於宮內別立慧義殿招引名僧講論嘗撰解二諦義云明道之方其由非一舉要論之不出境智或時以境明義或時以智顯行至於二諦即是就境明義若迷其方三有不絶若達其智萬纍斯遣所言二諦者一是真諦一名俗諦真諦離有離無俗諦即有即無即有即無斯是假名離有離無此為中道真是中道以不生為體俗既假名以生法為體慧超咨曰浮偽起作名之為俗離於有無名之為真未審浮偽為當與真一體為當有異答曰世人所知生法為體出世人所知不生為體依人作論應如是説若論真即有是空俗指空為有依此義明不得別異又咨真俗既云一體未審真諦亦有起動起動不關真諦答曰真諦寂然無起動相凡夫惑識橫見起動又咨未審有起動而凡夫橫見無起動而凡夫橫見答曰若有起動則不名橫見以無動而見所以是橫咨若法無起動則唯應一諦答曰此理常寂此自一諦橫見起動復是一諦唯應有兩不得言一蕭曄咨曰真諦稱真是實真否答曰得真實真又咨菩薩會真之時為忘俗忘真否答曰忘俗忘真故説會真又咨忘俗忘真何得實真答曰若存俗存真何謂實真正由兩遣故謂實真法雲咨曰聖人所知之境此是真諦未審能知之智為是真諦為是俗諦答曰能知是智所知是境智來冥境得言即真又咨有智之人為是真諦為是俗諦答曰若呼有智之人即是俗諦又咨未審俗諦之人何得有真諦之智答曰聖人能忘於俗所以得有真諦法寵咨曰若使凡夫見有聖人見無便應凡夫但見世諦有聖人應見太虗無答曰太虗亦非聖人所見太虗得名由於相待既由待生並凡所見又咨凡夫所見空有得言是一否答曰就凡為語有實異無約聖作談無不異有敬脫咨曰未審聖人見真為當漸見為當頓見答曰漸見又咨無相虗懷一見此理萬相並寂未審何故見真得有由漸答曰自凡之聖解有淺深真自虗寂不妨見有由漸又咨未審一得無相並忘萬有為不悉忘答曰一得無相萬有悉忘解法身義云法身虗寂遠離有無之境獨脫因果之外不可以知知不可以識識豈是稱謂所能論辨將欲顯理不容默然天竺云達摩舍利此土謂之法身若以當體則是自性之目若以言説則是相待立名法者軌則為旨身者有體之義軌則之體故曰法身粗陳其體是常住身是金剛身重加研核其則不爾若定是金剛即為名相定是常住便成方所所謂常住本是寄名稱曰金剛本是譬説及談實體則性同無生故云佛身無為不墮諸法故涅槃經説如來之身非身是身無量無邊無有足迹無知無形畢竟清淨無知清淨而不可為無稱曰妙有而復非有離無離有所謂法身法雲咨曰未審法身常住是萬行得否答曰名相道中萬行所得又咨既為萬行所得豈是無相若必無相豈為萬行所得答曰無名無相何曾有得寄以名相假言有得又咨實有萬行實得佛果安可言無相全無所得答曰問者住心謂實有萬行今謂萬行自空豈有實果可得又咨現有衆生修習萬行未審何故全謂為無答曰凡俗所見謂之為有理而檢之實無萬行又咨經説常住以為妙有如其假設何謂妙有答曰寄以名相故説妙有理絶名相何妙何有法寵咨曰未審法身之稱為止在妙本金姿丈六亦是法身答曰通而為論本迹皆是別而為語止在常住又咨若止在常住不應有身若通取丈六何為法身答曰常住既有妙體何得無身丈六亦能軌物故可通稱法身又咨若常住無纍方稱法身丈六有纍何謂法身答曰衆生注仰妄見丈六丈六非有有實何纍普通元年四月甘露降於慧義殿太子為人孝敬篤至每宴居一坐一起不敢南面被召當入輒危坐達旦丁貴嬪有疾太子朝夕侍衣不解帶及喪水漿不入口每哭輒慟絶奉武帝敕強進飲食比至葬日進麥粥一升不嘗菜果體素壯至是減削過半自加元服武帝使省萬幾百司奏事填委太子明於庶事辨析可否纖毫必白其有過失徐令改正未嘗糾彈一人平斷法獄多所全宥出宮二十餘年不畜聲伎時招引文學之士討論篇籍而已會大軍北伐京師穀貴太子菲衣減膳每霖雨積雪遣左右周行道路視貧困家有流離者密加賑賜又出綿帛多作襦褲方冬施凍人其死亡無以斂者為備棺槥每聞遠近百姓賦役勤苦輒斂容色大通二年詔發吳郡吳興義興民開漕大瀆以瀉浙江太子以吳興被水請權停此役武帝優詔報之三年三月寢疾自知不起終不以狀上聞四月薨年三十一諡曰昭明梁書廣宏明集知歸子曰豫觀昭明太子之論可謂了了見佛法者非梁君臣之所及也太子仁孝寬明動合規矩若使撫有梁祚勤施四方淳和之風可日俟也天步方艱前星遽殞一夫作難而江國土崩豈不哀哉文中子言齋戒修而齊梁亡非釋迦之罪也蓋定業使然天亦不能純佑命於太子也悲夫汪大紳云其行事頗與六度經相應昭明真佛種也吾不重其佛法重其仁孝寬明是為佛種論法到極入微處只是所知愚也惜其未遇達摩以下諸大作家痛與錐劄脫却所知愚只管要離有離無依舊只管在有無上之乎者也之乎者也到沒奈何去處且上文撰樓青黃亦白黑去者此處是文人根種非佛種也那得有天子福分那得有帝王事業以渠腳跟插在秀才和尚們隊裏弄得虗花花故也嗚呼以彼仁孝寬明根種又曾念過孝經論語五經者弄得下梢頭毫沒收拾不亦惜哉為甚金剛經心經七佛偈壇經汪大紳喜歡奉行朱子嘗判得千是萬是曰六朝人佛學只是説只是清言家數而已説得來清虗惹厭所以達摩入中國來一切掃去傳至惠能始有下手做工夫處可惜許多聰明絶特有志之士難得入此門來及入此門來又有漫天荊棘一個個陷入其中出身不得弄得一個個毫沒收拾千病萬痛總只為做工夫的祇在動靜上轉換講道理的祇在有無上拈放箇箇認指為月何曾識得月耶入此門來不是小可的事情千生萬劫於此一了無不了於此不了盡未來劫總未有了期豈可貪圖説得去做得好看便罷若只是説得去做得好看便罷鄉里小兒中這般人如麻似粟此門中不勞尊駕光輝也雖然事不可一向既承尊駕光輝不妨打開方便法門請來遊戲一回者你要遊戲此法門切不可在動靜上轉換有無上拈放動靜只是境有無只是意根卜度與心了不相干也你若有大力量動也一棒靜也一棒有也一棒無也一棒打得有無動靜諸魔腦袋子都裂去也影兒都不見也自然心光發露咄連那心光也送他一棒㘞跳出心量了也心量拘他不住了也尊駕豈非超佛越祖一個好人乎老漢這裏輕心慢心待人想你文謅謅的書生如何下得此手罷罷罷且用箇小小法兒去者也不要管他是心是境是意根遇著靜時只看靜的相在那裏遇著動時只看動的相在那裏遇著無的時候只看無的相在那裏遇著有的時候只看有的相在那裏看得來呆呆癡癡顛顛倒倒逢人不知是人見物不知是物過了這箇時候送到大知識門下喫棒去尊駕乃有收拾此是光輝法門的勾當微聞秀才和尚們相商道若使臨濟德山棒入汪大紳手須瞎却天下人眼誠哉是言
