body:
  text: 何周到裴劉傅傳何彥德名尚之廬江灊人也少頗不馴長而折節蹈道起家臨津令纍遷左衛將軍宋元嘉十二年京尹蕭謨之請制建寺鑄像文帝以問彥德及吏部羊元保曰朕少讀經不多因果之事昧然未究所以不敢立異者以卿輩時秀率皆信敬耳比見顏延之折達性論宗炳難白黑論其説汪洋大明至理若使率土之民皆敦此化則朕坐致太平矣夫復何事昨蕭謨之請制即以相示委卿增損必有以戒遏浮淫無傷宏獎者乃當著令耳尚之對曰橫目之俗多不信法以臣庸蔽更荷褒拂非所敢當然前代群英王導周顗庾亮王蒙謝安郗超王坦之王恭王謐郭文舉謝敷戴逵許詢及亡高祖兄弟王元琳昆季范汪孫綽張元殷覬或宰輔冠冕或人倫羽儀或致情天人之際或抗迹雲霞之表靡不傾心歸依至教慧遠法師云釋迦之化無所不可適道固是教源濟浴亦為要務竊味此言有契至理何則百家之鄉十人持五戒則十人淳謹千室之邑百人修十善則百人和睦傳此風教以周寰區編戶億千則仁人百萬夫能行一善則去一惡一惡既去則息一刑一刑息於家萬刑息於國此明詔所謂坐致太平者是也故圖澄適趙三石減暴靈塔放光符健損虐神道助化昭然可觀謨之請制不謂全非但傷蠹道俗本在無行僧尼而情偽難分去取未易至土木之工雖若靡費且植福報恩不可頓絶羊元保進曰此談蓋天人之學非臣愚所宜頂聞竊恐秦楚論強兵之術孫吳畫吞併之計無取於此彥德曰夫禮隱逸則戰士息責仁德則兵氣消倘以孫吳為志動期吞併則將無取於堯舜之道豈特釋教而已哉帝悅謂彥德曰佛門之有卿猶孔氏之有季路也自是帝留神釋典益重元化二十三年為尚書左僕射文帝有所興造彥德輒苦言諫止律身簡約妻亡不再娶旁無姬侍大明中以左光祿開府儀同三司領中書令卒於官贈司空諡曰簡穆孫求字子有清退寡嗜欲居吳隱波若寺人莫見其面除永嘉太守一夕乘小船逃去隱虎邱山齊永明四年拜太中大夫不就卒求弟點字子皙父鑠素有瘋疾無故害其妻坐法死點年十一居憂幾至滅性長傷家禍遂絶意仕宦兄求卒點菜食不飲酒訖於三年歷宋齊梁並徵不出雅好佛道從弟遁以東籬門園居之招名德沙門與諸勝侶清言竟日嘗於吳中石佛寺講經晝夢一道人授藥一丸服之夙患渴利自此而差天監二年卒點弟胤字子季嘗入鍾山定林寺聽習釋典通義學仕齊歷官至中書令拜表解職隱若耶山雲門寺梁武帝即位詔為特進光祿大夫遣使者以手敕喻意胤辭曰吾年已五十七月食四斗米不盡何容復有宦情使者還奏敕給白衣尚書祿固辭又敕山陰月給庫錢五萬亦不受乃敕何子期孔壽等六人於東山受學已而至吳居虎邱西寺講釋典注百法論十二門論各一卷晚而斷肉有虞人逐鹿鹿徑趨胤伏不動又有異鳥如鶴而赤毛集講堂馴狎不去中大通三年卒宏明集南史周彥倫名顒汝南安城人也初為宋益州刺史蕭惠開府主簿隨惠開還都明帝頗好名理以彥倫曉佛經引入殿內宿直帝所為慘毒事彥倫不敢顯諫輒誦經中罪福因緣帝心動為之小止嘗著三宗論闡空假不空假義時長史張融作門論謂道之與佛致本則同達迹成異彥倫難之曰言道家者以二篇為主言佛教者以般若為宗二篇所貴義極虗無般若所觀照窮法性夫有之為有物知其有無之為無人識其無老氏之言有無無出斯域是吾三宗鄙論所謂取捨驅馳也佛教之所以義奪情靈言詭聲律者蓋謂即色非有故擅絶於群家耳此塗未明紛紛橫沸皆由著有既患由有滯而有性未明矯有之家因崇無術盡有盡無非極莫備非有非無三宗所蘊惟足下其之歷官至中書郎於鍾山西立隱舍休沐則歸之清貧寡欲斷肉食雖有妻子常樂獨處將軍王儉謂彥倫曰卿山中何所食答曰赤米白鹽緑葵紫蓼文惠太子問曰菜食何味最勝答曰春初早韭秋末晚菘時何子季亦好佛法然未能斷肉太子問彥倫精進何如胤答曰各有其纍太子曰何纍答曰周妻何肉初彥倫嘗貽子季書令斷肉其略曰變之大者莫過死生生之所重無逾性命性命之於彼極切滋味之於我何賒而終身資之以永歲月彼就怨酷莫能自伸我業長久吁哉可畏且區區微卵脆薄易矜歂彼弱麑顧步宜愍觀其飲飛沈使人憐悼况其甘心撲搋加復恣意吞嚼至乃野牧成群間豢重圈量肉揣毛以俟支剝如土委地僉謂常理可為愴息一往一來生死常事傷心之慘行亦自及丈人於血氣之類雖弗身踐至於升鳧沉鯉不能不取備屠門財貝一經盜手猶為廉士所棄生性之一啓鸞刀寧復慈心所忍騶虞雖飢非自死之草不食聞其風者豈不使人多愧子季得書感動末年亦斷肉焉宏明集南史到茂灌名溉彭城武原人也仕梁歷官至吏部尚書以清白自修不好聲色虗室單牀旁無姬侍冠履十年一易傳呼清路示有朝章而已後因疾失明詔以散騎常侍就第養疾生平敬信佛法初與弟洽共居一齋洽卒便捨為寺蔣山有延賢寺茂灌先世所立也每得祿俸皆充二寺已而斷腥膻別營小室朝夕從僧禮誦武帝為月致三淨饌太清二年卒臨終屬其友張綰劉之遴敕子孫薄葬曰氣絶便殮殮以法服殮竟便葬不須擇日屏家人請僧讀經贊唄及卒顏色不變手屈二指南史裴幾原名子野河東聞喜人少好學工文有至性居父喪盡禮每之墓所哭泣處草為之枯有白兔馴擾其側梁天監中為著作郎掌國史及起居注大通初纍遷鴻臚卿尋領步兵校尉在禁省十餘年靜默自守未嘗有所請謁所得俸悉以分戚黨之貧者借官地二畝起屋數間妻子恆苦飢寒晚年深信佛法持其教戒飯麥食蔬終其身大通二年卒先是預尅死日及期自省移病詣同畝劉之亨曰吾其逝矣遺命喪葬務從節制諡曰貞子同時劉士深名杳平原人亦好學強記天監初官太學博士後代幾原為著作郎纍遷尚書左丞大同二年卒士深自讀佛經常行慈忍中年喪母便長斷腥血治身清儉無他嗜好性不自伐不論人長短臨終遺命以法服殮載以露車還葬舊墓勿設靈筵勿致祭醊其子遵行之又有任孝恭者臨淮人亦善屬文武帝時官司文侍郎初從蕭寺雲法師讀經論本佛理已而蔬食持戒太清二年侯景陷臺城為所殺梁書劉彥和名協東莞莒人少孤篤志好學家貧不娶依沙門祐法師居十餘年遂博通經論因區分部類録而序之定林寺經藏其所定也天監初除南康王記室兼東宮通事舍人時七廟饗薦已用蔬果而二郊農社猶有犧牲彥和表言二郊農社宜與七廟同改詔付尚書議如所請尋遷步兵校尉其為文長於佛理時有道士造三破論排抑佛道彥和作滅惑論以斥之其略曰至道宗極理歸乎一妙法真境本固無二佛之為道空元無形而萬象並應寂滅無心而元智彌照幽數潛會莫見其極冥功自用靡識其然顯迹則金容以表聖應俗則王宮以現生拔愚以四禪為始進慧以十地為階總龍鬼而均誘涵蠢動而普慈權教無方不以道俗乖應妙化無外豈以華戎阻情是以一音演法殊譯共解一乘敷教異經同歸經異由權故孔釋教殊而道契解同由妙故梵漢語隔而化通但感有精粗故教分道俗亦地有東西故國限內外其彌綸神化陶鑄群生無異也然至道雖一岐路生迷九十六種俱號為道聽名則邪正莫辨驗法則真偽自分若以粗笑精以偽謗真是瞽對離朱而曰我明也尋有敕與沙門慧震於定林寺證經功畢啓求出家先燔鬢髮以自誓敕許之遂於寺變服改名慧地未期而卒梁書傅宜事名縡北地靈州人好學能屬文居母喪哀毀骨立士友稱之陳文帝聞其名召為撰史學士除司空府記室宜事篤信佛法從興皇寺惠朗法師受三論盡通其學時有太心嵩法師著無諍論以詆惠朗宜事著明道論以釋其難其略云無諍論言比有宏三論者歷毀諸師非斥衆學論中道而執偏心語忘懷而競獨勝方學數論更為讎敵讐歒既搆諍鬪大生以此之心而成罪業罪業不止豈不重增生死苦聚答曰三論之興為日久矣龍樹創其源除內學之偏見提婆揚其旨蕩外道之邪執欲使大化流而不擁元風闡而無墜其言曠其意遠其道博其流深斯固龍象之騰驤鯤鵬之搏運乘決羽豈能望其間哉頃代澆薄時無曠士苟習小學以化蒙心漸染成俗遂迷正路唯競穿鑿各肆營造枝葉徒繁本源日翳一師解説復異一師更改舊宗各立新意同學之中取寤復別如是輾轉添糅倍多總而用之心無的準擇而行之何者為正豈不渾沌傷竅嘉樹弊芽雖復人説非馬家握靈蛇以無當之巵同畫地之餅矣攝山之學則不如是守一尊本無改作之愚約文申意杜臆斷之情言無預設理非宿搆覩緣爾乃應見敵然後動或彌綸而不窮或消散而無所凡相酬對隨理詳核有何嫉詐干犯諸師且諸師所説為是可毀為不可毀若可毀者毀故宜然若不可毀毀自不及法師何獨蔽護不聽毀乎且教有大小備在聖誥大乘之文則指斥小道今宏大法寧得不言大乘之意耶無諍論言無諍之道通於內外子所須諍者此用末而救本失本而營末者也何則若依外典尋書契之前至淳之世質朴其心行不言之教當於此時復有何諍固知本來不諍是物之真矣答曰諍與無諍不可偏執本之與末又安可知由來不諍寧知非末於今而諍何驗非本夫居後而望前則為前居前而望後則為後而前後之事猶如彼此彼呼此為彼此呼彼為彼彼此之名的居誰處以此言之萬事可知矣本末前後是非善惡可恆守耶何得自信聰明廢他耳目夫水泡生滅火輪旋轉入牢穽受羈紲生憂畏起煩惱其失何哉不與道相應而起諸見故也相應者則不然無為也無不為也善惡不能偕而未曾離善惡生死不能至亦終然在生死故得永離而任放焉明月在天衆水咸見清風在林羣籟畢響吾豈逆物哉不入鮑魚不甘腐鼠吾豈同物哉誰能知我共行斯路浩浩堂堂豈復見有諍為非無諍為是必欲考真偽觀得失無過依賢聖之言檢行藏之理始終研究表裏綜核使浮辭無所用詐道自然消請待後筵以觀其妙矣歷散騎侍郎太子庶子僕後主即位遷祕書監右衛將軍兼中書通事舍人掌制誥宜事雖以文章為後主所重然性剛直與朝士不相中會施文慶沈客卿以便干政而宜事益疏乃共𧮂宜事受高麗使金遂下之獄宜事獄中上書極論後主過失後主大怒頃之遣使謂曰我欲赦卿卿能改過不對曰臣心如面面可改則臣心可改後主益怒遂賜死獄中年五十五其後三年而隋滅陳陳書知歸子曰彥德宏法以佐治彥倫護生以全仁三何肥遁於邱園茂灌陸沉於朝市至如裴劉諸子文稱其質行浮於名彬彬乎有君子之風矣梁陳之際士大夫名學佛者甚衆然往往持祿保位視鼎社之遷如去涕唾焉嗚呼此豈佛教使然與吾所以不忘夫傅子也汪大紳云竟體旃檀香無復有亂之者矣贊極雅正轉覺妙遠不測
