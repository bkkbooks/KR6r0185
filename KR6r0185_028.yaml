body:
  text: 張天覺傳張天覺名商英號無盡居士蜀州新津人也為人負氣倜儻豪視一世初任通川簿嘗入寺見藏經卷䇿齊整怫然曰吾孔聖之書乃不及此歸而沉吟中夜不寐夫人向氏問其故天覺曰適欲著無佛論耳向氏曰既已無佛何論之有天覺疑其言遂止後於一同列所見維摩經閲至此病非地大亦不離地大歎曰胡人之言亦能爾耶乃借歸卒業向氏見而謂曰可熟讀此然後著無佛論天覺悚然遂深信佛法神宗朝以王安石薦內召再遷至監察御史裏行旋以事謫於外元祐中除河東提點刑獄至清凉山齊宿禱於文殊屢覩金燈光明如晝有化菩薩現於空中已乃塑文殊像供奉山寺著發願文云一切處金色世界真智所以無方東北方清凉寶山幻緣所以有在無方則一塵不立有在則三界同瞻是以五體歸依兩淚悲仰伏念商英昔在普光殿內或於大福城東一念差殊四生流浪出沒於三千剎土纏綿於十二根塵以往善因值今勝事荷剎那之方便開無始之光明揣俗垢之已深恐幔幢之猶在托之土偶明此願輪三界空而我性亦空孰真孰妄十方幻而我形亦幻何異何同伏願菩薩攝入悲宮接歸智殿起信足於妙峯山頂資辨河於阿耨池中誓終分段之身更顯希奇之作尋以亢旱入山祈雨三禱三應遂以聞於朝復還僧寺田三百頃旋為江西運使謁東林總禪師總詰其所見與己合遂可之既按部分寧遇兜率悅禪師謂曰聞公善文章悅曰從悅臨濟九世孫對運使論文章政如運使對從悅論禪也天覺不然其語但對悅稱賞東林悅不肯語至更深悅曰東林既印可運使運使於佛祖言教有少疑否曰有疑香巖獨腳頭德山托鉢話悅曰既於此有疑其餘安得無耶祇如巖頭末後句是有耶是無耶曰有悅大笑便歸方丈閉却門天覺一夕睡不安至五更下牀觸翻溺器猛省前語即往叩方丈門曰吾已捉得賊也悅曰贓在何處天覺無語悅曰運使且去來日相見翼日呈頌曰鼓寂鐘沉托鉢回巖頭一拶語如雷果然祇得三年活莫是遭他授記來悅乃謂曰參禪祇為命根不斷依語生解如是之說公已深悟然至極細微處不知不覺墮在區宇乃作頌曰等閒行處步步皆如雖居聲色寧滯有無一心靡異萬法非殊休分體用莫擇精粗臨機不礙應物無拘是非情盡凡聖皆除誰得誰失何親何踈拈頭作尾指實為虗翻身魔界轉腳邪塗了無逆順不犯工夫天覺遂邀悅至建昌途中作十頌悅亦作十頌酬之天覺故與元祐大臣不合紹聖初為左司諫上書毀司馬光呂公著士論短之崇寧中纍遷至尚書左丞與蔡京議政不合數詆京罷知亳州尋安置歸峽兩州兜率悅嘗見石霜侍者清素得末後句以語天覺其後天覺在峽告覺範洪禪師曰昔見真淨於歸宗語及兜率末後句語未卒真淨忽怒罵曰此吐血禿丁脫空妄語不用信惜真淨不知此也洪曰公惟知兜率口授末後句至真淨老師真藥現前不能辨何也天覺於言下頓見真淨用處即取家藏真淨像展拜題其上曰雲菴綱宗能用能照冷面嚴眸神光獨耀孰傳其旨覿露惟肖前悅後洪如融如肇大觀四年京罷相起為資政殿學士頃之除中書侍郎時中外共疾京所為見天覺能立異共稱為賢徽宗從人望拜尚書左僕射時久旱彗星中天命下之日大雨彗沒不見徽宗喜書商霖二字以賜之大革弊政改京所鑄當十大錢為當三以平泉貨復轉般倉以罷直達行鹽鈔法以通商旅蠲橫斂以寬民力勸上節華侈息土木抑僥幸徽宗甚嚴憚之嘗葺升平樓戒主者遇張丞相導騎過匿匠樓下為相逾年復為同列所忌諷言官文致其過出知河南府旋安置衡州蔡京復相太學諸生為之頌冤復故秩宣和四年十一月晨臥於牀口占遺表命子弟書之作偈曰幻質朝章八十一漚生漚滅誰久識撞破虗空歸去來鐵牛入海無消息俄取枕撞門窗有聲如雷遂卒諡曰文忠宗門武庫羅湖野録宋史清凉通傳法喜志知歸子曰天覺早歲嗜祿躁進邪正不明幾不有其躬危矣洎其晚節直道而行不撓於衆枉豈非所謂改過君子者耶其於心地法門知所致力矣嗚呼小智之流一入禪宗毫無畏忌撥置因果墮無明坑不知自奮者斯又天覺之罪人哉汪大紳云初祖入東土傳佛心印一口便已吸盡以下諸祖心心相印至曹溪而發泄無餘後來看得容易口口相傳依舊流為義學於是南嶽青原而下諸祖深有懼焉再開方便之門曲盡錘爐之妙重重祕惜狠狠掃除用格外之提撕為當頭之棒喝語多奇特話似風顛此皆不得已之苦心也善學者開宗明義當於初祖及六祖機緣法語窮參力究須實見得心外無宗凡外於心宗者即屬邪見任他見得漫天際地只是一團虗氣一點黑子耳如此方見得分明諦當多生來疑情難斷蘊界難枯再開方便之門重起錘爐之力曹溪以下門門參究疑情斷蘊界枯乃為了當然總不出初祖及六祖機緣法語也此外若更有路可走此即大妄語大波旬見去聖遙遠末學鮮有師承往往參尋者才讀上大人便將奇特語新鮮話蘊在心中意欲超佛越祖下梢頭箇箇弄成下劣狂魔痛哉痛哉傳中多少奇特縉閲之依舊疑著幸賴路頭素明疑而不惑已信得無別路可走耳觸翻淨瓶張天覺活埋了也枕聲如雷天覺末路出現復何疑哉
