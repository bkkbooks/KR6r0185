body:
  text: 宋景濂傳宋景濂名濂世居金華之潛溪至景濂遷於浦江青蘿山仍以潛溪題其室故學者稱為潛溪先生學佛氏之道亦自號無相居士母陳氏夢異僧手持華嚴經來曰吾方寫是經願假一室以終此卷覺已生景濂少強記絶人長而從吳萊柳貫黃溍諸儒問學博通經史元至正中薦授翰林院編修辭不行入龍門山居十餘年明太祖取婺州召見既徵詣金陵景濂曰吾聞大亂極而真人生斯其時矣遂留事太祖除江南儒學提舉兼授太子經改起居注常在左右備顧問數稱述帝王仁義之道勸上毋專任兵刑洪武二年除翰林院學士太祖常言佛氏之教幽贊王綱又言天下無二道聖人無兩心時廷臣獨景濂能深契上旨每召對輒與究論佛經奧義時詔於蔣山興國寺大興法會景濂作法會記其文曰皇帝御寶歷之四年海宇無虞洽於大康文武恬嬉雨風時順於是恭默思道端居穆清罔有二三與天為徒重念元季兵興六合雄爭有生之類不得正命而終動億萬計靈氛糾蟠充塞下上弔奠靡至煢然無依天陰雨濕之夜其聲或啾啾有聞宸衷傷若疚在躬且謂洗滌陰升陟陽明惟大雄氏之教為然乃冬十有二月詔徵江南有道浮屠十人詣於南京命欽天監臣羌以穀旦就蔣山太平興國禪寺丕建廣薦法會上宿齊室却葷肉弗御者一月復敕中書右丞相汪廣洋左丞相惟庸移書於城社之神具宣上意俾神達諸冥期以畢集五年春正月辛酉昧爽上服皮辨服臨奉天殿群臣服朝衣左右侍尚寶卿梁子忠啓御撰章疏識以皇帝之寶上再拜燎香於爐復再拜躬視疏已授禮部尚書陶凱凱捧從黃道出午門置龍輿中備法仗鼓吹導至蔣山天界總持萬金及蔣山主僧行客率僧伽千人持香華出迎萬金取疏入大雄殿用梵法從事白而焚之退閲三藏諸文自辛酉至癸亥止當癸亥日時加申諸浮屠行祠事已上服皮辨服搢玉圭上殿面大雄氏北向立群臣各衣法服以從和聲郎舉麾奏悅佛之樂首曰善世曲上再拜迎群臣亦再拜樂再奏昭信曲上跪進熏薌奠幣復再拜樂三奏延慈曲相以悅佛之舞舞人十其手各有所執或香或燈或珠玉明水或青蓮花氷桃暨茗荈衣食之物勢皆低昂應以節上行初獻禮跪進清淨饌史冊祝復再拜亞終二獻同其所異者不用冊光祿卿徐興祖進饌樂四奏曰法喜曲五奏曰禪悅曲舞同三獻上還大次羣臣退諸浮屠旋大雄寶座演梵呪三周初斸山右地成六十坎漫以堊至是令軍卒五百負湯實之湯蒸氣成雲諸浮屠速幽爽入浴焚象衣以綵幢法樂引至三解脫門門內五十步築方壇高四尺上升壇東向坐侍儀使溥博西向跪受詔而出集幽爽而戒飭之詔已引入殿致參佛之禮聽法於徑山禪師宗泐受毗尼戒於天竺法師慧日復引而出命軌範師呪飯摩伽陀斛法食凡四十有九飯已夜將半上復上殿羣臣從如初樂六奏遍應曲執事者徹豆上再拜群臣同樂七奏妙濟曲上拜送者再群臣復同樂八奏善成曲上至望燎位燎已上還大次解嚴群臣趨出濂聞前事二日凄風戒寒飛雪灑空山川慘淡不辨草木鑾輅一至雲開日明祥光冲融布滿寰宇天顏懌如歷陛而升嚴恭對越不違咫尺俯伏拜跪穆然無聲儼如象馭陟降在廷諸威神衆拱衛圍繞下逮冥靈來歆來饗焄蒿悽愴聳人毛髮此皆精誠動乎天地感乎鬼神初不可以聲音笑貌為也肆惟皇上自臨御以來即詔禮官稽古定制京師有泰厲之祭王國有國厲之祭郡厲邑厲鄉厲類皆有祭其興哀於無祀之鬼可謂備矣然聖慮淵深猶恐未盡幽明之故特徵內典附以先王之禮確然行之而不疑豈非仁之至者乎昔者周文王作靈臺掘地得死人之骨王曰更葬之天下謂文王為賢澤及朽骨而況於人夫瘞骨且爾矧欲挽其靈明於生道者則我皇上好生之仁流衍無際將不間於顯幽誠與天地之德同大非言辭之可贊也猗與盛哉繫以詩曰皇鑒九有憲天惟仁明幽雖殊錫福則均死視如生屈將使伸一歸至和同符大鈞元綱解紐亂是用作黑祲蕩摩白日為薄孰靈非人流血沱若積尸橫縱委溝溢壑霜月凄苦凉颸酸嘶茫然四顧精爽何依寒郊無人似聞夜啼鑄鐵為心寧免涕洟惟我聖皇夙受佛記手執金輪繼天出治軫念幽潛宵不遑寐爰啓靈場豁彼蒙翳皇輿載臨稽首大雄遙瞻猊座如覿睟容香凝霧黑燈類星紅梵唄震雷鯨音號鐘鬼宿渡河夜漏將半飈輪羽幢其集如霰神池潔清鮮衣華粲滌塵垢身還清淨觀乃陟祕殿乃覲慈皇聞法去蓋受戒思防昔也昏酣棘塗宵行今焉昭朗白晝康莊法筵設食厥名為斛化至河沙初因一粟無量香味用實其腹神變無方動皆充足鴻恩既廣氛戾全消乾坤清夷日月光昭器車瑞協玉燭時調大庭擊壤康衢列謠惟佛道弘誓拔群滯惟皇體佛仁德斯被無潛弗灼有生咸遂史臣載文永垂來裔五年除贊善大夫以禮法導皇太子太祖問廷臣臧否言其善者問否者為誰曰善者與臣友故知之否者臣不知也主事茹太素上書觸太祖怒以示廷臣或言此誹謗非法景濂曰彼盡忠於陛下耳惡可罪耶太祖乃釋然嘗欲使參大政景濂辭遂老於侍從然一代禮樂制作多景濂裁定十年以學士承旨致仕歸明年來朝先是景濂在太祖前稱楞伽為達摩氏印心之經太祖讀而善之至是召見與論諸識生住滅義乃詔天下僧並讀楞伽經頃之辭歸居青蘿山闢一室曰靜軒終日閉戶未嘗與有司接嘗三閲大藏暇則習禪觀自言宴坐般若場中有巨鐘朝夕出大聲未曾聞也天台僧無聞謁景濂問曰經中所說父母之恩鴻博勝羡不可思量弟子欲假如來三昧之力升濟神明未知何法而可景濂曰沙門汝善念之夫愛者生死之根輪回之本何以故衆生由情生恩由恩生愛由愛生執由執生戀由戀不捨遂成妄緣輾轉出沒無有休息沙門汝欲報恩莫先入道汝欲入道莫先割愛愛盡情盡性源自澄能如是者名大報恩何以故愛為欲水混混不窮能滋長一切無明枝葉茷骫纏結難可剪除能割愛者乃菩提道愛為利劍鋒刃難觸能斬伐一切智慧善果生意剝落不使萌發能割愛者乃菩提道愛為毒藥衆苦慘刻能斫喪一切衆生身命七竅流血彈指變壞能割愛者乃菩提道愛如猛焰光芒燭天能焚毀一切廬舍器物化為灰燼無復孑遺能割愛者乃菩提道愛如虎狼爪牙銛利能吞噉一切有生等類窺伺搏噬最可怖愕能割愛者乃菩提道愛如魑魅幻化不一能迷惑一切修善之士顛倒錯謬喪其本真能割愛者乃菩提道愛如敗航檣傾楫敝能沉溺一切渡河海者漂流轉徙不到彼岸能割愛者乃菩提道愛如枳棘叢生道旁能鈎罣一切塗行商旅冠服綻裂惱人心意能割愛者乃菩提道愛如傾崖摧境無時能壓碎一切動植諸物有識無識皆為虀粉能割愛者乃菩提道愛如蚖蛇口噴毒火能戕賊一切血肉身軀裂膚墮指受其毒苦能割愛者乃菩提道以是思惟愛之為害不可具言沙門汝善念之汝能割愛即可破妄汝能破妄即是返真直入菩提之路福德所被無量無邊雖聚七寶高如蘇迷盧山持用布施不是過也是為大功德力是為不思議勝力是為十方大覺如來三昧神力報父母恩孰出於此景濂善說法要多此類也十三年以孫慎獲罪連坐安置茂州明年過瞿塘夜逢僧唔語端坐斂手而化年七十二正德中追諡文憲其後雲棲宏公輯景濂文為護法録其所撰沙門塔銘凡三十九篇憨山清公盛稱之以為當代僧史也宋文憲集行狀護法録祠堂記知歸子曰余讀護法録如春風之被物生意鬯然其法會記及答天台僧問尤能以文字緣泛光明海其真文人之雄乎至景濂自敘謂己實永明後身然耶否耶讀其數者當自知之豫無容贅言矣汪大紳云許魯齊以儒學導元世祖興一代文教宋潛溪則以儒釋之學輔明太祖然文教之興潛溪其有明一代之權輿矣二公皆朱子後人也君子之澤豈有艾乎謹書之以廣後之志乎朱子之學者羅臺山云透得過夢幻泡影電露六字關然後能愛不然只是妄想團地獄渣無相居士以仁義輔太祖以割愛啓沙門直是見得清立得定
