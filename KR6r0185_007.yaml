body:
  text: 傅大士傳傅大士者名翕號善慧義烏人也齊建武四年生於雙林鄉傅宣慈家十六納劉氏女曰妙光生二子曰普建普成會有天竺嵩頭陀訪之曰吾與汝毗婆尸佛所發誓今兜率宮衣鉢見在何日當還因命臨水觀影見圓光寶蓋大士笑曰爐韛之所多鈍鐵良醫之門足病人度生為急何思彼樂乎嵩指松山頂曰此可棲也大士躬耕而居之有人盜菽麥瓜果大士即與籃籠盛去日常營作夜歸行道見釋迦金粟定光三如來放光襲其體自謂得首楞嚴定苦行七年欲導群品梁武帝時遣弟子奉書詣闕曰雙林樹下當來解脫善慧大士白國主救世菩薩條上中下善希能受持其上善略以虗懷為本不著為宗無相為因涅槃為果其中善略以治身為本治國為宗天上人間果報安樂其下善略以護養衆生勝殘去殺普令百姓皆稟六齊今聞皇帝崇法欲申論義未遂襟懷故遣弟子傅暀告白太樂令何昌以書進詔遣迎至武帝問從來師事何人答曰從無所從來無所來師事亦爾異日武帝請講金剛經大士才升座以尺揮案一下便下座帝愕然大士曰陛下會不曰不會大士曰大士講經竟一日講經次帝至衆皆起大士端坐不動衆報曰聖駕臨此何不起大士曰法地若動一切不安尋還雙林著心王銘云觀心空王元妙難測無形無相有大神力能滅千災成就萬德體性雖空能施法則觀之無形呼之有聲為大法將心戒傳經水中鹽味色裏膠青決定是有不見其形心王亦爾身內居停面門出入應物隨情自在無礙所作皆成了本識心識心見佛是心是佛是佛是心念念佛心佛心念佛欲得早成戒心自律淨律淨心心即是佛除此心王更無別佛欲求成佛莫染一物心性雖空貪嗔體實入此法門端坐成佛到彼岸已得波羅蜜慕道真士自觀自心知佛在內不向外尋即心即佛即佛即心心明識佛曉了識心離心非佛離佛非心非佛莫測無所堪任執空滯寂於此漂沉諸佛菩薩非此安心明心大士悟此元音身心性妙用無更改是故智者放心自在莫言心王空無體性能使色身作邪作正非有非無隱顯不定心性離空能凡能聖是故相勸好自防慎剎那造作還復漂沈清淨心智如世黃金般若法藏並在身心無為法寶非淺非深諸佛菩薩了此本心有緣遇者非去來今又有偈曰夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止纖毫不相離如身影相似欲識佛去處祇這語聲是又曰有物先天地無形本寂寥能為萬象主不逐四時凋又曰空手把鋤頭步行騎水牛人從橋上過橋流水不流太建元年嵩頭陀先於柯山靈巖寺入滅大士曰嵩公兜率待我不可留也四月二十四日示衆曰此身衆苦所集甚可厭惡須慎三業精修六度若墜地獄卒難得出弟子曰師之發迹可得聞乎曰我從第四天來為度汝等次補釋迦大品云有菩薩從兜率天來諸根猛利疾與般若相應即吾身是也言訖趺坐而終年七十三五燈會元佛祖通載知歸子曰初祖入梁機不契去而之少林人以此為梁武惜然當時如寶志公傅大士並傳佛心印闡大乘法徘徊於梁而梁武執著福罪因緣貪圖小果醉有為佛事沈湎不醒一微戞漢遮蓋本真皎日當空覆盆絶照豈不哀哉菩薩深慈衆生迷倒於大士傳可觀焉汪大紳云自家屋裏人說自家屋裏話讀之通身毛孔皆笑朱子於大士偈蓋嘗有取焉豫安得遊朱子之門日夕饜飫家常話乎五宗興而說法如雷連那即心即佛送他一拳連那萬象主與他一腳傅大士竟成老婆禪去矣門外漢試猜看畢竟是同是別
