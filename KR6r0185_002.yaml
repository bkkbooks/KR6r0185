body:
  text: 劉遺民傳劉遺民者名程之字仲思彭城人漢楚元王之後也少孤事母孝善老莊言不委蛇於時俗初為府參軍晉司徒王謐丞相桓元侍中謝琨太尉劉裕先後引薦皆力辭時慧遠法師止於廬山東林寺修念佛三昧遺民往依之遠師曰官祿巍巍云何不為遺民曰晉室無磐石之固物情有壘卵之危吾何為哉劉裕以其不屈乃以遺民之號旌焉同時宗少文周道祖雷仲倫張萊民張秀實畢士頴咸來廬山遠師曰諸君之來能無意於淨土乎乃造西方三聖像建齊立社衆至百二十有三人遺民鑱石為誓其辭曰夫緣化之理既明則去來之兆顯矣遷感之數既符則善惡之報必矣推交臂之潛淪悟無常之期切審三報之相催知險趣之難拔此其同志諸賢所以夕惕朝勤仰思攸濟者也蓋神者可以感涉而不可以跡求必感之有物則幽路咫尺苟求之無主則渺茫何津今幸以不謀而感僉心西境叩篇開信亮情天發乃機象通於寢夢欣歡百於子來於是雲圖表暉影侔神造功由理諧事非人運茲實天啓其誠冥運來萃者矣然其景績參差功德不一雖晨祈云同夕歸攸隔即我師友之眷良可悲矣是以慨焉胥命整襟法堂等施一心亭懷幽極誓茲同人俱遊絶域其驚出絶倫首登神界則無獨善於雲嶠忘兼全於幽谷然後妙覲天儀啓心貞照識以悟心形由化革藉芙蓉於中流蔭瓊柯以咏言飄雲衣於八極泛香風以窮年臨三塗而緬謝傲天宮而長辭紹衆靈以繼軌指大覺以為期究茲道也豈不弘哉遺民度西林㵎北別立禪坊精研元理兼持禁戒嘗貽書關中與什公肇公揚榷經義著念佛三昧詩居半載即於定中見佛光照地皆作金色更十五年於正念佛時見阿彌陀佛玉毫光照垂手慰接遺民曰安得如來為我摩頂覆我以衣俄而佛為摩頂引袈裟以被之他日又夢入七寶池見蓮華青白色其水湛湛有人頂有圓光胸出卍字指池水曰八功德水汝可飲之遺民飲水甘美及寤異香發於毛孔乃語人曰吾淨土之緣至矣請僧轉妙法蓮華經近數百周遺民對像焚香再拜而祝曰我以釋迦遺教知有阿彌陀佛此香當先供養釋迦如來次供養阿彌陀佛復次供養妙法蓮華經所以得生淨土由此經功德願與一切有情俱生淨土即與衆別臥牀上面西合掌泊然化去預敕子雍即土為墳勿用棺槨時義熙六年年五十九後六年遠師宴坐龕中從定起見阿彌陀佛身滿虗空觀音勢至左右侍遺民及社中僧先化者皆在側前揖遠師曰師早發心何來之晚乃展期七日而逝東林傳出三藏記集知歸子曰佛法入茲土始昌於晉而士大夫之息心淨土者罕聞焉至遺民一唱遠近傾動雖遠師實成之亦由遺民精誠內激冥孚衆志初遺民與周道祖陶淵明稱潯陽三隱道祖既入社遠師以書招淵明淵明曰許我飲酒則諾許之遂造焉無何攢眉而去志尚雖高於道闊矣惜哉汪大紳云此真冷淡生活淡得盡時方好知歸子已入此保社矣大佳大佳
