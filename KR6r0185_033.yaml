body:
  text: 王虗中傳王虗中名日休廬州人也宋高宗朝舉國學進士棄官不就著書名龍舒淨土文自王公土大夫下至屠丐僮奴皂隸優妓之屬咸以淨土法門勸引歸依其文淺説曲喻至詳至懇若父兄之教子弟然同時歷陽張安國為之序曰阿彌陀如來以大願力攝受群品繫念甚簡證果甚速或者疑之豫嘗為之言阿彌陀佛即汝性是極樂國土即汝心是衆生背覺合塵淪於七趣立我與佛天地懸隔佛為是故慈悲方便現諸無量如幻三昧莊嚴其國備諸華好復以辨智而為演説令諸衆生歡喜愛樂於日用中能發一念念彼如來欲生其國即此一念清淨堅固還性所有與佛無異當是念時不起於坐阿彌陀佛極樂國土悉皆現前如是修習乃至純熟幻身壞時此性不壞金蓮華臺由性種生往生其中如歸吾廬諸佛菩薩即我眷屬性無異故自相親愛友人龍舒王虗中端靜簡潔博通群經訓傳六經諸子數十萬言一旦捐之自是精進惟佛是念年且六十布衣蔬茹重趼千里以是教人風雨寒暑弗遑暇恤間居日課千拜夜分乃寢面目奕奕有光望之者信其為有道之士也紹興辛巳秋過家君於宣城留兩月始見其淨土文凡修習法門與感驗章著具有顛末故喜為之序云安國名孝祥官中書舍人嘗問法於大慧云虗中每晨起禮佛祝願言弟子日休謹為盡虗空界一切衆生然香敬禮盡虗空界一切諸佛一切正法一切諸大菩薩緣覺聲聞聖衆乞成就一切善願濟度無量無邊衆生臨命終時一剎那間見阿彌陀佛證無生忍了六神通不出此間一歲即來此間教化衆生漸漸變此南閻浮提盡娑婆世界以至十方無量世界皆為清淨極樂世界又祝云弟子日休為此南閻浮提無巨無細一切衆生敬禮諸天天帝日月后土一切靈祇為此等衆生感謝覆載照臨生養衛護之恩謹為此等衆生念南無釋迦牟尼佛一百八遍以種無上善根念南無阿彌陀佛一百八遍以結無上善緣願此等衆生常沐洪恩歡喜相向不相爭相殺不相食相陵進修佛法脫離苦海即變此南閻浮提為極樂世界又祝云弟子日休謹為盡虗空界一切衆生敬禮西方極樂世界阿彌陀佛觀世音菩薩大勢至菩薩聲聞諸上善人仰惟大慈大悲憫念衆生沉淪苦海無有出期特展威神遞相勸勉分身於此震旦國中教化衆生使不相爭相殺不相食相陵易世澆漓共躋仁壽及於此南閻浮提盡此娑婆世界及十方濁惡世界身為國王大臣百僚庶尹教化衆生同修佛道脫離苦海即變吾國以至十方濁惡世界皆為清淨極樂世界又祝云弟子日休身在世網宿業深重願為平昔所殺衆生所食衆生及南閻浮提所殺所食一切衆生日誦西方極樂世界三十六萬億一十一萬九千五百同名同號阿彌陀佛一百二十遍仰惟如來大慈大悲以日休所誦如來名號一聲一如來度一衆生盡其所誦之數度一切衆生同生極樂世界其詳載淨土文中虗中嘗以無量壽經稱讚西方義蘊深廣而自漢迄宋譯文晦塞罕中倫節致我佛説經之旨不白乃禱於觀世音會四本而譯之三年乃成釐為五十六分文辭爾雅條理燦然遂得大行於世乾道中廬陵李彥弼有疾垂死夢一人自稱龍舒居士謂曰汝起飲白粥疾當瘳且汝尚憶闕仲雅教汝修行捷徑否彥弼曰每日念佛不輟既覺索粥飲之立愈彥弼初未識虗中既而見其畫像與夢合使諸子往受學焉虗中將卒前三日遍別道友勗以精修淨業云將有行不復相見及期與生徒講書畢禮誦如常時至三更忽厲聲稱阿彌陀佛數聲唱言佛來迎我屹然立化彥弼聞而感之為刻虗中像并述其事傳遠近自是廬陵人多供事之咸祐中呂元益重刻淨土文至祝願篇版中得舍利三顆其叔父師説載其事於篇首云樂邦文類龍舒淨土文知歸子曰豫讀虗中所著書觀其願力之宏修持之密未嘗不惻然內愧憤發也益國公周必大贊其像曰皇皇然而無求惕惕然而無憂閔淳風之將墜攬衆善以同流導之以仁義之源誘之以寂滅之樂世知其有作而莫識其無為故中道奄然而示人以真覺其真知虗中者乎汪大紳云學道者如牛毛得道者如麟角究其病根只是立我與佛耳立我與佛我是根佛是塵根塵熾然何劫了當耶禪門一棒打殺根塵提脫之捷徑也淨土轉我作佛根即是性塵即是心變易根塵之祕門也
