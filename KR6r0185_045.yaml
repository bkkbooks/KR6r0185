body:
  text: 袁了凡傳袁了凡名黃江南吳江人故字學海幼孤業醫有術者孔生善皇極數推了凡命勸令習儒書曰明年當補諸生後以貢生為知縣終五十二歲然無子了凡之先贅嘉善殳氏遂補嘉善縣學生既而貢太學其考校名次廩米斗石之數悉符孔生懸記語頃之訪雲谷禪師於棲霞與雲谷坐對一室三晝夜不瞑雲谷異之曰子晝夜中不起妄想入道不難也了凡曰吾生平有孔生者懸記之既驗矣榮辱生死其有定數審矣知妄想之無益也息之久矣雲谷曰吾以豪傑之士待子不知子之為凡夫也人之生固前有定數焉然大善大惡之人則皆非前數之所得定也子二十年坐孔生算中不得一毫轉動凡夫哉曰然則定數可變乎雲谷曰命自我造福自己求一切福田不離自性反躬內省感無不通何為其不可變也孔生懸記汝者何試說之了凡以告雲谷曰汝自揣應得科第否應生子否了凡自忖良久曰不應也好逸惡勞恃才矜名多言善怒喜潔嗜飲之數者俱非載福之基也雲谷曰人苦不知非子知非子即痛刷之從前種種譬如昨日死從後種種譬如今日生此義理再生之身也何前數之不可變也了凡韙其言肅容再拜曰謹受教因為疏發己過於佛前誓立功行三千以自贖雲谷於是授以功過格教以準提呪謂曰事天立命須於何思何慮時實信天人合一之理於此起善行是真善行於此言感通是真感通孟子論立命曰夭壽不二修身以俟之曰夭壽則一切順逆該之矣曰修則一切過惡不容姑忍矣曰俟則一切覬覦一切將迎皆當剃絶矣到此地位纖毫不動求即無求不離有欲之中直造先天之境汝今未能但持準提呪無令間斷持至純熟持而不持不持而持日用應緣念頭不動則靈驗矣是日更字了凡自後終日兢兢暗室獨處戰惕倍至遇人憎毀恬然容受不校也其明年為隆慶四年舉於鄉自言行履未純檢身多悔積十餘年而前所誓三千行始滿復誓再行三千行無何生子儼又三年後所誓滿復誓行一萬行後四年為萬歷十四年成進士授寶坻知縣了凡自為諸生好學問通古今之務象緯律算兵政河渠之說靡不曉練其在官孜孜求利民治績甚著而終以善行遲久未完自疚責一夕夢神告曰減糧一事萬行完矣初寶坻田賦每畝二分三釐七毫了凡為區畫利病請於上官得減至一分四釐六毫神人所言指此也縣數被潦乃𤀹三坌河築堤以禦之又令民沿海岸植柳海水挾沙上遇柳而淤久之成堤治溝塍課耕種曠土日闢省諸徭役以便民後七年擢兵部職方司主事會朝鮮被倭難來乞師經略宋應昌奏了凡軍前贊畫兼督朝鮮兵提督李如松以封貢紿倭倭信之不設備如松遂襲破倭於平壤了凡面折如松不應行詭道虧損國體而如松麾下又殺平民為首功了凡爭之強如松怒獨引兵而東倭襲了凡了凡擊却之而如松軍果敗思脫罪更以十罪劾了凡而了凡旋以拾遺被議削籍歸居常誦持經呪習禪觀日有課程公私遽冗未嘗暫輟初與僧幻豫密藏議刻小本藏經閲數年事頗集遂於佛前發願云黃自無始以來迷失真性枉受輪回今幸生人道誠心懺悔破戒障道重罪勤修種種善道覩諸衆生現溺苦海不願生天獨受樂趣覩諸衆生昏迷顛倒不願證聲聞緣覺自超三界但願諸佛憐我賢聖助我即賜神丹或逢仙草證五通仙果住五濁惡世救度衆生力持大法永不息滅又願得六神通智慧頓開辨才無量一切法門靡不精進世間衆藝高擅古今使外道闡提垂首折伏作如來之金湯護正法於無盡發願已書之冊為唱導焉家不富而好施歲捐米數百石飯僧居其大半餘施窮乏者曰傳佛法者僧也吾故急焉妻賢助之施亦自記功行不能書以鵝翎莖漬硃逐日標歷本或見了凡積功少即顰蹙嘗為子製絮衣了凡曰何不用棉曰欲得餘錢以衣凍者耳了凡喜曰若能是不患此子無祿矣家居十餘年卒年七十四喜宗朝追敘征倭功贈尚寶司少卿著誡子文行於世其積善篇曰易曰積善之家必有餘慶然其真假端曲是非半滿大小難易當深辨也何謂真假人之行善利人者公公則為真利己者私私則為假根心者真襲跡者假無為而為者真有為而為者假何謂端曲今人見謹原之士類以為善其次則取邊幅自守者至言大而行不掩者棄之矣然聖人思狂者與狷者而以原人為德賊是流俗之取捨與聖人反也天地鬼神之福善禍淫與聖人同是非不與世俗同取舍有志積善者慎無狥流俗之耳目也但於己心隱微默默自洗滌默默自檢點如其純為濟世之心則為端有一毫媚世之心即為曲純為愛人之心則為端有一毫憤世之心即為曲何謂是非魯國之法有贖人於諸侯者受金於府子貢贖人而不受金孔子聞之曰自今以往無贖人於諸侯者矣子路拯人於溺其人謝以牛子路受之孔子喜曰自今魯國多拯人於溺者矣故知人之為善不論見行而論流極現行善其流足害人非善也現行似未盡善而其流足以濟人非不善也何謂半滿易言善不積不足以成名是如貯物於器焉勤而貯之日積而滿懈而不貯則不滿也此一說也昔有女子入寺施錢二文主僧親為懺悔及後入宮回施千金主僧令其徒回向而已女子問其故僧曰前者施心甚䖍非老僧親懺不足報德今則有間矣此千金為半二文為滿也鍾離授丹於呂仙點鐵成金可以濟世呂問曰終變否曰五百年後當復本質呂曰如此則誤五百年後人吾不為也曰修仙要積三千功行汝此一言三千功行滿矣又一說也又為善而心不著善則隨所成就皆得圓滿心著於善終身勤厲止於半善譬如以財施人內不見己外不見人中不見所施之物是謂三輪體空是謂一心清淨則斗粟可以種無涯之福一文可以消千劫之災苟此心未忘雖施萬鎰福不滿也又一說也何謂大小昔衛仲達為館職被攝至冥司吏呈善惡二録惡録盈庭善録如筯而已以稱平之則善録重而衡仰惡録輕而衡低仲達問何書重如是吏曰朝廷嘗大興工役造三山橋君上疏諫止之此疏藁也仲達曰某雖言之未見從於事何補吏曰雖未見從君一念之仁已被萬民善力大矣故知善在天下國家雖少而大若在一身雖多亦小何謂難易先儒謂克己須從難克處克夫子告樊遲為仁曰先難若難舍處能舍難忍處能忍斯可貴矣善量無窮義類亦衆有志力行推而廣之其改過篇曰夫造福遠災未論行善先宜改過然改過有機其機在心第一要發耻心孟子曰耻之於人大矣以能用耻則聖賢不能用耻則禽獸幾希之間其危甚矣第二要發畏心日月在上鬼神難欺雖在隱微實昭鑒之一念悔悟真誠足滌百年宿穢譬如幽谷一燈才照積暗俱除故過不論久近貴於能改但人命無常一息不屬欲改無由可為哀痛第三要發勇心人不改過多是因循退縮若有刻不能安之心如毒蛇螫指疾速斬除不肯姑待此風雷之益也然人之過有從事上改者有從理上改者有從心上改者工夫不同效驗亦異如前日殺生今戒不殺前日怒詈今戒不怒就事而改強制於外其難百倍且病根終在東滅西生非究竟廓然之道也善改過者未禁其事先明其理如過在殺生即思曰上帝好生物皆戀命殺彼養己於心不安且其在彼既受屠割復入鼎鑊種種痛苦徹骨入髓而其在己珍饌羅列食過即空疏食菜羮儘可充腹何為戕物虧仁造虗妄業如前日好怒必思曰人有不及情所宜矜悖理相干於我何與無可怒者又思天下無自是之豪傑無尤人之聖賢行有不得悉以自反謗毀之來歡然受賜且聞謗不怒雖讒焰灼天如火焚空終將自息聞謗而怒雖巧言力辨如蠶作繭自取纏綿不惟無益兼有大損其餘種種過惡皆當據理思之此理日明過將自止何謂從心而改過有千端惟心所造吾心不動過安從生學者於好色好名好貨好怒種種過端不必逐類尋求但當一心為善時時正念現前邪念即起污染不上如太陽當空魍魎自遁如紅爐炙炭雪點自消此精一之正傳乃執中之大道如斬毒樹直斷其根枝枝而求葉葉而摘祇益自勞終成迷復大抵最上治心當下清淨才動即覺覺之即無苟未能然則明理以遣之又未能然隨事以禁之發願痛改明須良朋提撕幽須鬼神證明一心懺悔晝夜不懈經一七二七以至一月二月三月必有效驗或覺心神恬曠或覺智慧頓開或處冗沓而觸念皆通或遇冤讐而回嗔作喜或夢吐黑物或夢往聖先賢提擕接引或夢飛步太虗或夢幡幢寶蓋種種勝事皆過消罪滅之象也然不得執此自高畫而不進義理無窮功行無窮昔蘧伯玉行年五十而知四十九年之非吾輩身為凡流過惡蝟集而回思往事常若不見有過者心粗而眼翳也是宜日日知非日日改過一日不知非即一日安於自是一日無過可改即一日無步可進天下聰明才俊不少所以德不加修業不加廣總由冒昧因循空過一生不可不深思而自勉也儼後亦成進士終高要知縣吳江志馮開之集丹桂籍密藏禪師遺稿附録知歸子曰了凡既歿百有餘年而功過格盛傳於世世之欲善者慮無不知效法了凡然求如了凡之真誠懇至由淺既深未數數也或疑了凡喜以禍福因果導人為不知德本豫竊非之蓮華經曰先以欲鈎牽後令入佛智孟子於齊梁諸君往往即好色好貨好樂好臺池鳥獸田獵遊觀納之歸大道謂非袁氏之旨耶賢智立言因時而制權各有至苦之心又各有其生平得力之故未必盡同考了凡行事其始蓋亦因欣羡而生趨向者乃其後遂若饑食渴飲之不可缺焉何其誠也後又得讀其誡子文敬其志刪其要而論之樂善君子當有取焉汪大紳云帶業修行中一箇有力量人為袁氏之學者須識得佛氏十善五戒六度萬行與道家太上感應皆是聖人作易開物成務之旨方不至墮落不然饒你做到轉輪王一朝墮落終為牛領中蝨蟲耳
