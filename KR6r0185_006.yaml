body:
  text: 竟陵文宣王傳竟陵文宣王蕭子良者字雲英齊武帝第二子也宋順帝升明三年為會稽太守督五郡封聞喜公自孝武時徵求急速以郡縣遲緩始遣臺使自此公役勞擾齊既受禪文宣盡陳其弊請罷之建元二年以母憂去官仍為丹陽尹開私倉賑屬縣貧人請修復古塘並墾荒田數千頃高帝納之會遷官事寢武帝即位封竟陵郡王永明二年為護軍將軍兼司徒四年進號車騎將軍時水旱不時請原除逋租又請寬刑息役輕賦省徭及罷征交州兵五年正位司徒移居雞籠山西邸招致名僧講論佛法造經唄新聲武帝初好射雉文宣諫止之及永明末將復射雉文宣復上書曰忽聞外議當更射雉臣下情震越心懷憂悚夫衛生保命人獸不殊重軀愛體彼我無異故禮云聞其聲不食其肉見其生不忍其死豈可以萬乘之尊降同匹夫之樂天殺無辜傷仁害福菩薩不殺壽命得長施物安樂自無恐怖不惱衆生身無患苦臣見此果報所以日夜劬勤厲身奉法陛下常日捨財修福臣私心顒顒尚恨其少豈可今日復見此事一損福業追悔便難願陛下照臣此誠曲加三思帝雖不盡納而深見寵嘉居常與文惠太子同好釋氏甚相友悌文宣敬信尤篤數於邸園營齊戒大集朝臣僧衆賦食行水或躬親其事一夕夢東方普光世界天王如來說淨住淨行法門因著淨住子淨住者梵語布薩謂淨身口意如戒而住也書凡三十一篇其歸信門云如來愍念衆生愛同一子所以垂形丈六表現靈儀顯發衆生欣樂瞻覩聞聲者證道見形者解脫今者雖稟精靈昏惑障重進不覩相好莊嚴退不聞八音辨說將由罪業深重煩惱牢固深憂惡道無由可絶豈容順默使流晏安自不堅強其志忘身捨命捍勞忍苦銜悲惻愴者將恐煩惱熾火無由而滅無明重暗開了未期譬如牢獄重囚具嬰衆苦抱長枷梏大械帶金鉗負鐵鎖膿瘡穢爛臭惡纏匝而欲以此牀求見國主貴臣雖復一心無怠何由而果何以故以其具諸罪惡不離苦具故若去枷脫鎖洗垢嚴服王不我礙自然而現今欲歸信亦復如斯將見如來相好光明者先當淨身口意洗除心垢六塵愛染永滅不起十惡重障淨盡無餘業纍既除表裏俱淨方可運明想於迦維標清心於寶剎去諸塵勞入歸信門必然仰覩法身無礙敬禮諸佛求哀懺悔既悔已後常行柔軟調和心堪受心不放逸心寂滅心真正心不雜心無貪吝心勝心大心慈悲安樂心善歡喜心度一切心守護衆生心無我所心如來心發如是等廣勝妙心專求多聞修離欲定奉戒清淨念報恩德常懷悅豫不捨衆生其尅責身心門云身為苦本自所造集於生死中復增惡業是故特須深自尅責經云見人之過口不得言己身有惡則應發露書云君子揚人之美不伐其善內外之教其本均同所以稱內外者本非形分但由心異若出家之人觀空無常厭離生死行出世法是則為內乖此為外在家之人歸崇三寶持戒修善奉行禮義是則為內乖此為外若欲修行先自剋責當知求進是假名退檢是實法愚暗滅則慧光發四相遷則戒德顯故知廉退者進之兆也貪進者退之萌也夫求而獲者虗情有所著則取傾危失墜之苦此外道之法也退而獲者實意無所戀故得常安涅槃之樂斯佛道之法也當知剋責心口是八正之路撿察身行是解脫之蹤其慚愧門云經云慚愧得具足能滅暗障故又云慚愧如鐵鈎能制人非法若無慚愧與諸禽獸無相異也慚愧之義以不及為本今既理妙難精觸向乖背一念之間造過無量過無量故慚愧亦應無量其中枝派不可縷述姑舉一端養生之急在於衣食由此衣食勞亂極深所須繒纊皮革無不損生殘命著他皮肉還養皮肉乃至食噉一粒之食非用功夫無由入口推度前功商量我腹上入下出常流不止而於其中選擇精肥進納軟滑貪嗜美味無羞無恥須臾欒改臭不可近何有智者於食生貪若生貪者大須慚愧與彼畜獸復何助別其大忍惡對門云夫道從苦生不由樂果德憑功建非情所集故經云忍辱第一道於諸衆生心無礙故以其在苦則多礙多惱起不善業今所以得無礙者良以在礙而修無礙故礙而不為礙既於礙而無所礙豈非忍力之所致乎經云娑婆世界五濁之剎五痛五燒具諸惡報是故發大乘者多來此土以救苦為資糧以拔惱為要行此土一日修善勝於他方淨國百千萬劫夫欲發廣大心行菩薩行自必履危涉險備受艱難蹈熾火歷氷霜攖苦切甘楚毒於萬苦中能忍受者則道場可踐若無此惱忍何從生籍此煩惱起我諸善所謂塵勞之儔為如來種當知忍者有力大人功德之本所謂忍痛癢忍思想忍疾病忍飢苦忍疲勞忍寒暑忍憂悲忍熱惱忍惡罵無恥辱忍撾打無恚礙忍貪欲無愛著忍憍慢無背道忍所難忍忍所難行忍所難作忍所難辦能行此者真可謂大忍辱矣其勸請增進門云勸請者殷勤之至意也由發殷勤之意則願善之情深矣勸請有二勸請衆生修行戒善具諸德本勸請諸佛救護衆生說法久住十方四惡趣我今悉勸請修持諸戒行獲得於人身十方一切人我今悉勸請令修十善業得生於天上十方諸天人我今悉勸請立登正定聚得離於惡道十方諸學人我今悉勸請覺察諸煩惱速登無學地十方阿羅漢我今悉勸請知非究竟位唯有一佛乘十方辟支佛我今悉勸請成就大悲智教化諸衆生人天二乘衆我今悉勸請體覺如來藏修習菩薩行一切諸菩薩我今悉勸請修行十度行速登於十地兜率天菩薩我今悉勸請常轉不退輪速下度羣生菩薩智未明我今悉勸請金剛滅塵纍顯發真實相十方一切佛初成正覺者我請轉法輪安樂諸衆生十方一切佛若欲捨壽命我今歸命請願久住於世如是佛菩薩我今皆勸請發此殷勤心是故稽首禮其隨喜萬善門云衆生以愚惑故多懷嫉妬增上之心是以見人行善則生惡想摧毀破壞不令成就然彼前人未必損行而嫉妬者妄增惱熱增長惑業生死不絶是以聖人調心制意行此隨喜亦復勸請衆生如說奉行十方一切衆所有微細善仁義及禮智孝養謙恭等慈和及愛敬廉貞清潔行若有如是善我今悉隨喜離欲在家人奉修如來戒三歸五八戒十善菩薩戒清淨諸律儀離惡名聞者如是諸功德我今悉隨喜飯僧施法衣浴除煩惱垢救攝諸貧窮飢寒露窘者疾病艱危苦施藥悲憐業如是等功德我今悉隨喜曠路作好井橋船度人物園林池花果施佛并供僧渴乏除熱惱其福實無量如是等功德我今悉隨喜造經流法教然燈發慧明習誦及轉讀決了諸義趣若復為人說倍增歡喜心如是諸功德我今悉隨喜建立諸塔廟堂殿及寶剎彩畫及木像金銀銅石等傳寫諸相好顯示於法身如是諸功德我今悉隨喜若有造僧房牀帳及臥具令彼息心者安意於禪林出入苦空門次第寂滅觀如是諸功德我今悉隨喜如來大慈悲善說諸法門發生隨喜行令我等修學隨喜諸聲聞忍苦度生死隨喜諸菩薩不捨惡道受隨喜十方佛無畏天人尊能於三界獄引出諸衆生願令衆生類悉得於佛道是故我隨喜稽首禮諸佛其回向佛道門云回向者以不著為義原一切衆生備修萬行捨身命財所以不得解脫生死者皆緣耽著果報不能捨離若能不執其心修行攝度隨有微福回施群生向於佛道者則於果報不復生著便於生死蕭然解脫故經云如所說修行回向為大利是以一切所作善業皆應回向兼勸衆生不著果報十方諸衆生所行微善業仁孝及謙敬慈愛柔和等忠正修禮智矜逮賑孤窮如是世俗善悉回向佛道一切諸外道種種勤苦行五熱炙其身投巖赴水火反縛塗炭等無量諸邪見今皆為回向同歸正覺道一切清信士歸戒行十善乃至諸女人亦能修福德又能善說法開化衆妙福回向施群生共成無上道一切弟子衆聞聲即解悟善來成比丘乃至四道果方便及初觀空苦非常想亦回施群生共向無上道十方諸辟支自然成緣覺深悟在別世曉了因緣法隱顯化衆生獨處樂善寂如是兼一切盡回向佛道十方諸菩薩讀誦於經法入禪出禪者勸總行衆善如是等三善一切衆德本亦回施衆生歸向無上道一切諸善等乃至賢聖果解空未能窮有無不雙盡悉令與一切同入真妙境著回有相心皆向解脫道如是諸菩薩我今勸𢌞向發此無著心是故稽首禮其他文多不具載書成開筵廣第集士庶為設講往復懇到皆灑然動容歎未曾有九年都下大水吳興偏劇文宣開倉賑救貧病於第北立廨收養給衣及藥十年領尚書令揚州刺史本官如故尋復尚書令加中書監武帝不豫詔使文宣輔政文宣素不樂世務乃推西昌候鸞詔以鸞佐之隆昌元年進督南徐州其年疾篤謂左右曰門外應有異遣人視之見淮中魚無算浮水上向城門尋薨年三十五齊書廣宏明集知歸子曰余嘗考田獵不見於古帝王之世虞書曰疇若豫上下草木鳥獸商書曰暨鳥獸魚鱉咸若其及物之仁如此驅而殺之豈其心乎余觀齊梁間君臣論議往往能慈心愛物矣充是心也勝殘去殺之風不難覯也文宣所著淨住子行願深淨悲智兩足其游於佛海久如不可以世智詳矣於是采著其言尤切要者而以諫獵一書首之汪大紳曰敘論具大悲心眼齊梁間學佛人如蕭子良者誠為希有其尅責身心一門尤為法要也允初近與吾書自述往日超佛越祖大願力原來只是放失其心而不知求近來始信得千聖萬賢總法門出不得求放心一語此是衆生往來三界疲極自息證驗也然吾不敢輒為之助喜以允初有求心甚深甚重以有求心求放心將心覓心求而又求又要弄出無數伎倆揑出無數鬼怪放心不益甚乎來書儒佛雙關一念捨不得佛一念又捨不得儒儒佛交爭朱子嘗判為隱微深痼之疾此放心之病之大者允初其能覺之乎允初性燥每喜捻著一面令牌道急急如律令者安知不奉孟子為太上老君硬捉一物把持定了為護身符乎此瞞心之大者非但放先其心而已如上種種諸病吾皆為允初打算過耒吾安敢為之助喜吾於是如法思惟不輕不重為允初打算出一退字來又恐允初承虗接響過了適檢子良傳說那段因緣極是法要直判出外道佛道界限極是分明吾遂決意將那退字助喜留此一段因緣在傳後發揮去者第一要講明求放心法要入手處朱子道得好不是將心覓心只是一念悚然心便在這裏了徹始徹終處程子道得好聖賢千言萬語只是要人將已放之心收入腔子裏自能尋向上去此兩則公案若能透得以上所說病痛頓爾消殺去矣允初允初你說那求放心一句子為學佛關鍵也說得有來歷你看釋迦老子至達摩以下諸位先生與諸魔及一切外道做盡冤家對頭你道是甚意思只為諸魔外道放失其心流轉三界輪回六道萬劫長夜所以諸位先生苦苦哀哀勸他學問佛說恆河沙數祖說一字不立只是要覺他本心而已諸魔外道本心頓覺便是佛便是祖本是一家眷屬你何苦放他去做出事來為魔為外道自取長夜之不妙乎允初所說豈不有來歷然必如子良判出佛道外道界限方得分明魔道外道俱是絶頂聰明人聰明反被聰明誤貪進不已放失其心咄魔了也咄外道了也釋迦老子也曾放失其心貪進不已直走到非非想天咄外道了也一念悚然忽然退位本心方得發現所以子良說那求進是假名退撿是實法真是法要也你看釋迦老子不獨與諸魔外道做盡冤家對頭且向一身中與五蘊六根六塵及一切山河大地做盡冤家對頭是甚意思只為五蘊是放心的大浪子走了走了走向六根去也走了走了走向六塵去也走了走了走向一切山河大地去也走了走了走向輪回三界流轉六道去也吾佛悲之所以苦苦哀哀勸他學問喚轉他耳多嘴老漢說到此允初舊病復發肚裏打葬道原來釋迦老子與一切人天作眼目果然大慈父大恩師大紳佛學果然透徹吾今要奉勸大紳與渠破除世覺專心尊奉釋迦求佛覺去也咄允初又放失其心矣不見惠能道得好佛法在世間不離世間覺離世覓菩提恰如求兔角正見名出世邪見名世間邪正盡打却菩提性宛然咄
