body:
  text: 曾端甫趙凡夫劉玉受傳曾端甫名大奇江西泰和人也篤信佛法為文博辨瑰偉著書曰通翼出入內外經傳推闡罪福因緣苦空無常之旨解愚俗之惑其護生篇義尤深切其辭曰客問經言人食羊羊食人生生世世互來相噉以是因緣歷千百劫長在生死推之他物亦莫不然如是則人之涉世觸手成罪亦可懼矣將誠然乎通曰夫聖言如實經旨不虗輪回之説報應之談據事似誕尋理必然夫人之力莫大於心心力所牽形勿能抗故心悲則貌皺心喜則貌舒暫情猶且役貌全力固宜君形孟子曰人之異於禽獸者幾希庶民去之君子存之幾希既去同體禽獸與禽獸同體則形逐神遷力猛則遷於生前力緩則遷於死後淹速少異究竟理齊若畫師之為馬靳尚之為蠎死後之變也封邵之為虎明珍之為蛇生前之變也明珍化理與畫師同一以藝故紆神情於騄耳一以論故寄觀想於率然神往則形隨想成則我易蛇馬嬗矣然或速化而或徐受則猛緩異也封邵化理與靳尚同一以暴故情同于於菟一以忮故理均於毒蟒情同則形符理均則事等蟒虎肖矣然或速化而或徐受亦猛緩異也資此而言則輪回之説事在不疑輪回無疑則我之為我亦將不免何則善境難攀惡途易涉即今貪心瞋心毒心勝心憎人心忌人心愛戀心驕慢心妄想心貢高心名心利心殺心淫心觸事現行流注不斷誰非蛇蟒之相並是馬虎之因然則四肢九竅暫時人體愛子艷妻剎那眷屬一息不還人物誰辨如此而猶恬心伊公之鼎快意朱亥之門殫四海於賓筵耗萬錢於食品傲秦宮之連騎美晉國之如坻吾恐傷心之慘行將自及周顒所云不亦悲乎夫人與物無異而人之所以不殺人者其途有三一曰不敢二曰不忍三曰積習橫目之民遊俠之家莫不欲推鋒異己剚刃仇胸然而斂手莫施懷惡不展者徒以竹書可畏刑鼎是虞此之謂不敢司命之君專殺之長勢堪逞暴力可快心然而一夫之獄遲回不上一人之死慘戚不寧徒以員顱方趾同體觸懷寡妻孤兒跉𨂲可念此之謂不忍既以不敢而又不忍則殺人之事世間全稀渭水之血或終身而未覩河南之屠或卒歲而不聞家習為俗世釀為風雖或藥嵩之徒橫觸躁君吉頊之黨誤抵鷙后而猶執杖莫下持七不前意怯於臨殺手柔於瀕死此之謂積習三事交持而蒼蒼之民得寄命於其中矣若夫物則不然屠儈之業不施禁於皋蘇之年鮮食之民不抵償於堯舜之日殺心熾於異體愛念伏於分形聲緣業而殊倮故似慘似舒而聞之者不憐肉償負而非參故不臊不腥而食之者甚旨彼命乍酬則因已往而難見我仇方結則果未來而誰知因果雙泯砧刃交施而又見殺聞殺不絶於耳目自殺教殺無間於歲時漉蟲護草之慈僧既寡二高柴幸靈之善俗亦無雙而近儒節用時取之説吾道中正之語又薰蒸於其耳浸灌於其心於是千生入筯曾無動容百品充庖略不關念萬方逞暴四蟲亡訴強者則搏人以爭一旦之命弱者則吞聲以填萬民之腹不依人而食者則匿於山林寧受大獸之噬猶十二之可逃必依人而食者則豢於牢策以待不時之需無萬一之能免嗚呼唐人有云生也何恩殺之何咎奈何令至此極乎然如前所稱別幽冥報對何異王法為日差緩酷踰萬倍豈以口故而甘斯苦縱謂不然猶當寶慈止殺抑嗜全仁觀同形於異形之中想共體於殊體之外觀念既久慈力自成正不作子肉之想亦何有人物之分若夫習心所使尤須推破夫薄惡之俗生女不舉羌胡之民男亦如之積習使然無分骨肉然則以不殺習心雖物可不殺何況於子以心習殺雖子可殺何有於物此之習心締業之本將欲去殺先須照習照心一起積習自蠲至於近儒之謬則隱心而求良亦易知夫孟子言仁民而愛物謂其愛有媛急耳若用之殺之而猶為愛則與佛經所言羅剎女事何異羅剎女食人曰我念汝食汝夫食人而曰念人與食物而曰愛物者同乎不同乎中正之義緣督為經逐事而求失之已遠而況少殺為中徵何典文有識聞之祇足莞爾子路鼓瑟殺心在絃孔子斥之門人輟敬開闢以來寧有殺心未盡之聖而邪説橫興錮我華夏大雄嘗言末法之中魔道熾盛以魔力故令人不覺今之邪説亦自易曉而地橫萬里時歷千年聰明智達雷同莫悟吾佛之言信不我欺昔陶隱君修習求仙多歷年所而鸞鶴杳然心甚疑之他日其都養先上升者來告曰上帝以子注本草用水蛭為藥殺命良多故他行雖滿以是為謫隱君乃悟改用他藥方近儒箋書不幸無天人之告遂使世安其説萬物并命號天不聞入地無隙世鮮孟孫之傅誰動孤獸之悲旁無介氏之君孰解三犧之恨母視子死子視母亡或鞭皮而即下或灑乳而方終或臨危而護孕或冒死以隨兒見之慘目言則傷心又公子打圍之後將軍射獵之餘萬肉登俎百族失羣孤雌夜囀如抱黃鵠之哀獨雉朝鳴似寫商陵之恨啁啁唽唽踽踽煢煢固知七情非獨人鍾蠢蠢之物亦爾五常寧惟我有林林之生皆然念至於此則萬劫習心一念可灰習心既灰忍敢俱消三途並宏物如人矣而又大乘為心急人猶己一人告百百人告千轉轉相告至於無算大慈之説曉然於世而後排虗無墜實不僵雖復咸若世遠攀巢俗邈而物之免者良亦多矣嗚呼彼既有必酬之果此又有必造之因吾言雖苦或可回慮夫近儒之説毋論異於孔孟即孔孟實然而吾佛如此孔孟如彼一涇一渭較然自分堯武並世人必歸堯孔佛並生得不歸佛此其所以王於三界奄有大千為衆父父為衆母母者也昔墨子兼愛或人病之墨子曰今有兼士於此兼士視人之父母若己之父母視人之妻子若己之妻子別士則反是請問子謂遠行當托妻子將托之於兼者乎抑托之於別者乎其人曰吾托之於兼也墨子笑曰子方托妻子於兼言而非兼何也今之謂殺為中正謂不殺為過當者亦幸然為人耳使其戴角而居衣毛而處縣命於郇廚之下遊魂於羿彀之中羲𮊁前施孔弋後逐成湯雖仁猶然結網子輿誠愛曾不聞聲於斯時也大覺垂憫倐然而現則夫夫也必將悲喜交懷旁皇歸命若抱怖之鴿蔭影而息機瀕死之羊銜刀而祈客又何暇持前人之餘論較孔佛之勝劣哉通翼趙凡夫名宦光太倉人也家富於財少豪華自喜中歲折節讀書居寒山廬親墓旁疏泉鑿石結構幽邃居常奉佛斷肉食客至亦設蔬果雖豪貴人必強食之曰不可不令渠知此味也已而有疾或言當食肉不爾疾且劇答曰若疾小加豈須破戒設為轉劇便近歸途一朝破戒帶業長往悔可追乎已而疾亦瘳客有被蚿螫者殺之曰吾以直報怨也凡夫曰非也不殺則直耳蚿之無知實無可怨忿而殺之得為直乎嘗與客行遇二人驅六豕赴屠凡夫為誦阿彌陀佛一客稱善凡夫曰吾誦佛號度六豕義少度二人義多何以故豕今就屠受一刀苦償一債畢償債畢已步步樂國彼屠豕人驅豕一步刳豕一刀心心步步造地獄業趣入苦境而彼恬然不知警懼可無哀乎又嘗勸一老人斷肉老人曰余年衰不能不資肉食凡夫曰老猶愛命未老之肉先受刀砧於心安乎未死防死慘死之肉恣意吞嚼於心安乎著書號護生品廣勸世人令斷肉其言甚痛天啓中卒於寒山妻陸氏名卿子與凡夫偕隱能詩文蘇州府志護生品劉玉受名錫玄長洲人也為諸生與姚孟長為友歸心大法同持佛母準提呪將赴省試建壇持呪七日及入場有蜂集其筆端而思如泉湧遂得雋萬歷三十五年成進士官廬陵教授應雲南聘分司鄉試過下嶲驛宿焉夢一偉丈夫黑而長揖而就坐曰余宋將軍曹翰也昔以王師破江州憤其固守不下屠之遂受報為豬計口以償所殺輾轉至今痛毒無盡往日荷公憐愛幸獲再生昨又償一近縣人債不意今者遇公於此言已泣下玉受家居時有奴徵租於鄉獲豬歸夜夢人乞命畜之至死即其事也已復言曰豫在唐太宗朝為小吏聽一法師説四十二章經親為設供遂得世世為官及翰身而報盡乃陷此大惡尚何言哉自今乞公凡遇我等或當執縛或當屠割為持凖提呪與西方佛名俾豫得暫忍其苦倘承善力脫此苦報再生人中誓不更造惡業以負公也玉受曰此豫夙心也其人拜謝而去先是玉受嘗舉放生會其後所至必活一豬及監蕪湖關豢二豬於官會其女將歸夢隨親作佛事佛案下有兩人蹲踞問何人曰衙中二豕也賴往因中曾聽大乘經得蒙見活故來相謝耳女覺瞿然有省遂誓不殺生請於父續舉放生會玉受重為序以倡之天啓中玉受官貴州提學僉事安彥反貴陽被圍玉受與前巡撫李橒巡按史永安等分城守且一載糧不繼居民死亡殆盡玉受守益力賊登陴忽自退者再墮梯死無算會援兵至乃解敘功進寧夏參政致仕歸以頭陀終自玉受以持準提唱於鄉里其後進之士若楊子澄及其二子維斗公幹李子木徐九一劉公旦姚文初諸賢皆結準提社擇桃花塢桃花菴故趾闢精舍修白業子澄名大濴篤行君子也以諸生終維斗名廷樞與應天鄉試九一名汧官少詹事公旦名曙以進士授南昌縣未赴官遭明之亡三人者後先殉國死矣公幹名廷楨亦諸生清真絶俗中歲夭士林惜之文初名宗典孟長子以諸生貢太學子木名模官御史國變隱居不出與文初倡上善會大合緇白修西方淨業老焉憨山夢遊集明史姚宗典準提菴廣仁品知歸子曰豫讀孟子書拳拳然勸導時君推不忍之心以生止殺時君終已不用卒成戰國坑屠之慘民如犬豕雞鶩然哀哉已而讀佛經究因果之原察輪回之本反覆沉潛斷疑生信幸際太平時人民樂康而毛羽鱗介之羣未嘗一日得離戰國之苦偶讀曾端甫文傷於心因比次趙劉二君事為之傳經言菩薩作大國王於法自在普行教令閻浮提內城邑聚落一切屠殺皆令禁斷常令安住三種淨戒亦令衆生如是安住美哉慈善之風自書契以來未有能親履其盛者也治亂循環冤報相復禍由己作業非外至纏蓋愈重福智愈微即令菩薩現身末如之何後之君子彰往察來一念信心永斷殺業生清淨心結歡喜緣同類異類有情無情慈悲愛護作大饒益其為福德不可思議恆河沙佛菩薩龍天證明是言真實非妄羅臺山云佛心天眼與有高微尚有針磁之契願生生世世與知歸道人徵逐不捨君為司空我為虞官君著護生之品我作金剛之杵若逢魔外非毀我當飛起落其牙齒不令成語
