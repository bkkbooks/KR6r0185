body:
  text: 鍾離孫陸張孫馬左范胡孫朱二王吳張李陸閻錢吳陳傳鍾離瑾會稽人母任夫人精修淨業年九十八起居如常時一日忽戒瑾曰人人有箇彌陀奈何拋去處處無非極樂不解歸來予將行矣汝其念之翼日晨起焚香持佛名頃之合掌而化瑾自是感奮日行利益二十事後知吉水縣將嫁女為置媵審之則舊令女也乃報姻家請緩婚期而先遣舊令女姻家曰公安得獨為君子予有猶子方擇偶請平分奩具俾同親迎可乎從之夜夢舊令來謝曰賤息荷公厚德已奏之上帝當十世有祿尋官浙西與慈雲式公論往生指要清修彌篤任夫人故有旃檀佛像常頂戴行道及是瑾方瞻禮眉間忽迸出舍利數粒未幾知開封府方夜半忽起謂家人曰夫人報我往生期至矣即趺跏坐逝前一日舉家夢瑾乘青蓮華天樂圍繞乘空西邁子景融官朝請大夫徙居儀真東園側常誦觀無量壽佛經修念佛三昧甞曰不識彌陀彌陀更在西方外識得彌陀彌陀只在自己家一夕請僧妙應誦普賢行願品炷香聽畢兩手作印而化曾孫松官朝請大夫主管台州崇道觀乾道中寓居蘇州與寶積實公結社修淨業與者且百人年八十六無疾化去佛祖統記樂邦文類孫良錢塘人隱居閱大藏尤得華嚴之旨甞依大智律師受菩薩戒日課佛名萬聲二十年不輟忽令家人請僧唱佛名方半日望空合掌曰世尊菩薩已荷降臨即退坐而化佛祖統記陸浚錢塘人少為吏久之棄去預西湖繫念會以淨土為歸每對佛前懺悔聲淚並下間與友人相見說淨土因緣未甞不感慨嗚咽恐此生之不度淨業之難成也臨終請圓淨法師說淨土法門諷觀經至上品上生章圓淨語之曰此時好去浚曰眾聖未齊且待少時起就竹牀面西端坐頃刻化去佛祖統記張廸錢塘人官助教從圓淨法師受菩薩戒專修淨業佛前然臂香為誓每稱佛名其聲奮厲至失音猶不已甞於靜室見白色頻伽飛舞於前又有綠髮童子合掌問訊後三年西向念佛名而化佛祖統記孫十二郎名忠明州人早慕西方蔬食持戒於府城東築菴鑿二池種白蓮臨池建閣月集眾為念佛會甞見佛身現空中趨出呼其二子至同拜禮焉久之始隱後人因名其地為駐佛巷元祐八年釋可久神遊西方三日而蘇言池中金臺標可久名其次則孫十二郎也遂逝久之十二郎得疾請道俗百人為念佛會忽仰視虗空合掌問訊手結雙印怡然而化闔城皆聞天樂異香漸向西沒二子能繼其業亦向西坐化佛祖統記馬仲玉名圩廬州合肥人父忠肅公亮守杭州日慈雲式公授以淨土法門遂全家奉佛元豐中仲玉遇僧廣初得天台十疑論喜曰吾今得所歸矣遂依慈雲十念回向法行之二十餘年後更與王敏仲往還益精進念佛常以放生為佛事歷守淄川新定以慈惠為政課誦經呪觀想西方日有常法時荊王夫人與其侍妾同修淨土其妾已化去已見夢於夫人引之遊於蓮池見有朝服而坐華上者曰此馬圩楊傑也時傑已化去而仲玉尚無恙崇寧元年得疾盥沐易衣端坐念佛而逝有氣如青盖騰空而上已而家人十數同夢仲玉曰吾已得生淨土上品矣其秋有婢臥疾亦念佛而逝子永逸亦行十念法習十六觀閱三十餘年已而得疾見阿彌陀佛及二菩薩來接引結印示寂香氣滿室中既殮柩上產五色華其光爛然樂邦文類左伸天台臨海人從法師神照受菩薩戒遂造西方三聖像求生淨土誦法華經三千四百部金剛經二萬卷紹聖二年秋有疾命其子沙門淨圓唱法華首題已而夢三偉人立江臯召伸登舟復請僧誦阿彌陀經遽曰我已見佛光即端坐結印而化法華持驗記佛祖統記范儼仁和人居常蔬食不牽世緣曰百年旅泊耳尚何求哉日誦法華經手書一部求生淨土大觀中忽見普賢乘六牙白象放金色光謂儼曰汝常誦法華念彌陀佛得生淨土故來相報越一夕覩眾聖授手就座合掌而逝佛祖統記胡達夫名闉錢塘人官宣義郎為人坦易好吟咏好遊山水亦信向佛法未能入也晚年致政與清照律師遊一日感疾其子請清照過之謂曰達夫平生與慧亨相善豈可不知末後大事乎達夫曰將謂心淨則土淨也清照曰達夫一切時中無雜念染污否曰未能也清照曰如此安能心淨土淨耶達夫曰經言一稱阿彌陀佛能滅八十億劫生死之罪何也清照曰阿彌陀佛有大誓願有大威德光明神力不可思議具如經說以是一稱洪名罪垢自消如赫日正中霜雪何有達夫大感悟遂一心稱佛名請僧為之助累月最後清照至達夫曰此來何晚已煩觀音勢至降臨甚久清照與眾僧同舉佛名達夫安然而化樂邦文類孫忭錢塘人號無諍居士幼學易歎曰窮理盡性易之教也烏用于祿為遂掩關晦迹居絕俗務沙門守寧與之交謂曰白樂天以儒修身以釋治心君聞之乎忭有省遂日閱華嚴金剛諸經以淨土為歸母龔氏誦阿彌陀經持佛名晝夜不輟偶得疾請清照律師指示西歸說法未終端坐而化老妾于氏亦專持佛名忽夢龔氏告曰吾已得生淨土矣汝後七日亦當來也至期果逝頃之忭夢至蓮池見清照在側旁一人授以梵字帖不識其人曰請十三日齋耳時方十二月及期忽得疾有僧問疾欲為祈禱忭曰生死已定何必禱即報清照云當暫相違遂跏趺作印西向坐脫翼日清照至為說法封龕歸菴三日亦逝佛祖統記朱進士遺其名蘇州人也甞遊虎邱寺聽佛印禪師講金剛經至六如偈欣然有會次日午睡夢一鬼吏督五人行而己隨後至一舍有青布簾懸焉鬼吏揭簾眾皆入至厨下見桶內盛湯五人各就飲朱方渴亦欲飲之鬼吏呵曰聽佛法人不得飲此驚而覺信步訪之果得一舍如夢所歷其人言厨下新產六犬其一死矣朱大恐怖自言不聞佛法且為此畜矣殆哉遂絕世務日誦金剛經年八十九八月望要諸道友相別入後園登樹杪說偈曰八十九年朱公兩手劈破虗空兩脚踏著白雲立化菩提樹東言訖端然而化金剛證果錄王無功名闐明州慈溪人再舉進士不第布衣蔬食徧參講席晚年專修念佛三昧述淨土自信錄其序云古之大聖人立言垂教被於百世之下其而未暢晦而未明者有之矣即吾佛淨土法門是也余徧覽諸經深求其指往生功德一言以蔽之曰在凡夫獲不退而已矣何則此土修行圓教初信小乘初果人邪見三毒永不復起茲為斷惑發悟創入聖流越生不昧其所證斯超四趣不失人天至於凡夫地中雖伏惑發悟菩薩一經生死非常之變則忘其所證所修是故遇緣或退仍墮苦塗者有之乃若凡聖同居淨土如極樂國等雖具三界惟有人天故一切含識獲生者即長辭四趣又助緣大備壽數莫量縱至鈍根一生熏修無不證聖果寧復有退失事乎如來讚勸之本意不過如此且圓機體道是最上淨業苟加願導之即預優品若夫愚朴輩但能稱佛發願者莫不往生嗚呼觀淨土一門則知聖人無棄物矣彼守癡空之徒效無礙無修起自障心絕他學路可不哀哉紹興十六年一夕忽聞異香滿室謂弟子沙門思齊曰此吾淨業所感也乃沐浴更衣面西趺坐而化焚其軀得舍利如菽者百八粒佛祖統記樂邦文類王衷嘉禾人居錢塘之孤山政和間舉隱逸不起甞參小本禪師未有所入偶聞僧誦彌陀經有感遂專心淨業日誦阿彌陀經七過佛號萬聲十九年未甞間斷即所居為蓮社無問道俗貴賤咸得與會一日無疾沐浴面西跏趺而化佛祖統記樂邦文類吳信叟名秉信明州人紹興中官於朝與秦檜忤斥為黨人歸而築菴城南日夕宴坐制一棺夜臥其中至五更令童子扣棺而歌曰吳信叟歸去來三界無安不可住西方淨土有蓮胎歸去來聞唱即起習禪誦久之檜死以禮部侍郎召時停度僧之令信叟請賣度牒以裕國用因論及檜黨卒為檜黨所中論以侫佛邀福出知常州二十六年復被召至蕭山驛舍坐頃之令家人靜聽咸聞天樂之音即曰清淨界中失念至此金臺既至吾當有行言訖而逝佛祖統記張掄不詳其所自起官浙西副都總管䖍修淨土甞請高宗書蓮社二字顏其居為之記曰臣甞讀天竺書知出世間有極樂國者國有佛號阿彌陀始享國履位捐去弗居超然獨覺悟心證聖以大願力普度一切其國悉以上妙眾寶莊嚴地皆黃金無山川邱谷之險氣序常春無陰陽寒暑之變無飢寒老病生死之苦無五趣雜居之濁用是種種神通方便善導眾生忻樂起信於日用中能發一念念彼佛號即此一念清淨純熟圓滿具足融會真如同一法性幻身盡時此性不滅一剎那頃佛土現前如持左契以取寓物臣敬聞其說刻厲精進無有間斷惟佛惟念亦既有年闔門少長靡不從化乃闢敝廬之東偏鑿池種蓮做慧遠結社之遺意日率妻子課佛萬徧而又歲以春秋之季月涓良日即普靜精舍與信道者共之於是見聞隨喜雲集川至唱佛之聲如潮汐之騰江也夫慧遠創為茲社距今閱數百其間緇素景慕餘風祖述其高致者代不乏人然率闇汶不章與木石同寂臣獨何幸乃蒙太上光堯壽聖皇帝親灑宸毫書蓮社二大字為賜雲章奎畫得未曾有萬目共瞻歡喜踊躍不獨傳示雲林侈千載之盛遇實願天下後世凡歷見聞普得念佛三昧究竟成就無上菩提其為饒益詎可量已謹刊之金石用對揚丕顯休命焉樂邦文類李秉紹興末為內廷官歷三朝爵武功大夫管御藥院乞宮祠以去秉壯歲慕禪宗參淨慈自得禪師有省既別自得作拄杖頌寄之曰得來拄杖元無價分付知音好受持千里同風了無說夜深月上瑚枝已而歸心淨土刻龍舒淨土文以勸世持誦謹篤逾三十年子元長偕諸同好結淨業會於傳法寺秉與焉嘉泰四年秋有疾減食却劑神色愈警及冬夢中忽見彌陀現相越七日凌晨見金華滿室中呼二子掖起別親友索筆書曰六十一年盡亂道些兒見處却也好而今驀直往西方萬劫長離生死老置筆整手結印而逝樂邦文類陸子元名沅會稽山陰人試吏部再為第一監行在都進奏院監尚書六部門居官落落守正不媚權勢歲滿遷大府寺丞尋外轉歷提舉福建市舶以母憂歸中同僚鄭興裔之言得罪閒居家明州橫溪之上客至語及鄭事必曰沅與鄭歷劫中冤耳謹當以善法解之否則彼此酬酢無了時也居常持法華經晨起即澡浴焚香首唱偈曰盥手清晨貝葉開不求諸佛不禳災世緣斷處從他斷劫火光中舞一回然後開卷而讀不緩不急聲如貫珠日周一部如是三十年年登八十增至三部宗教兩家靡不研究復誦彌陀佛號一意西馳年八十五沐浴冠服而化口鼻間出蓮華香郁然彌日方息事在紹熈五年渭南文集法喜志法華持驗記閻榮池州晉陽人中年甞遇僧勸修淨業持往生呪遂斷葷血每旦向西誦呪千遍又率諸男女同聲誦之積二十年紹熈元年正月朔閱大涅槃經歎曰人生夢幻耳吾何戀乎三月朔聞異香芬馥彌日不歇其子夢阿彌陀佛放大光明徧照堂宇皆作金色越五日晨起如常課誦訖顧家人曰我今日當行慎勿相攪遂面西瞑目跏趺而坐日過中瞿然起曰我去也便起立行數步舒手結印微笑而化樂文類錢同伯名象祖台州人祖端禮官參知政事甞參護國元公有省遂究極宗門旨趣臨終書曰浮世虗幻本無去來四大五蘊必歸終盡盖為地水火風暫時湊泊不可錯認為己有大丈夫當用處把定立處皆真去留自在是上來諸聖解脫路涅槃門也吾今如是豈不快哉置筆斂目而逝同伯以恩起家太常丞開禧中官參知政事時韓𠈁胄為相欲用兵於金同伯執不可遂罷知外郡已而復起與史彌遠謀共誅𠈁胄天下賴之嘉定二年拜左丞相尋罷歸初同伯問道於此菴元公此菴曰欲究此事須得心法兩忘乃可法執未忘契理亦非悟也同伯曰纔涉脣吻便落意思如何此菴曰本自無瘡勿傷之也同伯有省既而歸心淨土守金陵日於鄉州建接待寺十所皆以淨土極樂名之創止菴與高僧談處其中自致政後修持益力嘉定四年偶得微疾書偈曰菡萏香從佛國來琉璃地上絕纖埃我心清淨超於彼今日遙知一朵開僧有問起居者答曰不貪生不怕死不生天上不生人中唯當往生淨土耳言訖趺坐而化時天鼓震響異香芬郁郡人同夢空中聲云錢丞相當生西方淨土為慈濟菩薩佛祖統記續綱目往生傳台州志昝省齋名定國明州人為州學諭常修淨業結西歸社嘉泰初於小江慧光建淨土院結石塔於池為鄉民藏骨之所月二八日集僧俗院中誦觀經及佛號為擘窠圖勸人念佛有鐵工計公者年將七十喪明因從受念佛圖誦至四圖兩目瞭然如是三載滿十七圖一日方念佛次忽瞑半日復甦謂其子曰我已見西方佛菩薩矣昝學諭是勸導之首當分六圖與之並為致謝也西向坐逝嘉定四年省齋夢青童告曰佛今告君三日當往生彼國至日沐浴更衣速稱佛號端坐而化佛祖統記吳復之名克己自号鎧菴居士居於婺之浦江少讀周官慨然有濟世之志既不得志隱於左溪苦目疾或勸令禱圓通大士復之曰臨危不變乃真丈夫或舉杜祁公言君未讀佛書何以知其不及孔孟復之試持大士號疾良已遂起深信心讀楞嚴至空生心內猶雲點太清豁如發蒙既讀宗鏡錄遇寶積實公謂曰此書無規矩不若看止觀令即境觀二字倚為几杖服食已而果有悟入歎曰至哉規矩之說所謂至方以方天下之不方至圓以圓天下之不圓者乎著法華樞鍵回向極樂曰不讀法華無以明我心本具妙法不生安養無以證我心本具妙法如來諄諄示誨智者懇懇宏經佛祖垂慈初無異轍也乾道中寓蘇州與實公為蓮社命工繪十界九品圖於兩廡一示萬法唯心一指西方徑路社友鍾離松為之記嘉定七年冬終於寶山遺言以僧禮茶毗壽七十五佛祖統記樂邦文類陳君璋黃巖人生於元時年四十歸心佛法與妻葉氏誦法華經回向極樂歷二十年疾篤命其子景星扶之坐曰吾歸去景星曰歸何處去曰沒處去令死後用桑門闍維法合掌稱阿彌陀佛而逝往生集知歸子曰宋世宗風大盛而其時傳天台教者每以淨土為歸故士大夫篤志西方者視唐時稱盛焉嗚呼百年如電六道如環生此界中不歸淨土將安所終乎汪大紳云此一卷氷雪文也日復一過我懷如何矣念佛繙經至口鼻間皆出蓮花香則淨業成矣心心念佛心心種蓮心開見性花開見佛是為極樂
