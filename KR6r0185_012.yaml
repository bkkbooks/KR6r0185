body:
  text: 江劉張司馬李元萬朱二吳彭高傳江含潔名䋔濟陽考城人父蒨為梁光祿大夫含潔年十三父病眼含潔侍疾將期月衣不解帶夜夢一僧云患眼者飲慧眼水必差其叔父祿與草堂寺智者法師善往訪之智者曰無量壽經云慧眼見真能度彼岸蒨乃同智者啓聞捨同夏縣界牛屯里宅為寺乞賜嘉名敕曰慧眼是五眼之一可以慧眼為名寺成泄故井水清洌異常乃悟所夢取水洗眼並以煮藥而病遂差南康王為南州召含潔為主簿含潔頗好老莊尤善佛義不樂仕進及父卒廬於墓頃之亦卒梁書劉士烜名霽平原人梁天監中起家奉朝請尋為建康正引疾歸母明氏寢疾士烜年已五十晝夜侍閲七旬誦觀音經數至萬遍夜夢一僧謂曰夫人算盡君精誠篤至當延數旬耳後六十餘日乃亡居喪廬墓有雙白鶴翔於廬服未終亦卒梁書張孝始名元河北芮城人祖成仕周假平陽郡守父延俊歷州郡功曹主簿孝始性仁孝敬信佛法兒時見村陌間有棄狗子者收養之其叔父怒之曰何用為對曰有生之類莫不重其性命天生之而人棄之非其道也見而不收是不仁也其祖喪明三年孝始年十六晝夜誦佛經禮拜祈福後讀藥師經見盲者得視之言遂請七僧然七燈七日七夜轉藥師經唱言元為孫不孝使祖喪明今以燈光普施法界願祖目復明元罪深重願瞎元眼至第七日夢一老翁以金鎞刮其祖目後三日祖目果明縣博士楊軏等上其孝行詔表其門北史司馬喬卿河內人唐永徽中官揚州戶曹遭母喪毀瘠刺胸前血寫金剛經一卷所居廬上生芝草二莖經九日長尺有八寸緑莖朱蓋日瀝汁一升食之味如蜜盡而復生如是數四一時士大夫多傳異之法苑珠林李觀隴西人顯慶中寓滎陽遭父喪刺血寫金剛般若心經隨願往生經各一卷異香發於院郁然連日香及其鄰法苑珠林按此李觀與唐書所載字元賓者先後相懸法喜志金湯録合為一人非也元紫芝名德秀河南人開元中登進士第母喪廬墓側食無鹽酪藉無茵席刺血繪像寫佛經已而官魯山令歲滿携一縑駕柴車還愛陸渾山水居焉家無僕妾歲饑或日一爨酌酒鼓琴自娛生六十年未嘗識女色天寶十三年卒唐書萬敬儒合肥人親亡廬墓側十八年刺血寫佛經斷手二指輒復生宣宗表其家改所居曰成孝鄉佛法金湯朱康叔名壽昌揚州天長人以父蔭為將作監宋治平中歷官知閬州廣德軍康叔七歲父官長安出其母劉氏嫁民間康叔既仕念母行四方求之飲食罕御酒肉每於佛前灼臂燒頂刺血寫經冀遂其志熙寧初棄官入秦與家人訣誓不見母不復還行次同州得焉康叔念報母恩欲度衆苦觀諸教門切近周至莫如梁武所著懺法然其文繁旨祕觀者不能盡了乃更為韵語使一切人歌詠讚歎俱獲福利蘇子贍為說偈曰長者失母常自念言母本生我我生母去有我無母不如無我誓以此生出生入死母若不見我亦隨盡在衆人中猶如狂人終日皇皇四十餘年乃見其母我初不記母之長短大小肥瘠云何一見便知是母母子天性自然冥契如磁石針不謀而合我未見母不求何獲既見母已即無所求諸佛子等歌咏懺文既懺罪已當求佛道如我所說作求母觀尋起通判河中居數年母卒涕泣失明有白烏集其墓上後知鄂州代還卒於家東坡文集東都事略吳璋江南吳江人母陸氏當明永樂中以孀婦選給內廷母與焉宣德中隨淮王就封韶州璋往求之舟中供觀音大士像日夕哀禱願必見母中途下痢遇一僧療之獲瘳既至韶淮王已徙饒州復徒步往饒足指膚裂臥野寺中復遇一道人塗以藥立起過嶺蛇嚙其足仆於地復見前道人再塗以藥乃如故一夕宿孤村有婦奔之不納方雪急走出門入一古廟前道人迎笑謂曰子其賢哉出餅啖之天明至饒訪母果在乃啓王乞奉母歸不許復以死自誓而後許之大慈録吳君平浙江桐鄉人生明萬歷間少孤長而業儒館於靈隱寺每念父母涕泣如初喪有僧謂言欲報親恩莫如寫佛經君平然之食淡四十九日刺胸前血寫金剛經一卷既畢僧俗聚觀驗創痕凡十有一皆合掌歎曰希有事也但補闕真言未寫奈何君平復刺胸出血補之其夜夢父母立雲中謂曰賴爾寫經功德我二人已得生淨土矣佛憫爾誠且𢌿爾一善童子是年果生子數月後與以肉食輒閉口不食君平亦遂長齊誦經終其身金剛持驗記彭信宇名有源湖廣益陽人少奉觀音大士日誦諸經以祈親壽父疾亟刲臂肉和藥以進尋愈父歿母亦病疽發於掌夜夢見大士謂曰汝母壽盡若得人肝服之猶可救也晨起視母母方思食羊肝信宇曰天啓之矣至夜禱於大士持刀刺胸血湧膜開至五六刺砉然心出緣心得肺緣肺得肝而信宇痛且絶矣頃之蘇呼其妻煮肝進母母食之而甘病尋已然其肺既出不復收衆為禱於大士大士見夢曰是孝子肺收之無難但世無孝子欲出之百日令衆遍見之耳却後百日肺既收創合如故明文偶鈔高彚旃名世泰江南無錫人崇禎中舉進士官禮部郎中出為湖廣提學秩滿歸母李氏精修淨土無疾而逝彚旃日跪柩前誦妙法蓮華經越三虞庭中枯蘭忽榮一莖三華內外純白有聚沙居士者異其事推論之曰高子之感斯瑞也有二因焉一者世間孝子但知榮名利養生事死哀世緣牽率多生父母眷屬積骨如須彌山積淚成大海水沉沒生死洄淵不克自出高子當沉痛昏迷肝腸崩潰乃能歸命法王捧持妙典下佛種於身田殘壞之中抽法芽於火宅焚燒之內以念母因緣轉而念佛念法其自利最勝二者末法士大夫少知歸心佛門輒眩惑於邪師魔民掠影宗門抹摋經教種植邪因違背正果高子持誦契經獲斯靈感使末法中人信知金口所宣龍宮所藏是菩提資糧是金剛寶藏一字染神萬劫不壞以念母因緣再轉而破魔網樹法幢其利他最勝是二因緣皆從念母而生積劫之淨因與宿生之善根在愛別離苦中種子逼現豈非五濁惡世甚難希有者乎遂說偈曰稽首妙蓮華諸佛所宣說若能為人說乃至竊一句即是如來遣告報於異生共宿摩其頂法利無量數而況有孝子跪誦以報母晝夜六時中持誦準漏刻雙趺印入泥血淚積成穴經聲哀痛聲上達夜摩天諸天相傳報贊歎未曾有乃遣主林神示現庭中花一叢而三莖晶瑩如玉雪發生凋枯叢尤為奇特事我聞諸供養花為最勝妙弄花生諸天胎花生淨土今於庭砌內粲此潔白花表是母與子皆捨垢染故我聞妙蓮華一華具一切十大千世界微塵數蓮華重重作主伴以為其眷屬又以一蓮華攝入一切華多華及餘華一一成伴義故知此蘭華即是妙蓮華皆是蓮眷屬隨機而出現如是淨妙華開演戒定葉方便為枝幹六度為繁密無漏法樹林何憂不增長佛說孝順果等補處菩薩以是十方佛咸重四恩故哀哀孝子心供養生身佛即名供養佛佛心隨順故孝子即身花果花無有二心花開敷時蓮花與俱故我願十方界一切諸衆生咸思報佛恩誓願為孝子孝心同佛心諸佛所加被十方諸孝子即是微塵佛彚旃自國變後不復出主東林書院三十餘年闡程朱之學學者宗之卒於家明文偶鈔知歸子曰經云孝名為戒又言祀天地鬼神不如孝其二親或疑佛氏既已捨其家毀其身矣復何孝之云殊不知捨其家者盡虗空而為家者也毀其身者遍法界而為身者也故曰佛者覺也覺也者反始而合本之謂也反始而合本孝莫大於是世之君子誠欲孝其二親則舍佛將奚之焉如江劉以下諸賢其有以知之矣汪大紳云知歸子之於佛可謂知之明信之篤矣現居士身而說法不毀身不捨家可也
