body:
  text: 張洪賑張廷圭辛替否傳張洪賑名普惠常山九門人其學精於三禮兼善春秋百家之説仕魏為諫議大夫每朝廷有大議必據經義反覆陳論無少屈時孝明帝不親視朝郊廟之事都委有司營造寺像略無休息洪賑上書曰臣聞明德恤祀成湯光六百之祚嚴父配天孔子稱周公其人也故能馨香遠聞福傳遐世伏惟陛下重暉纂統欽明文思天地屬心百神佇望故宜敦崇祀禮咸秩無文而告朔朝廟不親於明堂嘗禘郊社多委於有司殖不急之冥業損巨費於生民減祿削力近供無事之僧崇飾雲殿遠邀未然之報昧爽之臣稽首於外元寂之僧遨遊於內愆禮忤時人靈未穆愚謂從朝夕之因求祇劫之果未若先萬國之歡心以事其親使天下和平災害不生者也伏願淑慎威儀萬作式躬致郊廟之虔親紆朔望之禮釋奠成均竭心千畝孝道可以通神明德教可以光四海則一人有慶兆民賴之然後精進三寶信心如來道由化深故諸漏可盡法隨禮積故彼岸可登量撤僧寺不急之奉還復百官久折之秩已興之構務從簡成將來之造權令停息庶節用愛人法俗俱賴尋遷尚書右丞出為東豫州刺史卒諡宣恭魏書廣宏明集張廷圭河南濟源人為人慷慨有志節則天朝纍遷監察御史長安中稅天下僧尼出錢欲於白司馬坂營建大佛像廷圭上疏諫曰夫佛者以覺知為義因心而成不可以諸相見也經云若以色見我以音聲求我是人行邪道不能見如來此真如之果不外求也陛下信心歸依發宏誓願壯其塔廟廣其尊容已遍於天下久矣蓋有住於相而行布施非最上第一希有之法經云若人滿三千大千世界七寶以用布施及恆河沙等身命布施其福甚多若人於此經中受持及四句偈等為人演説其福勝彼如佛所言則陛下傾四海之財殫萬人之力窮山之木以為塔極冶之金以為像勞則甚矣費則多矣而所獲福不愈於一禪房之匹夫菩薩作福德不應貪著蓋有為之法不足高也況此營建事殷土木開發盤礴峻築基階輾壓蟲蟻動盈巨億豈佛標坐夏之義愍蠢動而不忍害其生哉又役鬼不可惟人是營通計工匠率多貧窶朝驅暮役勞筋苦骨簞食瓢飲晨炊星飯飢渴所致疾疹交集豈佛標徒行之義愍畜獸而不忍殘其力哉又營築之費僧尼是稅雖乞丐所致而貧闕猶多州縣徵輸星火逼迫或謀計靡所或鬻賣以充怨聲載路和氣未洽豈佛標隨喜之義愍愚蒙而不忍奪其産哉且邊朔未寧軍裝日給天下虗竭海內勞弊伏惟陛下慎之重之思菩提之行為利益一切衆生應如是布施則其福德若南西北東四維上下虗空不可思量矣何必勤於住相凋蒼生之業崇不急之務乎臣以時政論之則宜先邊境畜府庫養人力以釋教論之則宜救苦厄滅諸相崇無為伏惟陛下察臣之愚行佛之意務以理為尚不以人廢言幸甚幸甚則天召見深慰賞之時祭酒李嶠亦言造像錢見有一十七萬餘貫若將散施貧窮人與二千濟得一十七萬餘戶拯飢寒省勞役順諸佛慈悲之心普聖君亭育之德則神人胥悅功德無窮則天不能用開元初廷圭為禮部侍郎嘗應詔極論時政遷黃門侍郎後以少府監致仕卒年七十餘贈工部尚書諡貞穆唐書辛替否京兆萬年人景龍中官左拾遺時中宗盛興佛寺百姓勞敝帑藏耗竭替否諫曰夫釋教者以清淨為基慈悲為主故常體道以濟物不利己以損人當去己以全真不榮身以害教經云菩薩心住於法而行布施如人入暗即無所見誠減雕琢之費以賑貧下是有如來之德息穿掘之苦以全昆蟲是有如來之仁陛下緩其所急急其所緩失真實而冀虗無臣竊痛之既奏不納睿宗朝切論時政遷右臺殿中侍御史天寶初卒唐書知歸子曰經言若諸菩薩隨順衆生則為隨順供養諸佛若於衆生尊重承事則為尊重承事如來何以故諸佛如來以大悲心而為體故季世之君重斂黷兵殘民以逞乃欲窮土木之工耀金玉之飾以希福報蓋重愆不亦闊乎善乎孟子之言曰行一不義殺一不辜而得天下有不為也斯可語於淨戒矣書亦有之一夫不獲時豫之辜菩薩所為度盡衆生方成佛道也張辛諸賢實有見於是録其言有國君子可以觀焉
