body:
  text: 袁伯修中郎小修傳袁伯修名宗道號香光居士湖北公安人也弟中郎名宏道號石頭居士小修名中道號上生居士三人同母生母龔氏日誦金剛經一日有巨蛛自梁下繞經行數匝俄對經蹲而伏母曰爾聽經來耶乃誦經至六如偈蛛微動若作禮狀終卷視之已化去矣因為龕葬之建小塔焉三人少以文名長而皆好禪宗萬歷中先後舉進士伯修官至右庶子中郎為吳江知縣聽斷敏決公庭鮮事輒喜遊山水後為禮部主事謝病歸築園城南植柳萬枝號曰柳浪與諸禪人遊處其中初學禪於李卓吾信解通利才辨無礙已而自驗曰此空談非實際也遂回向淨土晨夕禮誦兼持禁戒伯修小修亦同時發願中郎因博采經教作西方合論圓融性相入不二門書成伯修序之曰香光子避囂山剎修習淨業有一禪人闊視高步過舍而談見案上有石頭居士新撰淨土合論閲未終篇抗聲言曰若論此之法門原用接引中下之根何者中下人根智慧輕微業力深重以憶佛念佛獲生淨土如頑石附舟可以到岸誠宜念佛至於吾輩洞了本源此心即是佛更於何處覓佛此心即是土更於何處見土於實際理中覓生佛去來生死三世之相無一毛頭可得才說成佛已是剩語何得更有分淨分穢舍此生彼之事香光子聞而太息曰若汝所言止圖口角圓滑不知一舉足將墜於火坑也若約理而言世間一蚤一虱皆具有如來清淨覺體無二無別乃至諸佛成等正覺證大涅槃本體未曾增得一分衆生墮三塗趨生死海本體未曾減却一分如如之體常自不動生死涅槃等是妄見亦無如來亦無衆生於此證入亦無能證之人亦無所證之法泯絶心量超越情有大地無寸土佛之一字向何處安著至於進修法門於無修證中修證於無等級中等級千差萬別雖位至等覺尚不知如來舉足下足之處從上祖師所以呵佛斥教一切皆遮者止因人心執滯教相隨語生解不悟言外之本體漫執語中之方便所謂數他家寶己無分文其或有真實修行之人不見佛性辛苦行持如盲無導止獲人天之果不生如來之家於是諸祖知其流弊遂用毒手剗其語言塞其解路拶其情識令其苦參密究逆生滅流生滅流盡取捨念空始識得親生父母歷劫寶藏却來看經看教一一如道家中事然後如說進修以佛知見淨治餘習拜空花之如來修水月之梵行登陽焰之階級度谷響之衆生不取寂證是謂佛種正如杲日當空行大王路不同長夜趨走攀荊墮棘豈謂一悟之後即同極果如供奉問岑大蟲果上涅槃天下善知識證否岑曰未證奉曰何以未證岑曰功未齊於諸聖奉曰若爾何得名為善知識岑曰明見佛性亦得名為善知識也宏辨禪師曰頓明自性與佛同儔然有無始染習故假對治令順性起用如人喫飯不一口便飽溈山曰初心從緣頓悟自理猶有無始曠劫習氣未能頓盡須教渠淨除現業流識即修也不可別有法教渠修行趨向後世不識教意不達祖機乃取喝佛罵祖破膽險句以為行持昔之人為經論所障猶是雜食米麥不能運化後之人飽計禪宗語句排因撥果越分過頭是日取大黃巴豆以為茶飯也自誤誤人弊豈有極是以才入此門便輕十方如來莫不自云無佛可成無行可修見人念佛則曰自性是佛見人修淨土則曰即心是淨言參禪則尊之九天之上言念佛則蹂之九地之下全不思參禪念佛總之為了生死同是出苦海之橋梁越界有之寶筏事同一家何勝何劣參門之中所悟亦有淺深念佛之衆所修亦有高下自達摩西來立此宗門傳燈録中如麻如粟同云入悟其實逈別至若般若緣深靈根夙植伽陵破卵香象截流或見根宗於片言或顯威用於一喝一聞千悟得大總持或有懷出世之心具丈夫之志舍彼塵情究此大事不怙小解惟求實知臥薪嘗膽飲氷吞檗如此三十年四十年或遇明師痛與針劄偷心死盡心花始開此後又須潛行密修銷融餘習法見尚捨何況非法若趙州除粥飯是雜用心湧泉四十年尚有走作香林四十年打成一片兢兢業業如護頭目直至烟消灰滅自然一念不生業不能繫生死之際隨意自在詰其所證恐亦未能超於上品上生之上何以明之龍樹菩薩宗門之鼻祖也得大智慧具大辨才住持佛法故世尊數百年前於楞伽會上遙為授記然亦不過曰證初歡喜地往生安樂國而已而經中上品上生生於彼間一剎那頃亦證初地良以上品上生解第一義還同禪門之悟深信因果還同禪門之修止是念佛往生別耳其或悟門已入休歇太早智不入微道難勝習一念不盡即是生死之根業風所牽復入胞胎如五祖戒出為東坡青草堂再作魯公隔陰之後隨緣流轉道有消而無長業有加而無減縱般若緣深不落三塗而出房入房亦太辛苦還視中下往生之衆已天地不足喻其否泰矣況後世宗風日衰人之根器亦日劣發心既多不真功夫又不純一偶於佛祖機鋒知識語言或悟得本來成佛處當下即是處意識行不到語言說不及處一切不可得即不可得亦不可得處將古人語句和會無不相似既得此相似之解即云馳求已歇我是無事道人識得煩煩如幻則恣情以肆煩惱識得修行本空輒任意以壞修行謂檀本空也反舍檀而取慳謂忍本空也反聽隨而置忍言戒則曰本無持犯何必重持輕犯言禪則曰本無定亂何必舍亂取定聽情任意踏有談空既云法尚應捨何為復取非法既云真亦不求何為舍之求妄既云修觀習定皆屬有為之迹何獨貪名求利偏合無為之道愛憎毀譽之火才觸之而即高生老病死之風微吹之而已動爭人爭我說是說非甚至以火性為氣魄以我慢為承當以譎詐為機用以誑語為方便以放恣為遊戲以穢言為解粘讚歎破律無行之人侮弄繩趨尺步之士或至經年不拜一佛經年不禮一懺經年不轉一經反看世間不必看之書行道人不宜行之事使後生小子專逞聰明惟尋見解才有所知即為一超直入更復何事輕狂傲慢貢高恣睢父既報讐子遂行劫寫烏成馬輾轉差謬不念世間情欲無涯隄之尚溢如何日以圓滑之語大破因果之門決其防藩導以必流自誤誤人安免淪墜若不為魔所攝定當永陷三塗刀山劒樹報其前因披毛戴角酬還宿債莫云我是悟達之人業不能繫夫謂業不能繫非謂有而不有正以無而自無生既隨境即動死安得不隨業受生眼前一念嗔相即是怪蟒之形眼前一念貪相即是餓鬼之形無形之因念甚小有形之果報甚大一念之微識田持之歷千萬劫終不遺失如一比邱以智慧故身有光明以妄語故口流蛆出一言之微得此惡報雖有智慧終不能消況今無明煩惱熾然不斷欲以相似見解消其惡業冀出三塗無有是處鄉使此等不得少以為足常如說以修行終不自言我已悟了即心是佛豈可復同中下念佛求生了達生本無生不妨熾然求生即心是土蓮不屬心外不釋禮拜不舍念誦智力行力雙轂並進方當踞上品之蓮臺坐空中之寶閣朝飯香積夕遊滿月回視胎生之品彳亍寶地不聞法語不見法身象馬難羣雞鳳非類何況人天小果甕中蚊虻者哉而乃空腹高心著空破有卒以偏執之妄解攖非常之果報不與阿彌作子却為閻羅之囚不與淨衆為朋却與阿旁為伍棄寶林而行劒樹舍梵音而聽叫號毫髮有差天地懸隔可不哀與故知此道險難未易行遊成則為佛敗則為魔王虜分於彈指卿烹別於絲毫苦樂之分宜早擇矣況今代悟門不絶如線禪門之中寂寥無人止有二三在家居士路途端直可以流通此法然既為居士不同沙門釋子猶有戒律縛身方置身大火之中浸心煩惱之海雖於營幹世事內依稀得一入門而道力甚淺業力甚深即極粗莫如淫殺之業猶不能折身不行何況其細生死之間安能脫然故知念佛一門於居士尤為喫緊業力雖重仰借佛力免於沉淪如負債人藏於王宮不得抵償既生佛土生平所悟所解皆不唐捐縱使志在參禪不妨兼以念佛世間作官作家猶云不礙況早晚禮拜念誦乎且借念佛之警切可以提醒參禪之心借參門之洞徹可以堅固淨土之信適兩相資最為穩實如此不信真同下愚石頭居士少志參禪根性猛利十年之內洞有所入機鋒迅利語言圓轉自謂了悟無所事事雖世情減少不入塵勞然嘲風弄月登山玩水流連文酒之場沉酣騷雅之業懶慢踈狂未免縱意如前之病未能全脫所幸生死心切不長陷溺痛念見境生心觸途成滯浮解實情未能相勝悟不修行必墮魔境始約其偏空之見涉入普賢之海又思行門端的莫如念佛而權引中下之疑未之盡破及後博觀經論始知此門原攝一乘悟與未悟皆宜修習於是采金口之所宣揚菩薩之所闡明諸大善知識之所發揮附以己意千波競起萬派橫流詰其滙歸皆同一源其論以不思議第一義為宗以悟為導以十二時中持佛名號一心不亂念念相續為行持以六度萬行為助因以深信因果為入門此論甫成而同參發心持戒念佛者遂得五人共欲流通以解宗教之惑香光識劣根微久為空見所醉縱情肆志有若狂象去年沉湎之後親遊鬲子地獄烈火洞然見所熟談空破戒亡僧形容尫羸跛足而過哭聲震地殆不忍聞及寤身毛為豎亦遂發心歸依淨土後讀此論宿疑氷釋所以今日不憚苦口病夫知醫浪子憐客汝宜盡剗舊日知見虗心誦習自當有入生死事大莫久遲疑於是禪人悲泪交集自云若不遇子幾以空見賺過一生子生我矣懇求案集作禮而去已而中郎起故官再遷至稽勳司郎中移病歸抵家不數日入荊州城宿於僧寺無疾而卒小修官南禮部郎中乞休老於家居常勤於禮誦一夕課畢趺坐忽入定神出屋上飄然乘雲有二童子導之西行俄而下至地童子曰住小修隨下見地平如掌光耀滑潤旁為渠廣十餘丈中有五色蓮芳香異常金橋界渠欄楯交羅樓閣極整麗揖問童子此何地卿何人曰豫靈和先生侍者也問先生為誰曰君兄中郎也今方佇君有所語可疾往復取道抵一池上有白玉扉一童子先入一童子導過樓閣二十餘重至一樓下樓中人下迎其顏如玉衣如雲霞長丈餘見小修喜曰弟至矣諦視之則中郎也上樓交拜有四五人來共坐中郎曰此西方邊地信解未成戒寶未全者多生此亦名懈慢國上方有化佛樓臺前有大池可百由旬中有妙蓮衆生生處既生則散處樓臺與有緣淨友相聚以無淫聲美色勝解易成不久進為淨土中人小修問兄生何處中郎曰我淨願雖深情染未除初生此少時今居淨土矣終以戒緩僅地居不得與大士升虗空寶閣尚需進修耳幸宿生智慧猛利又曾作西方論讚歎如來不可思議度生之力感得飛行自在遊諸剎土諸佛說法皆得往聽此實為勝遂携小修而上倐忽千萬里至一處光耀無障蔽皆以琉璃為地界以七寶樹皆旃檀吉祥出衆妙花作異寶色下為寶池波揚無量自然妙聲其底沙純以金剛池中衆寶蓮葉五色光池上隱隱危樓回帶閣道旁出皆有無量樂器演諸法音中郎曰汝所見淨土地行衆生依報也過此為法身大士住處甚美妙千萬倍於此神通亦千萬倍於此吾以慧力遊其間不得住也過此為十地等覺所居吾不得而知過此為妙覺所居唯佛與佛乃能知之語罷復至一處光耀逾前坐頃之中郎曰吾不圖樂之至此極也使吾生時嚴持戒律尚不止此大都乘戒俱急生品最高次戒急生最穩若有乘無戒多為業力所牽流入八部鬼神衆去豫親所見者多矣弟般若氣分頗深戒定力甚少夫悟理不能生戒定狂慧也歸五濁趁強健實悟實修兼持淨願勤行方便憐憫一切不久當相晤一入他途可怖可畏如不能持戒有龍樹六齊法見存遵而行之殺戒尤急寄語同學未有日啓鸞刀口貪滋味而能生此土者也雖說法如雲如雨何益於事我與汝空王劫時世為兄弟乃至六道莫不皆然幸我得善地恐汝墮落方便神力攝汝至此淨穢相隔不得久留時伯修已沒因問其生處中郎曰生處亦佳汝後自知忽凌空而逝小修起步池上忽若墜水躍然而醒時萬歷四十二年十月望也小修自為記如此初伯修有子曰登年十三病痞將終語中郎曰死矣叔父何以救我中郎曰汝但念佛即得往生佛國此五濁世不足戀也登遂合掌稱阿彌陀佛諸眷屬同聲助之頃之登微笑云見一蓮華色微紅俄而云華漸大色鮮明無與比者俄而云佛至相好光明充滿一室頃之氣促伯修曰汝但稱佛之一字可也登稱佛數聲合掌而逝明史明文偶鈔西方合論序白蘇齊集珂雪齊外集獪園金剛新異録知歸子曰明萬歷間蓮池大師以淨土法門倡於雲棲謹持誦嚴戒律從之遊者彬彬多踐履篤實之士焉同時卓吾老人亦以禪導後進而學喜師心行無轍迹流末滔滔老人安得不任其咎豫讀袁氏兄弟早歲文大率掉弄知解依違光景心竊病之已而得見中郎西方合論三復之不厭而伯修所為序懺悔切深闢荊榛由坦道甚矣袁氏兄弟之善補過也學者觀此可以自鑑矣汪大紳曰夫子曰吾未見能見其過而內自訟者也袁氏兄弟其庶矣乎覺心悲心怎地廣大真切大紳又與允初書曰承勸看西方合論當檢出來看檢不出當借閲也袁氏禪非敢遽斷為口頭得法於龍湖龍湖不無狂魔入肺腑之證至袁氏一轉而為輕清魔墜在輕安快活裏作科臼日流在光滑滑處生知生見無箇銀山鐵壁時節後來知無所得歸心淨土真是奇特然不可以是之故於宗門淨土妄生高下也須知宗門中事釋迦佛所說是這箇彌陀佛所說是這箇彌勒所說也是這箇無二無分別也若然則大家在這裏過活儘彀了為甚要生西方要生兜率曰此願輪也又為甚讚歎西方者倍於兜率曰生人而有人欲生天亦有天欲生西方則人天之欲淨矣人天欲淨正好了當這箇所以盡十方法界願輪之大莫大於往生西方也乘此輪願者切不可隨語生解隨語生解便起一分計較心這計較心是六道輪回之根非往生淨土之因也欲生兜率者請從布袋和尚詩入欲生西方者請從豐干詩入此正因也布袋是彌勒化身豐干是彌陀化身
