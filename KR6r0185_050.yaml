body:
  text: 馬良徐成民傳馬良者富陽人萬歷中登進士第知丹徒縣仁慈正直一方推為神君既去立祠祀之後官甘肅行太僕以憂歸居慈山僧舍日禮阿彌陀佛求生西方過蘇州將謁座主王荊石至一寺禮佛稱佛名悲泪不止時舉人黃鍾與一友謁之就坐問曰公信佛念佛一何真實若此良曰人身難得正法難逢佛可不信耶念佛可不真實耶佛法利益人天非宿植善根多生疑謗一失人身受苦無量每一思之痛徹心骨兩人曰公言人身難得舉目便是三人併諸左右非人耶時方仲夏良以扇一揮羣蠅四飛詰曰蠅多與人多與兩人憮然久之良曰始吾為諸生時奉上帝旨掌第五殿閻羅事每夜坐殿上簿書山積亡者三尸自陳身口意業據律定案千百人中不失人身者才一二耳且陽世極刑不過一死陰司受罪痛極則死死已復生如是作如是受絶無適輕適重於其間惟信佛念佛往生極樂者不入冥塗然則佛可不信耶念佛可不真實耶因言殿西有二楹供養雲棲紫柏二大師而雲棲香火為尤盛其後領鄉薦判事漸稀至釋褐而謝事二人聞已毛髮竦豎傳其事以告鄉里焉淨土晨鐘活閻君紀略徐成民名坤小名佛舍江南太倉人父驥生縣學生成民為人長者長齋奉佛年十八當崇禎六年六月十二日夜夢被帝召至忉利天敕示夙世因緣命攝第五殿閻羅王事百日自此每夜坐堂中作呼叱聲若官府決獄狀驥生起而瞷之見一王者南面坐鬼判獄卒猙獰旁列則大驚諦視之而王者乃成民也遲明詢其故成民以實告即令移居寺中諸昆弟及遠近好事者多携筆札伏壁後記其判語得九十餘條決斷精嚴見者身毛為竪成民嘗自言冥中罪囚合四天下動以萬計除付所司分治外其親鞫者猶夕以千計獄有十八刑分萬條塞耳呼號舉目愁慘諸佛菩薩及歷代祖師時來救拔然非宿有善根者雖面與開示惛然不知惟七月之望為佛歡喜日普天下盡演瑜伽施食法大士親領衆囚赴食法力所屆諸罪末減過此則與人世遠隔矣是歲七月望夕成民謂獄官曰好勸衆囚各稱阿彌陀佛能稱阿彌陀佛一聲者合獄都出罪其不能者但令持佛字復詔四門各樹一牌庭中樹三十六幡各各大書阿彌陀佛以示衆囚復詔衆囚前各書佛字於胸而命之曰念之念之慎莫忘佛佛在爾心今告爾等或有惡鬼銅狗犯爾刀劍刺爾自火逼爾爾但稱佛名一切銷滅蓮花現前我若誑爾與爾同罪成民自受事後偶言生死事輒驗自以徐氏先世有負罪縶獄者率諸宗黨禮梁皇懺周而復始得末減乃已頃之至九月十四日成民上表謝事於是修持益力日誦準提呪回向淨土以終其身其判語二集里人揚時泰崑山戴衮序之名曰活閻羅斷案刻行於世活閻羅斷案知歸子曰豫讀文昌化書言張孝仲日應世務夜治幽冥以為異及觀馬良徐成民事乃知其事世多有之觀二人所言善惡報應理有固然無足怪者詩云視爾夢夢我心慘慘又云胡不相畏不畏於天嗚呼可不念哉汪大紳云為甚要念佛要腔子裏光明故也腔子裏香淨故也一分光明得念佛一分力一分香淨得念佛一分力到得滿腔子光明滿腔子香淨這便是極樂世界如今人要長要短弄得腔子裏又黑又臭若到得滿腔子黑臭這便是地獄佛也救他不得
