body:
  text: 張子韶傳張子韶名九成號無垢居士錢塘人也少好學年十四入學宮閉閣終日寒暑不越戶限比舍生穴隙視之斂膝危坐若與神明伍相與歎服既而聞客談楊大年呂微仲事心慕之謁寶印明禪師問入道之要寶印曰念念不捨久久成熟時節到來自然證入令看柏樹子話久之無省謁善權清禪師問此事人人有分箇箇圓成是否善權曰然子韶曰何故九成無入處善權出袖中數珠示之曰此是誰的子韶不能對善權復袖之曰是汝的則拈取去才涉思惟則不是汝的也子韶悚然一夕如廁正提柏樹子話聞蛙鳴契入作偈曰春天月下一聲蛙撞破乾坤共一家正恁麼時誰會得嶺頭腳痛有元沙會先忌日就明靜菴飯僧主僧惟尚才見乃展手子韶便喝惟尚批其頰子韶趨前惟尚曰張學録何得謗大般若子韶曰九成見處祇如此和尚又作麼生惟尚舉馬祖升堂百丈卷席話詰之敘語未終子韶推倒卓子惟尚大呼張學録殺人子韶躍起問旁僧曰汝又作麼生僧罔措子韶毆之顧惟尚曰祖禰不了殃及兒孫惟尚大笑子韶呈偈曰卷席因緣也大奇諸方聞舉盡攢眉臺盤躍倒人星散直漢從來不受欺惟尚亦作偈印之紹興二年擢進士第一授鎮東僉判明於聽斷浙東諸郡訟有不決者皆訴之民冒鹺禁監司有所支連子韶爭之不得遂投檄歸頃之以趙鼎薦召為太常博士遷著作郎尋拜禮部侍郎進對時屢以正心術為言又推陳孟子保民之旨高宗甚向之會金人來議和子韶持不可為執政秦檜所嫉改祕閣修撰提舉江州太平興國宮造徑山謁大慧杲禪師議及格物大慧曰公祇知有格物不知有物格子韶請其說大慧曰不見小說所載唐人有與安祿山謀反者其人先為閬守有畫像存焉明皇幸蜀見之怒令侍臣以劒擊像首其人在陝西忽頭落子韶言下領旨題壁曰子韶格物妙喜物格欲識一貫兩箇五百一日又問曰前輩既得後何故復理會四料揀大慧曰公之所見但可入佛不可入魔豈可不從料揀中去耶子韶遂舉克符問臨濟至人境兩俱奪不覺欣然大慧曰余則不然子韶曰師意如何大慧曰打破蔡州城殺却吳元濟子韶廓然得大自在嘗曰余聞徑山老人所舉因緣如千門萬戶不消一踏而開或與聯輿接席登高山之上或緩步徐行入深水之中非出常情之流莫知吾二人落處余得了末後大事實在老人處此瓣香不敢孤負老人也既復謫守邵州逾年丁父憂歸卒哭後詣徑山飯僧請大慧升座說法而秦檜憾子韶不已命言者劾子韶謗訕朝政并連大慧遂竄大慧於衡陽子韶落職安置安南軍既至閉門謝客以經史自娛縕袍糲食親知餽遺一切謝遣安南故少雪歲多疫癘子韶乃為民禱於龍神甫半日得雪盈寸䖍寇擾鄰境或請避之子韶曰吾謫此死分也何避為因為守二畫計以火攻之寇散走居十四年秦檜死復祕閣修撰知溫州大慧亦放還梅陽至贛州維舟俟之而子韶適至連舟東下至新淦而別子韶論不愁念起惟怕覺遲作偈曰念是賊子覺是賊魁捶殺賊魁賊子何歸堂堂大路惟吾獨之越南燕北遼東隴西撒手便到何慮何疑神劒在山鍔冷光寒魈夔罔兩莫之敢干此名真覺秦時𨍏轢大慧賡之曰說覺說念翻背作面無念無覺何處摸索起是誰起覺是誰覺豁開戶牖太虗遼廓撒手前行不顧人秦時𨍏轢何時作既至溫寬其賦斂道以禮法民大和悅會戶部遣吏督軍糧子韶移書陳其害戶部持之遂乞祠歸明年大慧復領徑山訪子韶於慶善院子韶曰九成每於夢中誦語孟何如大慧舉圓覺經云由寂靜故十方世界諸如來心於中顯現如鏡中像子韶曰非老師莫聞此論也子韶閒居取華嚴善知識日供其二回食以飯僧又嘗供十六大天杯中茶悉化乳作偈曰稽首十方佛法僧稽首一切護法天我今供養三寶天如海一滴牛一毛有何妙術能感格試借意識為汝說我心與佛天無異一塵才起大地隔倘或塵消覺圓淨是故佛天來降臨我欲供佛佛即現我欲供天天亦現佛子若或生狐疑試問此乳何處來狐疑即塵塵即疑終與佛天不相似我今為汝掃狐疑如湯沃雪水消氷汝今微有疑與惑子便到新羅國歸數月苦風痺家人環之泣子韶曰吾平生踐履今日愈覺有力何乃為兒女子呫呫涕泣耶疾稍閒設絳帳自居訓子姪益勤二十九年夏六月六日語從子榕曰吾其逝乎是夕疾作遂卒年六十有八朝命復敷文閣待制贈左朝請大夫子韶平生謹於法度衣食器物率常用敝惡或問此是性耶子韶曰汝且道我每日用心在何處既老讀書不輟嘗倚柱就明歲久雙趺隱然五燈會元宋史知歸子曰豫讀無垢居士書蓋欲擔荷五常闡孔孟心法者其於佛道未暇及也而世儒往往以禪議之意其生平得力之故固有不可掩者乎此則子韶之所以為子韶也汪大紳曰豫於佛道亦未暇及然使豫有立於世知必有以禪議豫者矣知歸讚語蓋具深心
