body:
  text: 李長者傳李長者名通元唐宗室子也為人美鬚髯朗眉目丹唇紫肌天稟超特而學無常師迹不可測少留情易道妙盡微旨年四十餘專精內典嘗遊五臺入善住院逢異僧授以華嚴大旨將別長者曰師去何之僧指北峯頂其夜望見北峯火光亘天長者曳杖而登見前僧在火光中樹紫金幢帝冠者數百圍繞長者湧身入作禮而起忽失前境乃於巖上一坐三日已而下山遂發弘經之願在則天朝會華嚴經新譯八十卷成持至太原寓高仙奴家日食十棗柏葉餅一枚居三年遷馬氏古佛堂閲十年又負經而去行二十里遇一虎當路長者撫之曰吾將著論釋華嚴經汝當為我擇一棲止即以經囊負其背至神福山下有土龕焉虎依龕而蹲長者入龕虎乃去山中故無水是夕風雷拔龕前松出泉清洌甘美山中人因號之曰長者泉夕則吐白光以代鐙炬二女子不知其自來日為長者汲泉炷香奉紙墨食時則具淨饌置長者前食已徹去起開元七年至十八年著論畢二女子亦遂去不見長者自為論序云夫以有情之本依智海以為源含識之流總法身而為體只為情生智隔想變體殊達本情亡知心體合今此大方廣佛華嚴經者明衆生之本際示諸佛之果源其為本也不可以功成其為源也不可以行得功亡本就行盡源成源本無功能隨緣自在者即此毗盧遮那也以本性為先智隨根應大悲濟物以此為名依本如是設其教澤滂流法界以潤含生於是寄位四天示形八相菩提場內現蘭若以始成普光法堂處報身之大宅普賢長者舉果德於藏身文殊小男創啓蒙於金色以海印三昧周法界而降靈用普眼法門覩塵中之剎海依正二報身土交參因果兩門體用相徹以釋天之寶網彰十剎之重重取離垢之摩尼明十身而隱隱無邊剎境自他不隔於毫端十世古今始終不離於當念其為廣也以虗空而為量其為小也處極微而無迹十方無卷即小相而匪虧纖塵不舒含十方而非礙於智海果德顯殊分於五位之門常住法堂示進修於九天之上此方如是十剎同然聖衆如雲海會相入智凡不礙狀多鏡以納衆形彼此無妨若千燈而共一室論中大要明衆生性即諸佛性迷即為凡悟即是佛但能信入從始發心文殊理普賢行一時頓印如將寶位直授凡庸回觀世間如夜夢千秋覺已隨滅故其明十種發心云賢首品中從凡夫位以信為首決定取佛大菩提故從凡夫地信十方諸佛心不動智與自心無異智故只為無明所迷故無明與十方諸佛心本來無二故從凡夫地信十方諸佛身根本智與自身無異故何以故皆是一法性身一根本智猶如樹株一根多生枝葉等以因緣故一樹株上成壞不同故從凡夫地信如來十住十行十回向十地我悉盡能行之何以故自憶無始時來波流苦海無益之事尚以行之何況如今菩薩萬行濟衆生事豈不能為從凡夫地信十方諸佛皆從三昧生我亦當得何以故諸佛三昧皆從如來自性方便生我亦具有如來自體清淨之性與佛平等從凡夫地信十方佛一切神通我亦當得何以故諸佛神通依真智而得我但依真性智中無有煩惱無明成智一切業亡唯有智慈通化自在從凡夫地信佛智慧我亦當得何以故一切諸佛悉從凡夫來故從凡夫地信佛大悲普覆一切我亦當得何以故諸佛大悲從大願起我亦如諸佛發大願故從凡夫地信佛自在我亦當得何以故諸佛自在於性起法門智身法身入衆生界不染色塵諸根自在我亦不離性起如來智故從凡夫地信自發心經無盡劫修功德行滿位齊諸佛不移一念何以故為三世無時故如是從凡夫信解始終徹佛果位如上所發十種信者必能決定成就十信之門住於堅固之種永不退轉他所論暢演一乘義至深廣此其最切者長者常冠樺皮衣麻衣長裙博袖散腰徒跣放曠人天靡所拘執一日出龕遇山中人高會宴樂長者語之曰汝等好住吾將歸矣衆驚其去有送者至龕謝遣之是夕烟雲凝布巖谷震蕩有白鶴翔空哀唳其餘飛走悲鳴滿山山中人共往候之則已端坐示寂於龕中矣白光從頂而出上徹於天時開元十八年三月二十八日壽九十有六所著華嚴論四十卷決疑論四卷略釋一卷解迷顯智成悲十明論一卷至於十玄六相百門義海普賢行門華嚴觀等及諸偈讚並傳於世宗教兩家咸推服焉華嚴合論決疑論序賢首宗乘清凉通傳華嚴持驗記知歸子曰豫讀華嚴經悲悔故見狹劣暗大方不知局此幾何世然而渾渾乎其無涯郁郁乎淵淵乎無所施吾視聽也久之得李長者論紬繹之恍乎其有會焉吾願生生窮遊於華藏海中其庶幾乎汪大紳云無相光中常自在長者之謂矣知歸子讀華嚴經有得輒告吾吾不信也今觀傳贊知所得於經論者有以發其覆而遊於廣大高明之域口吐白光代炬為說華嚴之始白光從頂而出上徹於天為說華嚴之終長者其有以教我矣
