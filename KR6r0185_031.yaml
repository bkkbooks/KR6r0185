body:
  text: 三李馮蔡二吳顏呂葛余張傳李似之初名彌遠後易名彌遜號普現居士蘇州吳縣人也大觀三年登第官起居郎久參圜悟禪師一日早朝回至天津橋馬躍忽有省通身汗流直造天寧寺適圜悟出門遙見便喚曰且喜居士大事了畢似之厲聲曰和尚眼花作麼圜悟便喝似之亦喝於是機鋒迅捷每與圜悟問答當機不讓以封事鯁切貶知廬山縣改奉嵩山祠宣和末起知冀州建炎三年復官起居郎纍遷至戶部侍郎秦檜主和議似之抗疏力爭不可檜邀至私第以甘言要之似之曰彌遜受國厚恩何敢見利忘義顧今日之事國人皆以為不可獨有一去可報相公檜默然似之再上疏爭益力紹興九年出知端州改漳州明年乞罷職隱連江西山檜猶以前事為憾削其籍似之遂屏絶人事築菴以居十餘年一日示微疾索湯沐浴畢作偈曰漫說從來牧護今日分明呈露虗空拶倒須彌說甚向上一路遂擲筆趺坐而逝既朝廷思其忠復敷文閣待制同時趙表之者名令襟太祖五世孫也參圜悟於甌阜圜悟曰此事要得相應直須死一回方得表之得旨嘗自疏曰家貧遭劫誰知盡底不存空室無人幾度賊來亦打圜悟囑令加護宋史五燈會元夷堅志李德遠名浩建昌人紹興中進士纍官吏部侍郎立朝忠憤激烈言切時弊人不敢干以私嘗讀首楞嚴經如遊舊國後造明果問法於應菴應菴揕其胸曰侍郎死後向甚處去德遠駭然汗下應菴喝出德遠退而力究不旬日徑躋堂奧以偈寄同參嚴康朝曰門有孫臏鋪家存甘贄妻夜眠還早起誰悟復誰迷康朝湖州長興人參應菴得旨作頌曰趙州狗子無佛性我道狗子佛性有驀然言下自知歸從茲不信趙州口著精神自抖擻隨人背後無好手騎牛覓牛笑殺人如今始覺從前謬又有鬻胭脂者亦久參應菴頗自負德遠贈以偈曰不塗紅粉自風流往往禪徒到此休透過古今圈䙡後却來者裏喫拳頭德遠後為夔路帥卒於官宋史續燈存稿增集續傳燈録李漢老名邴濟州任城人也登崇寧五年第紹興初官資政殿學士立朝挺挺有大節屢陳戰守之䇿不報歸老泉州語具宋史中大慧禪師方住泉南長樂菴漢老數往叩擊一日大慧舉自頌趙州庭前柏樹子話拈云庭前柏樹子今日重新舉打破趙州關特地尋言語敢問大衆既是打破趙州關因甚特地尋言語良久云當初將為茅長短燒了原來地不平漢老忽然有省別後以書告曰邴平生學解盡落情見一取一舍如衣壞絮行草棘中適自纏繞今一笑頓適欣幸可量頃有可自驗者三一事無逆順隨緣即應不留胸中二宿習濃厚不加排遣自爾輕微三古人公案舊所茫然時復瞥地但恐得少為足當擴而充之願更加提誨大慧答書曰但盡凡情別無聖解公既一笑豁開正眼消息頓亡得力不得力如人飲水冷暖自知矣然日用之間當依黃面老子所言刳其正性除其助因違其現業此乃了事漢無方便中真方便無修證中真修證也漢老遂命工圖大慧像奉之終身卒諡文敏宋史大慧年譜語録馮濟川名楫蜀遂寧人也由太學登第初參佛眼遠禪師一日同佛眼經行偶有童子吟曰萬象之中獨露身佛眼拊濟川背曰好聻濟川於是有省紹興七年除給事中會大慧杲禪師就明慶寺開堂濟川進見大慧下座次濟川問曰和尚常言不作這蟲豸為什麼今日敗闕大慧曰盡大地是箇杲上座你作麼生見濟川擬議大慧便掌之明年濟川依大慧坐夏山中日止一食長坐不臥一日大慧舉藥山初參石頭及馬祖因緣濟川復有省因舉呈大慧曰恁麼也不得囌嚕娑婆訶不恁麼也不得㗭唎娑婆訶恁麼不恁麼總不得囌嚕㗭唎娑婆訶大慧印以偈曰梵語唐言打成一塊咄哉俗人得此三昧既而兼修淨業作彌陀懺儀嘗出帥瀘南率道俗作繫念會以西方為歸時經建炎兵亂後名剎藏經多殘乃捐俸錢造大藏經四十八所小藏四大部者亦如其數分貯諸剎後知卭州二十三年秋乞休預報親知期以十月三日告終至期令後廳置高座見客如平時日將午具衣冠望闕肅拜請漕使攝州事著僧衣據高座囑諸官吏道俗各宜向道建立法幢遂拈拄杖按膝泊然坐化漕使曰安撫去住如此自由何不留一偈以表異蹟濟川復張目索筆書曰初三十一中九下七老人言盡龜哥眼赤有語録頌古行於世大慧年譜五燈會元蔡子應名樞閩興化人也紹興初官吏部郎中家居日請大慧住靈巖天宮菴與李漢老同咨法要既而以書自通所得曰樞近看狗子無佛性話恰似平地釘個繫驢橛子一除除却頓覺廓然本無罣礙見得竹篦子徹底分明自己腳根下一段大事明如皎日廓若太虗從本以來不生不滅不變不易赤骨歷著一絲毫不得直饒千佛出世亦無摸索處菩提煩惱真如涅槃皆為剩法因作頌曰雲門篦子逢人便舉有眼無睛徒勞下語又曰狗子無佛性截斷衲僧命打破趙州關識得雲門病大慧可之已而大慧在衡陽聞李漢老卒遣僧弔之歎曰泉南道友零落殆盡今惟蔡郎中一人而已不若生祭之乃為文曰致祭於靈巖山下半風半顛大脫空居士之靈惟靈鐵器市裏牙人脫空場中主將黑豆換人眼睛只做這般伎倆將謂閻老不知一向起模畫㨾而今死去見渠看你有何憑仗鑊湯爐炭橫行劍樹刀山逆上我儂聞說欣然呆漢攢眉惆悵人情敢不周旋薄奠聊陳供養郭郎線斷俱休嗚呼哀哉尚饗僧未至而子應卒矣復繫以辭曰嗚呼始以前文與公相戲此意未達公已瞥地二俱偶然初無實義公既去矣文焉敢棄就而祭之是法如是建州劉子羽名彥修紹興中知泉州亦參大慧看柏樹話有省頌曰趙州柏樹太無端境上追尋也大難處處緑楊堪繫馬家家門底透長安大慧年譜續燈存稿吳元昭名偉明邵武人南宋初官學士嘗閲華嚴梵行品自謂有悟入處大慧見其所為跋語曰此人只悟得無梵行而已既謁大慧呈解大慧不許并為痛說禪病因舉狗子無佛性話元昭疑之留菴十日呈解二十次俱不許因語之曰不須呈伎倆直須啐地折𪹼地斷方了得生死即辭去道次延平忽然契悟因將室中所舉因緣連書數頌其一云不是心不是佛不是物通身一串金鎖骨趙州親見老南泉解道鎮州出蘿蔔大慧證以偈曰通身一串金鎖骨堪與人天為軌則要識臨濟小廝兒便是當年白拈賊其法友彌光和之曰通身一串金鎖骨正眼觀來猶剩物縱使當機覿面提敢保居士猶未徹大慧年譜吳十三者遺其名建寧仙州人紹興中給侍開善謙公參究頗力忽於夜中有省占偈曰元來無縫罅觸著便光輝既是千金寶何須彈兒開善答之曰啐地折時真慶快死生凡聖盡平沉仙州山下呵呵笑不負相期宿昔心續燈存稿如如居士顏丙者雪峯然公嗣也嘗作三教詠曰硬似綿團軟似鐵六月炎天一點雪露柱燈籠笑點頭啞子得夢向誰說古來三教強安名如來杜口於磨竭夫子謂默而識之老聃謂大辨若訥直饒剖破作一家不免落在第二月又頌子湖狗話曰貧家無所有只養一隻狗便是佛出來也須遭一口著勸修淨業文行於世續燈存稿學佛考訓呂鐵船遺其名母秦國夫人夢福巖佑公至家而生鐵船弱冠時即究心法要日夕參空山禪師一日師問曰曾見趙州麼鐵船厲聲曰無師休去每稱於人曰再來人也嘗任江淮都總管於蘇嘉定建永壽寺以延僧達摩忌日拈香曰西來不稱梁王旨西去空擕一隻履若言妙用與神通真正衲僧誰數你九年面壁尋出場接得一人又無臂衣盂連纍到盧能從此葛藤生不已罪過有彌天源流無滴水今朝七百八十六年逢忌辰那個兒孫不痛徹骨髓一爐香篆一甌茶報恩却是孤恩的欲把拳頭舉似伊憐渠已沒當門齒有山居詩及諸偈言俱超倫邁俗續燈存稿葛謙問名郯不詳其里居少擢上第玩心禪悅謁無菴全公全令看即心即佛久無所契請曰有何方便使郯得入全曰居士太無厭生再參佛海舉全所示語佛海曰即心即佛眉拖地非心非佛雙眼橫蝴蝶夢中家萬里杜䳌枝上月三更一日舉不是心不是佛不是物㸌然頓悟作頌曰非心非佛亦非物五鳳樓前山突兀艷陽影裏倒翻身野狐跳入金毛窟寄呈佛海海報曰此事非紙筆可既居士能過我當有所問遂至虎邱海迎之曰居士見處止可入佛不可入魔謙聞叩請其說海正容曰何不道金毛跳入野狐窟謙問乃痛省遂嗣其法淳熙六年守臨川感微疾大書曰大洋海裏打鼓須彌山上聞鐘業鏡忽然撲破翻身透出虗空召僚屬示之曰生死如晝夜無足怪者若作生死會去道遠矣端坐而逝五燈會元法喜志余放牛者遺其名杭州人參無門開公凡有論說無門連道不是不是放牛不服退見臭菴問曰師在無門得甚麼見解臭菴曰吾在無門祇得兩個字不是不是放牛有省乃曰今日始知無門為人處一點惡水不曾輕灑著人因著是非關行於世嘗曰是法平等不離本心十方三界六道四生萬別千差皆歸當念看經念佛布施持齊不隔纖毫臨官治政事主奉親有何不可若乃妄談般若設法安身誑惑人天隨業受報色身與法身無異我性與佛性一同但要識得本心便可出離生死把纜放船不是不是遂嗣法於無門先覺宗乘張功甫名鎡家於杭州南湖之上官直祕閣學士參密菴傑公歸而靜坐究狗子無佛性話有省自言胸臆豁然如太虗空了無障礙祖師言句是入道之門守著不放亦為大病自此塵緣世念不著排遣自然淨盡古人公案昔所茫然今亦無疑矣嘗聞鐘聲作頌曰鐘一撞耳根塞赤肉團邊去箇賊有人問我解何宗舜若多神面門黑晚而致仕頗極遊觀之樂其言曰昔賢云不為俗情所染方能說法度人蓋光明藏中孰非遊戲若心常清淨離諸取著於有差別境中而能常入無差別定則淫房酒肆遍歷道場鼓樂音聲皆談般若倘情生智隔境逐源移如鳥黏黐動傷軀命又烏所謂設法度人者哉後捨宅建寺曰慧雲請破菴先公居焉佛法金湯武陵舊事知歸子曰豫讀宋史觀三李所建立誠卓然豪傑之士其入道之捷如師子奮迅擺脫韁鎖而去矣馮濟川掉臂宗門復回心淨土吾師乎吾師乎元昭以下諸賢其行事不概見於傳記其得法機緣如此顧不偉哉汪大紳云吾有知乎哉無知也有鄙夫問於我空空如也我叩其兩端而竭焉早知此事四十偈私記可以不作
