body:
  text: 知歸子傳知歸子者不傳其姓名平生落落自喜人莫識也嘗與空空子遊空空子異之知歸子世為儒其父兄皆以文學官於朝知歸子年未冠用儒言取科第既益治古經注疏及世間文字窮晝夜不自休嘗慕古抗直士如洛陽賈生之為人也思欲考鏡得失之故陳治安之書赫然著功名於當世久之自省曰此非吾務也於是端點靜思反己修德非禮弗履久之復自省曰吾未明吾心奈何以問空空子而空空子默然無言也或告以道家修鍊術習之三年不效其後讀佛書心開以為道之所歸在是矣聞西方有無量壽佛放大光明接引五濁眾生往生淨土意忳然慕之日面西而拜焉空空子曰是可不謂知歸者乎年三十有司下檄召作七品官知歸子辭焉作偈曰綠草庭前好風林下樂我太平無冬無夏頃之遂斷肉食絕婬慾作偈曰我身爾身爾肉我肉大德曰生與爾並育又作偈曰從妄有愛萬死萬生猛然斫斷天地清寧未幾隱去遺一偈曰來無所從去無所至極樂非遙當念即是空空子曰或言知歸子往來城市間時與人遇然予嘗求之弗見也羅臺山贊曰予與知歸子游舊矣吾不知其始渺然相失逖而萬里乾隆三十年歲陽耑蒙歲名作噩乃相遇於京師且月炎天氷光滿屋脈脈心歡喜談丹鼎考故童晝暮追戀爾我都忘邀我閉關延壽寺街長洲舘圓覺經一部莊子一卷或趺坐之幽幽或說空之侃侃出關行省其兄汶上縣於汶上縣寄我書書辭短短無他語要我素貧賤砥礪其廉隅我時得書贊歎謂奇特如聽朝陽鳳咮雝雝嗚高梧彼時我心刻刻有一知歸子彼時我欲徹究儒釋黃老之原與其氐凉凉求耦欲奮而未奮自得知歸子我膽廓廓斗覺新寬粗知歸子文章根性如梅如青蓮寒香寂靜和祥扇為人慈竺貌臞然畏避利勢疑懦頑聞一善言見一善行意而有勇健若霜中鳶慊慊乎其如有求也貪夫之徇財好色者𤣏色渴夫之思飲周飢者索食日皇皇而不息夜鰥鰥以水眸最後聞無量壽佛名字遂積念焉不休其志灝然若迦樓羅王之闢海水而吞龍也其身飄然若不繫之舟蓮海無邊而嵯峨乎中流憺乎其幾於不憂也閔乎嘵嘵唇敝舌焦其嘯侶而命儔也吾之不見知歸子三歲矣一日十二時十二時百刻睇睞送遙睛喉閒長格磔自今以往倘得相於茅屋三間危峯鏡湖好華一瓶名香一鑪一箇蒲團一箇盂佛號數萬聲華嚴一兩卷不亦樂乎不亦樂乎䱐水瀰瀰日往月來云何不思乾隆四十一年歲易涒灘歲名柔兆陬月吉日造居士傳䟦儒佛之道泥其跡若東西之相反然循其本則一而已矣知歸子之學出入儒佛間初未嘗強而同之而卒不見其有異所謂知本者非耶既以自利又欲利人上下數千百年凡偉人碩士有契斯道者采其言行比以史法合為一書名曰居士傳事提其要句鉤其元真法門班馬也僕少失學耽著五欲順流忘返年三十宦遊京師偶於市上得覩雲棲法彚惕然心動捧歸卒業始知信向歸田以往客居吳門於勤息菴曉峯老人處熟知歸子名後接晤於文星閣中服其持律之堅向道之切不覺惘然自失知歸子顧以予之能不背於道也於是往還無間頃之出此書示予予讀之竟作而歎曰自為儒佛之學者迷不知本黨同伐異泣岐無歸知歸子起而救之是書之作盖欲學者除去異同之見反循其本而致力焉至於一旦豁然還問其所為儒佛者如水中月如空中華復何異同之有予既樂玩其書爰授之梓人以廣其傳兼誌其緣起如此乾隆四十年秋八月養空居士王廷言䟦
