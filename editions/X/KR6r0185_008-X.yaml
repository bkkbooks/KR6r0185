body:
  text: 荊山居士傳荊山居士陸法和者不知何許人也齊梁間隱於江陵百里洲衣食居處一與戒行沙門同耆老自幼見之容色常定人莫能測也既居荊州高要縣紫石山無故捨去俄而有蠻亂矦景之降梁也居士謂南郡朱元英曰貧道助檀越擊之元英曰矦景為國立效擊之何也不省及景圍臺城居士時在青溪山元英往問曰景事云何居士曰凡人取果宜待熟時不撩自落檀越但待景熟時何勞問也固問之則曰亦克亦不克景遣其將任約擊湘東王於江陵居士乃詣湘東乞征約召諸蠻子弟八百人誓之江津且發湘東復遣胡僧祐領兵千餘益其軍居士笑曰吾兵馬甚盛何須此江陵多神祠人俗祈禱即騐自居士軍出祈禱無騐者人以為神皆從行也至赤沙湖與約相對居士乘輕舟不甲冑沿流而下去約軍一里而還謂將士曰吾觀彼龍軍睡不動吾軍之龍甚踴躍即攻之逐縱火舫於前而風逆居士執白羽扇麾風風即返約眾見梁兵步水上遂大潰眾皆投水死而約逃竄不知處居士曰明日日中當得及期未得人問之居士曰吾前於此洲水涸時建一剎語檀越等此雖為剎實賊標今何不向標下求如其言果於水中見約抱剎仰頭纔出鼻遂擒之約見居士求死居士曰檀越與王有緣決無他慮王於後且當得檀越力也湘東果釋之用為郡守及魏圍江陵約以兵赴救力戰如居士言居士既平約會蜀賊將至請守巫峽待之乃總諸軍而往親運石以填江三日水不流橫以鐵鎖武陵王紀果遣蜀兵來渡峽口勢蹙進退不可居士與王琳一戰殄之居士為人言若不出口及有所論則雄辨無敵生平多諸靈異甞於襄陽城北大樹下畫地方二尺令弟子掘之得一龜長尺半以杖叩之曰汝欲出不能數百歲矣不逢我者豈見天日乎為授三歸初入疊山多惡疾人居士為采藥療之率不過三服即差即求為弟子山中毒蟲猛獸授以禁戒即不復噬螫所泊江湖每於岸側表云此處放生漁者即皆無所得得即大風雷放之乃定將兵時禁諸軍漁捕甚嚴有竊違者中夜即有猛獸來欲噬之或亡其船纜有小弟子戲截蛇頭已而詣居士居士曰何殺蛇弟子愕指曰是非汝所殺者乎弟子乃見蛇頭齚袴襠振之不落則恐居士使懺悔為蛇作功德又有人以牛試刀斷牛頭已而詣居士居士曰有一斷頭牛就卿徵命殊急若不為作功德一月內報至其人弗信少日果死梁元帝即位以居士為都督郢州刺史封江業縣公已而加司徒部曲數千人通呼為弟子唯以道術為化不以法獄其市法以空櫝鎖置道間上開一孔受錢賈人計貨輸稅自委諸櫝中及夕有司開櫝條其稅目輸之庫居士在江夏大聚兵艦欲襲襄陽入武關元帝使止之居士曰法和求佛之人尚不希釋梵天王坐處豈規王位但於空王佛所與主上有香火因緣見主上應有報至故相援耳今既被疑業定不可改也及魏舉兵居士自郢入漢口將赴江陵元帝又使止之曰此間自能破賊但鎮郢州不須動也居士乃還州堊其城門著麤白布衫有袴邪巾大繩束腰坐葦席終日乃脫之及聞元帝敗滅腹著前凶服哭泣受弔齊文宣使清河王岳將兵攻魏救梁會江陵陷居士乃舉州入齊文宣以為大都督十州諸軍事太尉公居士入朝不稱臣但云荊山居士文宣親宴之賜錢百萬物千段甲第一區田一百頃奴婢二百人生資什物稱是居士所得奴婢盡免之曰各隨緣去錢帛散施一日便盡以官所賜宅營佛寺自居一房三年間再為太尉無預告弟子死期至時燒香禮佛坐繩牀而終浴訖將斂尸小縮至三尺許既文宣令開棺視之空棺而已居士有讖語預道齊事後一一皆驗北史知歸子曰吳人汪生言居士在佛門得吟風弄月吾與點也之趣瑞金羅生以汪生之言為然或乃以靈異震居士也悲夫
