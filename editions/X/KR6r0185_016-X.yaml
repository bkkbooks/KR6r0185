body:
  text: 顏清臣韋城武傳顏清臣名真卿琅邪臨河人也舉開元中進士擢制科天寶末年為平原太守安祿山反舉兵為諸郡倡扼其衝大破賊肅宗即位赴行在授憲部尚書遷御史大夫立朝嚴重直道而行不畏疆禦以是不容於朝屢外轉乾元初拜浙江節度使清臣故信樂佛法甞受戒於湖州慧明問道於江西嚴峻時肅宗詔天下立放生池清臣為立歌誦主德助宣佛化其文曰皇唐七葉我乾元大聖光天文武孝感皇帝陛下以至聖之姿屬艱難之運無少康一旅之眾當祿山強暴之初乾鞏勞謙厲精為理推誠而萬方胥悅克己而天下歸仁恩信侔於四時英威達於八表功庸格天地孝感通神明故得回紇奚霫契丹大食盾蠻之屬扶服萬里決命而爭先朔方河東平盧河西隴右安西黔中嶺南河南之師𧯘五年椎鋒而効死摧元惡如拉朽舉兩京若拾遺慶緒遁逃已蒙赤族之戮思明跧伏行就沸湯之誅拯已墜之皇綱據再安之宗社迎上皇於西蜀申子道於中京一日三朝大明天子之孝問安視膳不改家人之禮蒸蒸然翼翼然真帝皇之上儀誥誓所不及已而嫗煦萬類勤勞四生乃以乾元二年春三月己丑端命左驍衛右郎將史元琮中使張廷玉奉明詔布德音始於洋州之興道洎山南劍南黔中荊南嶺南江西浙江諸道訖於昇州之江寧秦淮太平橋臨江帶郭上下五里各置放生池凡八十一所盖所以宣皇明而廣慈愛也易不云乎信及豚魚書不云乎鳥獸魚鼈咸若古之聰明睿智神武而不殺者非陛下而誰昔殷湯克仁猶存一面之網漢武垂惠纔致䘖珠之答雖流水救涸寶勝稱名盖事止於當時尚介祉於終古豈如今者動者植者水居陸居舉天下以為池罄域中而蒙福乘陀羅尼加持之力竭煩惱海生死之津揆之前古曾何髣髴微臣職忝方面生丁盛美受恩寖深無以上報謹緣皐陶奚斯歌虞頌魯之義述天下放生池銘一章雖不足雍容明聖萬分之一亦臣之情懇也敢刻金石著其辭曰明明皇帝臨下有赫至德光大乾元啟賾緯武勘亂經文御歷孝感神明義形金石仁覆華夏恩加蠻貊道冠巍巍威深虩虩遘茲多難克廣丕績慶緒致誅史明辟易人道助順天道惡逆撲滅之期非朝伊夕乘此寶祚永康宗祐業盛君親功崇列辟交禪之際粲然明白迴映來今孤高往䇿去殺流惠好生立辟率土之濵臨江是宅遂其生性庇爾鱗翮環海為池周天布澤致茲忠厚罔弗怡懌動植依仁飛沉受獲流水長者從稱往昔寶勝如來疇庸允格德力無競慈悲孔碩相時傳聞尚賴弘益矧在遭遇其忘敷錫真卿勒銘敢告凡百文成復上表肅宗乞御書其額肅宗詔曰朕以中孚及物亭育為心凡在覆載之中畢登仁壽之域四靈是畜一氣同依江漢為池魚鼈咸若卿慎徽盛典潤色大文能以懿文用刊樂石體含飛動韻合鏗鏘成不朽之立言結好生之上德倡而必和自古有之情發於衷予嘉乃意所請者依德宗朝官太子太師為宰相盧𣏌所嫉李希烈反請遣清臣往宣詔旨希烈欲降之萬方終不屈卒為賊所殺年七十七淮泗平子頵碩以其喪歸將易棺以葬發之顏色如生唐書魯公文集鐔津集韋城武名臯京兆萬年人也生彌月父飯僧祈福一胡僧不召而至坐之庭中既食乳母抱兒出胡僧忽升階謂兒曰別久無恙乎兒目僧而笑眾詰其故胡僧曰此兒諸葛武侯後身也夙有惠於蜀他日當為蜀帥受蜀人之福吾與之有舊故來相視父因以武字之已而起家帥府為監察御史德宗朝知隴州行營留事朱泚反署為御史城武斬其使遣兄平乃弇赴行在授隴州刺史置奉義軍拜節度使貞元初移劒南西川節度使治蜀二十有一年數出師破吐蕃服南詔府庫既實三年一復其民賦蜀人安之封南康郡王雅信樂佛法請清凉國師著法界觀元鏡一卷甞作鸚鵡舍利記曰元精以五氣授萬類雖鱗介羽毛必有感清英淳粹者矣或炳耀離火或稟奇蒼精皆應乎人文以奉若時政則有革彼禽類習乎能言了空相於一念留真骨於已斃殆由元聖示現感於人心同夫異緣用一真化前歲有献鸚鵡鳥者河東裴氏以此鳥名載梵經智殊常類常狎而敬之始告以六齋之禁比及辰後非時之食終夕不視或教以持佛名號者當由有念以至無念則仰首奮翼若承若聽其後或俾之念佛則默然而不答或謂之不念即唱言阿彌陀佛歷試如一曾無爽異予謂其以有念為緣生以無念為真際緣生不答為緣起也真際離言言本空也每虗室或曙發和雅音穆如笙竽念念相續聞之者莫不洗然而嘉善矣以今年七月悴而不懌已而日甚馴養者知其將盡乃鳴磬告曰將西歸乎為爾擊磬爾其存念每一擊磬一稱阿彌陀佛暨十擊磬而十念成斂羽委足不震不仆奄然而絕按釋典十念成往生西方又云得佛慧者歿有舍利遂命火以闍維之法餘燼之末果得舍利十餘粒炯爾耀目瑩然在掌識者驚視聞者駭聽時有高僧慧觀常詣五臺山巡禮聖迹聞說此鳥涕泪悲泣請以舍利於靈山用陶甓建塔旌其異也予謂古之所以通聖神階至化者女媧蛇軀以嗣帝中衍鳥身而建侯紀乎䇿書其誰曰語恠而況此鳥有宏於道聖證昭昭胡可默也是用不愧直書於辭順宗朝王叔文等亂政城武上表請太子監國暴叔文等之姦已而太子遂受禪叔文等皆罷黜是歲卒於西川贈太師諡忠武蜀民思其德立廟祀之唐書宣室志佛祖通載知歸子曰記稱顏公少遇道士陶八八得鍊神之術期以他日待公於羅浮公既死有人至羅浮見二客圍棋一客顧之曰煩寄一書於北山顏氏乃受書而還其子得書大驚曰此先太師手筆也公之得仙無足異者然予讀公書其於佛法信向久矣若韋公者其亦顏公之亞也故合而論之汪大紳云如此大人物却以兩篇文字作對合而傳之抑何妙遠不測曰慈悲心所發故宏法深心所成故
