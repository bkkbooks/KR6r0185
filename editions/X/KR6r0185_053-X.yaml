body:
  text: 溫月峰崔應魁蔣虎臣李生傳溫月峰者逸其名亦不詳其里居隱於江西宜黃扶笋峰不婚娶亦不去髭髮幅巾野服翛然而已平居愛逃禪暇則勤種植給衣食稍贏輙與人共之一日行圃間方有竊者遽却走偶行他所見一傭力作甚苦詢之曰無以家也乃携歸試以事輙辦月峰喜為盡舉扶笋聽之已而傭頗驕欲遂據扶笋月峰覺之為好語謝曰扶笋子有也予無事焉挈斗米鐮鋤瓦釜各一具擔而去去峰五里許度阻峻處穴而居垂松葉自蔽出種植如故山中多虎月峰豕畜之或以為規微笑曰是身其吾有哉藝圃次有虎薄而睨之月峰拱語曰子欲之乎今飼汝即解衣就虎虎伏不動則又曰若念我無侶乎為我點頭三我與若為友虎點頭者三自是月峰出入常與虎偕其寢也以茅偃地席其上或發視之有蟒盤焉亦無害也崇禎初卒年八十餘甞著書論性學甚具既沒而其書不傳懸榻編崔應魁北京永平人少為醫人以疾請者不論直皆為之盡晚歲學佛法下上盤山十八年參諸老宿有省康熈二十七年秋示微疾徧告常所往來者為期訣別至期眾至環坐談笑如平日久之乃曰萬事無常百年有限依我行之決不相誤索筆書偈而逝其偈曰來去赤條條不挂一絲毫本來無一物縱橫任逍遙盤山志蔣虎臣名超金壇人順治四年進士官翰林院修撰以文章自名性寬厚好施常以德報怨督順天學政持守清慎每舉債以賑貧士疏請復古學禁天下有司刑責諸生士林頌之虎臣少時屢夢身為比邱年十五有二道人坐其門言虎臣有師在峨眉慎毋忘宿因他日當相見也居常斷葷肉喜方外交居京師時參大博和尚一日入朝聞喝道聲豁然有省詣大博呈解大博徵詰再三乃可之及督學任滿乃告歸過百泉謁孫鍾元語數日去之匡廬遊鹿門遂直達峨眉居伏虎寺久之有司請修峨眉志乃一至成都已而得疾遺書別當事沐浴端坐吟詩而逝翼日有胡生者遇諸山椒頻呼蔣先生不應及入寺知虎臣已死乃大驚磐山志施愚山集李生江西人不知其名字往來江漢間三十年常如五十許人以一瓢自隨遊行肆上乞牛肉彘膏啖之有餘納諸敗襖中方暑色味不變遇紙筆即書不盡可曉或襍一二字如符篆人與之言不答有府丞者異其人邀至官舍留數日辭去府丞與以葛衣文舄為插花滿頭徜徉過市市兒競奪之輒抱頭不與已而葛敝縷縷風雪中自若也康熙中遂安毛際可遊漢上與生遇於旅館生為書扇頭詩數首皆可讀際可錄而傳之詩曰雲有深山鶴有林不離當處了禪心夜來月照長廊下一句彌陀劫外音又曰明暗全捐正眼開一枝秀出一如來凡夫到此皆成聖拍手相逢一笑回又曰漫去千峯與萬峯重重無盡又重重何如高臥家山裏前有幽篁後有松又曰山色溪光明祖意鳥啼花笑悟機緣有時獨坐臺盤上午夜無雲月一天又曰道有道無俱漫語是淨是禪總強名昧却本來咬枯骨溺沈苦海不知春又曰道行孤高化有緣降龍伏虎自安然於今喜得真三昧月落風廻綠樹邊又曰趙州布衫重七斤失處分明得處真山河大地都盖却誰是當機截斷人又曰千崖雨濕松添老一味秋聲菊轉新莫謂山中無甲子數珠粒粒紀時辰時又有洞庭生者乞食洞庭山中狀類狂者夜則臥寺廡下寺僧驅之已而復來甞題詩壁上云不信乾坤大超然世莫羣口吞三峽水脚踏萬方雲又云有形總是假無象孰為真悟到無生地梅花滿四隣又除夕詩云燈火輝煌慶此宵夜深兒女不相招破蒲團上三更夜那管明朝是歲朝長洲汪琬錄傳之二生者其後皆不知所終安序堂集池北偶談知歸子曰觀溫李諸君子行履類古所稱沉冥者味其言殆寒山拾得之亞與蔣先生之趣遠矣宰官耶比邱耶予烏乎測之
