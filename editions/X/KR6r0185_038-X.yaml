body:
  text: 劉萬李王薛傳劉祖庭名智旺應天人也早歲有孝行已而堅持五戒獨處一樓修念佛三昧居三年心花發明往參東山海舟和尚遂蒙印可景泰元年海舟示寂以大衣麈拂付之古溪澄公作東山顧命歌贈祖庭其辭曰金陵有箇奇男子參訪明師求直指見說傳燈錄上人志氣衝天奮然起念彌陀如自己拶得寒氷化為水任他非佛與非心務要禪河窮到底晝亦然夜亦然銕牛不動痛加鞭撒手懸崖知落處千重慾網打不住碧眼胡僧沒奈何分付袈裟為信具趙州禪真罕遇截斷南山老葛藤明月清風送君去明詩偶鈔萬民望名表號鹿園居士寧波衛人也世襲指揮僉事正德十七年登武科進士官至南京中軍都督僉書少落落有大志不事家人業晝習騎射夜燒燭讀書慕諸葛孔明之為人也揭寧靜淡泊四言於座右嘉靖中與唐應德王汝中羅達夫為友研窮性命之學已而閱佛書有契聞關西釋自然者以苦行煉磨得道因與語大悅之自是參究不輟一日被衲入伏牛山曉行見日升忽大悟甞語學者言學貴真悟語言精切不離見解聖賢工夫莫先格物格物者格吾心之物也掃蕩一切獨觀吾心格之又格愈研愈精到得頓悟本來則徹底明淨不為一切情境所轉如鏡照形鏡無留形如鳥飛空空無鳥跡斯則融識歸真反情復性矣一日與達夫論道於臨江達夫躍然而歸遺書曰自聞教後終日忻忻若出樊籠見大世界若入巨海見龍宮藏舉手動脚無非道妙其折服如此民望明習世務論議英偉聞四方有兵變輙自奮迅其所規畫多中要害海上倭起民望方赴官南京散家財募死士遇賊於蘇州奮擊之身中流矢不少挫遂為巡撫周珫畫䇿懸賞格以擕賊黨進兵破賊海上焚其舟居官四十年家無餘資野服翛然時與衲子遊處年五十九無疾端坐而逝有大星隕於庭光射數十丈焦弱侯憺園集明儒學案李文進蜀人也嘉靖中官至都御史總督宣大初在朝時以釋氏為異端請除之上不從歸而不樂有方山人者見而問其故曰吾幼時讀聖賢書即知釋氏為吾道蠧也不達則已達則必除之今既達矣復不能除奈何山人曰敢問夫子之欲除釋也亦甞閱其書而得其所以蠧吾道者安在乎文進曰吾聞朱子之說以為異端虗無寂滅之教夫虗無寂滅豈不為仁義忠信之賊乎山人曰甚矣夫子其不自重也奈何以皓皓之明而蔽囿於他人之一言乎且余聞之釋氏毗盧有萬德普賢有萬行安在其虗無寂滅耶今夫子必欲除之當熟翫其書果無一善可取力以除之則天必助其成功而無取誚於天下後世也文進然之遂閱佛書過三月謂山人曰荷子之誨得見大聖人之心法與吾聖人曾不少異夫佛謂眾生心者亦名如來藏義有空不空所謂空者從本以來無私欲之染無物累之患廓然大公虗寥冲漠者也所謂不空者真體無妄中實靈明淨德滿足者也然空與不空初無二物唯吾一心朱子所謂虗無寂滅者但見其空而不識不空之德也如來藏中有河沙性德天地萬物亦吾心之光影耳吾甞以為天地生我今知我生天地矣山人曰夫子破格矣他日見道不難也其後之官宣大聞五臺僧楚峯有道者也請山人為介紹而會於雲中公舘以昔悟告之楚峯曰噫公見影矣若吾法王之心猶未夢見在文進悚然曰法王之心若為可見耶楚峯曰公欲究法王之心必極其空而後可以契不空之德不然則為物欲塞矣情愛蔽矣念緒紛紜生滅流注昏瞢汩沒未有了時尚何能見法王之心哉文進乃退而修空三昧六月目不受色耳不受聲鼻不受香舌不受味六情悄然運動如偶一日聞秋風落木聲忽爾念盡廓然大定楚峯一日見而問曰公於此道信乎文進曰祇是箇李文進更信阿誰楚峯曰公今信矣清凉通傳王道安名爾康號性海居士廬陵人父育仁終涪州知州之官時擕家宿旅亭夢大比邱入門而生道安道安生而淵默兒時常樂趺坐年十三見案上圓覺經竊觀之父遇問曰解否應曰解時道安實未曉文義父遽指經語曰試解之道安惶迫無以應良久胸中砉然開裂夙慧頓發即為父宣說其義父駭之退而博覧佛書皆如夙所習萬歷二十三年舉進士授行人先後奉詔冊封諸王問遺無所受遇名山輙留止甞習靜焦山半歲乃出初受戒於雲棲宏公修念佛三昧復參求宗要用力精猛一日輿行幹折忽有省及使唐時又得旨於松杏老人語人云吾至是始名舍兩臂矣居常行履純密夕每端坐至曉自謂不過彈指頃陶周望善道安問曰入道以何為功曰道無功也周望曰無功何以進道曰無功之功至矣既而復以書告曰直心易深心難有功之功易無功之功難周望甚服之二十九年謝病歸居招提中為眾講起信論著起信疏記無何痬生左足日講楞嚴不輟已而右足又生痬漸劇預知不起捨田宅與僧擇日為券其友請以十月朔後十日道安曰吾不待也易以朔謂其友曰後九日吾行矣及期見群僧繞案有頃曰天人至矣遂瞑斂之夕地震動屋瓦盡鳴卒年三十八道安在時甞止小樓誦華嚴經妻劉氏夢大日輪懸樓上光彩煜然不可正視寤而言之道安為語佛法欣然信受屏葷血清淨自居先道安三歲沒沒時了然若無事者陶石簣集薛元初名大春鳳陽亳州人郎中蕙之孫也兒時好寬衣大履却紈綺不御間遇疾輙喃喃誦佛名十歲即善言名理多與佛經合父官鴻臚序班隨之京師經古賢遺墟歎曰偉哉丈夫僅以一抔土供樵豎遊乎既而習舉子業始見老莊書及維摩圓覺諸經輙以孔孟語解之曰世之詘二氏者未知二氏也且又不知孔孟學貴發明自性何論異同哉每讀書必過夜半一夕豁然有省自是慧辨無礙語次舉當體全空或難曰天地間無物不在性中何云空耶曰正因空故無物不具耳或言欲知未發當會已發曰性一耳誰為未發誰為已發會得時如風檣陣馬不疾而速必待已發又成擔閣矣或問草木禽魚皆可見性否曰纔涉擬議是識非性偶聞花香說偈曰非動非定非淡非濃聞之滿室攬之還空己夢觀音大士導之河濵滌以水曰爾何蒙垢若此浴已摩其頂曰急尋汝歸路去尋得疾急家人相顧泣元初語其父曰四大假合我非真我我未生時誰父誰子即今之死何異未生如是諦觀慎勿悲悼正襟趺坐而逝年十五事在萬歷二十八年憺園集知歸子曰劉萬李王薛諸子俱可謂用志不紛者其能發明本有也宜哉世之學者狥名象牽訓詁知解益多天真日鑿矣此陽明王先生所為發憤而太息也
