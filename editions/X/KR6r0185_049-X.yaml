body:
  text: 周景文姚孟長傳周景文名順昌江南吳縣人也萬歷四十一年登進士第痛祿不逮親署所居曰蓼菴題其壁曰咬菜留先澤焚香問自心選福州推官強直與稅監高宷忤幾得禍會宷罷去乃解臨民慈嘗曰吾為刑官六年從不敢一用夾棍周內人也擢吏部主事天啟初官文選司員外署選事絕請託抑僥倖餽問一無所受素信奉佛法其在官暇則稱佛號日課千聲以為常不携妻子從家奴六人日需米五升錢十枚而已頃之告歸家居城西里有龍樹菴僧傅公修雲棲之教景文為倡募廣其放生之池又嘗與竹塢僧斷言善一日請斷言演瑜伽施食法有假寐於側者夢所散粟皆化為蓮華斷言嘗以血書蓮華經景文見而讚曰是血是經非血非經為無著華為如意寶書者誦者皆從空現向之所夢亦若是而已矣會魏忠賢擅權黨禍作嘉善魏大中被逮過蘇景文往餞之與同臥起三日旂尉屢趣行景文怒罵忠賢不已旂尉歸以告忠賢御史倪文煥承忠賢旨劾景文不當與罪人連姻且誣景文署選郎時贜罪忠賢即矯旨削籍前巡撫周起元以忤忠賢罷至是織造李實追論起元并誣景文請屬有所乾沒天啟六年三月與起元次第被逮景文聞意色甚閒徐為僧書小雲棲三字額已出詣有司將發與文湛持書曰弟一生向志節一路著力是弟不濟處出門便與宦官為仇畢竟以此輩結局然不可謂非天之所以成我此時工夫正欲使怨親平等貪戀俱忘急消却一段憤激之心歡喜順受方是實地也景文家居行義甚高又數為有司陳說閭閻疾苦狀及白他冤抑甚眾以故士民甚德之逮者至士民莫不憤宣詔日士民不期而集至數萬人咸執香為周吏部乞命諸生王節文震亨等前謁巡撫毛一鷺請以民情上聞眾遂直前逼緹騎緹騎厲聲叱之眾怒大譟毆緹騎有死者城中沸騰一鷺僅得免景文中夜乘閒就道或勸以自裁景文曰大丈夫末後一著定當俊偉且若輩為所欲為者苦無大人君子張胆明目教誨之耳吾不可以徒死也既發復與湛持書曰二鼓登舟旌旗戈戟相望於道周生此行亦可謂不落寞矣朔日已渡江回首閶關不勝贓然然日來得素患難學問朝夕與虎狼為伍亦覺無入而不自得也既至京下詔獄坐贓三千金被考時大聲呼曰汝不畏天地耶奈何必欲置吾輩死天下忠臣義士多矣汝能盡殺耶更極口罵忠賢鎮撫官許顯純命椎擊其齒齒盡落顯純自起問曰復能罵魏公否景文噀血唾其面罵益厲遂於夜中潛斃之明年莊烈即位誅魏忠賢倪文煥毛一鷺等連坐有差贈景文太常卿諡忠介年譜燼餘集明史北行日譜姚孟長名希孟亦吳縣人也為諸生與舅文湛持往來東林切劘道義萬歷四十七年成進士改庶吉士時景文方官吏部以志節相厲並持清議韓爌劉一燝執政甚器孟長遇大事多所咨決天啟五年黨禍既作孟長以母喪歸給事中楊所修以孟長負東林望劾為繆昌期死黨遂削籍崇禎初起左贊善再遷右庶子日講官又為溫體仁所嫉左遷少詹事掌南京翰林院平居歸信三寶有宏護之志初母文氏在時奉佛謹孟長居喪蔬食三年晝夜誦佛經為母回向西方大祥日禮懺甫畢五色雲見光照四野及居南京搜覧傳記著佛法金湯徵文錄十卷其序云盖聞尸林首唱三車顯出宅之因葱嶺誕敷五印示安心之要一十八梵之作禮堪忍雲驅六十七載之潛符重溟葦汎金舂玉撞廣開兜率之音樹植花敷普現優曇之瑞具四德三伊之相性海同舟悟八空萬法之歸真如共域盧行者徵風幡之義尚以肉身止廊廡之間龐居士破人我之藩竟以素衣說團欒之話蔭法雲之藹藹並禮蓮趺曜慧日之昭昭悉依蘭若瓶槃釵釧融大冶而總是一金酥酪醍醐調法羮而攪成一味賊子無非佛子凡生即繫聖生倘仡仡而崇墉將拒何人於域外且馮馮而浚險反淪彼界於塹中金湯之義敢問所安曰非也佛果圓因尚有十僊之劣昧法音震旦未免六宗之崢嶸遇竊法之真人亦可碎琴而収座下破異見之剎利已自投崖而坐巖間棲棲泛般若之江如愚若訥怡怡了涅槃之債混迹韜光劍嶺刀山涌乳傷罽賓之難引腸掛胃捧心興靜藹之悲瑞相巍峨化作楮錢流水瑤宮矗直何當葭管飛灰但見古廟香爐蜘封鼠竄即有庭前栢樹蟻穴鵶鳴故須東土闡西土之淨因端仗人王開法王之秘密篸篸時秀能降憍慢之幢几几元臣廣集芬陀之社轉法輪於金殿旭日晨開揚祖德於祇園粲花齒落運目犍連之神力或像起夫旃檀現窣堵波之莊嚴或塔奉其牙髮披精進鎧焚香結十萬之緣依堅固林開池布六賢之坐凡此勝事具在前篇但有緒言聊申末簡道岸覩紫金之相此相本同妙明舍衛放白毫之光此光誰無慧𦦨誕心田之嘉種粲若芬花護髻頂之鬘陀皎同秋月振綱維以覺世聲聲成替戾之音餐禮義以肥身處處作乳糜之供彰九德六德以至三德即是菩提道塲修一度二度以圓六度漸至琉璃寶所碧潭澄沚沸鼎生解脫之門白酒清鹽甘露現清凉之味豈特以淨而化穢抑能顯威以達權電掣魔軍劍揮賊首波旬作供破煩惱而獻密言近護出家擲化籌而盈丈室非患諸邪之害正而患邪自我生何慮群醜之弗賓而慮醜從中伏八識田起黑風之浪罪染氷紈四威儀破白淨之容業琱藍璧猴冠羊質難參獅座之旁蜉羽蝣裳豈是象王之子等三綱於敝屣恐三歸莫浣其愆視一本如弁髦詎一乘頓寬其網行同饕餮則黍稷非馨性比豺狼恐泥犁莫貸七寶八珍之布施何事張皇一方五老之參承未為了却敢略鑒其真贋用微辨其薰蕕因先德燦列之言冠華嚴攝屬之義外護非殊內護十善知歸心光即是佛光三乘同入隨所示現自有大覺明師痛下劄椎未許盲拳瞎棒用是無憂樹下不成荊棘之林大術胎中剛下淤泥之種爰清疆界稍峻坊閑略具苦心敬質明眼十方菩薩建大法園安隱熏修樹精進旛即此身心樂淨域勿使性相而生薄蝕序華嚴十地品第一法器充周能戒而定彼堅固體道果是證耶緇素耶非渭而涇嵩公之論明德維馨序輔教第二式廓九有赫曦方中宣大法音道隆而隆普濟羣迷陰翊王度永明後身筆垂秋露序高皇御製文附宋濂文第三爰有達人丕扶名教有倫有脊可以言斆隨所住處戒水沉香世出世間圓滿道塲序金湯名義第四夢幻泡影至人所憎十力調御遊戲作賓非樹非臺去來自在皓月當空不傷靉靆序應化諸賢第五阿闍世王護正法眼外道縱橫利用刪剗佛始漢至夢託南宮哲王代生法鼓逢逢序護法人王第六維屏維翰繄惟宗工蔭此瓊柯而扇芳風蓮社初藹藹藹吉士菡萏香來是人心蘂序晉宋以下宰官居士第七碣巋而至唐始盛有筆如椽讚彼清淨無縫為塔太虗為紙誰能銘者舉似裴李序有唐宰官居士第八一華五葉似似繩繩何假薙披鏡拭波澄碩德名勳道林斯馤眾法森羅原非門外序宋元宰官居士第九身心沉霾等於陰曀附影吠聲元津思枻山藪藏疾是曰不然攘之剔之辨其妍序響附第十尋移疾歸家居二年卒福王時贈禮部右侍郎諡文毅金湯徵文錄明文偶鈔明史知歸子曰予嘗過支硎中峯寺僧念庭言寺故王氏宅明天啟間捨為寺以居蒼雪法師立書契戒子孫不得有所求責而景文湛持孟長三君子皆署名其後為左證因出以相示嗚呼百餘年來死生代遷朝市之間亦多故矣而蒼雪門庭修整如昔日如王氏者可不謂智矣乎宜其為三君子所樂與也汪大紳云椒山先生不以做成鐵脊漢滿願蓼洲先生不以志節為有濟此是兩先生篤志於道處然即此是兩先生一大障使兩先生見道分明便知學道無他伎倆只是破此一障耳破此一障乃知南山望見北山高早已兩個文殊早已攝入鐵圍山中兩先生決定悔此為失言矣龍湖先生䟦椒山公集云道學家能辦否參禪家能辦否念佛家能辦否下語如雷如霆臨濟棒德山喝不是過也司空見慣渾無事所以判得分明曰吾知其必不能也又曰生平求友覔半箇椒山不可得嗚呼非真實學道人安能發此千古傷心之言乎又云孟長於佛法中善善惡惡有春秋之志其序文一闢一闔一為總攝法門一為宏範法門
