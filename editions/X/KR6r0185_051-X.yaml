body:
  text: 蔡劉三黃傳蔡維立名懋德蘇州崑山人祖母沈氏修淨業一日徧謝諸親鄰無疾而逝臨終念佛聲不絕也父允忠為人慈善有節概持佛戒維立母徐氏長齋六十年年七十餘忽識字日誦金剛經維立少好陽明王子之書萬歷四十七年成進士授杭州推官尋遷禮部主事崇禎初由主客郎中出為江西提學副使發明良知之學尤致嚴善利之間作聖門律令繩切學者遷浙江右參政分守嘉湖以母憂去官家居往來鄧尉參三峯藏公有省作三頓棒頌曰原來佛法無多子三頓三拳已較多悟去即今便一掌錯向高安參老婆嘗與金正希黃元公錢啟忠蕭士瑋諸賢訂為密社究竟大事每言修行人多怕去後黑漫漫地不知現前黑漫漫地更苦盡說生死事大不知現前剎那生生死死更切此際重關一擊如何下手聞者竦然服除起井陘兵備道歷調寧遠濟南崇禎十四年擢山西巡撫維立居官清苦能知人曲盡其用習於用兵屢平劇盜在帝前論治以大學為先曰自儒者心學不明執一自是多陷於偏黨不知有大中至正之道此亂之所由興也其將之山西也帝問何以治盜對曰盜之起皆由民窮臣任撫綏當使窮民有飯喫耳然愛民先察吏察吏莫先臣自察願正己率屬俾民不為盜而臣無可見之功不願殺害百姓以成一己之名在官時與姪方暹書勉其學道曰吾姪經歷大變備嘗諸苦於此中要得個翻身吐氣法便步步是真道場著著是斬魔寶劒矣即今眼界漸開胸次漸闊諸苦中自有安身立命處若捧住琉璃瓶坐定安樂窩中轉動不得亦是苦趣姪於勞倦乍息時庭除閒步時五更枕上纔覺時𨺗然猛醒當了了自知非可與他人道也我於三十歲後粗知信向只未經大爐錘鍛煉生死塲中未能直入橫出然借諸苦境為吾道塲盖亦步步不敢放過耳此中分猷更無人獨力支撐更苦功名久置度外死生亦復了然惟恐有悞疆事仰負聖明如何如何然一死自誓則吾末後一著也十六年流賊陷陝西惟立帥三千兵拒賊河上三敗之而賊復自西安破榆林逼太原晉王手書召之還賊遂渡河陷平陽攻太原惟立誓眾死守巡按御史汪宗友劾惟立不當歸太原遂解職聽勘或謂惟立曰事急矣委之可也曰不可曰移鎮候代可乎曰不可賊使使招之降斬其頭懸於城上賊薄城禦之所殺甚眾城陷北向再拜出遺表付使者至三立祠自縊死福王時追諡忠襄明文偶鈔三峰燈史忠襄逸稿劉長倩名道貞一名濟斌四川卭州人少通經術舉於鄉一日過岳祠見六祖壇經有所發遂信向宗門已而疊遭憂患一意參禪以大慧中峯二錄為指南恒自逼迫每到言語道斷心行處滅眼前如銀山鐵壁愈不放捨如是者十八年崇禎四年下第南游抵南京遇一僧從杭州安隱寺來得三峰藏公語錄讀之歎曰何意末世遇此法寶亟趨吳門謁頂目徹公問石乘公二公皆三峰之門人也參竹篦子話疑情奮發歷七十餘日終不契後參三峯於鄧尉山中結制度夏轉益迷悶一日大樹證公自虞山來往叩之忽於言下心地豁然述偈曰妙喜老人無風起浪咄哉三峯添鹽合醬跳出雲門觸背關夜懸明月青天上三峯命之入室問不得有語不得無語長倩撫掌一下三峰曰速道長倩大聲曰黃鶴樓前鸚鵡洲三峯曰未在長倩以手掣竹篦於地禮拜而出次日三峰舉句中無意意在句中語長倩茫然三峰云豈不聞不疑言句是為大病此後不惟參古人意旨即自己下語意旨亦須透徹方得受用長倩乃更加䇿發久之偶舉古德語忽悟句中意旨方明柏樹子𨍏轢鑽新婦騎驢阿家牽等句三峰曰且喜居士會得一句子也已而看有無句公案於樹倒藤枯呵呵大笑更無下手處三峰屢詰之曰非不更有進處意必於此契證一番耳三峰曰子已悟得一句便知根本智矣若其中差別難明迫欲契證無有是處日久溫研證入無心三昧自然入佛入魔生死自由也長倩爽然後於百丈再參德山托鉢臨濟元要等語深悟旨趣乃辭去三峰書法語并拄杖授之有問如何是佛法的的大意曰淮安城外兩水交流如何是轉身一句曰滿船烟月下揚州向上還有事也無曰長干寺裏千尋塔夜半長明五色光後歸卭州張獻忠陷蜀羣議乞降長倩曰如何提筆寫得個降字被執席地坐罵不絕口坐脫去有問道錄行於世三峯燈史黃元公名端伯建昌新城人崇禎元年進士歷寧波杭州二府推官廉辨有聲以喪歸篤志宗乘徧參天童徑山三峰諸老師最後師事壽昌經公時明政不綱元公數上書當路言𡨥禍不納遂披薙入廬山初謁壽昌問百丈野狐公案壽昌厲聲曰總無干至是夜坐開先寺驀然有省始識得壽昌用處揚維節嘗從元公問經義復書曰依經解義三世佛冤即清凉圭峰諸公猶未免作他家奴婢看他過量大人呵佛罵祖寧被古人語脉轉哉我為法王於法自在獅音吼處裂破山河豈有義路可尋覔乎已而南京立福王大學士姜曰廣薦起之授儀制主事我兵下南京元公方寓能仁寺榜其名於門遂被逮大帥者元公同年友諭降不從欲以善知識禮全之亦不許居獄中作明夷錄以見志既大帥復遣騎諭降不從乃引出通濟門外過水草亭元公北面叩頭坐受戮顏色不變行刑者憚之舉刃輙手顫墮其刀易卒亦如之元公厲聲曰何不刺我心刺其心乃死先是元公自號海岸道人鐫石印佩之及再出磨去更鐫忠孝廉節四字南京城守時作詩曰巍巍不動寰中主一座堅城似鐵山刀鋸在前無怯志只緣勘破死生關臨死又作偈曰覿面絕商量獨露金剛王若問安身處刀山是道場已而大帥給傳護元公柩歸新城門下士葬之於忠孝橋側初元公母李孺人賢明仁慈信樂佛法晚歲誦金剛經地藏經日䖍一夕夢趺坐山巔佛光照身覺謂元公曰西方之期至矣無何示微疾念佛而逝而元公之妾范氏者免喪後薙染入麻姑山老焉明史建昌志新城志瑤光閣集蒿菴集黃介子名毓祺常州江陰人崇禎中以諸生貢太學好與禪門諸老宿游依天童密雲禪師最久默契法源得密雲印可授以衲衣國變後同縣人張大圓棄官歸約介子俱隱結白社為終老計介子不可曰不舉事何以報國不授命何以成人我師下江東江陰典史陳明遇等起兵城守介子與門人徐趨集眾行塘應之城陷逸去已而事露見執當事者欲輕其罪以盜論介子不可曰毓祺豈為盜者將刑其門人告之期作絕命詞遂取襲衣自斂趺坐而化子晞亦繫獄晞妻周氏當沒官自縊不死絕粒數日者再不死赴水不死再吞金不死自刎不死終自縊而死晞之姊寒輝菴主言周氏甞宿菴中夜深經行琉璃燈下顧盻英毅絕無女子態真法器也晞既被繫周日誦大悲心呪至死神氣不亂澹歸道人曰文信國吞腦子不死絕食不死卒死於柴市三死耳而周乃八死嗚呼雄哉明史餘學集明文偶鈔黃蘊生名淳耀蘇州嘉定人父中年無子日誦觀音經一夕夢大士抱一兒與之曰念汝勤苦誦經尋得一好秀才與汝已而生蘊生早歲為諸生蘊袍糲食研索遺經以名節自勵著自鑒錄晝所行事及念慮純襍夜必書之同縣諸生唐昌全有道行能以乩降神呂真人感而憑焉其所言出入仙佛蘊生聞而信樂之與弟淵耀友陳俶侯元演元潔夏雲蛟等十餘人俱往問法惠雲地菩薩者生宋仁宗時年二十棄家入金粟山從師學道參究精猛卒證道果時與呂真人同降或問禪宗差別菩薩示曰大道一門不留權識本無宗教安有分別吾佛出世哀憫眾生執心不破自伐其根故用止啼權流言句有本非真無亦非實兩義破除一中為的佛氏真源超乎道德痴人索夢尋踪肖跡故下剗除權機各出總斷習心歸於不習不習者良習者是賊同出見聞聖狂不一本性天良物必有則倣古摹今精神自失不急求心自度何日宗門昌教無非革習正令日新自明則一執此泥彼何異生食物肖化工萬不得一化工肖物不謀而集其故云何至誠惟一一則天全隱微莫測求此良方莫如除識識空性現識在性窒譬之夜人空自謗日亦猶求星往而捫石不見其真惟辨其迹性海靈光反成六賊一心不運天地皆忒吾不開宗亦無教立釋迦達摩驢踪馬跡吾有一心萬古不識非不可識無形可執㵎底泉聲碧天朗日可見可聞孰覩孰執有色有聲無象無質靈光周徧一理不忒子等求心斷莫泥跡佛氏真詮不在行墨一一歸心魔說亦得苟二於心佛說亦失破此佛魔心心無惑閱十年諸弟子彚先後訓辭為一書名正教錄陳俶將刻板行世蘊生疑之曰師以道教道不在言上品利根超然言外中根小品反墮言中況謗語之易興致業因之反重是欲度人而適成其罪也俶曰不然予欲無言猶有麟經之著未甞說字今流大藏之文故古人發魯壁而求書歷鷲峰而譯典況乎真靈伊邇不煩負笈之勞典誥在陳具有叩鐘之樂如愚可以默識知二亦得承流至於太陽懸燭豈有目者弗明時雨灑枯豈祈年者罔戴苟人心之不死則此道之宜明如其未挹真源反嗤異學聞道大笑下士故常彼則坐井之觀吾則同胞之視而已蘊生善其言從之蘊生自聞法後默究向上事益自刻厲時與同事宣說佛法友張子灝新持不殺戒謂蘊生曰子姑現老齋公身而說法可乎蘊生喜為和蘇子瞻岐亭詩示之詩曰𮊁師貪得魚不惜魚化汁屠伯恬殺牛不見牛眼濕嗟彼殺業多所以遭汝得彼債既已償汝憂差獨急微性憐朱朱愚仁赦鴨鴨三品戒庖厨百籩謝巾獸炭與松明入爐平等赤象髓與韮菹入喉平等白深坐不橫參大歡不洿幘敢邀天公憐庶免佛子泣靜念古賢人飢驅食常缺今我餘草蔬猶堪饗嘉客推此告同心暴殄非雅集其二曰昔有愚小兒垂死思肉汁世人與彼同談食口常濕大罰方後隨無肴汝猶得胡然一晌甘易此八難急列柵囚鷄豚排籤戮鵝鴨驅驅黑業中何由發其我喜周生厨堆盤葵蓼赤我念唐帝庖剖蛤毫光白為生雖有累如僧但加幘為帝苟推心何異下車泣所嗟願力微不救世界缺鸞刀啟烝嘗折俎供賓客大哉食時觀觀彼諸苦集崇禎十六年成進士歸杜門不出福王時諸進士悉授官蘊生獨不起南京破我師至嘉定士民共推前浙江右參政候峒曾為主峒曾者元演元潔父也蘊生與昌全雲蛟等並嬰城固守且一月大雨城陷峒曾挈二子沉於池蘊生入僧舍與淵耀相對縊昌全雲蛟並死之昌全妻亦從死淵耀字偉恭諸生好學敦行如其兄明史陶菴文集正教錄知歸子曰自古忠孝之士大都以白淨因現慈忍力觸機遇緣根種勃發或入於仙或歸於佛各有由來小生詹詹橫滋謗議責斄牛使執鼠誇海若以灌河豈有當焉蔡劉諸先生俱現身儒門皎然於生死之際其入道之由不可誣也經言菩薩從初發心精進不退以不可說身命而為布施其諸先生之謂乎汪大紳云蜻蜓許是好蜻蜓飛來飛去不曾停被我捉來摘却兩邊翼恰是一枚大鐵釘即此一枚鐵釘是真聖種是真佛種是真忠孝根種此種人之所自具只因喜歡飛來飛去捨不得那雙翼把一枚鐵釘弄壞了諸公只是能捨箇箇好似一枚大鐵釘也
