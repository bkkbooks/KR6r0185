front:
  text: 居士傳序知歸子現居士身說法著居士傳屬予為之序序曰知歸子學佛歸心淨土發決定往生之願者也究論往生之因因於一念之淨一念之淨即成往生之因況念念相繼有不決定往生得覲彌陀者乎知歸子修淨土念念相繼其學佛也可謂密矣仰前修之匪遠表萬法之同歸自度度人度人自度著書之心可謂切矣若知歸子可以現居士身而說法矣予故歡喜序之以告世之讀居士傳者同學汪縉撰居士傳發凡佛門人文記載其專繫宰官白衣者故有祐法師宏明集宣律師廣宏明集心泰佛法金湯姚孟長金湯徵文錄夏樹芳法喜志其以沙門為主兼収外護者則有志磐佛祖統記念常佛祖通載以及傳燈錄續傳燈錄五燈會元東林傳往生傳諸書所錄事言互有詳略或失之冗或失之踈至朱時恩居士分燈錄郭凝之先覺宗乘李士材居士禪燈錄並本五燈止揚宗乘於諸三昧法門有所未備今節取諸書者十之五別徵史傳諸家文集諸經序錄百家雜說視諸書倍之裁別綴屬成列傳五十餘篇詳其入道因緣成道功候俾有志者各隨根性或宗或教或淨土觀感願樂具足師資但自唐以前簡冊無多披覽易遍自宋以後文字浩瀚耳目聞見搜討難周更望博雅君子惠以珍藏佐其不逮護法之文須從般若光明海中自在流出乃為可貴是書所載非其真實有關慧命者概弗列焉如王簡栖頭陀寺王子安釋迦成道記誠為典贍然文過其質於道何有柳子厚制諸沙言銘為蘇子瞻所推服然如曹溪一和會儒釋與六祖壇經之旨全無交涉況摩詰夢得之文抑又遜之元明士大夫文字類多出入儒佛亦必其行解相應始堪采擇否則祇成戲論何足數也宗門冐濫者多如夏竦呂惠卿章惇之徒既不足道即白蘇二公其在佛門亦別有長處與宗門無與諸書所載機緣無可取者他如韓退之李習之周茂叔歐陽永叔諸先生平生願力全在護儒一機一境偶然隨喜不足增重佛門豈宜附會牽合莊點門庭反成謬妄此於教理違背非小故予是書持擇之間頗存微指不敢將就影響以誣古人以誣自心以誣教理龐居士之於宗李長者之於教劉遺民之於淨土百世之師矣三公者各專傳尊師也其他立專傳者大都軼邁等倫難為匹儷雖不盡以三公為繩亦庶幾近之者也登地證果根基五戒而五戒者全體五常不踐五常何有五戒南北朝諸臣罔明忠孝之義妄談般若裨販如來至如魏収蔚宗浪附通人沈約江總濫塵戒品以身謗法視崔浩傅奕罪有甚焉清淨海中不受死屍削而投之豈為刻核若王摩詰柳子厚郭功甫張天覺之徒先迷後復情罪可原善善從長亦庶幾春秋之指與自昔言三教者其莫善於大珠乎或問三教異同曰大量者用之即同小機者執之即異總從一性起用機見差別成三迷悟在人不在教之同異也達此義者其宋之李伯紀明之趙大洲乎南北之朝釋道相爭唐宋之時儒佛相角總由不知性真常中本無同異尋枝摘葉安有了期至如周彥倫明休烈張天覺李純甫數子之論解紛挫銳不謂無功究其實際亦多離合獅子咬人韓盧逐塊智者覩指知歸昧者雙迷指月世又安得盡大珠與之暢談三教哉列傳中有不得詳其事跡者文富諸公是也非繫於佛法弗錄其事跡自載正史舉而著之非此書體也有不容略其事蹟者如宗汝霖趙大洲周景文熊魚山諸公是也其應於世者其學佛之精神也一切治生諧偶皆與實相不相違背不其然乎不其然乎是書始事於庚寅之夏削稿於乙未之秋中間辨味淄澠商量去取則吳縣汪子大紳之助為多瑞金羅子臺山往來過蘇每相切磋訂其離合最後書成婺源王子顧庭諷誦一周讚歎歡喜捐金付刻普願見聞隨喜發菩提心證圓滿果是則區區七年纂述功不虗施青蓮華海香光無垠一念歸誠同登彼岸不亦樂乎題居士傳偈菩薩戒弟子彭際清述我聞觀世音應身三十二華嚴善知識亦有五十三比邱居士身種種天人趣譬如空中雲隨風無定形又如海上波從日現五色眾生眼所見分別每熾然豈知妙明心非一云何二憶我無始來一念不自覺生死六道中念念入輪迴貪染習已深真色成晦昧無明力所牽顛倒惡叉聚因緣值此生得聞無上法深心發悲淚長跪向佛前誓盡此報身永息輪迴苦一念阿彌陀究竟成佛道䖍恭秉淨戒懺悔從前非諦觀法界身如幻不思議況逢此震旦大乘所出處火中生蓮華時時現希有良哉東林賢善權開方便亦有龐與李宗教扶雙輪傳燈代有人如虗空無盡今雖末法中典刑幸未沫網羅舊文字放此不夜光如日月眾星昭回四天下一多互相攝畢入菩提場願以此功德回施諸有情現在及當來有緣同聚會讀我所著書各發無上心南無佛陀耶同生極樂國居士傳目錄傳一牟融安元支恭明支讖支亮竺叔蘭竺長舒闕公則孫興公謝慶緒戴逵傳二劉遺民傳三張萊民張秀實王喬之宗少文周道祖雷仲倫傳四安陽沮渠侯董吉何曇遠魏世子陳參軍劉謙之嚴恭荀生傳五何彥悳求點胤周彥倫到茂灌裴幾原劉士深任孝恭劉彥和傅宜事傳六竟陵文宣王傳七傅大士傳八荊山居士傳九昭明太子傳十劉靈預明休烈仲璋山賓劉士光彥度庾彥寶劉宣文張文逸阮士宗向居士馮袞李子約傳十一張洪賑張廷珪李嶠辛替否傳十二江含潔劉士烜張孝始司馬喬卿李觀元紫芝萬敬儒朱康叔吳璋吳君平彭信宇高彚旃傳十三李師政梁敬之李華裴公美傳十四李山龍史阿誓薛嚴樊元智牛思遠于昶商居士鄭牧卿馬子雲陸康成李知遙傳十五李長者傳十六顏清臣韋城武傳十七龐居士傳十八王敬初陳操甘行者張秀才傳十九王摩詰柳子厚白樂天傳二十楊大年李公武端愿傳二十一晁明遠王子正文寬夫富彥國張安道趙閱道傳二十二楊次公王仲回王敏中葛繁傳二十三張平叔王邦叔傳二十四鍾離瑾景融松孫良陸浚張廸孫十二郎馬仲玉永逸左伸范儼胡達夫孫忭朱進士王無功王衷吳信叟張掄李秉陸子元閻榮錢同伯𭨚省齋計公吳復之陳君璋傳二十五劉興臣潘延之許叔矜郭功父陳體常吳德夫王韶傳二十六蘇子瞻子由黃魯直晁无咎以道傳二十七鄭介夫鄒志完江民表陳瑩中傳二十八張天覺傳二十九李伯紀傳三十宗汝霖陳允昌張德遠傳三十一李似之趙表之李德遠嚴康朝李漢老馮濟川蔡子應劉彥脩吳元昭吳十三顏丙呂鐵船葛謙問余放牛張功甫傳三十二張子韶傳三十三王虗中張安國李彥弼傳三十四真希元陳貴謙吳毅夫傳三十五李純甫劉謚沈士榮王子彧董國華鄭所南胡汲仲馮子振傳三十六耶律晉卿國寶傳三十七宋景濂傳三十八劉祖庭萬民望李文進王道安薛元初傳三十九趙大州小洲傳四十嚴敏卿澂樸澤拭濟陸與繩馮開之陸伯貞傳四十一楊華唐體如戈以安孫叔子朱綱郭大林劉通志郝熈載杜居士吳大恩吳用卿張愛傳四十二殷時訓陳廷裸顧清甫朱元正周楚峯蔡槐庭虞長孺僧儒黃平倩莊復真鮑性泉傳四十三李卓吾傳四十四管登之楊貞復陶周望奭齡焦弱侯唐宜之瞿元立朱兆隆鍾伯敬玉弱生平仲與游王宇泰吳體中應賓董元宰傳四十五袁了凡傳四十六袁伯修中郎登小修傳四十七曾端甫趙凡夫劉玉受楊子澄維斗公幹李子木徐九一劉公旦姚文初傳四十八王孟夙丁劒虹朱白民婁子柔莊平叔黃元孚聞子與黃子羽錢伯韞吳瞻樓王先民陳用拙駱見於程季清傳四十九周景文姚孟長傳五十馬良徐成民傳五十一蔡維立劉長倩黃元公黃介子黃蘊生唐昌全黃淵耀陳俶侯元演元潔夏雲蛟傳五十二金正希熊魚山姜如農張大圓傳五十三溫月峰崔應魁蔣虎臣李生洞庭生傳五十四嚴仲慤周知微宋文森畢紫嵐傳五十五周安士傳五十六知歸子大清乾隆四十年吳縣龔履雲錄於齊門蔣民舘舍
