body:
  text: 王丁朱莊黃聞黃錢吳王陳駱程傳王孟夙名在公江南崑山人萬歷二十二年舉於鄉謁雲棲宏公稱弟子已而為高苑知縣在官日禮普門大士誦阿彌陀經大旱露禱輒雨遇歲飢輒盡力為民請賑間有冤獄已成讞者必焚香告天願為昭雪上官亦諒而從之遷濟南同知用兵法部勒吏卒追捕豪右輕俠放響馬剽劫者竿其骨於衢內尸虎穴中遠近帖然一夕戒徒御束裝投劾竟去過吳門不抵家往來徑山天目石盂間泝大江入蜀登峨眉歷匡廬博山而歸以憨山聞谷諸禪師居士朱白民為師友閱大藏經修念佛三昧天啟七年遷海鹽石佛寺時逆奄勢張方謀篡位孟夙語其徒曰此地濵海北信朝以至則朝於斯夕以至則夕於斯已而得脾疾笑曰可無為魚腹之葬矣夜半趺坐而化明文偶鈔雲棲法彙丁劒虹名明登江浦人萬歷中受三歸於雲棲自號曰蓮侶四十四年登進士第官泉州推官遷知衢州所至輙以佛法勸人法應杖者聽納米以贖贍諸獄囚遇夏月修獄舍給諸囚香薷飲葵扇冬月與之椒薑擇醫視病者人與念珠一串教令念佛雲棲宏公甞稱其鄰翁居常念佛臨終與其友一請而逝因繪一請圖懸齋中以自勗崇禎中受菩薩戒於大慧順治二年冬病劇十一月朔具疏白佛求生淨土日焚一疏至第十日飲粥如常時面有光赩然徧勸戚友俾修淨業側身就枕而逝淨土晨鐘朱白民名鷺吳江諸生也少有俊才長身玉立風神閒遠家貧教授生徒以養父母牀頭恒貯數十錢曰買笑錢親死乃棄諸生學長生術遠遊至西嶽登天井黃縚道服掀髯長嘯見者以為仙也已而參雲棲宏公探求法要宏公化去白民因禮塔作偈曰我昔初謁師問參禪念佛可用融通得師答隨口出若然是兩物用得融通著快哉此一語令人心膽悅時時舉向人諸方徧傳說念佛人無盡是指亦無盡靈山會未散蓮池舌長活短偈作供養合掌無縫塔與王孟夙同遊徑山闢一軒居之閱般若經會憨山清公至二人共禮為師清公名白民曰大力孟夙曰大名其軒曰般若銘之曰咄哉此軒光明透脫內外洞然了無縛著六根門頭圓通虗豁世出世間一齊拋却此軒之味恬澹寂寞軒中主人身心快樂一切情塵火聚太末問此法門名不可說崇禎初至京師我兵薄城下或勸之亟歸慨然歎曰莫非王臣也其敢逃乎端居龍華寺注般若經兵退乃南下所至畫竹賣錢自給不妄受人一錢晚居蘇州蓮華峯下偕山僧修念佛三昧自號西空居士年八十作辭世偈沐浴更衣而逝時嘉定諸生婁子柔者名堅亦參雲棲受戒歸長齋工書尤好書四十二章經遺教經曰此佛門論語也其遺墨世多傳寶之明文偶鈔雲棲法彙吳江志憨山夢遊集莊平叔名嚴華亭人少與其兄友愛殊篤兄客黔中而病平叔徒步逆之中途舟覆救免而兄竟病死平叔致其喪而還鄉人以是賢之晚而深達佛法逢人輙以佛法相勸導衣履所餘常以施人家有一子一婿視之泊如也間作詩及小詞皆清遠有致常調滿庭芳一闋云六十餘年片時春夢覺來剛熟黃粱浮花幻影有甚好風光冷眼輕輕破急翻身蹬斷絲韁兒孫戲從他搬演何必看終場青山茅一把殘生活計別作商量但隨緣消遣洗鉢焚香先送心歸極樂恣消遙寶樹清凉堪悲也回頭望處業海正茫茫天啟四年卒於其友胡子灝之園崑山王弱生錄其詞以為數年中所見學道人以平叔為第一也王弱生河渚集黃元孚名承惠浙江錢塘人為人耿介不合俗不能治生產事大母母盡孝好施與隣人寒無衣者解衣衣之無食者傾其囊中錢予之妻弟聞子與奇其清苦導往雲棲宏公所以弟子禮見宏公名之曰淨明其後得嘔血疾積三歲弗瘳且亟子與教之念佛元孚方苦痛弗省子與厲聲曰汝眼光墮地即今知痛者畢竟落在何處元孚悚然曰將奈何子與曰莫如念佛元孚曰爾教我念自性彌陀耶念極樂彌陀耶子與曰汝將謂有二耶元孚遽有省請法師慧文至設佛像為說淨土因緣元孚欣然請法師為剃髮受沙彌戒屏家屬唱佛號默轉蓮華經七日家人皆聞蓮華香忽微笑說偈曰一物不將來一物不將去高山頂上一輪秋此是本來真實意乃命家人治齋供佛請僧唱佛號讀雲棲發願文至云阿彌陀佛放光接引垂手提携歡然起坐諦觀佛像而逝憨山夢遊集聞子與法名大晟與元孚同鄉里少善病志欲出生死乃往雲棲受念佛法門宏公示寂憨山清公來弔子與作禮白言願薙髮為弟子清公曰佛性四大不能拘豈毛髮能為礙乎況子有親在未可也子與乃已俄而疾作子與曰吾當直往西方耳疾無傷也及疾甚神志瞀亂不能自持大懼亟命家人請僧至唱佛號越一日瞀亂如故復瞿然曰生死根株非他人所能拔也立起盥沐著衣對佛焚香煉臂哀苦懺悔徹夜無少倦及還坐神志安定淨土現前乃薙髮披袈裟別眾而逝憨山清公聞而歎曰勇哉聞生其可謂烈丈大矣憨山夢遊集黃子羽名翼聖太倉人素服雲棲之教與妻王氏精修淨業崇禎中以薦起為四川新都知縣甞飯僧縣堂躬行匕箸布䞋施繼以膜拜張獻忠宼四川過新都子羽率民城守新都千僧感子羽之德相率登城擊鼓稱佛號夜中其聲震天賊尋引去以城守功遷知吉州明亡棄官歸印溪所居樓曰蓮蘂樓自號蓮蘂居士營齋奉佛日持佛號數萬已而臥疾浹月自制終令四壁張彌陀像請晦山顯公授菩薩戒語顯公曰吾神明愈健誓願愈堅自信生西方必矣明晨顯公將別去尅八日必行已而果然年六十四現果隨錄明文偶鈔錢伯韞名炳亦太倉人也為人淳善以貢授教官年七十餘遷知富陽縣一日鞫一大盜盜詭稱被誣求免伯韞曰汝殺人多矣法當抵盜奮起攫按上硯擿伯韞伯韞痛仆地吏爭前執盜毆之伯韞遽起坐一手摩其胸一手止吏曰莫打莫打吾痛息矣聞者傳說為笑後去官歸篤志修行日誦金剛經臨終作自祭文及偈頃命左右取清凉水飲之問清凉水何在曰放生池水也水至飲訖合掌曰我以佛力徑往清淨界中矣熙然坐逝現果隨錄吳瞻樓遺其名亦太倉人也早修淨業晚以家事付二子一意西邁日持佛號萬聲兼作西方觀不雜餘業閱十二年如一日室中屢現瑞相床前湧白蓮華大如臼童稚皆見之年七十餘怡然坐逝子孫以事佛世其家焉現果隨錄王先民名醇揚州人性豪宕善射從季父遊長安挾歌姬日醉市樓一日突入演武塲方大閱先民引弓發矢連破的掣雙劒舞霎忽如崩雷將軍降階執其手欲舉以冠軍笑謝曰家本儒生聊相戲耳還家父母命之室以羸疾辭為其兩弟納婦已而脫身徧遊吳越山水參一雨禪師受優婆塞戒居山日誦蓮華經已而歸揚州之慈雲菴䖍修淨業顏其居曰寶蕋棲自知時至結跏趺坐請僧環誦佛號而逝明文偶鈔陳用拙名至善常熟人孩時聞大母誦佛號啼輒止既入塾讀論語至朝聞道夕死可矣入問母曰人死安歸母不能答以告其父父曰汝意云何用拙曰欲知生死其必聞道乎父曰是兒他日定入無生法及長聞雲棲之風慕之篤志淨業有寂公者嗣法雲棲已而結茅藤溪用拙首為募金搆禪院縣中諸搢紳創放生社請用拙司之常以私錢佐其費所放生物不貲一日寂公夢用拙緇衣黃縧含笑言別亟走視之見用拙方誦佛號右脅而逝常熟志駱見於名鳴雷惠陽人崇禎中領鄉薦為藤縣教諭遷中書舍人習華首之教精心淨業初事父母孝父病感異人授藥而愈母病籲神請減己壽以益親及朝而愈明亡後里居杜門橫經教授惟以善誘人為人謙退和敬未嘗出一過分語亦未嘗有不可告人之事人無貴賤賢不肖無不稱駱先生長者也鄉民陶如耀病死而甦云冥中方督造善橋云為駱鳴雷建也復有林必高者亦嘗至冥中而還云方為駱鳴雷建槐亭妻鄧氏亦䖍誦阿彌陀佛一日炷尺香於爐火盡而灰不斷火復逆行上至巔灰盡赤其靈異如此明文偶鈔程季清名文濟法名通慧新安人遷湖州以老焉嘗讀書天目謁高峰禪師塔不覺痛哭刳臂肉為供遂矢志參究禮雪嶠禪師逼拶既久漸有入處既謁博山無異禪師師甚器之臨別步行五里送之季清每念言末世禪流不達教理如盲無導陷黑暗阬而不自覺深可憐愍乃建講社於蓮居以六年為期請十法主以次登座說諸大乘經又延自平法主至菰城丈室再演成唯識論季清退而覃思漸得慈恩綱要居常讀華嚴經及發菩提心論聲淚俱下自號十願居士里中放生度鬼禮懺誦經諸會必季清為之導其友錢元冲喪子季清與之大興塔寺費至三十萬金元冲卒季清亦喪子乃閉戶謝客專修丈六佛身觀其始懵然已隱隱漸現而色甚黯方凝想時忽空中有聲教曰若欲見金色身者須於佛身先作紅想依教想之果見佛身光明四徹室中什物皆成金色妻盧氏法名智福仁而好施長齋日課佛名二三萬年三十九疾病請古德法師授五戒師為開示淨土法要乃一意西歸季清復為誦華嚴經至入法界品五十三門為一一解說且曰百劫千生在此一時努力直往毋猶豫也盧氏深有省課佛名益切徹夜不休閱半月親見化佛來迎急索香水沐浴西向叉手連稱佛名而逝季清雖修佛觀然好堪輿術徧為叢林度地禪觀亦少踈矣又言後身當作國王或諸天神弘法護世靈蜂藕益法師聞而訶之已而告師曰邇來始信生西要訣須是放得娑婆下耳師稱善順治八年秋嬰腹疾繪西方佛像懸室中以助觀力吉祥而逝居七日見夢於長女曰吾已向吳門四十里外作大叢林護伽藍神矣靈峯宗論知歸子曰蓮華經云火中生蓮花是則為希有在欲而行禪希有亦如是觀諸君行事在世出世間其能速證淨因者盖願力使然也季清一念之岐卒歸神道智者觀之可以知懼矣
