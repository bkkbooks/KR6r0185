body:
  text: 殷陳顧朱周蔡虞黃莊鮑傳殷時訓名邁號秋溟居士應天人也早歲肆業南京國子監與江西何善山遊聞陽明王子之學又受教於司業歐陽南野遂屏居山寺反求諸心期於自得嘉靖二十年登進士第授戶部主事歷官貴州提學副使乞假歸隆慶初以薦起浙江提學副使遷南太僕卿仍移疾家居萬歷初張居正當國欲引以自助屬操江都御史王篆詣其家致意時訓不應已而謂其子慶曰張公太橫且有禍篆非端人不可與作緣也久之起南太常卿旋以禮部侍郎管南京祭酒事累疏乞休得請時訓性淡泊雖處清要不耐交際苛禮自通藉後在官十三在告十七閒居耽釋氏書從楞嚴經金剛乾慧發悟著贅言一卷論楞嚴要義又謂楞嚴諸解直吐心得以經解經溫陵為最著溫陵要解輯補十卷官太僕日居滁陽棲雲樓作偈曰春陰蔽幽齋朝來始和霽春風悠然來花雨滿庭際又云百慮靜中起旋向靜中消早知生即滅始信起徒勞又云丈夫自堂堂脚底有元路撒手便歸家何曾移寸步又云六塵雖幻相能令真性裂何名出世心但不隨分別又云應跡寄人寰凝神栖絕境識得銕牛機爐𦦨如氷冷又云對雨千峯靜看山百慮輕昨宵明日夜露地白牛生晚棲天界寺息心禪定持戒精嚴雖老衲子不過也年六十有二自知逝期焚香坐脫若假寐然明詩偶鈔楞嚴𫎇鈔江寧志陳廷裸名瓚江南常熟人嘉靖三十五年進士官刑科給事中劾罷嚴嵩餘黨又請錄建言廢斥者忤旨杖六十除名家居一意修西方淨業有客過之呵曰爾不聞大鑒之論唯心者乎何厭垢而欣淨為答曰惟心淨土發之大鑒而非自大鑒始也是心作佛是心是佛佛固先言之矣盖懼人以不淨之心求淨土也非曰土無垢淨也且樂之可樂也不獨華池珠閣鳥音風樹云爾也吾幸而與羣聖人遊被無量光經無數劫證無生忍成無上道濟無邊眾誠樂矣客以客之禪樂垢土而我以我之禪樂淨土禪無客無我樂無垢無淨也客無庸呵我矣隆慶初復起吏科屢以直言與時相忤萬歷中累官刑部侍郎十六年七月臥疾誦佛名益䖍故事京師大臣三品以上暑月賜氷既置氷於榻前眾見氷中湧出七級浮屠欄楯鈎綴窗格玲瓏移時氷漸消塔影漸瘦頃之氣絕而影沒矣贈右都御史諡莊靖明史樂邦文類序談薈顧清甫名源號寶幢居士應天人明嘉靖間諸生也少豪雋工詩善書畵年將四十盡棄所習斷酒肉搆小樓獨坐其上精修禪觀唯一小童侍左右奉香華淨水家人女子絕不見其面每夜五更起擊大木魚高聲唱阿彌陀佛其舍旁有屠兒每聞木魚聲即起屠豕一日遲起恚而責其妻妻曰爾不聞彼道人日打木魚念佛耶自不知罪乃責我何也屠兒愕即折刀不復屠一時屠兒從而徙業者甚眾與棲霞雲谷禪師善結西方社憨山清公一日至棲霞寺望見一道者閒閒如孤鶴即之其目不瞬脫若遺世已而入殿門禮舍利塔瞻拜良久塔頂忽現五色光赭如寶錯清公異之以語雲谷雲谷曰此寶幢也方作西方觀耳頃之示微疾請名僧數人相對唱佛號已而內人走報曰滿宅聞蓮華香眾驚喜清甫恬然如平時徐語僧曰我坐蓮華中半月餘見彌陀法身徧虗空世界世界皆金色佛視我微笑而挈我又以袈裟覆我我決定往西方矣諸子涕泣請曰父即往奈兒輩何清甫笑曰汝將謂我生耶死耶而獨不觀於日乎日出於東而沒於西是果沒乎遂尅期沐浴更衣端坐而逝蓮香三日始歇憨山夢遊集朱元正者海鹽諸生也平生有志聖學律身甚嚴年六十餘深入禪悅居宅後敝屋中閉關不問家事每日晨誦法華經一卷日過中則靜坐其門人陳則梁訪之曰先生年高盍少開酒禁元正曰子謂我須調養血氣耶不知我於生死已畫得斷則梁竦然其年七月語其子曰吾在此無事可行矣問何處去曰西方去子及孫固留許之至十二月朔示微疾不食家人蒼黃治殮具元正曰勿忙此後八日半夜事也及期端坐欲逝復曰吾生平秋毫不負人今冬舍後匠人為我平後門一片地欲待明年元日便老人出關行步其好意未報因取紙作詩謝之寂然而逝時方鷄鳴預戒家人臨行勿令婦女來過二三時乃來來亦勿哭比天明眷屬至皆哭元正復張目搖頭令婦女去去盡乃瞑法華持驗紀事周楚峰名廷璋雲南人也生於正德嘉靖間為人淳朴治家不計有無有輙散之貧者人與之語輙笑或謔之詈辱之亦笑而已素向佛法晨起必誦金剛彌陀觀音諸經各一卷充然自得曰吾不離日用不涉貪愛如是而已年八十七以清明日上家決辭祖考還謂其婦曰吾將行矣彌陀迎我觀音勢至俱來也已而曰觀音謂我絕葷五日可西行遂日食一粥一蔬至期沐而冠令子弟誦七如來名而已誦經既畢端坐而逝翼日有香發於體貌如生金剛靈應錄蔡槐庭名承植湖廣攸縣人性孤迥淡於聲利年二十餘長齋奉佛甞誦三千佛名日記一名至三年乃卒業遂終身不忘登萬歷十一年進士第歷官嘉興太守在官日誦金剛經室無長物爐香經案而已重興古楞嚴寺禁民間殺牲祀神其文云孔子曰敬鬼神而遠之未甞以鬼神為無有也第鬼神享用與人間不同人好酒肉便以酒肉祀鬼神譬之蛆蟲噉糞便以糞貢人豈不得罪於人盖神明清淨聞人間酒肉污穢厭惡不暇豈肯鑒甞故郊祀者止用淡酒承祭者戒酒戒葷意可知已至於餓鬼不能飲水何能食肉欲祀鬼者須用變食真言又非可漫為也為此特示爾等凡祀神者宜焚香設齋并誦金剛經一卷神自鑒納陰司極重此經我今告稟城隍將爾等前罪赦除後次不可再犯若仍前殺牲污神不惟無益且遭罪譴此係實說決非妄言甞問法於雲棲宏公遂專修念佛三昧已而官太常寺卿乞休歸知交中有欲薦為巡撫者以書問之槐庭笑曰若視一巡撫太尊貴生我法直超三界金輪王尚不屑意况區區耶或勸槐庭當教兒答曰生死事大吾自救不暇遑恤我後諸子或美其宮室不能禁以扇掩面過之晚歲結草菴為念佛會導諸賣菜傭同回向淨土作二偈以謝客其一云安養思歸客湘江一腐儒不愁明日事但覓往生符斗室隨緣住稀羮信口餬胸中絕憎愛一任馬牛呼其二云休把閒言語頻頻告老大年來性暴惡開口便糊塗業重期心懺人親以病踈張三與李四好醜不關吾將逝之歲自號為不久道人及疾舁詣佛寺請僧祝髮歸至所臥室見銀臺接引連稱觀世音菩薩遂逝有淨土詩及因果書行世明文偶鈔金剛新異錄慈心寶鑑虞長孺名淳熙錢塘人生而長臥不暝三歲唱佛號不絕口蓮華寶樹現於室中以告祖母祖母曰此西方瑞相也因教之習定遂時時垂目端坐弟僧孺名淳貞少而相得居母喪共習天台止觀長而為里中師教羣兒習鼻觀以是忤主人弗恤也已中鄉舉尋授徒毗山與同社友誦梁皇懺至次日雲光入楹甘露霑壁天雨金粟玄黍沈水香方冬萬花盡吐長孺感其靈異習定益堅遂能前知雲棲宏公聞而呵之曰虞生墮魔網矣萬歷十一年成進士居京師道人未來事口占晴雨輙應聞父喪一慟欲死語僧孺曰吾與若不能終事父將不得為人子非入山修道何以報恩歸而廬墓三年受戒於宏公每晨起拜墓畢即往雲棲問法作淨土四十八問語在雲栖法彚中居山日以羮飯施諸獐兔虎來輙叱去服除起職方司主事頃之復告歸語僧孺曰吾不悟道決不復出當為陸法和否亦為王伯安耳遂携僧孺上天目坐高峯死關前與僧孺約曰任汝登山臨水看我七日取證去晝夜䇿厲無少間至三七日不悟倦甚欲就枕忽見高峯禪師斬其左臂豁然有省馳證雲棲宏公曰凡寐而覺者不巾櫛而復依衾枕必復寐矣迷而悟者不莊嚴而復親穢濁必復迷矣火蓮易萎新篁易折子自為計毋以一隙之光自阻進修之路因勸令回向淨土以續前因長孺遂終身行之或有不信念佛者告之曰自覺覺他覺滿曰佛念佛者念覺也念念不常覺而念念常迷可乎民止畿鳥止邱隅不止至善之地而止不善之地可乎或問如何念佛曰提醒正念相續不斷而已百千方便只一知字念念無量光何不可入佛知見學人修道專求出離生死念念無量壽有何生死可出離已而還官遷主客司員外郎改司勳復乞歸與僧孺日遊湖上時宏公方坐南屏演圓覺經募錢贖萬工池立放生社緇白數萬伽陀之音震動川谷一時清節之士多與其會實長孺倡率之甞與僧孺放舟湖心過三潭僧孺慨然曰此古放生池也奈何為漁人所奪長孺因謀復之築堤架閣為放生所頃之入南屏山不出僧孺亦隱靈鷲老焉德園集附錄黃平倩名輝四川南充人萬歷十七年進士與陶周望同官編修並學出世法中年妻死不復娶一夕夢登寶塔同年友焦弱候贈一卷書視之乃雲棲戒殺文也覺而持不殺戒得俸錢輙買生物放之刻雲棲文施諸鄉里已而上書雲棲稱弟子篤志淨業自書座右云心淨則佛土淨不淨三業滿中穢惡何由往生然非常常覺照痛與一刀兩段三業可得淨耶雲棲聞而善之曰誠如是淨之又淨淨極光通達自性彌陀不求而獲矣平倩故甞受五戒至是又請雲棲遙受菩薩戒甞見一蜘蛛為誦佛號蜘蛛良久立化為建小塔作文志之友人范子喬請書戒殺卷携過武當其從者探其囊棄卷龍湫中子喬求之遇神龜引路復得之而卷不濡尋以少詹事乞歸遨遊山水間與衲子酬酢或欲薦起之有忌者上章言詞官結社談禪與方外為侶不當復玷廊廟遂老於家明文偶鈔雲棲法彙莊復真名廣還浙江桐鄉人少為儒已而學醫年四十餘頗厭世事遂從事養生術久之致疾乃喟然曰吾獨不能為天地間一閒人乎遂搆小園疊石樹花木嘯歌其中一日覩花開落悟身無常即毀園閉關坐禪取金剛諸經誦之偶出遊杭州遇一翁與之語學佛翁曰子學佛誰所師曰未也翁曰子不讀柳子厚服氣書乎雲棲有蓮池禪師者近在此盍往師之應曰諾遂徒步詣雲棲謁蓮池蓮池授以念佛法遂受五戒歸家日課阿彌陀佛五萬聲未半載心地寂然年八十再詣雲棲受菩薩戒歸老於家居常病其鄉人不知正法多宗邪教閱淨土諸經論掇其語要名曰淨土資糧集以導眾信鄉人從而化焉淨土資糧序鮑性泉名宗肇紹興山陰人家世信佛性泉既冠斷葷酒能覆誦法華楞嚴二經日每一周其父命鬻楮於嘉興怒其折閱罰之跪良久起則已默轉楞嚴竟矣甞從紫柏散木諸老師遊晚而皈心雲捿篤志淨業兼肆力於方山合論永明宗鏡錄諸書信解通利自號天鼓居士著書曰天樂鳴空其自序云華嚴有言若有眾生一念信入毗盧法界縱以惡業墮阿鼻地獄毗盧放光觸其身分應念命隕即生兜率化為天子受無量樂正樂之頃忽有天鼓自空而鳴告諸天子此樂虗妄不久壞滅慎勿貪著當念無常諸天聞已頓悟無生即證果位盖毗盧之光熾然常放無間無別而地獄眾生未必盡出其出者乃往昔曾與毗盧有緣一念信入法界者耳是知此光不住毗盧不住於我非我非渠了無處所故得應念脫苦既離地獄復耽天樂樂久無常衰相現前乃聞天鼓如是激揚即超十地而此天鼓亦無所從但有音聲了無形質雖無形質常自空鳴是故號之為無依知印法門妙矣哉無依知印也吾越有山名曰鵝鼻古寶掌千歲和尚所居登其巔者每聞空中樂聲嘹亮皆謂天帝作樂故號天樂鄉噫天樂即天鼓也天鼓即無依智印法門即毗盧法界之光既入無依智印法門則天鼓轟轟天樂鏗鏗不舍晝夜遍界全聞予復撾之欲警昏蒙雖形言迹出處無從以故假號天鼓居士而名此集為天樂鳴空臨終囑其子治齋邀法侶王季常戴升之徐春門等及緇衣數人至同聲誦西方佛號日西時忽合掌謝眾曰與諸君永別矣遂趺坐而化他所著書甚具皆不傳其天樂鳴空刻入徑山大藏中天樂鳴空序知歸子曰經言雖知諸佛國及與眾生空而常修淨土教化於眾生南泉亦言平常心是道智者領得南泉意旨念念趨向而無趨向念念觀空不作空解若諸居士者其庶幾乎
