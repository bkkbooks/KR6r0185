body:
  text: 楊唐戈孫朱郭郝杜二吳張傳楊華名嘉褘江西泰和人萬歷中諸生也少好學於書無所不窺已而潛心內典年十三持不殺戒蚤虱無所傷至二十餘入南京國子監俄疾作夢遊地獄見地藏菩薩於冥陽殿覺而放諸生物延僧誦經唱佛號已而謂人曰吾將逝矣青蓮花現吾前非淨土境乎遂晝夜唱佛號不絕命侍者息燭曰吾常在光明中不須燭也問何所見曰蓮開四色問見彌陀否曰見彌陀現千丈身問觀音曰身與彌陀等惟不見勢至耳言訖忽躍起拈香曰彌陀經功德不可說不可說不可說吾已得上品生矣寂然而逝往生傳唐體如名廷任浙江蘭溪諸生也天性醇慤躬孝友之行已而覺世無常傾心至道參雲棲宏公受念佛三昧遂力行之閱十三年如一日年六十當仲冬之旦謂諸子曰新春十有一日吾行矣至期盥漱整衣端坐手結印口稱佛號微笑而逝事在萬歷三十一年往生傳戈以安錢塘人事雲棲宏公為師法名廣泰事親孝好行陰德晚歲奉佛甚䖍與僧元素結春秋二社為念佛會誦華嚴經已而曰吾大限迫矣當為西歸計遂閉一室習禪誦晨夕不輟預尅歸期前二日家人來視甚悲以安曰生必有滅奚悲為吾方凝神淨域面覲彌陀若等勿以情愛亂我正念請元素至共唱佛號及期而化往生傳孫叔子江南桐城人父鏡吾居士讀雲棲彌陀疏抄喟然歎曰至哉妙用旋乾轉坤所謂十世古今始終不離於當念其惟念佛一門乎鑄阿彌陀佛像按四十八願以為莊嚴像成送之雲棲因乞法名為廣寓稱弟子叔子年十二從焉遂受五戒法名大圩歸而斷葷血棄科舉業修念佛三昧勤苦不惜身命俄見兩比邱持蓮花立於前曰孺子善哉一心淨土復見化人誦金剛經一晝夜乃瞿然起坐曰彌陀觀音皆來迎我結金剛拳印高唱阿彌陀佛數聲泊然而寂有淨土十二時歌傳於世其室中歲產瑞芝卒之歲有大如斗者其色或如金或如玉或如赤白輪往生傳雲棲法彙朱綱順天貢士官終府同知專修淨業日誦佛名三萬聲積十五年一日坐榻上方提珠誦佛名忽異香滿室曰佛來也遂逝徃生傳郭大林湯陰人亦專志淨業年七十六一日謂其子曰明午吾去矣無疾而逝徃生傳劉通志順天人精勤念佛年五十二得疾念益切其法侶李白齋先卒通志絕而復甦謂家人曰白齋與我當同生淨土已維舟相待矣為我易衣掛念珠於項從之遂逝徃生傳郝熈載錢塘諸生為人忠信不欺晚歸雲棲之教法名廣定居家禪誦無間已而得疾一日忽舉首視外謂其子曰今者別一乾坤矣夜半云佛坐蓮花臺現吾前吾往矣遂逝事在萬歷三十九年往生傳杜居士遺其名順天宛平人也隱西山瑞光寺側古齋堂中三十年專志念佛對人惟合掌稱佛號預知將終禮懺九日誦至懺中懇切語輙流涕哽咽遂絕食日飲水少許懺畢坐脫浹旬始殮顏色如生有五色雲盤旋屋上山中人傳異之徃生傳吳大恩浙江仁和人仁慈好施恤孤窮護生命鄉里稱之已而皈心佛法晨夕誦經唱佛號一日別眾跏趺而逝神色煥然室有香氣事在萬歷四十年徃生傳吳用卿名繼勛江南新安人性沉毅嗜善若渴晚修淨業持往生呪唱佛號日有定課甞失足墮江中有物籍之流十里躍而登舟眾以為神已而患背疽持誦自若俄而正念示寂往生傳張愛萬歷間中官也晚持金剛經閱數年病死至一王者所謂曰汝合向人間受胎答曰愛持金剛經願生淨土不願受胎王者曰汝持經功少奈何愛曰曾聞十念成就况其久乎王者曰且放還聽持經去既甦遂去之西山碧雲寺專誦金剛經又十一年一日集眾曰我以持經力今西去矣沐浴更衣端坐而逝金剛新異錄知歸子曰右錄雲棲往生傳而稍附益之大都聞雲棲之風而興者也其他學士大夫名節炳著者別有傳嗚呼自東林以來樂之化莫盛於斯矣孟子曰奮乎百世之上百世之下聞者莫不興起也況於親炙之者乎予於宏公亦云汪大紳云今者別一乾坤矣如語者實語者不誑語者不到此地步修行尚少證驗在何以明為如語者實語者不誑語者以十法界觀之便是十箇乾坤佛法界是佛乾坤菩薩法界是菩薩乾坤緣覺法界是緣覺乾坤聲聞法界是聲聞乾坤此是四聖法界也即為四聖乾坤天法界是天乾坤修羅法界是修羅乾坤人法界是人乾坤旁生法界是旁生乾坤餓鬼法界是餓鬼乾坤地獄法界是地獄乾坤此是六凡法界也即為六凡乾坤修行到得超凡入聖時候聖境自然現前豈非別有一乾坤耶何以明其證驗以十法界之因觀之一念起處於十惡境上生心即是地獄界因念念不斷便造了地獄乾坤於慳妬境上生心即是餓鬼界因念念不斷便造了餓鬼乾坤於痴婬境上生心即是畜生界因念念不斷便造了畜生乾坤於五戒境上生心即是人界因念念不斷便造了人乾坤於下品十善境上生心即是修羅界因念念不斷便造了修羅乾坤於上品十善境上生心即是天界因念念不斷便造了天乾坤於四諦境上生心即是聲聞界因念念不斷便造了聲聞乾坤於十二因緣境上生心即是緣覺界因念念不斷便造了緣覺乾坤於六度境上生心即是菩薩界因念念不斷便造了菩薩乾坤於無上菩提境上生心即是佛界因念念不斷便造了佛乾坤由此觀之從樂生心念念不斷有不往生者乎有不往生者必其所發之因未真也必其念佛有間斷也故曰修行尚少證驗在讚歎此語一以堅人決定心一以發人精進心
