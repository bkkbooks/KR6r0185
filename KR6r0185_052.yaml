body:
  text: 金正希熊魚山傳金正希名聲一字子駿湖南嘉魚人少從父遊於休寧家焉初好陽明近溪之學為文洞達原本脫棄訓故讀者往往駭之年二十六學佛法習靜古剎中一日食茄而甘遂長齋其友程開祚就正希飯怪其斷肉也問所繇正希與之言佛法開祚心動曰是信然向吾與子僅一世朋友耳不知前後乃有無量世也今與子重定交遂棄所學而學焉崇禎元年成進士選庶吉士明年我師薄京城正希慷慨上言防禦䇿薦布衣申甫有將才莊烈以甫為副總兵募新軍數千人改正希御史參其軍既而甫出戰沒於陣正希言浸不用遂謝病歸後屢徵不起家居益銳志學道甞自言此生不能及早透徹大法淨盡羣疑便灑然出頭激揚此事使萬靈被光眾魔歸命而兀兀縈縈一機莫發真是虗度不成丈夫也延廬山宗寶禪師師禮之閉關相對作斷五欲說其辭曰細撿平生每於此事有得力處隨復退墮惟茲五欲實為大障從今發心願悉禁斷一曰色欲世人欲色本為身樂曾不念言油盡燈滅髓竭人亡大可怖畏佛在世時勅優婆塞姑戒邪婬亦為眾生欲愛深積未能淨盡特樹大防令無縱濫故斷婬者是了義教斷邪婬者不了義教余今之年四十始衰子壯已娶子可生孫及今斷之已嗟遲暮少生繫戀不比於人而況岸然稱大丈夫圖出世事求大光明通天徹地世間勝事非全精神無少滲漏尚不能辦何況出世大光明事聞之於師此於般若如水與火如氷與炭相克相滅不容並行要令此心光明無壅拔出形骸血氣之外七處割截心無動搖安可得有須臾欲樂微繫吾念自傷福薄不早斷決遲延至今可慙可恨一曰食欲智者念言縱令世間五糓飢荒蔬果饉乏非食少肉不得自活寧自攝身端坐俟死割彼身肉活我軀命萬無此理何況今者肉食之外百味俱全佛言飲食如病服藥無得以意趣自增減視我此身如一竿竹如一根樹欲其存立用加灌溉令汁流潤無致速枯何心揀擇蔬糓之類天真淡然原有至味業重之人舌浸醲肥無復舌本真味當前反不覺知是則佛言可憐憫者一曰睡欲嚮晦入息人道常理惟佛亦許夜半倒身消日間食乃至尸寢早罷晏起每自簡察其害多種一柔筋骨做工夫人要是醒時硬峙脊梁堅挺腰骨其坐如山其立如峰睡多弛廢坦腹伸足便同死人一昏神思流水不腐戶樞不朽一刻不運心如死水睡多如醉血氣盛旺徒長無明一失正念初學之人白日醒眼一念不端能即覺警猛與割斷雖有夙習能以醒待不令強勁睡多憧憧遊思往來舊習有力新知未強或現惡境退人信心且惱亂魔與盜精鬼乘人熟睡攪亂附身豈得不防如上三欲皆是眾生切身逸樂眾生芸芸無量劫來孤負此心通天徹地徧照法界大光明幢是無他故生生陷溺濃重血肉顛倒其中不得脫離濃重一分減一分光濃重十分減十分光百分千分萬分億分日漸沉淪黑業可怖幸於今者信有此心盡形畢力棄塵舍俗廢寢忘飱猶恐失之但一眨眼少圖息肩已太下劣全不丈夫何忍復放少絲毫頭令入濃重陷溺舊處一曰財欲上三欲者次第破除此身無用逸樂享用戕毀慧命此身以外何須求備貪積不休取諸不義父母兄弟亦生計較致令家庭傷乖爭鬬重其所輕輕其所重其為迷謬不可勝言諺亦有之要一文錢不值一文此是眾生尋常見解不必佛祖而後明了或謂治生畜積恒產備窘乏時未為不是要當隨緣量入為出至於違心背義取財則寧閉戶端坐餓死世尊律儀丐食樹栖寄於殘生旅泊三界孔子疏水顏氏簞瓢光𦦨萬丈威德千古此非強為法如是故一曰名欲自反平生好文章名徒悅耳目無益於人固大虗妄此不足破垂訓立言有關人心似亦當為實不盡然若有真實為己學人古經前史法戒昭著不勞今日捧土益岱運水添海縱有緣起因病立方予不得已菩薩心行但令此言垂萬萬世觸之得益爰有眾生掩我此言作彼自為舉世誦彼不知為我我無絲毫計較心念則為真實我未必能今後但起文章一念讀書攻索是惡邪見障菩提道所宜痛絕其次有時好功業名欲立勞績百姓感服天子風聞坐取高位此最陋劣亦不足破惟是我甞丈夫自命英雄自處胸中磊磊不能平懷常自念言一事不能一物不透則是我者心光不到心量不周曾不念言我若果為心光不到心量不周密密究事切切透物原無不可今伏田間杜居一室不周不到甚為多故何不透取何不究取但令今者我有功能為人掩取為彼功能膺大封賞我不自得更罹重謗我無絲毫計較動念則為真實我未必能今後但起功業一念多方習學動念仕進是惡邪見障菩提道所宜痛絕總之名欲祇緣我見真見心者豈應有此真見心者密密自踐時時自了無喜無憂名究竟樂如此之人雖盡大地一切眾生來至彼前禮拜稱誦於此人心不加毫末雖盡大地一切眾生來至彼前非毀辱罵於此人心不損毫末如抓牆壁痛癢無關頗聞人言借人驗我我心何在我既不為逸樂利養惟有是非我是我非我不能明藉人為明益復顛倒五欲既淨皎如明月唯生死關最難開破要之死生亦係妄見能徹自心淨前五欲死生關頭亦同一例義當死時貪戀不死其人心中隱默負慙見人掩辨縱戀其身其心昭明謂是當死是故智者直養此心一切不受身分遮障現今生時因緣會合虗妄名生我心無生緣起非有異日死時因緣別離虗妄名死我心無死緣滅非無是故智者無生可貪無死可怖此心光明總不顛錯可生則生可死則死緣盡強留作意自盡皆屬妄見非真如法古人有言毫釐繫念三塗業因瞥爾情生萬劫枷鎖戒之戒之智者當此應能鋒利如吹劒毛正希為學決烈精進惟日不足然亦未甞廢事時流賊日熾煽動江左右諸無賴者多起應之正希團練鄉兵為扞衛申明大義法令周備民有固志福王立於南京擢左僉都御史不赴順治二年我師破南京徇諸州縣正希率兵扼險拒守唐王在閩授右都御史兼兵部侍郎進兵下寧國旌德諸縣我師間道襲破之正希被執途中與長兄書曰生死禍福皆有天命我等唯順受之不必逃避我家為王事勤勞死者死得其所即流離散亡者亦流離散亡得其所弟日來靜觀之殊無大悽慘可見平昔學道得力聞我女前日積薪於屋俟有急即譽火自焚此真學道人望兄仍時以佛法提撕一切乃為來生大留種子耳又與長子書曰我一身久如浮雲無絲毫繫戀但念郡事未定此心實不安倘百姓幸安堵則我瞑目矣各鄉尚有好事言兵者此實無益徒殺百姓何辜孔子曰以不教民戰是謂棄之此吾數日之所惓惓者也遂致命於南京贈禮部尚書諡文毅正希女曰道照少長齋長字於唐氏將行正希為出治奩具忽上書願從親學道正希大喜罷奩不治人或以為言正希曰彼方欲向上我可抑之使下乎及難作遂剪髮屏居已而之靈巖參繼起禪師入室為所棒悶絕於地後參靈隱巨德禪師有省回望靈巖拜曰當時若與我說明豈有今日還結夏華山依蘗菴禪師以居云明文偶鈔明史退翁廣錄蘗菴別集熊魚山名開元亦嘉魚人也其家故奉佛持不殺戒里有異僧天如者與魚山舉業師童希孔善甞見魚山童時文書其後曰掀天揭地男子也已而成進士就天如問所以應世者天如曰汝學道未有獲操刀不得柄安能割物閉關一月讀楞嚴經瞥然有省出為崇明知縣移吳江禮三峯漢月禪師稱弟子書問往復激發精烈已徽授吏科給事中以言事為輔臣周延儒所疾乃以前在吳江時徵賦不及額貶二秩出之外遂乞歸居數年歲閉關百日眷屬不相聞一日天如忽至語魚山曰快薙頭好皇帝方在籬下又欲寄其籬下乎魚山愕然不知其為讖也已而起山西按察司照磨遷光祿寺監事既又遷行人司副初魚山與同邑金正希友善切劘大事忠憤出於至誠其論治一本乎道不回惑功利辨邪正賢不肖至嚴不以禍患退屈崇禎十三年周延儒復相舉錯失當魚山疾延儒所為因責延儒所善孫晉馮元颷吳昌時令為延儒陳禍福延儒日益甚無何大清兵入塞魚山條上六事不報及畿輔被兵詔許官民得請見言事魚山請以軍事見遂言輔臣不稱職專以情面賄賂用人壞天下人心術帝疑其有私徵詰再三命具本本上帝方倚重延儒惡其言切遂下錦衣衛獄究主使拷掠慘酷魚山更盡摘發延儒所為奸利事會給事中姜埰如農亦以直言下鎮撫司獄帝深恨兩人手詔衛帥駱養性潛斃之養性謀之同官同官以為不可乃以獄辭上並繳前手詔曰誠如聖諭則天下祇畏臣衙門不畏朝廷矣請將二人付刑部擬罪乃移刑部刑部尚書徐石騏擬魚山贖徒埰杖戍帝以為徇縱奪石騏及郎中劉沂春官而逮二人至午門杖一百仍繫獄魚山在獄年餘以佛法攝獄中人晝二時禮誦夜演蒙山法拔瘦死者又為獄中人說心經因筆之為心經再傳當受杖時魚山自分必死乃取所預為書寄家人曰國爾忘身義不反顧兩年屢嬰大病皆可死不獨法能死人也受杖時惟默誦觀世音號自一至百血肉糜爛弗覺也居常奉六齋至是或勸魚山暫開齋禁不聽曰患死於杖耳死於齋乎如農在獄中過魚山見指月錄弗省既而兩人以盛暑得保出獄如農母欲見如農自萊陽疾馳至京師未到前一日遽還獄如農大悲慟既已無可奈何則問魚山曰子學佛久有何方便使吾得見母魚山曰觀世音菩薩叩必應盍誦普門品如農於是誦普門品日三十徧不一月夢菩薩為說法有省重讀指月錄釐然開解又一月諸囚以疫得保出獄兩人預焉如農遂得出見母數日帝聞兩人出獄怒復還之獄頃之延儒得罪賜死言官多救魚山者不聽而刑部仍擬贖徒復不許時崇禎十六年也明年遣戍杭州三月抵戍所而流賊遂以是月陷京師矣如農甞以書問法於魚山曰日來參叩於心空境空處略知趨向然止完得吾儒知止工夫其於靜定安慮得搔不著痛癢乃諸師極口詆靜勝為非譬之日月不靜如何能明古德云恰似木人見花鳥到得木人地位非靜勝而何魚山復之曰承示於空處略知趨向空何物可容人趨容人向既有可趨向又得謂之空耶總是於話頭未甞力究遂於塵勞暫歇時見有空可取止可求靜可樂譬如澄得一泓止水惟恐人撥動則渣滓復生故告子不動心已是有過得處覺得古人言句徒惑亂人故曰不得於言勿求於心不知纔有不得其心已不靜已不定已不安便有不慮即得慮即不得之病又何可以不求硬作主宰謂吾已得靜勝也譬之日月木人未甞知有靜勝故不緣而照花鳥不驚纔知有靜勝早已不靜勝去木人日月千里萬里矣盖靜與動對滅與生對初向道時覺往昔紛馳可厭自然謂靜與滅是吾人勝境若明眼人看來金屑瓦屑總無殊異須知更有向上事在如何是向上事喚作則觸不喚作則背畢竟喚作甚麼向金剛圈裏翻身併却咽喉吐氣朝餐暮宿如鳥空行來札所問老僧臨死時預知時至為從話頭中來為從靜勝中得直須問取這僧始得非愚之所得知也所貴學道為了生死故當不顧危亡向無可巴鼻處進步若只圖順易可以攀緣認定有澄空一境在非心非目之間以為近道假饒從佛肚內坐一萬劫亦祇是死水澄之則是撓之則不是矣唐王在閩起魚山工科給事中累官東閣大學士以病乞休寓汀州城破遂為僧更名正志號蘗菴得法於靈巖繼起禪師隱蓮華峯翠巖寺老於虞山而如農亦與魚山同時出戍宣州後薙髮於黃山寓蘇州以卒時又有張大圓者名有譽江陰人天啟二年進士歷官至戶部尚書南京破遁入武康山依繼起及碩機禪師晨夕參究夙慧頓發已而繼起主靈巖大圓從之刳心受鍛泮然氷釋年七十廣演金剛般若經八十重疏孝經居靈巖二十五年其子弟逆之歸康熈四十五年九月迎繼起作別至則合掌曰弟子時至明旦行矣明日復告曰今佛法世間法一齊放下但願生生不離左右言訖而逝明史魚山剩稿蘗菴別錄知歸子曰黃宗羲言明季士大夫學道者多入宗門如金先生及蔡懋德馬世奇錢啟忠皆是也然皆以忠義名一世宗門以無善無惡為宗如諸公者血心未化乃儒家所謂誠不可掩者在宗門不謂之知性也固哉安羲儒與佛有二性乎孟子曰天下之言性也則故而已矣故者以利為本誠利之則忠義若禹之行水矣何血心之能與焉大慧亦言菩提心者即忠義心是余讀金熊兩先生書其於君臣師友間至性激發若水寒而火熱然其真丈夫之雄法門之傑乎顧世之論魚山者頗異予詳其行事著於篇俟論世者徵焉汪大紳云予少時未聞道日極服忠義之士謂忠義之士便是聖賢便是活佛活菩薩此外有甚聖賢有甚佛菩薩後來反覆推勘方曉得忠義之士能了手者實難其人聖賢之學當生則生當死則死一循乎天理即此是忠義即此是道非忠義之外另有甚麼道也但於忠義上一些也攙和不得纔攙和一些子便非天理於道即有未盡也佛菩薩之學如何是忠義曰本來空是如何是本來空曰忠義是當體即是一真實而已矣即此是忠義即此是道亦非忠義之外另有甚麼道也但於忠義上一些也污染不得纔污染一些子便非真實於道即有未盡也予於道有聞而進之不勇者坐忠義之心微故耳忠義之微坐為好名好色之念所汩而已誓當上面截斷道學佛學不留一元字脚下面截斷好名好色不留一元字脚專提忠義二字為金剛寶杵佛來一擊魔來一擊臨濟德山何有哉大慧高峯何有哉
