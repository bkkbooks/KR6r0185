body:
  text: 張平叔傳張平叔初名伯端後改名用誠號紫陽天台人也熙寧中遊蜀遇劉海蟾授以丹法久之洞徹法源作悟真內外篇序云人之生也皆緣妄情而有其身有其身則有患若無身患從何有夫欲免夫患者莫若體夫至道欲體夫至道莫若明夫本心故心者道之體也道者心之用也人能察心觀性則圓明之體自現無為之用自成不假施功頓超彼岸此非心境朗然神珠廓明則何以使諸相頓離纖塵不染心源自在決定無生者哉然使明心體道之士身不能纍其性境不能亂其真則刀兵烏能傷虎兕烏能害巨焚大浸烏足為虞達人心若明鏡鑑而不納隨機應物和而不唱故能勝物而無傷也此所謂無上至真之妙道也原其道本無名聖人強名道本無言聖人強言耳然名言若寂則時流無以識其體而歸其真是以聖人設教立言以顯其道奈何此道至妙至微世人根性迷鈍執有其身而惡死悅生故卒難了悟黃老悲其貪著乃以修生之術順其所欲漸次導之以修生之要在金丹金丹之要在神水華池故道德陰符之教得盛行於世矣然其言隱而理奧學者雖諷其文而莫曉其義若不遇至人授之口訣縱揣量百種終莫能著其功而成其事余向己酉歲於成都遇師授丹法自後三傳於人三遭禍患皆不逾兩旬乃省前過自今以往常箝口結舌無敢復言矣此悟真篇中所歌咏大丹藥物火候細微之旨無不備悉好事者夙有仙骨觀之則智慮自明此乃天之所賜非余之輒傳也如其篇末歌頌談見性之法即上之所謂無為妙覺之道也然無為之道齊物為心雖顯祕要終無過咎奈何凡夫緣業有厚薄性根有利鈍縱聞一音紛成異見若有根性猛利之士見聞此篇則知余得達摩諸祖最上一乘之妙旨可因一言而悟萬法也如其習氣尚餘則歸中小之見亦非余之咎矣外篇偈頌三十三首文多不録録其無心頌云堪笑我心如頑如鄙兀兀騰騰任物安委不解修行亦不造罪不曾利人亦不私己不持戒律不拘忌諱不知禮樂不行仁義人間所能百無一會飢來喫飯渴來飲水困則打睡覺則行履熱則單衣寒則蓋被無思無慮何憂何喜不悔不謀無念無意此生榮辱逆旅而已林木棲鳥亦可為比來亦不禁去亦不止不避不求無讚無毀不厭醜惡不羡善美不棲靜室不遠閙市不説人非不誇己是不厚尊官不薄賤稚親愛冤讐大小內外哀樂得喪欽侮險易心無兩覩坦然一揆不為福先不為禍始感而後應迫而後起不畏鋒刃焉怕虎兕隨物稱呼豈拘名字眼不就色聲不來耳凡所有相皆屬妄偽男女形聲悉非定體體相無心不染不礙自在逍遙物莫能纍妙覺光圓映徹表裏包褁六極無有遐邇光兮非光如月在水取捨既難復何比擬了茲妙用迥然超彼或問所宗此而已矣年九十一坐趺而化用茶毗法得舍利千百大者如芡實色皆紺碧至淳熙中嘗一還家踞上席與家人語化後事甚悉時其孫不在及歸則已遠去矣其弟子有王叔者從平叔九年不知入道之要一日至羅浮觀平叔問曰子從我久矣而不求道何也曰非敢然也自揣愚昧恐無分耳平叔曰噫道在我心人人有之賢者不加多愚者不加少如子言是自蔽其明也可哀也哉叔涕泗交頤拜不能起平叔曰子姑退而深思之有所覺急來告我叔辭去入室靜思至夜平叔往省之叔啓戶出平叔笑曰吾一尋汝便見頭面汝固有之物尋之不得何也遂滅所執燭而去叔大窘坐至五更大悟通體汗流待旦呈頌曰月照長江風浪息魚龍遁迹水天平箇中誰唱真仙子聲滿虗空萬籟清平叔覽之問曰誰唱誰聽叔再頌曰莫問誰莫問誰一聲高了一聲低阿誰唱阿誰聽橫竪大千説不盡先生有意度迷津急撞靈臺安寶鏡鏡明澄靜萬緣空百萬絲條處處通斗轉星移人睡定覺來紅日正當中平叔遂出金丹圖授之止於羅浮後三十年坐逝天台志悟真篇青華祕文知歸子曰世之學仙者往往執幻為真從空覓有迷失真常歷諸塵劫首楞嚴經呵之切矣平叔雖志慕金丹其所論撰往往契西來大意於老氏之徒可謂具正知見者豫故表而出之汪大紳云豫嘗略觀其書蓋在佛老門中能真實踐履者然以明眼人觀之得毋坐在閨閣中做功課者乎
