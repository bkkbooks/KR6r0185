body:
  text: 宗汝霖張德遠傳宗汝霖名澤婺州義烏人也母夢大雷電有光下燭寤而生汝霖元祐六年登進士第歷官州縣為人磊磊有節概忠勇出於至誠深信一乘樂宣說正法宣和六年義烏滿心寺鑄大鐘成為之記曰如來以大悲心欲令眾生於十二時中因耳所聞生利益見不為欲所沉迷不為邪所障蔽斷除惡念滋種善根於是建置洪鐘以時撞擊俾有識無識虗懷聽受隨所聞聲因緣入道譬如雷霆蟄驚牙甲昆蟲悉皆感悟所以者何日將旦羣動咸作奔趨爭逐擾擾競前於是警之廣令眾生起戒懼心暨至食時飢火煎迫噉涎貪噬腥羶無厭於是警之廣令眾生起齊潔心日之方中交易為市矜智嚇愚籠絡利己於是警之廣令眾生起方便心昧谷斂昏陰邪氣盛一念差誤為盜為淫於是警之廣令眾生起畏懼心至夜未央神識俱晦夢想顛倒莫覺莫知於是警之廣令眾生起脩省心人之云亡氣魄隨去倀倀冥行莫知所趨於是警之廣令眾生起依歸心如是等心悉由中起念念勿絕證無上道滿心古剎也舊雖有鐘形度小瑣發響焦急無從容韻寺僧有宗徧募檀越弋陽主簿葉天將捐財唱之和者沓至於是大體鈞模采鳧氏法規天地以為爐翕陰陽以鼓氣回祿騰焰飛廉助威神施鬼設一瀉而就徽以金索懸而擊之隱隱闐闐滿虗空界四生六道濡滯幽冥聽此法聲悉皆解脫茲勝事也樂為頌云人得是身不自愛重貪殘暴忍長惡弗悛劫劫輪廻歷盡苦報如來悲憫以鐘代言俾眾生聞警覺省悟隨聲懺悔滋益善心予適宰官代佛宣說願咸諦聽無量無邊靖康初知磁州康王再使金過磁汝霖力止之金人破真定詔以汝霖為副元帥從康王起兵入援與金人大小十數戰輙以少勝眾金人憚之呼曰宗爺康王即位南京汝霖入見上疏陳復大計其言洞達心法識治體其一事云臣聞情生於愛愛生於見見生於目之所遇與左右之所接所遇所接果順於己則喜喜則賞之賞之者非懋其功也賞其順己而已耳所遇所接果逆於己則怒怒則罰之罰之者非罰其罪也罰其逆己而已耳如是則賞罰出於喜怒喜怒出於逆順可謂之公而無私乎賞罰徇私其何以礪世磨鈍大有為於天下乎聖人無我故忘情忘情故忘逆順忘逆順故忘喜怒故賞一善而天下之為善者勸知其非私善也罰一惡而天下之為惡者沮亦知其非私惡也一賞一罰歸之至公而我無容心焉人其不心悅而誠服者乎陛下所以號令天下使人知所趨知所避知所行知所止者賞罰而已昔文王一怒而安天下之民武王亦一怒而安天下之民是怒也豈發於目之所遇與左右之所接哉彼仇方橫肆兇慕侵侮王室臣願陛下如文王武王亦一怒而安天下之民有賞有罰惟平惟一至於應酬萬幾進退取予之際斷之至公以慰天下之望尋以李伯紀薦知開封府兼留守事遂修復京城招降巨宼王善楊進等百萬眾河北諸山寨皆受節制金人來攻輙敗去疏請回鑾凡二十四上高宗不從建炎二年汝霖糾合諸將尅日大舉會疽發於背諸將入問疾語之曰吾以二帝蒙塵積憤至此汝等能殲敵則我死無恨眾皆流涕翼日風雨晝晦汝霖連呼渡河者三遂卒贈觀文殿學士諡忠簡汝霖既卒數日間將士散去者十五六已而盡散去而中原不守矣汝霖甞作覧鏡偈曰覧鏡影還在掩鏡影還去試問鏡中人却歸什麼處又作休牧軒頌曰空餘短笠與輕蓑道作休時事更多更向中間問消息夜深無奈月明何同縣人陳允昌字得全汝霖父執也亦好佛法屏居小室宴坐湛然離諸染著年八十八將卒飲沉水香湯三日恬然而逝汝霖志其事而銘之曰公坐一室心自內觀了知六塵皆是幻妄故於財色盡欲遠離方寸泊然清淨圓滿公無所住子復何言宋史宗忠簡集張德遠名浚漢州綿竹人也政和八年登進士第高孝兩朝再登政府封魏國公以復為己任遭讒被斥志不少挫士大夫視其進退以為憂喜其用兵雖屢衂人咸諒其忠不以為罪也初居京師遇處士譙定教以熟讀論語始有志於道已而問法於圓悟禪師師曰巖頭云却物為上逐物為下若能於物上轉得疾一切立在下風德遠有省呈偈曰教外單傳佛祖機本來無悟亦無迷浮雲散盡青天在日出東方夜落西師囑之曰公他日無忘護教甞作虎邱轉輪大藏記曰虎邱號吳郡勝處晉王珣與弟珉宅石㵎之東西已而捨為佛剎本朝至道中革律為禪紹與八年予謫居零陵住持宗達以書抵予曰我與紹隆同嗣法於圓悟禪師隆甞建立轉輪大藏效彌勒示現體製施軸於中負戴其上規模甚偉方議卜築隆適告寂我夙夜究力益勵精誠再閱寒暑功績甫就平高益下棟宇翼然琅函貝葉輝燦焜燿信士鄒珉目規口歎盡損所有獨力莊嚴於我法中為大緣事敢以請記夫世變之興其來有自因欲生愛因愛生貪因貪生忿欲愛貪忿是謂無明展轉交攻激為鬬亂怨深禍結殆不偶然我佛以清淨立教使人回心歸善一念倘正和氣自生其於教化似非小補是以有請而無媿余聞佛為一大事因緣故出現於世種種警喻發明空理丁寧反覆務息塵勞現大光明饒益照耀妙用神通不可思議將見斯藏之成覩相增信由信趨善宿習退轉直證圓通孝弟和睦之心油然而起宜勤守護用永其傳大慧禪師居泉州應德遠請入徑山甞遣其徒謙候德遠於長沙德遠母秦國夫人故奉佛日常誦經禮拜及謙至因問徑山何以教人謙言祇教人看狗子無佛性及竹篦子話夫人退而習坐力究前話一夕忽有省回看經文無滯遂作偈寄呈大慧曰逐日看經文如逢舊識人莫言頻有礙一舉一回新及卒遺命供大慧一年以報激揚之恩德遠從之晚歲除醴泉觀使寓餘干日讀易不輟書座右曰慎言語節飲食致命遂志反身修德尋得疾卒贈太師諡忠獻朱子文集虎邱志五燈會元知歸子曰予讀宗公上高宗諸䟽本末貫徹卓然命世才也其於佛法的的見大意故其轉物之智不窮張公忠孝大節不後宗公而機用則稍踈矣其護法之誠不可沒也因合而論之汪大紳云出家乃大丈夫之事非將相所能為若宗忠簡公斯大丈夫矣將相云乎哉魏公盖其同志合傳之是也
