body:
  text: 牟安支二竺闕孫謝傳佛法之東自漢明帝始永平三年帝夢見神人身長丈六尺項有日光飛在殿前明日博問羣臣何神人也傅毅進曰臣按周書異記云昭王二十四年四月八日平旦時大風起宮殿民居震動其夜有五色光氣貫太微遍於四方作青赤色王問太史蘇由曰是何祥也對曰西方有大聖人降生後一千年聲教被此土王使鐫石記之瘞於南郊天祠前以年計之今一千一十年矣陛下所夢將是乎帝以為然遣郎中蔡愔博士蔡景王遵等十有八人西訪其道至大月氏國遇迦葉摩騰竺法蘭持優填王所造㲲像并四十二章經而東遂與偕至洛陽帝為立寺雍門外由是象教興焉其後王公貴人禱祀祈福者衆實罕明其道學士大夫格以五經之文斥為異術有蒼梧牟融者作理惑論以解之問曰何以正言佛佛何謂也牟子曰佛乃道德之元祖神明之宗緒佛之言覺也恍惚變化分身散體能圓能方或小或巨或隱或彰蹈火不燒履刃不傷在汙不染在禍無殃欲行則飛坐則揚光故號為佛問曰何以謂之道道何類也牟子曰道之言導也導人致於無為牽之無前引之無後舉之無上抑之無下視之無形聽之無聲四表為大宛延其外毫釐為細間關其內故謂之道問曰孝經言身體髮膚受之父母不敢毀傷曾子臨歿啓豫手足今沙門剃頭何其違聖人之語不合孝子之道也牟子曰昔齊人乘船渡江其父墮水其子攘臂捽頭顛倒水從口出父命得蘇夫捽頭顛倒不孝莫大然以全父之身若拱手修孝子之常父命絶水矣孔子曰可與適道未可與權所謂時宜施者也且泰伯斷髮文身自從吳越之俗違於身體髮膚之義然孔子稱之其可謂至德矣由是而觀苟有大德不拘於小沙門捐家財棄妻子不聽音不視色讓之至也何違聖語不合孝乎問曰佛言人死當復更生僕不信此言也牟子曰身譬五穀之根葉魂神五穀之種實根葉生必當死種實豈有終亡問曰佛道崇無為樂施與持戒兢兢今沙門耽好酒漿或畜妻子取賤賣貴專行詐紿此得謂之無為耶牟子曰工輪能與人斧斤繩墨而不能使人巧聖人能授人道不能使人履而行之皋陶能罪盜人不能使貪夫為夷齊五刑能誅無狀不能使惡人為曾閔堯不能化丹朱周公不能訓管蔡豈唐教之不著周道之不備哉然無如惡人何也問曰吾子之說其辭富其文熾是子之辨也牟子曰非辨也見博故不惑耳問曰見博亦有術乎牟子曰由佛經也吾未解佛經之時惑甚於子雖誦五經適以為華未成實矣吾既覩佛經之說覽老子之要守恬淡之性觀無為之行還視世事猶臨天井而窺溪谷登嵩岱而見邱垤矣問曰吾昔在京師入東觀遊太學視俊士之所規聽儒林之所論未聞修佛道以為貴自損容以為上也吾子曷為耽之哉牟子曰老子曰名者身之害利者行之穢赴趣閒隙務合當世此下士之所行中士之所廢也况至道之蕩蕩上聖之所行乎杳兮如天淵兮如海不合窺墻之士數忉之夫固其宜也彼見其門我覩其室彼采其華我取其實彼求其備我守其一子速改路吾請履之論凡三十七條其大指如此融才甚高通百家之說見漢末天下擾亂屢被州辟不起太守復委以使命以母喪不果行既而歎曰老子絶聖棄智修身保真萬物不干其志天下不易其樂故可貴也於是鋭志佛法兼研老子五千言肆志相羊終身不仕佛祖通載宏明集安元安息國人也志性貞白為優婆塞嚴秉法戒博通群經漢靈帝末游宦洛陽官騎都尉常與沙門講論道義時僧佛調方譯法鏡經元口譯梵文佛調筆受詞旨兩得見述後代出三藏記集支恭明名謙一名越大月支人也大父法度以漢靈帝世率國人數百歸化拜率善中郎將恭明年七歲騎竹馬戲於鄰家為狗所嚙傷脛鄰人欲殺狗取肝傅瘡恭明曰天生此狗為人守吠我若不來終不見嚙失在於我非關於狗殺之得差尚不可為況無益而招大罪由是鄉人數十家感其言悉不復殺生十歲學書十三歲學梵書通六國語博覽經籍兼綜藝術嘗受業於支亮亮又受業於支讖當桓靈世新出佛經多讖所譯當世稱之曰天下博知無出三支獻帝末遭寇亂恭明與鄉人數十避地歸吳初發日惟有一被有客隨之大寒無被恭明呼與共臥夜將半客奪被而去明旦同侶問被所在語以故咸曰何不相告答曰我若相告卿等必以劫罪罪之豈宜以一被而殺一人乎聞者歎服既至吳吳主孫權聞其博學有才即召見之問經中深隱之義恭明應機釋難無疑不析權甚悅拜為博士使輔導東宮嘗譯摩詰大般泥洹法句瑞應本起等二十七經辭旨文雅盛傳於世其後太子即位遂隱於穹窿山不交世務從道人竺法蘭更鍊五戒凡所游從皆沙門而已年六十卒於山中出三藏記集竺叔蘭本天竺人也其大父婁陀好學有節操時國王無道有為將者得罪懼誅欲要婁陀共反婁陀拒之遂殺婁陀以作亂婁陀子達摩尸羅先在他國聞亂即與其婦兄二人之為沙門者奔晉居於河南生叔蘭叔蘭幼從二舅受經法一聞輒悟通華梵語及書然性輕躁好遊獵嘗遇虎墮馬折其右臂母數呵禁終不改已而為之蔬食乃止頃之暴亡三日而蘇自言入一朱門金銀為堂見一人自云是其大父謂叔蘭曰吾修善纍年今得此報汝罪人何得來耶守門者以杖驅之入竹林中見其獵伴為鷹犬所齧流血號叫叔蘭走避數十步值牛頭人欲扠之叔蘭曰吾纍世佛弟子常供二沙門何罪見治牛頭曰此雖有福不救獵罪俄而見其兩舅來語牛頭曰我等二人恆受其供惡少善多可得相免二舅遂導之還家俄而蘇於是改節修慈專志經法以晉元康元年譯出放光經及異維摩詰經十餘萬言旋遭母喪葬畢遇石勒之亂避之荊州後無疾忽告知識曰吾將死矣數日便卒出三藏記集竺長舒亦天竺人也晉初內徙居於吳奉法精至尤䖍誦觀世音經比鄰失火長舒家在下風敕家人不得動唯一心念觀世音頃之火忽自熄有諸少年心怪之後一夕密束炬擲其屋四擲皆滅乃大驚以為神各走還家明晨相率詣長舒稽顙謝自說昨事長舒曰我無神力止念觀世音力耳諸君但當洗心信向毋自恐也於是鄉里間咸知奉法辨正論闕公則者趙人也晉武帝時居於洛陽蕭然恬放日常誦正法華經既卒其友為設會於白馬寺至夕轉經忽聞空中有聲仰視一人形色光麗曰我闕公則也生西方安樂世界與諸上人來此聽經堂中人共見之有汲郡衛士度者受業於公則其母常飯僧是日將中忽空中下鉢正落母前諦視之乃公則常所用鉢也有飯滿中其香充堂食者七日不飢支道林為之讚曰大哉闕公歆虗納靈神化西域跡應東京徘徊霄墟流響耀形豈欽一贊示以匪冥大唐內典録念佛寶王三昧論按他書撰引公則為東林社中人今據二書正之孫興公名綽太原中都人遷會稽早慕淵泊之行與名僧支遁遊放曠山水撰喻道論其略曰或有疑至道者喻之曰夫六合遐邈庶類殷充千變萬化渾然無端是以有方之類各岐所見鱗介之物不達皋壤之事毛羽之族不識流浪之勢自得於窞井者則怪游溟之量翻翥於數仞者則疑冲天之力焉復觀夫方外之妙趣寰中之元照乎夫佛也者體道者也道也者導物者也應感順通無為而無不為者也無為故虗寂自然無不為故神化萬物萬物之情高卑不同故訓教之術或精或粗悟上識則舉其宗本遇中材則示以禍福歷觀古今禍福之證皆有由緣豈可掩哉何者陰謀之門子孫不昌三世之將道家明忌斯非兵凶戰危積殺之所致耶夫魏顆從治而致結草之報子都守信而受驄驥之賜齊襄委罪故有墜車之禍晉惠棄禮故有斃韓之困斯皆死者報生之也立德暗昧之中慶彰萬物之上陰行陽耀自然之利至也或難曰報應之事誠皆有徵則周孔之教何不去殺答曰客可謂達教聲而不體教情者也謂聖人有殺心乎曰無也答曰誠知其無心於殺殺固百姓之心耳夫時移世易滋有薄淳結繩之前陶然太和暨於唐虞禮法始興爰逮三代刑網虎章刀斧雖嚴而猶不懲至於君臣相滅父子相害吞噬之甚過於豺虎聖人知人情之固於殺不可一朝而息故漸抑以求厥中猶蝮蛇螫足斬之以全身癰疽附體決之以救命亡一以存十亦輕重之所權舉茲以求足以悟其歸矣或難曰周孔適時而教佛欲頓去之將何以懲暴止姦統理群生哉答曰周孔即佛佛即周孔佛者覺也覺之為義悟物之謂應世軌物蓋亦隨時周孔救極弊佛教明其本共為首尾其致不殊即如堯舜世夷二后高讓湯武時難兩君揮戈淵默之與赫斯其跡則胡越然其所以跡者何嘗有際哉故逆尋者每見其二順通者無往不一或難曰周孔之教以孝為首三千之責莫大無後而沙門之道委離所生生廢色養終絶血食背理傷情莫此之甚而云宏道敦仁廣濟群生皮之不存毛將焉附答曰父子一體惟命同之父隆則子貴子貴則父尊故孝之為貴貴能立身行道永光厥親若匍匐懷袖日御三牲而不能令萬物尊已舉世我賴以之養親其榮近矣昔佛為太子棄國學道垂條為宇結草為茵端坐六年道成號佛於是游步三界之表恣化無窮之境大範群邪遷之正路衆魔小道靡不遵服於斯時也天清地潤品物咸亨蠢蠕之生浸育靈液枯槁之類化瘁為榮還照本國廣敷法音父王感悟亦升道場以此榮親何孝如之而俗人不詳其源流未涉其場肆瞽言妄說輒生攻難以螢燭之見疑三光之盛芒隙之滴怪淵海之量可謂狎大人而侮天命者也既襲父爵為長樂侯哀帝朝官散騎常侍領著作郎桓溫將遷都洛陽人情疑懼興公上疏力爭溫大慍然卒莫能難也尋轉廷尉卒年五十八晉書宏明集謝慶緒名敷會稽山陰人性澄靜寡欲隱於太平山十餘年篤信大法長齊奉佛招引同事化納不倦自注安般守意經為之敘曰夫意也者衆苦之萌基背正之元本荒迷放蕩浪逸無涯彈指之間九百六十轉一日一夕十三億想念一身所種滋蔓彌劫凡在三界倒見之徒弱喪淵流莫能自反正覺慈愍開正慧路漸塞忿欲之微兆為啓安般之要徑泯生滅以冥寂伸道品以養恬建十慧以入微縶九神之逸足防七識之洪流故曰守意也若乃制伏粗垢拂剗漏結閉色聲於視聽遏塵想以禪寂乘靜泊之禎祥納色天之嘉祚然正志荒於華樂昔習沒於交逸福田矜執而日零毒根迭興而罪襲是以輪回五趣億劫難拔嬰罹欲網有劇深牢由於無慧樂定不惟道門使其然也至於乘慧入禪亦有三輩或畏苦滅色樂宿泥洹志存自濟不務兼利者為無著乘或仰希妙相仍有遣無不建大悲練盡緣縛者則號緣覺菩薩者深達本有暢因緣無達本者有有自空暢無者因緣常寂自空故不出有以入無常寂故不盡緣以歸空苟厝心領要觸有悟理者則不假外以靜內不因禪而成慧故曰阿惟越致不隨四禪也若欲塵翳心慧不常立者乃假以安般息其馳想猶農夫之淨地明鏡之瑩剗然則耘耨不以為地地淨而種滋瑩剗非以為鏡鏡淨而照明矣又嘗手寫首楞嚴經置都下白馬寺寺為鄰火所延其什物及他經並燼而此經文字獨完惟毀紙邊而已尋以母老還南山若耶中內史郗愔表薦之徵博士不起會月犯少微占者以隱士當之人言當應在戴逵俄而慶緒卒逵字安道譙郡人亦有高行孝武時纍徵不就善屬文兼工藝事欲造無量壽佛積思三年雕刻方就迎置山陰靈寶寺郗超見而作禮撮香在手勃然烟上極目雲表衆皆歎其神異子顒能世其業出三藏記集晉書冥祥記法苑珠林知歸子曰當牟子之世佛法未盛行而牟子篤信其道豈非獨往之士哉安支竺闕之徒宏法扶戒導信化疑亦甚為希有者矣東晉之初風教漸廣王導庾亮周顗謝鯤桓之屬皆嘗與梵僧尸利密多羅游謝安居東山降心支遁遁奉詔入禁中講經會宗遺文守文者陋之安聞而歎曰此九方歅之相馬略元黃取神駿者也至如王羲之坦之珣珉許詢習鑿齒各與緇流津接大率名言相永自標遠致而已咸康中庾氷輔政奏沙門應盡禮王者下禮官議何充等以為不宜壞其本法執奏至三氷議遂寢充篤信佛法飯僧造寺所費不訾阮裕嘗謂之曰卿志大宇宙勇邁終古充問其故裕曰我圖數千戶郡未得卿圖作佛不亦大乎蓋嘲之也充弟準高尚寡欲散帶衡門日誦佛經其他士大夫信向雖衆修行軌則罕有聞焉不得而著也逮至晉宋之交始有東林之盛應化神靈繼此騰集矣豫録牟子以下諸賢行業及其論議雖未詣淵微而其意已遠岷江之流始於濫觴又可少乎哉汪大紳云為傳中不可少之文所記事言雖淺然亦近實千經萬典流傳有外於四十二章之旨乎千聖萬賢出沒有外於導人以無為之化乎佛者覺也盡之矣
